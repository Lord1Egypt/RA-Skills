<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>__REPORT_TITLE__</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap">
<style>
/* ===================================================
   CSS VARIABLES — 所有颜色、间距、圆角集中管理
   修改主题只需改这里
   =================================================== */
:root {
  /* -- 背景 -- */
  --bg-body: #0a0e1a;
  --bg-slide: linear-gradient(135deg, #0f1629 0%, #1a1f3a 50%, #0f1629 100%);
  --bg-slide-border: rgba(100, 140, 255, 0.15);
  --bg-slide-shadow: 0 20px 80px rgba(0,0,0,0.5), 0 0 60px rgba(80,120,255,0.08);
  --bg-slide-glow: radial-gradient(circle, rgba(80,120,255,0.06) 0%, transparent 70%);
  --bg-card: rgba(255,255,255,0.03);
  --bg-card-border: rgba(255,255,255,0.06);

  /* -- 文字 -- */
  --text-primary: #e0e6f0;
  --text-secondary: #8899bb;
  --text-tertiary: #5a6a8a;
  --text-muted: #3a4a6a;
  --text-white: #ffffff;

  /* -- 主题色 -- */
  --color-blue: #5070ff;
  --color-blue-light: #7cacff;
  --color-blue-text: #a0b4ff;
  --color-blue-bg: rgba(80,112,255,0.12);

  --color-purple: #7c3aed;
  --color-purple-light: #a78bfa;
  --color-purple-text: #c4b5fd;
  --color-purple-bg: rgba(124,58,237,0.12);

  --color-green: #10b981;
  --color-green-light: #34d399;
  --color-green-text: #6ee7b7;
  --color-green-bg: rgba(16,185,129,0.12);

  --color-orange: #f59e0b;
  --color-orange-light: #fbbf24;
  --color-orange-text: #fcd34d;
  --color-orange-bg: rgba(245,158,11,0.12);

  --color-red: #ef4444;
  --color-red-light: #fb923c;
  --color-red-text: #fca5a5;
  --color-red-bg: rgba(239,68,68,0.08);

  --color-gray: #64748b;
  --color-gray-text: #cbd5e1;
  --color-gray-bg: rgba(100,116,139,0.15);

  /* -- 渐变 -- */
  --gradient-title: linear-gradient(135deg, #ffffff 0%, #7cacff 50%, #a78bfa 100%);
  --gradient-accent: linear-gradient(135deg, #5070ff, #a78bfa);

  /* -- 间距 -- */
  --slide-width: 1280px;
  --slide-min-height: 720px;
  --slide-padding: 60px 70px;
  --slide-padding-content: 40px 50px;
  --slide-margin: 40px auto;
  --slide-radius: 20px;
  --card-radius: 14px;
  --widget-radius: 8px;
  --gap-section: 24px;
  --gap-card: 16px;
  --gap-inline: 8px;

  /* -- 字体 -- */
  --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --font-cover-title: 52px;
  --font-slide-title: 34px;
  --font-section-title: 18px;
  --font-card-title: 16px;
  --font-body: 14px;
  --font-small: 12px;
  --font-footer: 11px;

  /* -- 动画 -- */
  --animation-duration: 0.6s;
  --animation-easing: cubic-bezier(0.16, 1, 0.3, 1);
}

/* ===================================================
   亮色主题（投影仪友好）
   在 <body class="light"> 激活
   =================================================== */
body.light {
  --bg-body: #f5f7fa;
  --bg-slide: linear-gradient(135deg, #ffffff 0%, #f8f9fc 50%, #ffffff 100%);
  --bg-slide-border: rgba(0, 0, 0, 0.08);
  --bg-slide-shadow: 0 10px 40px rgba(0,0,0,0.08);
  --bg-slide-glow: radial-gradient(circle, rgba(80,120,255,0.03) 0%, transparent 70%);
  --bg-card: rgba(0,0,0,0.02);
  --bg-card-border: rgba(0,0,0,0.06);

  --text-primary: #1a1a2e;
  --text-secondary: #4a5568;
  --text-tertiary: #718096;
  --text-muted: #a0aec0;
  --text-white: #1a1a2e;

  --gradient-title: linear-gradient(135deg, #1a1a2e 0%, #3b5998 50%, #6b46c1 100%);
  --gradient-accent: linear-gradient(135deg, #3b5998, #6b46c1);
}

/* ===================================================
   RESET & BASE
   =================================================== */
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-family);
  background: var(--bg-body);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ===================================================
   SLIDE 基础
   =================================================== */
.slide {
  max-width: var(--slide-width);
  width: 100%;
  min-height: var(--slide-min-height);
  margin: var(--slide-margin);
  background: var(--bg-slide);
  border-radius: var(--slide-radius);
  border: 1px solid var(--bg-slide-border);
  box-shadow: var(--bg-slide-shadow);
  padding: var(--slide-padding);
  position: relative;
  overflow: hidden;
  page-break-after: always;
}

.slide::before {
  content: '';
  position: absolute;
  top: -50%;
  right: -30%;
  width: 800px;
  height: 800px;
  background: var(--bg-slide-glow);
  pointer-events: none;
}

/* ===================================================
   COVER SLIDE
   =================================================== */
.slide-cover {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  min-height: 600px;
  text-align: center;
}
.cover-badge {
  display: inline-block;
  background: linear-gradient(135deg, var(--color-blue-bg), var(--color-purple-bg));
  border: 1px solid rgba(80,120,255,0.3);
  border-radius: 30px;
  padding: 8px 24px;
  font-size: var(--font-body);
  font-weight: 500;
  color: var(--color-blue-light);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 30px;
}
.cover-title {
  font-size: var(--font-cover-title);
  font-weight: 800;
  background: var(--gradient-title);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.25;
  margin-bottom: 20px;
}
.cover-subtitle {
  font-size: 20px;
  color: var(--text-secondary);
  font-weight: 400;
  margin-bottom: 50px;
  max-width: 800px;
  line-height: 1.6;
}
.cover-meta {
  display: flex;
  gap: 40px;
  color: var(--text-tertiary);
  font-size: var(--font-body);
}

/* ===================================================
   SLIDE HEADER
   =================================================== */
.slide-header { margin-bottom: 32px; }
.slide-number {
  font-size: var(--font-small);
  font-weight: 600;
  color: var(--color-blue);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.slide-title {
  font-size: var(--font-slide-title);
  font-weight: 700;
  color: var(--text-white);
  line-height: 1.3;
}
.slide-title span {
  background: var(--gradient-accent);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.slide-subtitle {
  font-size: 15px;
  color: var(--text-secondary);
  margin-top: 10px;
}

/* ===================================================
   CARD — 通用卡片
   =================================================== */
.card {
  background: var(--bg-card);
  border-radius: var(--card-radius);
  border: 1px solid var(--bg-card-border);
  padding: 24px;
  position: relative;
  transition: transform 0.2s;
}
.card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.2);
}

/* ===================================================
   METRIC TABLE — 数据表格（替代 inline style）
   =================================================== */
.metric-table {
  width: 100%;
  border-collapse: collapse;
}
.metric-table th,
.metric-table td {
  padding: 12px 16px;
  text-align: left;
  font-size: var(--font-body);
  border-bottom: 1px solid var(--bg-card-border);
}
.metric-table th {
  font-weight: 600;
  color: var(--text-secondary);
  font-size: var(--font-small);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.metric-table td {
  color: var(--text-primary);
}
.metric-table tr:last-child td { border-bottom: none; }

.metric-row {
  display: grid;
  grid-template-columns: 1.5fr repeat(3, 1fr) 0.8fr;
  gap: 12px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--bg-card-border);
  align-items: center;
  font-size: var(--font-body);
}
.metric-row:last-child { border-bottom: none; }
.metric-row.header {
  font-size: var(--font-small);
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.metric-value {
  font-weight: 700;
  font-size: 18px;
}
.metric-value.up { color: var(--color-red); }
.metric-value.down { color: var(--color-green); }
.metric-change {
  font-size: var(--font-small);
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 4px;
}
.metric-change.up { background: var(--color-red-bg); color: var(--color-red-text); }
.metric-change.down { background: var(--color-green-bg); color: var(--color-green-text); }

/* ===================================================
   STORYLINE
   =================================================== */
.storylines { display: flex; flex-direction: column; gap: var(--gap-section); }
.storyline {
  background: var(--bg-card);
  border-radius: 16px;
  border: 1px solid var(--bg-card-border);
  padding: 28px 32px;
  position: relative;
  overflow: hidden;
}
.storyline::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
}
.storyline-1::before { background: linear-gradient(180deg, var(--color-blue), var(--color-purple-light)); }
.storyline-2::before { background: linear-gradient(180deg, var(--color-green), var(--color-green-light)); }
.storyline-3::before { background: linear-gradient(180deg, var(--color-orange), var(--color-orange-light)); }
.storyline-header { display: flex; align-items: center; gap: 16px; margin-bottom: 14px; }
.storyline-num {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 800; color: #fff;
}
.storyline-1 .storyline-num { background: linear-gradient(135deg, var(--color-blue), var(--color-purple)); }
.storyline-2 .storyline-num { background: linear-gradient(135deg, var(--color-green), #059669); }
.storyline-3 .storyline-num { background: linear-gradient(135deg, var(--color-orange), #d97706); }
.storyline-title { font-size: 20px; font-weight: 700; color: var(--text-white); }
.storyline-path { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
.path-node { padding: 6px 14px; border-radius: var(--widget-radius); font-size: 13px; font-weight: 600; white-space: nowrap; }
.storyline-1 .path-node { background: var(--color-blue-bg); border: 1px solid rgba(80,112,255,0.25); color: var(--color-blue-text); }
.storyline-2 .path-node { background: var(--color-green-bg); border: 1px solid rgba(16,185,129,0.25); color: var(--color-green-text); }
.storyline-3 .path-node { background: var(--color-orange-bg); border: 1px solid rgba(245,158,11,0.25); color: var(--color-orange-text); }
.path-arrow { color: var(--text-muted); font-size: 14px; font-weight: 600; }
.storyline-desc { font-size: var(--font-body); color: var(--text-secondary); line-height: 1.7; }
.storyline-desc strong { color: #c0ccee; }

/* ===================================================
   DECISION CARDS
   =================================================== */
.decisions { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.decision-card {
  background: var(--bg-card);
  border-radius: var(--card-radius);
  border: 1px solid var(--bg-card-border);
  padding: 24px;
}
.decision-card.full-width { grid-column: 1 / -1; }
.decision-icon {
  width: 40px; height: 40px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; margin-bottom: 14px;
}
.decision-icon.blue { background: var(--color-blue-bg); }
.decision-icon.purple { background: var(--color-purple-bg); }
.decision-icon.green { background: var(--color-green-bg); }
.decision-icon.orange { background: var(--color-orange-bg); }
.decision-title { font-size: var(--font-card-title); font-weight: 700; color: var(--text-white); margin-bottom: 8px; }
.decision-content { font-size: 13px; color: var(--text-secondary); line-height: 1.7; }
.decision-options { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
.option { display: flex; align-items: center; gap: 8px; font-size: 13px; }
.option-a { color: var(--color-blue-text); }
.option-b { color: var(--color-orange-text); }
.option-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.option-a .option-dot { background: var(--color-blue); }
.option-b .option-dot { background: var(--color-orange); }

/* ===================================================
   NEXT STEPS / TIMELINE
   =================================================== */
.next-steps { display: flex; flex-direction: column; gap: var(--gap-card); }
.step {
  display: flex; align-items: flex-start; gap: 18px;
  background: var(--bg-card);
  border-radius: 12px;
  border: 1px solid var(--bg-card-border);
  padding: 20px 24px;
}
.step-time {
  min-width: 80px;
  padding: 6px 12px;
  border-radius: var(--widget-radius);
  background: var(--color-blue-bg);
  border: 1px solid rgba(80,112,255,0.2);
  color: var(--color-blue-light);
  font-size: var(--font-small);
  font-weight: 600;
  text-align: center;
  white-space: nowrap;
}
.step-content { flex: 1; }
.step-title { font-size: 15px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
.step-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
.step-owner {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  background: var(--color-purple-bg);
  border: 1px solid rgba(167,139,250,0.2);
  color: var(--color-purple-text);
  font-size: 11px; font-weight: 600; margin-top: 6px;
}

/* ===================================================
   COST / BUDGET CARDS
   =================================================== */
.cost-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: var(--gap-card); }
.cost-card {
  background: var(--bg-card);
  border-radius: var(--card-radius);
  border: 1px solid var(--bg-card-border);
  padding: 20px;
}
.cost-card-label { font-size: var(--font-small); color: var(--text-secondary); margin-bottom: 8px; font-weight: 600; }
.cost-card-value { font-size: 28px; font-weight: 800; color: var(--text-white); }
.cost-card-change { font-size: var(--font-small); margin-top: 6px; font-weight: 600; }
.cost-card-change.up { color: var(--color-red); }
.cost-card-change.down { color: var(--color-green); }

/* ===================================================
   BUDGET TIMELINE
   =================================================== */
.budget-timeline { display: flex; flex-direction: column; gap: 12px; }
.budget-item { display: flex; align-items: center; gap: 16px; }
.budget-label { min-width: 120px; font-size: 13px; color: var(--text-secondary); font-weight: 600; }
.budget-bar-track {
  flex: 1; height: 24px;
  background: rgba(255,255,255,0.04);
  border-radius: 6px;
  overflow: hidden;
  position: relative;
}
.budget-bar-fill {
  height: 100%; border-radius: 6px;
  background: linear-gradient(90deg, var(--color-blue), var(--color-purple-light));
  display: flex; align-items: center; justify-content: flex-end; padding-right: 8px;
  font-size: 11px; font-weight: 700; color: #fff;
  transition: width 0.8s var(--animation-easing);
}
.budget-value { min-width: 60px; text-align: right; font-size: 13px; font-weight: 700; color: var(--text-primary); }

/* ===================================================
   FUTURE / NOW-NEXT CARDS
   =================================================== */
.future-cards { display: grid; grid-template-columns: 1fr 1fr; gap: var(--gap-card); }
.future-card {
  background: var(--bg-card);
  border-radius: var(--card-radius);
  border: 1px solid var(--bg-card-border);
  padding: 24px;
}
.future-card.now { border-left: 3px solid var(--color-green); }
.future-card.next { border-left: 3px solid var(--color-orange); }
.future-card-tag {
  font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px;
}
.future-card.now .future-card-tag { color: var(--color-green-text); }
.future-card.next .future-card-tag { color: var(--color-orange-text); }
.future-card-title { font-size: var(--font-card-title); font-weight: 700; color: var(--text-white); margin-bottom: 8px; }
.future-card-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }

/* ===================================================
   FOOTER
   =================================================== */
.slide-footer {
  position: absolute;
  bottom: 20px;
  left: 70px; right: 70px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: var(--text-muted);
  font-size: var(--font-footer);
}

/* ===================================================
   NAVIGATION — 右侧圆点 + 顶部进度条
   =================================================== */
.nav-dots {
  position: fixed;
  right: 24px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 12px;
  z-index: 1000;
}
.nav-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--text-muted);
  cursor: pointer;
  transition: all 0.3s;
  border: none;
  padding: 0;
}
.nav-dot:hover { background: var(--color-blue-light); transform: scale(1.3); }
.nav-dot.active { background: var(--color-blue); transform: scale(1.4); box-shadow: 0 0 8px var(--color-blue); }

.progress-bar {
  position: fixed;
  top: 0; left: 0;
  height: 3px;
  background: var(--gradient-accent);
  z-index: 1000;
  transition: width 0.3s ease;
}

/* ===================================================
   PDF EXPORT BUTTON
   =================================================== */
.btn-export {
  position: fixed;
  top: 20px; right: 24px;
  padding: 8px 16px;
  border-radius: var(--widget-radius);
  background: var(--color-blue-bg);
  border: 1px solid rgba(80,112,255,0.3);
  color: var(--color-blue-light);
  font-size: var(--font-small);
  font-weight: 600;
  cursor: pointer;
  z-index: 1000;
  transition: all 0.2s;
  font-family: var(--font-family);
}
.btn-export:hover {
  background: var(--color-blue);
  color: #fff;
  transform: translateY(-1px);
}

/* ===================================================
   THEME TOGGLE (可选)
   =================================================== */
.btn-theme {
  position: fixed;
  top: 20px; right: 120px;
  padding: 8px 16px;
  border-radius: var(--widget-radius);
  background: var(--bg-card);
  border: 1px solid var(--bg-card-border);
  color: var(--text-secondary);
  font-size: var(--font-small);
  font-weight: 600;
  cursor: pointer;
  z-index: 1000;
  transition: all 0.2s;
  font-family: var(--font-family);
}
.btn-theme:hover { color: var(--text-primary); border-color: var(--color-blue); }

/* ===================================================
   ANIMATIONS — IntersectionObserver 触发
   =================================================== */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeInLeft {
  from { opacity: 0; transform: translateX(-20px); }
  to { opacity: 1; transform: translateX(0); }
}

.slide {
  opacity: 0;
  transform: translateY(24px);
}
.slide.visible {
  animation: fadeInUp var(--animation-duration) var(--animation-easing) forwards;
}
.slide.visible .card,
.slide.visible .storyline,
.slide.visible .decision-card,
.slide.visible .step,
.slide.visible .cost-card,
.slide.visible .future-card {
  opacity: 0;
  animation: fadeInUp 0.5s var(--animation-easing) forwards;
}
.slide.visible .card:nth-child(1),
.slide.visible .storyline:nth-child(1),
.slide.visible .decision-card:nth-child(1),
.slide.visible .step:nth-child(1) { animation-delay: 0.1s; }
.slide.visible .card:nth-child(2),
.slide.visible .storyline:nth-child(2),
.slide.visible .decision-card:nth-child(2),
.slide.visible .step:nth-child(2) { animation-delay: 0.2s; }
.slide.visible .card:nth-child(3),
.slide.visible .storyline:nth-child(3),
.slide.visible .decision-card:nth-child(3),
.slide.visible .step:nth-child(3) { animation-delay: 0.3s; }
.slide.visible .card:nth-child(4),
.slide.visible .decision-card:nth-child(4),
.slide.visible .step:nth-child(4) { animation-delay: 0.4s; }

/* ===================================================
   RESPONSIVE — 笔记本适配
   =================================================== */
@media (max-width: 1360px) {
  .slide {
    max-width: 100%;
    margin: 20px;
    border-radius: 16px;
  }
  .nav-dots { right: 8px; }
}
@media (max-width: 768px) {
  .slide {
    padding: 30px 24px;
    min-height: auto;
  }
  .cover-title { font-size: 32px; }
  .slide-title { font-size: 24px; }
  .decisions { grid-template-columns: 1fr; }
  .future-cards { grid-template-columns: 1fr; }
  .nav-dots { display: none; }
}

/* ===================================================
   PRINT / PDF — 完整打印优化
   =================================================== */
@media print {
  body { background: #fff !important; }
  body.light, body { color: #1a1a2e !important; }

  .slide {
    box-shadow: none !important;
    border: 1px solid #ddd !important;
    background: #fff !important;
    margin: 0 auto 20px !important;
    page-break-inside: avoid;
    opacity: 1 !important;
    transform: none !important;
    animation: none !important;
  }
  .slide::before { display: none; }
  .slide * { animation: none !important; opacity: 1 !important; transform: none !important; }

  .cover-title {
    background: none !important;
    -webkit-text-fill-color: #1a1a2e !important;
    color: #1a1a2e !important;
  }
  .slide-title { color: #1a1a2e !important; }
  .slide-title span {
    background: none !important;
    -webkit-text-fill-color: #3b5998 !important;
    color: #3b5998 !important;
  }
  .slide-number { color: #3b5998 !important; }

  .card, .storyline, .decision-card, .step, .cost-card, .future-card {
    background: #f8f9fa !important;
    border-color: #e2e8f0 !important;
  }

  .storyline-desc, .decision-content, .step-desc, .future-card-desc {
    color: #333 !important;
  }
  .storyline-title, .decision-title, .step-title, .future-card-title {
    color: #1a1a2e !important;
  }
  .slide-footer { color: #999 !important; }

  .nav-dots, .progress-bar, .btn-export, .btn-theme { display: none !important; }
}
</style>
</head>
<body>

<!-- 进度条 -->
<div class="progress-bar" id="progressBar"></div>

<!-- 导航圆点（JS 自动生成） -->
<nav class="nav-dots" id="navDots"></nav>

<!-- 导出 PDF 按钮 -->
<button class="btn-export" onclick="window.print()">&#10515; PDF</button>

<!-- 主题切换按钮（可选，删除此行则不显示） -->
<button class="btn-theme" onclick="document.body.classList.toggle('light');this.textContent=document.body.classList.contains('light')?'&#9790; Dark':'&#9788; Light'">&#9788; Light</button>

<!-- ================================================
     SLIDE 1: COVER
     ================================================ -->
<div class="slide">
  <div class="slide-cover">
    <div class="cover-badge">__TAGLINE__</div>
    <div class="cover-title">__MAIN_TITLE__</div>
    <div class="cover-subtitle">__SUBTITLE__</div>
    <div class="cover-meta" style="margin-top: 40px;">
      <span>__DATE__</span>
      <span>__DEPT__</span>
    </div>
  </div>
  <div class="slide-footer">
    <span>__BRAND__</span>
    <span>1 / __TOTAL__</span>
  </div>
</div>

<!-- ================================================
     SLIDE 2: 内容页示例
     ================================================ -->
<div class="slide" style="padding: var(--slide-padding-content);">
  <div class="slide-header">
    <div class="slide-number">01 &mdash; __SECTION_EN__</div>
    <div class="slide-title">__PAGE_TITLE__ <span>__HIGHLIGHT__</span></div>
    <div class="slide-subtitle">__PAGE_SUBTITLE__</div>
  </div>

  <!-- 在这里放入组件：
       - storylines / decision-cards / next-steps
       - cost-cards / metric-table / budget-timeline
       - future-cards / svg-architecture
       详见 components/ 目录各片段文件 -->

  <div class="slide-footer">
    <span>__BRAND__</span>
    <span>2 / __TOTAL__</span>
  </div>
</div>

<!-- ================================================
     JAVASCRIPT — 导航 + 动画 + 键盘翻页
     ================================================ -->
<script>
(function() {
  'use strict';

  const slides = document.querySelectorAll('.slide');
  const navDots = document.getElementById('navDots');
  const progressBar = document.getElementById('progressBar');

  // --- 生成导航圆点 ---
  slides.forEach((_, i) => {
    const dot = document.createElement('button');
    dot.className = 'nav-dot';
    dot.setAttribute('aria-label', `Slide ${i + 1}`);
    dot.addEventListener('click', () => {
      slides[i].scrollIntoView({ behavior: 'smooth', block: 'center' });
    });
    navDots.appendChild(dot);
  });
  const dots = navDots.querySelectorAll('.nav-dot');

  // --- IntersectionObserver: 入场动画 + 激活圆点 ---
  let currentSlide = 0;
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        const idx = Array.from(slides).indexOf(entry.target);
        if (idx >= 0) {
          currentSlide = idx;
          dots.forEach((d, i) => d.classList.toggle('active', i === idx));
          // 更新进度条
          const progress = ((idx + 1) / slides.length) * 100;
          progressBar.style.width = progress + '%';
        }
      }
    });
  }, { threshold: 0.3 });

  slides.forEach(slide => observer.observe(slide));

  // --- 键盘翻页 ---
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowDown' || e.key === 'ArrowRight' || e.key === ' ') {
      e.preventDefault();
      const next = Math.min(currentSlide + 1, slides.length - 1);
      slides[next].scrollIntoView({ behavior: 'smooth', block: 'center' });
    } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
      e.preventDefault();
      const prev = Math.max(currentSlide - 1, 0);
      slides[prev].scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  });

  // --- 滚动进度更新 ---
  window.addEventListener('scroll', () => {
    const scrollTop = window.scrollY;
    const docHeight = document.documentElement.scrollHeight - window.innerHeight;
    if (docHeight > 0) {
      progressBar.style.width = (scrollTop / docHeight * 100) + '%';
    }
  });
})();
</script>

</body>
</html>
