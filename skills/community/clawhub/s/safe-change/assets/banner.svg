<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#042f2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#14b8a6"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.05" stroke="#14b8a6" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Glow circle -->
  <circle cx="600" cy="280" r="200" fill="#14b8a6" opacity="0.05"/>

  <!-- Shield icon (SVG primitives) -->
  <g transform="translate(560, 128)">
    <!-- Shield outer path -->
    <path d="M40 0 L80 14 L80 46 Q80 70 40 84 Q0 70 0 46 L0 14 Z" fill="none" stroke="url(#accent)" stroke-width="3" stroke-linejoin="round"/>
    <!-- Shield inner check mark -->
    <polyline points="20,44 34,58 60,30" fill="none" stroke="#10b981" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Title -->
  <text x="600" y="310" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="56" font-weight="900" fill="white" letter-spacing="-1">Safe Change</text>

  <!-- Accent line -->
  <rect x="480" y="330" width="240" height="4" rx="2" fill="url(#accent)"/>

  <!-- Subtitle -->
  <text x="600" y="390" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" fill="#94a3b8">Map blast radius before you ship</text>

  <!-- Tags -->
  <g transform="translate(295, 440)">
    <rect width="150" height="36" rx="18" fill="#0f2d2b" stroke="#14b8a6" stroke-width="1" opacity="0.9"/>
    <text x="75" y="23" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#5eead4">impact map</text>
  </g>
  <g transform="translate(462, 440)">
    <rect width="140" height="36" rx="18" fill="#0f2d2b" stroke="#14b8a6" stroke-width="1" opacity="0.9"/>
    <text x="70" y="23" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#5eead4">risk score</text>
  </g>
  <g transform="translate(619, 440)">
    <rect width="160" height="36" rx="18" fill="#0f2d2b" stroke="#14b8a6" stroke-width="1" opacity="0.9"/>
    <text x="80" y="23" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#5eead4">verify gate</text>
  </g>
  <g transform="translate(796, 440)">
    <rect width="120" height="36" rx="18" fill="#0f2d2b" stroke="#14b8a6" stroke-width="1" opacity="0.9"/>
    <text x="60" y="23" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#5eead4">zero deps</text>
  </g>

  <!-- Bottom author -->
  <text x="600" y="590" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#475569">by brasco05 · ClawHub</text>
</svg>
