<!-- ============================================
     COMPONENT: SVG Architecture (多层架构图)
     用途：5 层架构全景图、系统拓扑
     注意：所有方块坐标需计算均匀分布
     viewBox 标准：0 0 1180 620
     ============================================ -->
<div class="slide" style="padding: var(--slide-padding-content);">
  <div class="slide-header">
    <div class="slide-number">__NUM__ &mdash; Architecture</div>
    <div class="slide-title"><span>__TITLE__</span></div>
  </div>

  <svg viewBox="0 0 1180 620" style="width:100%;height:auto;" font-family="Inter, 'PingFang SC', sans-serif">
    <defs>
      <!-- 箭头 marker，按需调色 -->
      <marker id="arrowBlue" markerWidth="5" markerHeight="4" refX="5" refY="2" orient="auto">
        <polygon points="0 0, 5 2, 0 4" fill="var(--color-blue)"/>
      </marker>
      <marker id="arrowGreen" markerWidth="5" markerHeight="4" refX="5" refY="2" orient="auto">
        <polygon points="0 0, 5 2, 0 4" fill="var(--color-green)"/>
      </marker>
      <marker id="arrowOrange" markerWidth="5" markerHeight="4" refX="5" refY="2" orient="auto">
        <polygon points="0 0, 5 2, 0 4" fill="var(--color-orange)"/>
      </marker>
    </defs>

    <!-- === 第5层（底）: 基础设施 === -->
    <rect x="30" y="530" width="1120" height="70" rx="10"
          fill="rgba(100,116,139,0.15)" stroke="rgba(100,116,139,0.3)"/>
    <text x="65" y="570" font-size="14" font-weight="700" fill="#94a3b8">__LAYER5_NAME__</text>
    <!-- 层内元素 -->
    <text x="170" y="568" font-size="12" fill="#94a3b8">__ITEM_1__</text>
    <text x="300" y="568" font-size="12" fill="#94a3b8">__ITEM_2__</text>
    <!-- 继续添加... -->

    <!-- === 第4层: 支撑层 === -->
    <rect x="30" y="420" width="1120" height="80" rx="10"
          fill="rgba(234,88,12,0.08)" stroke="rgba(234,88,12,0.3)"/>
    <text x="40" y="450" font-size="13" font-weight="700" fill="#fdba74">__LAYER4_NAME__</text>
    <!-- 方块示例：
    <rect x="60" y="460" width="130" height="30" rx="6"
          fill="rgba(234,88,12,0.15)" stroke="rgba(234,88,12,0.3)"/>
    <text x="125" y="480" font-size="12" fill="#fed7aa" text-anchor="middle" font-weight="700">__BOX__</text>
    -->

    <!-- === 第3层: 核心层 === -->
    <rect x="30" y="300" width="1120" height="95" rx="10"
          fill="rgba(124,58,237,0.08)" stroke="rgba(124,58,237,0.3)"/>
    <text x="40" y="328" font-size="13" font-weight="700" fill="#c4b5fd">__LAYER3_NAME__</text>
    <!-- 方块示例：
    <rect x="60" y="338" width="140" height="36" rx="8"
          fill="rgba(124,58,237,0.2)" stroke="rgba(167,139,250,0.5)" stroke-width="1.5"/>
    <text x="130" y="361" font-size="13" fill="#e0d4ff" text-anchor="middle" font-weight="600">__BOX__</text>
    -->

    <!-- === 第2层: 触达层 === -->
    <rect x="30" y="130" width="1120" height="125" rx="10"
          fill="rgba(80,112,255,0.08)" stroke="rgba(80,112,255,0.3)"/>
    <text x="40" y="158" font-size="13" font-weight="700" fill="#93b4ff">__LAYER2_NAME__</text>

    <!-- === 第1层（顶）: 用户层 === -->
    <rect x="30" y="20" width="1120" height="90" rx="10"
          fill="rgba(45,106,79,0.08)" stroke="rgba(64,145,108,0.3)"/>
    <text x="40" y="48" font-size="13" font-weight="700" fill="#95d5b2">__LAYER1_NAME__</text>

    <!-- === 连线示例 ===
    <path d="M x1,y1 C cx1,cy1 cx2,cy2 x2,y2" fill="none"
          stroke="var(--color-blue)" stroke-width="2" stroke-dasharray="7,4"
          marker-end="url(#arrowBlue)" opacity="0.85"/>
    <text x="__X__" y="__Y__" font-size="13" fill="var(--color-blue)"
          font-weight="700" font-style="italic">__LABEL__</text>
    -->
  </svg>

  <div class="slide-footer">
    <span>__BRAND__</span>
    <span>__N__ / __TOTAL__</span>
  </div>
</div>
