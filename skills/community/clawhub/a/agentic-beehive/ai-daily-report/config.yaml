# 排名权重（可演化）
ranking:
  comprehensive:
    capability: 0.35       # 能力分（benchmark）
    cost_effectiveness: 0.30  # 性价比分（能力/价格）
    ecosystem: 0.20       # 生态分（API成熟度/文档/社区）
    momentum: 0.15        # 势头分（近期增长/热度变化）
  
  cost_effectiveness:
    # 性价比 = 能力分 / 归一化价格
    # 价格归一化方式：取每百万token成本，按输入/输出 7:3 加权
    input_weight: 0.7
    output_weight: 0.3

# 日报输出
output:
  dir: "/home/hongliang/.openclaw/workspace/ai-daily-report/output"
  format: "markdown"       # markdown / feishu_card / both
  feishu_target: ""         # 飞书推送目标（open_id）
  archive_days: 90          # 保留天数

# Playwright 配置
playwright:
  headless: true
  timeout: 30000            # 30s 页面超时
  navigation_timeout: 20000
  retries: 2
