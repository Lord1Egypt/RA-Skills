<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KineticHeadline — cinematic-scroll component</title>
<!--
  KineticHeadline — a multi-line headline whose words/lines rise + fade in on a
  staggered cascade as the heading enters view (split-line-rise, guardrails §4.5).
  Accessible: the <h2> carries a clean aria-label; the per-word spans are decorative
  (aria-hidden), so screen readers hear the sentence once, not word-by-word.
  Token-driven (design.md), transform/opacity only (§1.6), reduced-motion safe (§1.9),
  no dependencies. Mode A: inline the :root subset or @import tokens/build/variables.css.
-->
<style>
  /* --- design tokens (default theme subset from tokens/build/variables.css) --- */
  :root{
    --bg:#F7F5F1; --surface:#EFEBE4; --fg:#161310; --fg-dim:#574F45; --accent:#C9A96E;
    --line:#16131024;
    --font-display:"Cormorant Garamond",Georgia,serif;
    --font-body:"EB Garamond",Georgia,"Times New Roman",serif;
    --font-ui:Inter,system-ui,-apple-system,"Segoe UI",sans-serif;
    --fluid-h1:clamp(2.37rem, 1.8rem + 2.52vw, 3.815rem);
    --size-caption:.78rem; --size-body-lg:1.125rem;
    --space-md:16px; --space-lg:24px; --space-4xl:96px;
    --ease-reveal:cubic-bezier(.16,1,.3,1);
    --dur-slow:720ms;
    --lh-tight:1.1; --lh-relaxed:1.7;
  }
  *{box-sizing:border-box;margin:0}
  body{background:var(--bg);color:var(--fg);font-family:var(--font-body);line-height:var(--lh-relaxed)}
  .spacer{height:60vh;display:grid;place-items:center;color:var(--fg-dim);font-family:var(--font-ui);font-size:var(--size-caption);letter-spacing:.2em;text-transform:uppercase}

  .chapter{min-height:100vh;display:grid;align-content:center;gap:var(--space-md);
    padding:var(--space-4xl) clamp(var(--space-lg),6vw,8rem);max-width:62rem;margin-inline:auto}
  .eyebrow{font-family:var(--font-ui);font-size:var(--size-caption);letter-spacing:.22em;
    text-transform:uppercase;color:var(--fg-dim)}
  .summary{font-size:var(--size-body-lg);color:var(--fg-dim);max-width:46ch}
  .accent{color:var(--accent)}
  :focus-visible{outline:2px solid var(--accent);outline-offset:3px}

  /* --- kinetic headline: split into lines (clip-mask) of inline words --- */
  .kinetic{font-family:var(--font-display);font-size:var(--fluid-h1);line-height:var(--lh-tight);
    font-weight:600;max-width:18ch;text-wrap:balance}
  /* each visual line is a clipping window; words rise from below the mask */
  .kinetic .line{display:block;overflow:hidden;padding-bottom:.04em}
  .kinetic .word{display:inline-block;will-change:transform;
    transform:translateY(110%);
    transition:transform var(--dur-slow) var(--ease-reveal),opacity var(--dur-slow) var(--ease-reveal);
    opacity:0}
  .kinetic .word::after{content:"\00a0"} /* preserve the inter-word space */
  /* in-view: each word settles; stagger via per-word custom property --i (§3.6) */
  .is-in .kinetic .word{transform:none;opacity:1;transition-delay:calc(var(--i,0) * 70ms)}

  @media (max-width: 768px){
    .chapter{padding:var(--space-4xl) var(--space-lg);gap:var(--space-md)}
    .kinetic{font-size:2rem;max-width:none}
  }

  @media (prefers-reduced-motion: reduce){
    .kinetic .word{transform:none;opacity:1;transition:none;transition-delay:0s}
    .kinetic .line{overflow:visible} /* descenders not clipped when static */
  }
</style>
</head>
<body>
  <div class="spacer">scroll ↓</div>

  <main>
    <section class="chapter" id="chapter-1" aria-labelledby="ch1-title">
      <p class="eyebrow">Chapter 01</p>
      <!--
        aria-label = the readable sentence (one announcement). Visual word spans are
        aria-hidden so AT never spells it out word-by-word. --i drives the stagger;
        keep ≤5 perceptual steps before overlap (§3.6) — long lines settle as a wave.
      -->
      <h2 class="kinetic" id="ch1-title"
          aria-label="Every word arrives on its own beat.">
        <span class="line" aria-hidden="true">
          <span class="word" style="--i:0">Every</span><span class="word" style="--i:1">word</span><span class="word" style="--i:2">arrives</span>
        </span>
        <span class="line" aria-hidden="true">
          <span class="word accent" style="--i:3">on its own</span><span class="word accent" style="--i:4">beat.</span>
        </span>
      </h2>
      <p class="summary">Each word rises out of its line-mask in sequence as the heading
        enters the viewport — transform and opacity only, on the <code>--ease-reveal</code>
        curve. The sentence is announced once via <code>aria-label</code>.</p>
    </section>
  </main>

  <div class="spacer">end</div>

<script>
  // Reveal on enter. IntersectionObserver — no scroll handler, no layout thrash.
  // CSS owns the cascade (per-word transition-delay); JS only flips the .is-in flag.
  const io = new IntersectionObserver((entries) => {
    for (const e of entries) if (e.isIntersecting) { e.target.classList.add("is-in"); io.unobserve(e.target); }
  }, { threshold: 0.35 });
  document.querySelectorAll(".chapter").forEach((c) => io.observe(c));
</script>
</body>
</html>
