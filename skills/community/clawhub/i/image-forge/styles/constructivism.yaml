  [在此处替换为您想要生成的主体内容]，俄国构成主义风格，平面设计插画，极简主义矢量艺术，复古宣传海报。画面由强烈的几何形状构成，包含大量的锐利三角形、圆形和粗重的对角线切割。色调采用极简的三色限定：高饱和度宝蓝色、深黑色和米白色（做旧纸张感）。整体具有复古丝网印刷质感，布满细腻的颗粒噪点和磨损纹理。构图充满张力，强调不对称的平衡感和工业力量感，锐利的线条边缘，扁平化视觉，高对比度。
