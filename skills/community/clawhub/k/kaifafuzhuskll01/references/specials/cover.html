<!-- cover — 深蓝全屏封面 + 渐变装饰 + 居中白色大标题 -->
<section class="slide active" data-page="{{page}}" data-layout="cover">
  <div class="ppt-slide" style="display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;background:var(--color-primary);position:relative;overflow:hidden">
    <!-- 渐变装饰圆 — 右上大圆 -->
    <div style="position:absolute;top:-120px;right:-120px;width:400px;height:400px;border-radius:50%;background:linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02))" aria-hidden="true"></div>
    <!-- 渐变装饰圆 — 左下小圆 -->
    <div style="position:absolute;bottom:-80px;left:-80px;width:240px;height:240px;border-radius:50%;background:linear-gradient(135deg, rgba(255,255,255,0.04), transparent)" aria-hidden="true"></div>
    <!-- 右侧竖线装饰 -->
    <div style="position:absolute;top:50%;right:15%;width:6px;height:80px;background:linear-gradient(180deg, var(--color-accent), var(--color-primary));border-radius:3px;opacity:0.4;transform:translateY(-50%)" aria-hidden="true"></div>
    <!-- 内容 -->
    <h1 style="font-family:var(--font);font-size:56px;font-weight:700;color:#fff;margin:0 0 24px 0;z-index:1;letter-spacing:2px">{{title}}</h1>
    {{#if subtitle}}
    <p style="font-family:var(--font);font-size:22px;font-weight:300;color:rgba(255,255,255,0.65);margin:0;z-index:1">{{subtitle}}</p>
    {{/if}}
    <div style="margin-top:48px;width:60px;height:4px;background:linear-gradient(90deg, var(--color-accent), rgba(255,255,255,0.3));border-radius:2px;z-index:1"></div>
  </div>
</section>
