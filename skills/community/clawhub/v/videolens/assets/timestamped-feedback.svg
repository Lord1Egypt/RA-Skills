<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="800" viewBox="0 0 1400 800" role="img" aria-label="Timestamped VideoLens feedback"><rect width="1400" height="800" fill="url(#bg)"/><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#07111f"/><stop offset="55%" stop-color="#101a3d"/><stop offset="100%" stop-color="#241044"/></linearGradient><linearGradient id="a" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#00E5FF"/><stop offset="100%" stop-color="#A855F7"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><style>.title{font:800 54px Inter,Arial,sans-serif;fill:#f8fbff}.sub{font:500 24px Inter,Arial,sans-serif;fill:#b9c7e6}.tiny{font:600 17px Inter,Arial,sans-serif;fill:#8fa7d8}.mono{font:600 18px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#d9e7ff}.card{fill:#0d1730;stroke:#233a74;stroke-width:2}.accent{fill:url(#a)}.good{fill:#39ffb6}.warn{fill:#ffd166}.bad{fill:#ff6b8a}</style></defs><text x="70" y="100" class="title">Timestamped feedback agents can use</text><text x="70" y="142" class="sub">From fuzzy “watch this” to concrete fixes with evidence</text><rect x="70" y="205" width="1260" height="105" rx="22" class="card"/><text x="110" y="252" class="mono" fill="#39ffb6">00:07</text><text x="205" y="252" class="sub">Hook promise is visible, but the value prop lands too late.</text><text x="205" y="285" class="tiny">Fix: state the outcome in the first sentence and show the finished artifact immediately.</text><rect x="70" y="340" width="1260" height="105" rx="22" class="card"/><text x="110" y="387" class="mono" fill="#ffd166">00:44</text><text x="205" y="387" class="sub">Screen text is readable on desktop, risky on mobile.</text><text x="205" y="420" class="tiny">Fix: crop tighter, increase UI zoom, and add callout labels.</text><rect x="70" y="475" width="1260" height="105" rx="22" class="card"/><text x="110" y="522" class="mono" fill="#ff6b8a">01:21</text><text x="205" y="522" class="sub">CTA appears after attention has already dropped.</text><text x="205" y="555" class="tiny">Fix: add a soft CTA before the final proof section, then repeat at close.</text><rect x="70" y="640" width="390" height="72" rx="22" fill="#071426" stroke="#39ffb6"/><text x="105" y="685" class="mono">report.md</text><rect x="505" y="640" width="390" height="72" rx="22" fill="#071426" stroke="#00e5ff"/><text x="540" y="685" class="mono">analysis.json</text><rect x="940" y="640" width="390" height="72" rx="22" fill="#071426" stroke="#a855f7"/><text x="975" y="685" class="mono">OpenClaw task output</text></svg>