# 评论模板 - 日常轻松风格
# 当 AI 模型不可用时的降级模板

style: casual
description: "日常口语化评论，像朋友间聊天"

templates:
  # 通用正面评论
  generic_positive:
    - "写得好棒 学到了{emoji}"
    - "感谢分享{emoji}"
    - "太真实了哈哈"
    - "说得对 收藏了"
    - "涨知识了{emoji}"
    - "一直在关注你的内容"
    - "终于有人说到点子上了"
    - "这个总结好到位"
    - "马了 回头慢慢看"
    - "每次刷到你都会停下来看看"

  # 认同/共鸣类
  agreement:
    - "说到我心坎里了"
    - "深有同感"
    - "太对了 就是这个道理"
    - "跟我想的一模一样"
    - "确实是这样的"

  # 学习/收获类
  learning:
    - "又学到新东西了"
    - "原来是这样 之前一直没搞明白"
    - "干货满满 感谢"
    - "这个解释太清楚了"
    - "笔记做起来{emoji}"

  # 期待/关注类
  following:
    - "期待更新{emoji}"
    - "关注了 等后续"
    - "催更催更"
    - "什么时候出下一篇"

# Emoji 池
emoji_pool:
  - "👍"
  - "🔥"
  - "💯"
  - "✨"
  - "📝"
  - "🙏"
  - "😊"
  - "❤️"
  - "👏"
  - "💡"
  - "🎯"
  - "📌"
