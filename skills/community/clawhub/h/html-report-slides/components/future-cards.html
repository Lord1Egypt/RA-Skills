<!-- ============================================
     COMPONENT: Future Cards (Now / Next 规划)
     用途：展示当前阶段 vs 下一阶段规划
     配色：now(绿色左边框) / next(橙色左边框)
     布局：2 列并排
     ============================================ -->
<div class="future-cards">

  <!-- NOW -->
  <div class="future-card now">
    <div class="future-card-tag">NOW &mdash; 当前阶段</div>
    <div class="future-card-title">__NOW_TITLE__</div>
    <div class="future-card-desc">
      __NOW_DESC__
    </div>
  </div>

  <!-- NEXT -->
  <div class="future-card next">
    <div class="future-card-tag">NEXT &mdash; 下一步</div>
    <div class="future-card-title">__NEXT_TITLE__</div>
    <div class="future-card-desc">
      __NEXT_DESC__
    </div>
  </div>

</div>
