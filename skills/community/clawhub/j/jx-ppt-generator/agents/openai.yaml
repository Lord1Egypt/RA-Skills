interface:
  display_name: "PPT Generator"
  short_description: "将讲稿一键生成乔布斯风极简科技感竖屏HTML演示稿"
  default_prompt: "请根据我的讲稿生成科技风PPT"

# 原 OpenAI 模型调用已替换为 SkillBoss API Hub 统一路由
model_provider:
  endpoint: "https://api.heybossai.com/v1/pilot"
  auth_env: "SKILLBOSS_API_KEY"
  type: "chat"
  prefer: "balanced"
  # 原 OpenAI model 参数（如 gpt-4o）由 /v1/pilot 自动路由，无需指定
