version: 1
mode: prompt

skill:
  name: yunitalk-beta
  display_name: OpenClaw 与你聊聊对话
  description: 使用 OpenClaw 接入与你聊聊，实现聊聊与 OpenClaw 的对话
  version: 0.8.5
  build: 20260613

# OpenClaw 侧由 Talk Robots 机器人配置页扫码流程写入连接信息
config:
  # Talk Robots 服务端点
  robot_endpoint:
    type: string
    required: false
    description: Talk Robots 服务端点地址，用于发送消息；默认值为 https://api-talk.yuniapp.cn/v1/robot/send，可通过环境变量 TALK_ROBOT_ENDPOINT 覆盖
    default: "https://api-talk.yuniapp.cn/v1/robot/send"

  # 机器人 ID
  robot_id:
    type: string
    required: false
    description: 机器人 ID，用于签名鉴权；初始化成功后从环境变量 TALK_ROBOT_ID 读取
    default: "${TALK_ROBOT_ID}"

  # 机器人密钥
  robot_key:
    type: string
    required: false
    description: 机器人密钥，用于 /robot/send 签名鉴权；初始化成功后从环境变量 TALK_ROBOT_KEY 读取
    default: "${TALK_ROBOT_KEY}"

  # 可选：默认 agent ID
  default_agent_id:
    type: string
    required: false
    description: 默认使用的 OpenClaw Agent ID
    default: main

# 运行时变量（由 Talk Robots 调用时注入）
variables:
  cvs_id:
    type: string
    required: false
    description: 可选目标会话ID；不传时默认投递到机器人与创建者的点对点会话

# 能力声明（用于 MCP 模式，prompt 模式下可忽略）
capabilities:
  send_text:
    enabled: true
    description: 通过 Robot 消息接口投递文本事件给指定机器人；JSON 请求体使用完整 imx.Msg 结构
    endpoint: "{{config.robot_endpoint}}?robot_id={{config.robot_id}}&noncestr={{nonce}}&timestamp={{timestamp}}&msg_id={{msg_id}}&sign={{sign}}"
    method: POST
    content_type: application/json
    payload_schema:
      type: object
      properties:
        cmd:
          type: string
          const: msg
          description: 固定为 msg
        head:
          type: object
          properties:
            msg_id:
              type: string
              description: 消息 ID，需与 URL 中 msg_id 一致
            cvs_id:
              type: string
              description: 可选目标会话 ID；不传时默认投递到机器人与创建者的点对点会话
            refer_msg_id:
              type: string
              description: 可选，引用消息 ID
          required: [msg_id]
        body:
          type: object
          properties:
            content:
              type: string
              description: 文本内容、Markdown 内容或文件说明
            file_list:
              type: array
              description: 文件数组，元素为 RobotFile
            at_uid_list:
              type: array
              description: "@ 用户列表"
            mentioned_list:
              type: array
              description: 兼容企业微信类命名
          required: [content]
      required: [cmd, head, body]

  send_file:
    enabled: true
    description: 通过 Robot 消息接口投递文件事件给指定机器人
    endpoint: "{{config.robot_endpoint}}?robot_id={{config.robot_id}}&noncestr={{nonce}}&timestamp={{timestamp}}&msg_id={{msg_id}}&sign={{sign}}"
    method: POST
    content_type: multipart/form-data
    form_fields:
      msg_id:
        type: string
        required: true
        description: 消息ID，需与 URL 中 msg_id 一致
      cvs_id:
        type: string
        required: false
        description: 可选目标会话ID；不传时默认投递到机器人与创建者的点对点会话
      file:
        type: binary
        required: true
        description: 文件二进制内容
      content:
        type: string
        required: false
        description: 可选，文件说明文本
      refer_msg_id:
        type: string
        required: false
        description: 可选，引用消息 ID

# 规则（用于 AI 遵循）
rules:
  - OpenClaw 会自动管理当前会话的身份标识
  - 初始化入口使用 Talk Robots 机器人配置页的 OpenClaw连接信息 扫码项
  - 安装后应提示用户运行 yntalk-openclaw-init 读取本地 OpenClaw 配置，并输出可扫码保存到 OpenClaw连接信息 的初始化指令
  - 初始化指令必须是 /openclaw --init <base64-json>，其中 <base64-json> 是对 {"OPENCLAW_URL":"...","OPENCLAW_TOKEN":"...","OPENCLAW_LAN_URL":"..."} 做 UTF-8 Base64 编码后的结果；不得明文展示 OPENCLAW_TOKEN 或 robot_key
  - 如需主动投递消息，robot_endpoint、robot_id 和 robot_key 必须由 OpenClaw 运行环境或管理员提供，并且不要回显 robot_key
  - cvs_id 是可选目标会话 ID；不传 cvs_id 时，/robot/send 默认投递到机器人与创建者的点对点会话
  - 投递文本事件时必须使用完整 imx.Msg JSON 结构，cmd 固定为 msg，文本放在 body.content
  - 发送文件时必须使用 multipart/form-data，不得使用 JSON 传文件
  - /robot/send 只负责把事件投递给目标 robot，最终是否回发由机器人脚本决定
  - 如果缺少 robot_endpoint、robot_id 或 robot_key，则不能投递消息，应明确提示缺失项

# 默认设置
defaults:
  language: zh-CN
  message_type: text
