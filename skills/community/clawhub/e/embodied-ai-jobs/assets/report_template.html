<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>具身智能就业资讯 | {{date}}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 16px;
            padding: 40px;
            margin-bottom: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            color: #2d3748;
            margin-bottom: 10px;
        }
        
        .header .subtitle {
            color: #718096;
            font-size: 1.1em;
        }
        
        .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            color: #718096;
            font-size: 0.9em;
        }
        
        .category-tabs {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .tab-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 30px;
            background: #f7fafc;
            color: #4a5568;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .tab-btn:hover {
            background: #edf2f7;
        }
        
        .tab-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .section {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .section h2 {
            color: #2d3748;
            font-size: 1.5em;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 3px solid #667eea;
        }
        
        .job-card {
            background: #f7fafc;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            border-left: 4px solid #667eea;
            transition: all 0.3s;
        }
        
        .job-card:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        
        .job-title {
            font-size: 1.2em;
            color: #2d3748;
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .job-company {
            color: #667eea;
            font-weight: 500;
            margin-bottom: 8px;
        }
        
        .job-meta {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 12px;
            color: #718096;
            font-size: 0.9em;
        }
        
        .job-desc {
            color: #4a5568;
            line-height: 1.6;
            margin-bottom: 12px;
        }
        
        .job-link {
            display: inline-block;
            padding: 8px 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 20px;
            font-size: 0.9em;
            transition: all 0.3s;
        }
        
        .job-link:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .highlight {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 24px;
        }
        
        .highlight h2 {
            color: white;
            border-bottom-color: rgba(255,255,255,0.3);
        }
        
        .footer {
            text-align: center;
            color: rgba(255,255,255,0.8);
            padding: 20px;
            font-size: 0.9em;
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }
            
            .stats {
                gap: 20px;
            }
            
            .stat-number {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 具身智能就业资讯</h1>
            <p class="subtitle">{{date}} | 第 {{week}} 周</p>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-number">{{total}}</div>
                    <div class="stat-label">收录岗位</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">{{companies}}</div>
                    <div class="stat-label">涉及公司</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">{{categories}}</div>
                    <div class="stat-label">岗位类别</div>
                </div>
            </div>
        </div>
        
        <div class="category-tabs">
            <button class="tab-btn active" onclick="showSection('all')">全部</button>
            <button class="tab-btn" onclick="showSection('algorithm')">🤖 算法岗</button>
            <button class="tab-btn" onclick="showSection('software')">💻 软件岗</button>
            <button class="tab-btn" onclick="showSection('hardware')">⚙️ 硬件岗</button>
            <button class="tab-btn" onclick="showSection('product')">📦 产品岗</button>
            <button class="tab-btn" onclick="showSection('research')">🔬 研究岗</button>
        </div>
        
        <div id="content">
            {{content}}
        </div>
        
        <div class="footer">
            <p>数据来源：各公司官网、招聘平台、微信公众号</p>
            <p>本报告由 AI 自动生成 | 更新时间：{{update_time}}</p>
        </div>
    </div>
    
    <script>
        function showSection(category) {
            // 实现分类筛选逻辑
            document.querySelectorAll('.section').forEach(section => {
                if (category === 'all' || section.dataset.category === category) {
                    section.style.display = 'block';
                } else {
                    section.style.display = 'none';
                }
            });
            
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
