version: "1"
defaults:
  trials: 3
  timeout: 300
  threshold: 0.8

trigger_tests:
  - id: explicit-compress-image
    should_trigger: true
    prompt: "Use the compress-image skill to convert this PNG to webp."
  - id: implicit-compress-image
    should_trigger: true
    prompt: "Optimize this generated image for upload and reduce the file size."
  - id: negative-control-generation
    should_trigger: false
    prompt: "Generate a new image from this prompt."

outcome_tests:
  - id: file-structure
    type: deterministic
    checks:
      - file_exists: "SKILL.md"
      - file_exists: "package.json"
      - file_exists: "scripts/main.ts"
