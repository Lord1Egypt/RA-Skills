<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" fill="none">
  <!-- Firefly glow -->
  <circle cx="18" cy="14" r="12" fill="#4CAF50" opacity="0.3"/>
  <circle cx="18" cy="14" r="7" fill="#66BB6A" opacity="0.5"/>
  <!-- Firefly body -->
  <ellipse cx="18" cy="20" rx="5" ry="8" fill="#2E7D32"/>
  <ellipse cx="18" cy="18" rx="4" ry="6" fill="#4CAF50"/>
  <!-- Firefly wings -->
  <ellipse cx="10" cy="16" rx="6" ry="4" fill="#81C784" opacity="0.7" transform="rotate(-20 10 16)"/>
  <ellipse cx="26" cy="16" rx="6" ry="4" fill="#81C784" opacity="0.7" transform="rotate(20 26 16)"/>
  <!-- Glow dot -->
  <circle cx="18" cy="8" r="2" fill="#A5D6A7"/>
  <!-- Company name -->
  <text x="42" y="30" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="22" font-weight="700" fill="#0E5C25">萤火虫空压机</text>
  <!-- Tagline -->
  <text x="42" y="44" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="9" fill="#888">专注空压机节能 · 为企业省气省电</text>
</svg>
