version: "1"
defaults:
  trials: 3
  timeout: 300
  threshold: 0.8

trigger_tests:
  - id: explicit-image-generation
    should_trigger: true
    prompt: "Use the image-generation skill to generate an image from a text prompt."
  - id: implicit-image-generation
    should_trigger: true
    prompt: "Generate an image from this prompt, show me model options, and let me switch later."
  - id: negative-control-workflow
    should_trigger: false
    prompt: "Turn this article into a five-card RedNote series with prompt files and batch generation."

outcome_tests:
  - id: file-structure
    type: deterministic
    checks:
      - file_exists: "SKILL.md"
      - file_exists: "package.json"
      - file_exists: "scripts/main.ts"
      - file_exists: "references/config/first-time-setup.md"
