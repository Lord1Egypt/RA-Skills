interface:
  display_name: "Infographic PowerPoint Deck"
  short_description: "Generate slide images + images-only PPTX."
  default_prompt: "Create an image-only PowerPoint deck from the user's article or notes by following the structured planning flow: first draft a detailed `slides_message_plan.md` that captures what the presenter means to say on each slide, then choose the deck archetype from that approved message plan, then derive `slides_display_plan.md` for the exact audience-facing slide text, then derive `slides_visual_plan.md` for style/layout/scene decisions. Choose one deck-level style pack (fallback editorial-light only when the fit is unclear), auto-choose the best layout for each slide unless the user explicitly overrides it, prefer direct text-on-image full-bleed layouts for cinematic, editorial, warm, airy, animated, and youth-oriented decks when the text budget and scene allow, and bias structured or self-contained didactic explainer decks toward labeled board layouts such as mirrored comparisons, concept boards, and teaching grids. Keep internal layout IDs like `L1` or `L10` out of the concrete image prompts; translate them into plain composition instructions instead. If a reference image or edit-style tool call is used, keep that mechanic in the tool call and write the prompt as result-oriented art direction such as `Using the provided image as the compositional base...`, not as tool-like language such as `edit this image`. Do not stop at style/layout shorthand: for high-fidelity slides, expand the prompt into concrete geometry, palette/material treatment, typography attitude, divider/module structure, diagram style, and lighting behavior. Write prompts in English by default, keep required on-slide text verbatim in the user-specified language(s), list every visible label explicitly when a slide is diagram-rich, generate one 16:9 slide image per slide, and assemble an images-only PPTX."
