<svg width="1280" height="400" viewBox="0 0 1280 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF620"/>
      <stop offset="100%" style="stop-color:#6366f100"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="400" fill="url(#bg)"/>

  <!-- Glow blob -->
  <ellipse cx="200" cy="200" rx="300" ry="200" fill="url(#glow)"/>

  <!-- Grid lines subtle -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/>
    <line x1="640" y1="0" x2="640" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="960" y1="0" x2="960" y2="400"/>
    <line x1="1120" y1="0" x2="1120" y2="400"/>
  </g>

  <!-- Accent bar top -->
  <rect x="0" y="0" width="1280" height="3" fill="url(#accent)"/>

  <!-- Node circles decoration -->
  <circle cx="980" cy="120" r="60" fill="none" stroke="#8B5CF6" stroke-width="1" opacity="0.3"/>
  <circle cx="980" cy="120" r="100" fill="none" stroke="#8B5CF6" stroke-width="1" opacity="0.15"/>
  <circle cx="980" cy="120" r="140" fill="none" stroke="#8B5CF6" stroke-width="1" opacity="0.08"/>
  <circle cx="1100" cy="260" r="40" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.25"/>
  <circle cx="1100" cy="260" r="70" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.12"/>

  <!-- Connecting lines (network) -->
  <line x1="980" y1="120" x2="1100" y2="260" stroke="#8B5CF6" stroke-width="1" opacity="0.2"/>
  <line x1="980" y1="120" x2="1160" y2="80" stroke="#8B5CF6" stroke-width="1" opacity="0.2"/>
  <line x1="1100" y1="260" x2="1200" y2="300" stroke="#6366f1" stroke-width="1" opacity="0.2"/>

  <!-- Dots at nodes -->
  <circle cx="980" cy="120" r="4" fill="#8B5CF6" opacity="0.8"/>
  <circle cx="1100" cy="260" r="4" fill="#6366f1" opacity="0.8"/>
  <circle cx="1160" cy="80" r="3" fill="#8B5CF6" opacity="0.6"/>
  <circle cx="1200" cy="300" r="3" fill="#6366f1" opacity="0.6"/>

  <!-- Badge -->
  <rect x="80" y="100" width="130" height="28" rx="14" fill="#8B5CF620" stroke="#8B5CF6" stroke-width="1"/>
  <text x="145" y="119" font-family="monospace" font-size="12" fill="#8B5CF6" text-anchor="middle">SKILL.md</text>

  <!-- Main title -->
  <text x="80" y="200" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="52" font-weight="700" fill="#ffffff" letter-spacing="-1">Web3 Community</text>
  <text x="80" y="258" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="52" font-weight="700" fill="#8B5CF6" letter-spacing="-1">Marketing</text>

  <!-- Subtitle -->
  <text x="80" y="310" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" fill="#8b949e">Build, grow, and activate crypto-native communities on Discord, Telegram &amp; X</text>

  <!-- Modules pill -->
  <rect x="80" y="340" width="88" height="24" rx="12" fill="#8B5CF610" stroke="#8B5CF640" stroke-width="1"/>
  <text x="124" y="357" font-family="monospace" font-size="11" fill="#8B5CF6" text-anchor="middle">6 modules</text>

  <rect x="180" y="340" width="110" height="24" rx="12" fill="#8B5CF610" stroke="#8B5CF640" stroke-width="1"/>
  <text x="235" y="357" font-family="monospace" font-size="11" fill="#8B5CF6" text-anchor="middle">Web3 native</text>

  <rect x="302" y="340" width="100" height="24" rx="12" fill="#8B5CF610" stroke="#8B5CF640" stroke-width="1"/>
  <text x="352" y="357" font-family="monospace" font-size="11" fill="#8B5CF6" text-anchor="middle">OpenClaw</text>
</svg>
