<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>伺服电机课程智能体 | 南京理工大学紫金学院</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0e17;--bg2:#111827;--bg3:#1a2235;--bg4:#232d42;
  --accent:#f59e0b;--accent2:#fbbf24;--accent-glow:rgba(245,158,11,.15);
  --blue:#3b82f6;--blue2:#60a5fa;--blue-glow:rgba(59,130,246,.12);
  --green:#10b981;--green2:#34d399;--green-glow:rgba(16,185,129,.12);
  --red:#ef4444;--red2:#f87171;
  --text:#e5e7eb;--text2:#9ca3af;--text3:#6b7280;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.04);
  --radius:12px;--radius-lg:20px;
  --font-display:'Noto Serif SC',serif;--font-body:'Noto Sans SC',sans-serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);line-height:1.7;overflow-x:hidden}
::selection{background:var(--accent);color:#000}

/* ===== Background ===== */
.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(245,158,11,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(245,158,11,.03) 1px,transparent 1px);
  background-size:60px 60px;
}
.bg-glow{position:fixed;z-index:0;pointer-events:none;border-radius:50%;filter:blur(120px)}
.bg-glow-1{width:600px;height:600px;top:-200px;right:-100px;background:rgba(245,158,11,.06)}
.bg-glow-2{width:500px;height:500px;bottom:-150px;left:-100px;background:rgba(59,130,246,.05)}

/* ===== Layout ===== */
.container{max-width:1200px;margin:0 auto;padding:0 24px;position:relative;z-index:1}

/* ===== Header ===== */
header{padding:20px 0;position:sticky;top:0;z-index:100;background:rgba(10,14,23,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.header-inner{display:flex;align-items:center;justify-content:space-between;gap:16px}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:48px;height:48px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#d97706);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#000;font-family:var(--font-display)}
.logo-text h1{font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--text);letter-spacing:.5px}
.logo-text p{font-size:15px;color:var(--text3);letter-spacing:1px}
.nav-tabs{display:flex;gap:4px;background:var(--bg2);border-radius:10px;padding:4px}
.nav-tab{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .25s;border:none;background:transparent;white-space:nowrap}
.nav-tab:hover{color:var(--text)}
.nav-tab.active{background:var(--accent);color:#000;font-weight:700;box-shadow:0 2px 12px rgba(245,158,11,.3)}

/* ===== Hero ===== */
.hero{padding:60px 0 40px;text-align:center}
.hero-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:20px;background:var(--accent-glow);border:1px solid rgba(245,158,11,.2);font-size:12px;color:var(--accent2);margin-bottom:20px;letter-spacing:.5px}
.hero h2{font-family:var(--font-display);font-size:clamp(28px,5vw,48px);font-weight:900;line-height:1.2;margin-bottom:16px;background:linear-gradient(135deg,var(--text) 0%,var(--accent2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{font-size:16px;color:var(--text2);max-width:600px;margin:0 auto 32px}
.hero-stats{display:flex;justify-content:center;gap:40px;flex-wrap:wrap}
.hero-stat{text-align:center}
.hero-stat .num{font-family:var(--font-display);font-size:32px;font-weight:900;color:var(--accent2)}
.hero-stat .label{font-size:12px;color:var(--text3);letter-spacing:1px;margin-top:2px}

/* ===== Section ===== */
.section{display:none;animation:fadeUp .4s ease}
.section.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* ===== Cards ===== */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;transition:all .3s}
.card:hover{border-color:rgba(245,158,11,.15);box-shadow:0 8px 32px rgba(0,0,0,.3)}
.card-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.card-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.card h3{font-family:var(--font-display);font-size:17px;font-weight:700}

/* ===== Knowledge Section ===== */
.chapter-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;margin-top:24px}
.chapter-card{cursor:pointer;position:relative;overflow:hidden}
.chapter-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;border-radius:4px 0 0 4px;transition:all .3s}
.chapter-card:nth-child(1)::before{background:var(--accent)}
.chapter-card:nth-child(2)::before{background:var(--blue)}
.chapter-card:nth-child(3)::before{background:var(--green)}
.chapter-card:nth-child(4)::before{background:#a855f7}
.chapter-card:nth-child(5)::before{background:var(--red)}
.chapter-card:nth-child(6)::before{background:#06b6d4}
.chapter-num{font-size:11px;font-weight:700;letter-spacing:2px;margin-bottom:4px}
.chapter-card:nth-child(1) .chapter-num{color:var(--accent)}
.chapter-card:nth-child(2) .chapter-num{color:var(--blue)}
.chapter-card:nth-child(3) .chapter-num{color:var(--green)}
.chapter-card:nth-child(4) .chapter-num{color:#a855f7}
.chapter-card:nth-child(5) .chapter-num{color:var(--red)}
.chapter-card:nth-child(6) .chapter-num{color:#06b6d4}
.chapter-topics{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.topic-tag{padding:4px 10px;border-radius:6px;font-size:11px;background:var(--bg3);color:var(--text2);border:1px solid var(--border2);transition:all .2s;cursor:pointer}
.topic-tag:hover{background:var(--accent-glow);color:var(--accent2);border-color:rgba(245,158,11,.2)}

/* Knowledge Detail */
.knowledge-detail{margin-top:24px;display:none}
.knowledge-detail.active{display:block;animation:fadeUp .3s ease}
.knowledge-back{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-size:13px;cursor:pointer;transition:all .2s;margin-bottom:20px}
.knowledge-back:hover{color:var(--accent2);border-color:rgba(245,158,11,.2)}
.knowledge-content{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:32px}
.knowledge-content h3{font-family:var(--font-display);font-size:22px;font-weight:900;margin-bottom:20px;color:var(--accent2)}
.knowledge-content h4{font-size:15px;font-weight:700;margin:20px 0 8px;color:var(--text)}
.knowledge-content p,.knowledge-content li{font-size:14px;color:var(--text2);line-height:1.8}
.knowledge-content ul{padding-left:20px;margin:8px 0}
.knowledge-content li{margin:4px 0}
.knowledge-content .formula{display:inline-block;padding:2px 8px;border-radius:4px;background:var(--bg3);color:var(--accent2);font-family:monospace;font-size:13px;margin:2px 0}

/* ===== Quiz Section ===== */
.quiz-controls{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px}
.quiz-btn{padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:all .25s;border:1px solid var(--border);background:var(--bg2);color:var(--text2)}
.quiz-btn:hover{border-color:rgba(245,158,11,.3);color:var(--accent2);box-shadow:0 4px 16px rgba(0,0,0,.2)}
.quiz-btn.primary{background:var(--accent);color:#000;border-color:var(--accent)}
.quiz-btn.primary:hover{background:var(--accent2);box-shadow:0 4px 16px rgba(245,158,11,.3)}
.quiz-chapter-select{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.quiz-chip{padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text2);transition:all .2s}
.quiz-chip:hover,.quiz-chip.active{background:var(--accent-glow);color:var(--accent2);border-color:rgba(245,158,11,.3)}
.quiz-area{margin-top:16px}
.quiz-progress{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.quiz-progress-bar{flex:1;height:6px;border-radius:3px;background:var(--bg3);overflow:hidden}
.quiz-progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .3s}
.quiz-progress-text{font-size:12px;color:var(--text3);white-space:nowrap}
.question-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px;margin-bottom:16px;animation:fadeUp .3s ease}
.question-num{font-size:12px;font-weight:700;color:var(--accent);letter-spacing:1px;margin-bottom:8px}
.question-text{font-size:15px;font-weight:500;margin-bottom:16px;line-height:1.7}
.question-options{display:flex;flex-direction:column;gap:8px}
.option-btn{display:flex;align-items:flex-start;gap:10px;padding:12px 16px;border-radius:10px;background:var(--bg3);border:1px solid var(--border2);cursor:pointer;transition:all .2s;text-align:left;font-size:14px;color:var(--text2)}
.option-btn:hover{border-color:rgba(245,158,11,.2);background:var(--bg4)}
.option-btn .opt-label{min-width:24px;height:24px;border-radius:6px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--text3);flex-shrink:0}
.option-btn.correct{background:var(--green-glow);border-color:rgba(16,185,129,.3)}
.option-btn.correct .opt-label{background:var(--green);color:#fff}
.option-btn.wrong{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.2)}
.option-btn.wrong .opt-label{background:var(--red);color:#fff}
.answer-reveal{margin-top:16px;padding:16px;border-radius:10px;background:var(--green-glow);border:1px solid rgba(16,185,129,.15);font-size:13px;color:var(--green2);line-height:1.8;display:none}
.answer-reveal.show{display:block;animation:fadeUp .3s ease}
.calc-answer{margin-top:16px;padding:20px;border-radius:10px;background:var(--blue-glow);border:1px solid rgba(59,130,246,.15);font-size:13px;color:var(--blue2);line-height:1.8;white-space:pre-wrap;display:none}
.calc-answer.show{display:block;animation:fadeUp .3s ease}
.calc-toggle{margin-top:12px;padding:8px 16px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);color:var(--blue2);font-size:12px;cursor:pointer;transition:all .2s}
.calc-toggle:hover{background:var(--blue-glow);border-color:rgba(59,130,246,.2)}
.quiz-score{text-align:center;padding:40px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg)}
.quiz-score .big{font-family:var(--font-display);font-size:64px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.quiz-score p{color:var(--text2);margin-top:8px}
.qa-container{max-width:720px;margin:0 auto}
.qa-input-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:20px}
.qa-input-box textarea{width:100%;min-height:80px;border:1px solid var(--border);border-radius:10px;padding:12px;font-size:15px;background:var(--bg);color:var(--text);resize:vertical;line-height:1.6;font-family:inherit}
.qa-input-box textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,158,11,.15)}
.qa-input-box textarea::placeholder{color:var(--text3)}
.qa-input-actions{display:flex;gap:10px;margin-top:12px;justify-content:flex-end}
.qa-send-btn{padding:10px 24px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;background:var(--accent);color:#000;border:none;transition:all .25s}
.qa-send-btn:hover{background:var(--accent2);box-shadow:0 4px 16px rgba(245,158,11,.3)}
.qa-send-btn:disabled{opacity:.5;cursor:not-allowed}
.qa-clear-btn{padding:10px 16px;border-radius:10px;font-size:13px;cursor:pointer;background:var(--bg3);color:var(--text3);border:1px solid var(--border);transition:all .2s}
.qa-clear-btn:hover{color:var(--text2);border-color:var(--text3)}
.qa-history{display:flex;flex-direction:column;gap:16px}
.qa-msg{border-radius:14px;padding:16px 20px;animation:fadeUp .3s ease;position:relative}
.qa-msg-user{background:var(--accent-glow);border:1px solid rgba(245,158,11,.15);margin-left:40px}
.qa-msg-ai{background:var(--bg2);border:1px solid var(--border);margin-right:40px}
.qa-msg-label{font-size:11px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.qa-msg-user .qa-msg-label{color:var(--accent2)}
.qa-msg-ai .qa-msg-label{color:var(--blue2)}
.qa-msg-content{font-size:14px;line-height:1.8;color:var(--text)}
.qa-msg-content .formula-inline{display:inline;background:rgba(245,158,11,.1);padding:2px 6px;border-radius:4px;font-style:italic;font-weight:600}
.qa-typing{display:flex;align-items:center;gap:8px;padding:12px 16px;font-size:13px;color:var(--text3)}
.qa-typing-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:qaBounce 1.2s infinite}
.qa-typing-dot:nth-child(2){animation-delay:.2s}
.qa-typing-dot:nth-child(3){animation-delay:.4s}
@keyframes qaBounce{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
.qa-suggestions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.qa-suggest-btn{padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text3);transition:all .2s}
.qa-suggest-btn:hover{background:var(--accent-glow);color:var(--accent2);border-color:rgba(245,158,11,.3)}
.summary-box{margin:16px 0;padding:16px 20px;border-radius:12px;background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.15)}
.summary-box h4{font-size:14px;font-weight:700;color:var(--accent2);margin-bottom:10px}
.summary-box ul{margin:0;padding-left:20px}
.summary-box li{font-size:13px;line-height:1.7;color:var(--text2)}
.formula-table{width:100%;border-collapse:collapse;margin:8px 0;font-size:13px}
.formula-table th{background:rgba(245,158,11,.12);padding:8px 12px;text-align:left;font-weight:600;color:var(--accent2);border-bottom:2px solid rgba(245,158,11,.2)}
.formula-table td{padding:7px 12px;border-bottom:1px solid var(--border);color:var(--text2)}
.formula-table tr:hover td{background:rgba(245,158,11,.04)}
.tip-box{margin:12px 0;padding:12px 16px;border-radius:10px;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.15);font-size:13px;color:var(--blue2);line-height:1.7}
.warn-box{margin:12px 0;padding:12px 16px;border-radius:10px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.15);font-size:13px;color:var(--red2);line-height:1.7}

/* ===== Video Section ===== */
.video-platforms{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.platform-badge{display:flex;align-items:center;gap:8px;padding:8px 16px;border-radius:10px;background:var(--bg2);border:1px solid var(--border);font-size:13px;color:var(--text2);cursor:pointer;transition:all .2s}
.platform-badge:hover,.platform-badge.active{border-color:rgba(245,158,11,.3);color:var(--accent2)}
.platform-badge .dot{width:8px;height:8px;border-radius:50%}
.video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
.video-card{position:relative;overflow:hidden}
.video-card .vid-chapter{font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--accent);margin-bottom:6px}
.video-card .vid-title{font-size:14px;font-weight:600;margin-bottom:8px;line-height:1.5}
.video-card .vid-source{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:6px}
.video-card .vid-desc{font-size:12px;color:var(--text2);margin-top:8px;line-height:1.6}
.video-card .vid-link{display:inline-flex;align-items:center;gap:4px;margin-top:10px;font-size:12px;color:var(--blue2);text-decoration:none;transition:color .2s}
.video-card .vid-link:hover{color:var(--accent2)}
.mooc-section{margin-top:40px}
.mooc-section h3{font-family:var(--font-display);font-size:20px;font-weight:700;margin-bottom:16px}
.mooc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.mooc-card{padding:16px;border-radius:var(--radius);background:var(--bg2);border:1px solid var(--border);transition:all .2s}
.mooc-card:hover{border-color:rgba(245,158,11,.15)}
.mooc-card .school{font-size:12px;color:var(--accent);font-weight:700;letter-spacing:.5px}
.mooc-card .course{font-size:14px;font-weight:600;margin:4px 0}
.mooc-card .platform{font-size:11px;color:var(--text3)}

/* ===== Search ===== */
.search-box{position:relative;margin-bottom:24px}
.search-box input{width:100%;padding:14px 20px 14px 48px;border-radius:var(--radius);background:var(--bg2);border:1px solid var(--border);color:var(--text);font-size:14px;font-family:var(--font-body);outline:none;transition:all .2s}
.search-box input:focus{border-color:rgba(245,158,11,.3);box-shadow:0 0 0 3px var(--accent-glow)}
.search-box input::placeholder{color:var(--text3)}
.search-box .search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px}
.fig-box{margin:12px 0 8px;padding:0;text-align:center}
.fig-svg{max-width:100%;height:auto;border-radius:8px;display:block;margin:0 auto}
.fig-caption{text-align:center;font-size:12px;color:var(--text3);margin-top:4px;padding-bottom:8px}
.formula{display:inline;background:rgba(245,158,11,.1);padding:2px 6px;border-radius:4px;font-style:italic;font-weight:600}

/* ===== Responsive ===== */
@media(max-width:768px){
  .header-inner{flex-direction:column;gap:12px}
  .nav-tabs{width:100%;justify-content:center}
  .hero-stats{gap:24px}
  .chapter-grid,.video-grid{grid-template-columns:1fr}
  .mooc-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:480px){
  .mooc-grid{grid-template-columns:1fr}
  .nav-tab{padding:8px 12px;font-size:12px}
}

/* ===== Scrollbar ===== */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

/* ===== Toast ===== */
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:10px;background:var(--bg2);border:1px solid var(--border);color:var(--text);font-size:13px;z-index:200;transform:translateY(100px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow bg-glow-1"></div>
<div class="bg-glow bg-glow-2"></div>

<header>
  <div class="container header-inner">
    <div class="logo">
      <div class="logo-icon">电</div>
      <div class="logo-text">
        <h1>伺服电机课程智能体</h1>
        <p>南京理工大学紫金学院 · 机器人工程</p>
      </div>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" data-tab="knowledge">📖 知识体系</button>
      <button class="nav-tab" data-tab="quiz">📝 题库练习</button>
      <button class="nav-tab" data-tab="qa">💡 问题解答</button>
      <button class="nav-tab" data-tab="video">🎬 教学视频</button>
    </div>
  </div>
</header>

<main class="container">
  <div class="hero">
    <div class="hero-badge">⚡ 2026 春季学期</div>
    <h2>掌握伺服电机，从原理到实践</h2>
    <p>涵盖直流电机、变压器、交流绕组、异步电机、同步电机五大板块，助你系统学习、高效备考</p>
    <div class="hero-stats">
      <div class="hero-stat"><div class="num">5</div><div class="label">核心章节</div></div>
      <div class="hero-stat"><div class="num">800+</div><div class="label">精选题目</div></div>

        <li>Id：直轴电流分量（去磁或助磁）；Iq：交轴电流分量（产生电磁转矩）</li>
        <li>内功率因数角ψ（E₀与I的夹角）用于分解Id和Iq</li>

  {id:8,ch:'dc',type:'choice',q:'他励直流电动机回馈制动时，电机处于',opts:['电动机状态','发电机状态','短路状态','停转状态'],ans:1},
  {id:9,ch:'dc',type:'calc',q:'一台他励直流电动机，PN=10kW，UN=220V，IN=53.4A，nN=1500r/min，Ra=0.4Ω。求额定电磁转矩TN和额定效率ηN。',ans:'(1) TN = 9.55 × PN/nN = 9.55 × 10000/1500 = 63.67 N·m\n(2) ηN = PN/(UN × IN) = 10000/(220 × 53.4) = 10000/11748 ≈ 85.1%'},
  {id:10,ch:'dc',type:'calc',q:'一台并励直流发电机，PN=6kW，UN=230V，nN=1450r/min，Ra=0.92Ω，Rf=280Ω。求额定负载时电枢电流Ia和电磁功率Pem。',ans:'If = UN/Rf = 230/280 ≈ 0.82A\nIN = PN/UN = 6000/230 ≈ 26.09A\nIa = IN + If ≈ 26.91A\nPem = (UN + IaRa) × Ia ≈ 255.4 × 26.91 ≈ 6859W'},

  {id:18,ch:'transformer',type:'choice',q:'电压互感器二次侧严禁',opts:['开路','短路','接表计','接地'],ans:1},
  {id:19,ch:'transformer',type:'calc',q:'一台单相变压器，SN=50kVA，U₁N/U₂N=10000/230V，空载试验（低压侧）：U₀=230V，I₀=6A，p₀=380W；短路试验（高压侧）：Uk=400V，Ik=5A，pk=600W。求变比k、短路参数Rk和Xk。',ans:'(1) k = U₁N/U₂N = 10000/230 ≈ 43.48\n(2) 短路参数（高压侧）：\n  Zk = Uk/Ik = 400/5 = 80Ω\n  Rk = pk/Ik² = 600/25 = 24Ω\n  Xk = √(80² - 24²) = √5824 ≈ 76.3Ω'},
  {id:20,ch:'transformer',type:'calc',q:'一台三相变压器，SN=1000kVA，pkN=12kW，p₀=4kW。求β=0.8、cosφ₂=0.8时的效率。',ans:'η = βSNcosφ₂/(βSNcosφ₂ + p₀ + β²pkN)\n= 0.8×1000×0.8/(0.8×1000×0.8 + 4 + 0.64×12)\n= 640/(640 + 4 + 7.68)\n= 640/651.68 ≈ 98.2%'},

  {id:31,ch:'async',type:'choice',q:'绕线型异步电动机转子串电阻起动的优点是',opts:['起动电流更小','既减小起动电流又增大起动转矩','起动转矩更大','起动更平稳'],ans:1},

  {id:33,ch:'async',type:'calc',q:'一台三相异步电动机，PN=7.5kW，nN=1440r/min，f=50Hz，极数=4。求额定转差率sN和额定电磁转矩TN。',ans:'n₁ = 60f/p = 60×50/2 = 1500 r/min\nsN = (n₁ - nN)/n₁ = (1500 - 1440)/1500 = 0.04\nTN = 9.55 × PN/nN = 9.55 × 7500/1440 ≈ 49.74 N·m'},
  {id:34,ch:'async',type:'calc',q:'一台三相异步电动机，Pem=10kW，sN=0.03。求转子铜损pCu2和机械功率Pmec。',ans:'pCu2 = sN × Pem = 0.03 × 10000 = 300W\nPmec = (1 - sN) × Pem = 0.97 × 10000 = 9700W'},

  {id:41,ch:'sync',type:'choice',q:'隐极同步发电机的功角特性公式为',opts:['Pem = mU²sinδ/Xd','Pem = mE₀Usinδ/Xd','Pem = mE₀Ucosδ/Xd','Pem = mE²sinδ/Xd'],ans:1},
  {id:42,ch:'sync',type:'choice',q:'同步电动机最常用的起动方法是',opts:['直接起动','辅助电动机起动','异步起动法（利用阻尼绕组）','变频起动'],ans:2},
  {id:43,ch:'sync',type:'calc',q:'一台隐极同步发电机，Xd=1.2Ω，E₀=500V（线），U=400V（线），求δ=30°时的电磁功率Pem。',ans:'E₀相 = 500/√3 ≈ 288.7V，U相 = 400/√3 ≈ 230.9V\nPem = 3 × (E₀相 × U相 / Xd) × sin30°\n= 3 × (288.7 × 230.9 / 1.2) × 0.5\n= 3 × 55453 × 0.5 ≈ 83179W ≈ 83.2kW'},
  // Comprehensive
  {id:44,ch:'transformer',type:'calc',q:'简述变压器空载试验和短路试验的目的及分别在哪个侧进行。',ans:'空载试验：测定铁损pFe、励磁阻抗Zm=Rm+jXm。通常在低压侧进行（低压侧加额定电压，高压侧开路）。\n\n短路试验：测定铜损pCu（短路损耗）、短路阻抗Zk=Rk+jXk。通常在高压侧进行（高压侧加低电压使电流达额定值，低压侧短路）。'},
  {id:45,ch:'transformer',type:'calc',q:'为什么电流互感器二次侧严禁开路？',ans:'正常运行时，二次侧电流产生的磁动势近似抵消一次侧磁动势，铁心磁通很小。\n\n若二次侧开路：\n(1) 二次电流为零，一次磁动势全部用于励磁，铁心磁通急剧增大\n(2) 铁损剧增，铁心过热可能烧毁\n(3) 二次侧感应出极高电压（可达数千伏），危及人身安全和设备绝缘'},
  {id:46,ch:'dc',type:'calc',q:'直流电动机为什么不能直接起动？常用的起动方法有哪些？',ans:'直接起动时 n=0 → E=0 → Ia=U/Ra，因Ra很小，起动电流可达5~7倍额定电流，造成：\n(1) 换向困难，产生严重火花\n(2) 机械冲击，损坏转轴和传动机构\n(3) 对电网造成过大冲击\n\n常用起动方法：电枢串电阻起动、降压起动'},
  {id:47,ch:'async',type:'calc',q:'试述三相异步电动机变频调速的原理及V/f恒定控制的原因。',ans:'变频调速原理：改变供电频率f，同步转速n₁=60f/p随之改变，从而调节转速。\n\nV/f恒定控制原因：E₁≈4.44fNΦkw\n• f降低而U不变 → Φ增大 → 磁路饱和 → 励磁电流剧增\n• f升高而U不变 → Φ减小 → 转矩下降\n\n保持U/f恒定可使Φ基本不变，保持转矩能力并避免磁路饱和。'},
  {id:48,ch:'sync',type:'calc',q:'同步发电机并联运行时，如何调节有功功率和无功功率？',ans:'有功功率调节：调节原动机的输入转矩（增大原动机转矩 → 功角δ增大 → 输出有功功率增大）\n\n无功功率调节：调节励磁电流If\n• 增大If → E₀增大 → 发出更多感性无功（过励）\n• 减小If → E₀减小 → 吸收感性无功（欠励）\n\nV形曲线描述了不同励磁下有功功率与无功功率的关系。'},

document.querySelector('.nav-tabs').addEventListener('click',function(e){

  if(!tab) return;
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));

});

// ===== KNOWLEDGE =====
function renderChapters(filter=''){
  const grid=document.getElementById('chapter-grid');
  const detail=document.getElementById('knowledge-detail');
  detail.classList.remove('active');
  grid.style.display='';
  grid.innerHTML='';
  chapters.forEach(ch=>{
    if(filter && !ch.title.includes(filter) && !ch.topics.some(t=>t.includes(filter)) && !ch.content.toLowerCase().includes(filter.toLowerCase())) return;
    const card=document.createElement('div');
    card.className='card chapter-card';
    card.innerHTML=`
      <div class="chapter-num">${ch.num}</div>
      <h3>${ch.title}</h3>
      <div class="chapter-topics">${ch.topics.map(t=>`<span class="topic-tag">${t}</span>`).join('')}</div>`;
    card.addEventListener('click',()=>showChapter(ch));
    grid.appendChild(card);
  });
  if(!grid.children.length) grid.innerHTML='<div style="text-align:center;padding:40px;color:var(--text3)">未找到匹配的知识点</div>';
}

function showChapter(ch){
  const grid=document.getElementById('chapter-grid');
  const detail=document.getElementById('knowledge-detail');
  const content=document.getElementById('knowledge-content');
  grid.style.display='none';
  content.innerHTML=ch.content;
  detail.classList.add('active');
  window.scrollTo({top:200,behavior:'smooth'});
}

document.getElementById('knowledge-back').addEventListener('click',()=>{
  document.getElementById('knowledge-detail').classList.remove('active');
  document.getElementById('chapter-grid').style.display='';
});

document.getElementById('knowledge-search').addEventListener('input',e=>{
  renderChapters(e.target.value.trim());
});

renderChapters();

function startQuiz(count){
  let pool=questions.filter(q=>selectedChapters.size===0||selectedChapters.has(q.ch));
  if(!pool.length){showToast('请先选择章节');return;}
  pool=[...pool].sort(()=>Math.random()-.5);
  currentQuiz=pool.slice(0,Math.min(count,pool.length));
  quizIndex=0;quizScore=0;quizAnswered=0;
  renderQuestion();
}

function renderQuestion(){
  const area=document.getElementById('quiz-area');
  if(quizIndex>=currentQuiz.length){showScore();return;}
  const q=currentQuiz[quizIndex];
  const chName=chapters.find(c=>c.id===q.ch)?.title||'';
  const total=currentQuiz.length;
  let html=`<div class="quiz-progress">
    <div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${(quizIndex/total)*100}%"></div></div>
    <div class="quiz-progress-text">${quizIndex+1} / ${total}</div>
  </div><div class="question-card">
    <div class="question-num">${chName} · 第 ${quizIndex+1} 题</div>
    <div class="question-text">${q.q}</div>`;
  if(q.type==='choice'){
    const labels=['A','B','C','D'];
    html+=`<div class="question-options">${q.opts.map((o,i)=>`<button class="option-btn" data-idx="${i}"><span class="opt-label">${labels[i]}</span><span>${o}</span></button>`).join('')}</div>
    <div class="answer-reveal" id="ans-reveal">✅ 正确答案：${labels[q.ans]}. ${q.opts[q.ans]}</div>`;
  } else {
    html+=`<button class="calc-toggle" id="calc-toggle">📖 查看解答</button>
    <div class="calc-answer" id="calc-answer">${q.ans}</div>`;
  }
  html+=`</div>`;
  area.innerHTML=html;

  if(q.type==='choice'){
    area.querySelectorAll('.option-btn').forEach(btn=>{
      btn.addEventListener('click',()=>{
        if(btn.classList.contains('correct')||btn.classList.contains('wrong'))return;
        const idx=parseInt(btn.dataset.idx);
        area.querySelectorAll('.option-btn').forEach(b=>{b.style.pointerEvents='none';});
        if(idx===q.ans){btn.classList.add('correct');quizScore++;}
        else{btn.classList.add('wrong');area.querySelectorAll('.option-btn')[q.ans].classList.add('correct');}
        document.getElementById('ans-reveal').classList.add('show');
        quizAnswered++;
        setTimeout(()=>{quizIndex++;renderQuestion();},1800);
      });
    });
  } else {
    document.getElementById('calc-toggle').addEventListener('click',()=>{
      document.getElementById('calc-answer').classList.add('show');
      document.getElementById('calc-toggle').style.display='none';
      quizAnswered++;
      setTimeout(()=>{quizIndex++;renderQuestion();},2500);
    });
  }
}

function showScore(){
  const area=document.getElementById('quiz-area');
  const choiceTotal=currentQuiz.filter(q=>q.type==='choice').length;
  const pct=choiceTotal?Math.round(quizScore/choiceTotal*100):0;
  area.innerHTML=`<div class="quiz-score">
    <div style="font-size:48px;margin-bottom:16px">🎉</div>
    <div class="big">${pct}%</div>
    <p>选择题正确 ${quizScore}/${choiceTotal}，共完成 ${quizAnswered}/${currentQuiz.length} 题</p>
    <button class="quiz-btn primary" style="margin-top:20px" onclick="startQuiz(${currentQuiz.length})">再练一次</button>
  </div>`;
}

<b>基本术语</b>：

• 槽距角 α=360°p/Z（电角度）

<b>短距因数</b>：kp₁=sin(yα/2)≤1
• 物理意义：短距与整距电动势之比
• 整距时kp₁=1

<b>分布因数</b>：kd₁=sin(qα/2)/(q·sin(α/2))≤1
• 物理意义：分布与集中电动势之比
• 集中(q=1)时kd₁=1

<b>绕组因数</b>：kN₁=kp₁×kd₁

<b>谐波削弱</b>：
• 短距：消除ν次谐波取y=(ν-1)τ/ν
• 消除5次谐波取y=4τ/5
• 同时削弱5次7次取y=5τ/6
• 分布绕组也可削弱谐波，q越大效果越好`},
  {keywords:['磁动势','旋转磁场','脉振'],answer:`<b>交流绕组磁动势</b>：

<b>单相绕组</b>：脉振磁动势
• 空间固定位置，幅值随时间脉振
• Fφ₁=(4/π)(Nkw₁/2p)I

<b>脉振磁动势分解定理</b>：
一个脉振磁动势=两个幅值相等、转向相反的旋转磁动势

<b>三相绕组</b>：圆形旋转磁动势
• 幅值 F₁=(3/2)Fφ₁（1.5倍单相幅值）
• 条件：三相对称绕组+三相对称电流
• 不对称→椭圆形旋转磁动势

<b>同步转速</b>：n₁=60f/p
• 旋转方向：从超前相→滞后相
• 对调任意两相电源线→转向反转`},
  {keywords:['效率','效率最大','损耗','铁损','铜损'],answer:`<b>变压器效率</b>：
η = P₂/(P₂+pFe+β²pkN) × 100%

<b>效率最大条件</b>：可变损耗=不变损耗
即 β²pkN = p₀（铜损=铁损）

<b>效率最大时的负载系数</b>：βm=√(p₀/pkN)

<b>损耗分类</b>：
• 不变损耗（铁损pFe）：额定电压下基本不变
• 可变损耗（铜损β²pkN）：与负载系数平方成正比

<b>异步电机功率流程</b>：
P₁→pCu₁→Pem→pCu₂→Pmec→pΩ+pₛ→P₂
• pCu₂=sPem（转子铜损与转差率成正比）
• Pmec=(1-s)Pem`},
  {keywords:['机械特性','硬特性','软特性'],answer:`<b>机械特性</b>：n=f(T)或T=f(s)

<b>直流电动机</b>：
• 他励/并励：硬特性（转速随负载变化小）
  n = U/(CₑΦ) - Ra·T/(CₑCₜΦ²)
• 串励：软特性（转速随负载急剧下降，严禁空载）

<b>异步电动机</b>：
• 额定运行段接近线性（硬特性）
• 最大转矩Tmax处为临界点
• 过载能力λ=Tmax/TN≈1.5~2.5

<b>人为机械特性</b>：
• 电枢串电阻→特性变软
• 降压→理想空载转速降低，斜率不变
• 弱磁→理想空载转速升高`},
  {keywords:['实验','安全','数据处理','温升'],answer:`<b>电机实验要点</b>：

<b>直流电机实验</b>：空载/负载特性、自励过程、起动调速制动
<b>变压器实验</b>：空载短路试验、连接组别测定、并联运行
<b>异步电机实验</b>：空载堵转、负载特性、起动对比
<b>同步电机实验</b>：空载短路零功率因数、并网运行

<b>安全规范</b>：
• 实验前检查接线，确认无误方可通电
• 电流互感器二次侧严禁开路
• 电压互感器二次侧严禁短路
• 实验结束先断电源再拆线

<b>数据处理</b>：
• 多次测量取平均值减小随机误差
• 效率 η=P₂/(P₂+Σp)
• 温升 ΔT=T绕组-T环境`}
];

function qaMatch(question){
  const q=question.toLowerCase();
  let best=null,bestScore=0;
  for(const k of qaKnowledge){
    let score=0;
    for(const kw of k.keywords){
      if(q.includes(kw.toLowerCase())) score+=kw.length;
    }
    if(score>bestScore){bestScore=score;best=k;}
  }
  return bestScore>=2?best:null;
}

function qaGenerateAnswer(question){
  const match=qaMatch(question);
  if(match) return match.answer;

  // Fallback: try to give a general helpful answer
  const q=question.toLowerCase();
  if(q.includes('什么')||q.includes('是什么')||q.includes('什么是')){
    return `这是一个很好的问题！关于"${question}"，建议你先查看知识体系中相关章节的内容，也可以在题库练习中做相关题目加深理解。

<b>常见相关知识点</b>：
• 直流电机：工作原理、运行特性、起动调速制动、换向
• 变压器：等效电路、参数测定、运行特性、并联运行
• 交流绕组：短距分布因数、感应电动势、磁动势
• 异步电机：转差率、等效电路、机械特性、起动调速
• 同步电机：功角特性、并联运行、V形曲线

请尝试更具体的问题，我可以给出更详细的解答！`;
  }
  return `感谢你的提问！关于"${question}"，这涉及到电机学的知识。

我目前可以回答以下方面的问题：
• <b>直流电机</b>：原理、特性、起动、调速、制动、换向、电枢反应
• <b>变压器</b>：等效电路、参数测定、效率、三相连接、并联运行、互感器
• <b>交流绕组</b>：短距/分布因数、感应电动势、磁动势、谐波削弱
• <b>异步电机</b>：转差率、等效电路、功率转矩、起动、调速、制动、单相电机
• <b>同步电机</b>：功角特性、并联运行、V形曲线、补偿机
• <b>实验</b>：各类实验方法、安全规范

请尝试用更具体的关键词提问，例如"换向极的作用是什么？"`;
}

function qaAddMessage(type,content){
  const div=document.createElement('div');
  div.className=`qa-msg qa-msg-${type}`;
  const label=type==='user'?'🧑 你的问题':'🤖 电机学助手';
  div.innerHTML=`<div class="qa-msg-label">${label}</div><div class="qa-msg-content">${content}</div>`;
  qaHistory.appendChild(div);
  div.scrollIntoView({behavior:'smooth',block:'end'});
}

function qaShowTyping(){
  const div=document.createElement('div');
  div.className='qa-msg qa-msg-ai';
  div.id='qa-typing';
  div.innerHTML=`<div class="qa-typing"><div class="qa-typing-dot"></div><div class="qa-typing-dot"></div><div class="qa-typing-dot"></div><span>正在思考...</span></div>`;
  qaHistory.appendChild(div);
  div.scrollIntoView({behavior:'smooth',block:'end'});
}

function qaHideTyping(){
  const t=document.getElementById('qa-typing');
  if(t)t.remove();
}

function qaSubmit(){
  const q=qaInput.value.trim();
  if(!q)return;
  if(qaFirstQuestion){
    qaHistory.innerHTML='';
    qaFirstQuestion=false;
  }
  qaAddMessage('user',q.replace(/</g,'&lt;').replace(/>/g,'&gt;'));
  qaInput.value='';
  qaSend.disabled=true;
  qaShowTyping();
  setTimeout(()=>{
    qaHideTyping();
    const answer=qaGenerateAnswer(q);
    qaAddMessage('ai',answer);
    qaSend.disabled=false;
  },800+Math.random()*600);
}

qaSend.addEventListener('click',qaSubmit);
qaInput.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();qaSubmit();}
});
qaClear.addEventListener('click',()=>{
  qaHistory.innerHTML=`<div style="text-align:center;padding:40px 20px;color:var(--text3)">
    <div style="font-size:48px;margin-bottom:16px">💡</div>
    <p style="font-size:16px;margin-bottom:8px">有问题？随时提问！</p>
    <p style="font-size:13px">我会根据电机学知识库为你详细解答</p></div>`;
  qaFirstQuestion=true;
});
document.querySelectorAll('.qa-suggest-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    qaInput.value=btn.dataset.q;
    qaSubmit();
  });
});
</script>
