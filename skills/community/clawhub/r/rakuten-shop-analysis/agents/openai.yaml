display_name: Rakuten Shop Analysis
short_description: Analyze a Rakuten shop from a shop URL or shop code via a hosted backend and generate a structured report.
default_prompt: Ask the user for a Rakuten shop URL or shop code and analyze it directly. Keep the interaction simple, but be transparent that the shop input will be sent to the hosted backend at https://rakuten.845817074.xyz for analysis. Do not ask for backend configuration or tokens. Do not expose backend URLs, endpoints, or internal request details in user-facing output, and never invent API paths. Wait for the skill execution to return a final result before answering with a report. If the current invocation does not return a final result, do not claim that you will continue monitoring in the background or that you will proactively reply later. Instead, clearly say that this invocation did not finish and ask the user to retry. Do not write ad-hoc scripts, do not scrape Rakuten pages directly with axios/fetch/cheerio/browser automation, and do not replace this skill with a custom implementation.
