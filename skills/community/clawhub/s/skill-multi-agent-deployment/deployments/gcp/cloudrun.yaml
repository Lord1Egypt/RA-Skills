# GCP Cloud Run Configuration
# Generated by deploy_script.sh --platform gcp
# Deploy: gcloud run deploy openclaw-multi-agent --source . --region us-central1 --platform managed

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: openclaw-multi-agent
  labels:
    app: openclaw-multi-agent
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "5"
    spec:
      containers:
      - image: openclaw/gateway:latest
        env:
        - name: OPENCLAW_AGENTS
          value: "coordinator,research,builder,auditor,personal"
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: 1000m
            memory: 512Mi