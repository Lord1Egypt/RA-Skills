<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>
  <!-- Open book -->
  <g transform="translate(128,108)">
    <!-- Left page -->
    <path d="M-2,0 Q-70,-6 -70,40 L-70,100 Q-70,106 -64,104 L-6,86 Q-2,84 -2,80 Z" fill="#e8d5b7" stroke="#c4a97d" stroke-width="1.5"/>
    <!-- Right page -->
    <path d="M2,0 Q70,-6 70,40 L70,100 Q70,106 64,104 L6,86 Q2,84 2,80 Z" fill="#f5ecd7" stroke="#c4a97d" stroke-width="1.5"/>
    <!-- Spine line -->
    <line x1="0" y1="-6" x2="0" y2="82" stroke="#c4a97d" stroke-width="2"/>
    <!-- Left page lines -->
    <line x1="-55" y1="20" x2="-12" y2="16" stroke="#d4c4a0" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-55" y1="35" x2="-12" y2="31" stroke="#d4c4a0" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-55" y1="50" x2="-12" y2="46" stroke="#d4c4a0" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-50" y1="65" x2="-12" y2="61" stroke="#d4c4a0" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Right page lines -->
    <line x1="55" y1="20" x2="12" y2="16" stroke="#d4c4a0" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="55" y1="35" x2="12" y2="31" stroke="#d4c4a0" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="55" y1="50" x2="12" y2="46" stroke="#d4c4a0" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Highlight marker (yellow) on right page -->
    <rect x="10" y="32" width="42" height="5" rx="2" fill="#f6d365" opacity="0.7"/>
  </g>
  <!-- Brain / knowledge node -->
  <g transform="translate(128,172)">
    <!-- Central node -->
    <circle cx="0" cy="0" r="14" fill="#4ecdc4" stroke="#3db8b0" stroke-width="2"/>
    <!-- Connected nodes -->
    <circle cx="-28" cy="-10" r="9" fill="#ff6b6b" stroke="#e55555" stroke-width="1.5"/>
    <circle cx="28" cy="-8" r="9" fill="#a29bfe" stroke="#8b83e5" stroke-width="1.5"/>
    <circle cx="-22" cy="16" r="9" fill="#f9ca24" stroke="#d4a81c" stroke-width="1.5"/>
    <circle cx="24" cy="14" r="9" fill="#6c5ce7" stroke="#5548d9" stroke-width="1.5"/>
    <!-- Connection lines -->
    <line x1="-15" y1="-5" x2="-20" y2="-8" stroke="#888" stroke-width="1.5" opacity="0.6"/>
    <line x1="15" y1="-4" x2="20" y2="-7" stroke="#888" stroke-width="1.5" opacity="0.6"/>
    <line x1="-13" y1="8" x2="-16" y2="12" stroke="#888" stroke-width="1.5" opacity="0.6"/>
    <line x1="14" y1="7" x2="17" y2="11" stroke="#888" stroke-width="1.5" opacity="0.6"/>
    <!-- Synapse dots -->
    <circle cx="-20" cy="-7" r="2" fill="#fff" opacity="0.8"/>
    <circle cx="20" cy="-6" r="2" fill="#fff" opacity="0.8"/>
    <circle cx="-17" cy="12" r="2" fill="#fff" opacity="0.8"/>
    <circle cx="17" cy="11" r="2" fill="#fff" opacity="0.8"/>
  </g>
  <!-- WeChat green accent -->
  <circle cx="38" cy="38" r="16" fill="#07c160" opacity="0.9"/>
  <text x="38" y="44" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="20" font-weight="bold">W</text>
</svg>