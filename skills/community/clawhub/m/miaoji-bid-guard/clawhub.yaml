tagline: 设定利润边界，秒级出价决策，熔断防御
description: |
  亚马逊广告出价护栏顾问。告别ACoS分析工具的被动思维，升级为AI广告护栏的主动防御体系。
  
  用户只需说"ACoS不能超25%"，系统秒级计算每个展示机会的最优出价，触碰红线立即生成降出价或暂停建议。
  
  核心功能：
  - 利润边界设定：基于目标ACoS计算护栏指标
  - 出价计算方案：阶段化关键词出价建议
  - 熔断策略建议：词级/时段/活动级三级熔断
  - 飞轮出价联动：自然排名与广告协同
  - 视频广告脚本：30秒痛点驱动型脚本框架

