# MeetMind Nginx 配置 v0.6.1 + 企微 Agent Connector 反向代理
# 部署路径：/etc/nginx/sites-available/hermesai
# 激活：ln -sf /etc/nginx/sites-available/hermesai /etc/nginx/sites-enabled/

server {
    listen 443 ssl http2;
    server_name www.hermesai.ltd hermesai.ltd;

    ssl_certificate /etc/letsencrypt/live/www.hermesai.ltd/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.hermesai.ltd/privkey.pem;

    # mTLS CA 证书（server 级别，各 location 根据需要启用）
    ssl_client_certificate /etc/nginx/meetmind-certs/ca.crt;
    ssl_verify_client optional;  # optional: 不强制，由各 location 决定

    # ============================================================
    # 企微 Agent Connector API（配对 + 消息转换）
    # ============================================================

    # 健康检查（精确匹配，优先级最高）
    location = /health {
        proxy_pass http://127.0.0.1:19527;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket 信令（精确匹配）
    location = /ws {
        proxy_pass http://127.0.0.1:19527;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
    }

    # 消息转换 API（/api/convert/*）
    location /api/ {
        proxy_pass http://127.0.0.1:19527;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # P2P 配对 API（/pair/*）
    location /pair/ {
        proxy_pass http://127.0.0.1:19527;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ============================================================
    # MeetMind 配置（原有，保持不变）
    # ============================================================

    # MeetMind 上传文件（公开访问）
    location /meetmind-uploads/ {
        alias /var/www/hermesai/meetmind-api/uploads/;
        autoindex off;
    }

    # 🔓 MeetMind 免费试用端点（无需 mTLS）
    location /meetmind/trial {
        proxy_pass http://127.0.0.1:8004;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # 🔒 MeetMind 升级页面（无需 mTLS）
    location /meetmind/upgrade {
        proxy_pass http://127.0.0.1:8004;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # 🖼️ MeetMind 静态文件（收款码等，无需 mTLS）
    location /meetmind/static/ {
        proxy_pass http://127.0.0.1:8004;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # MeetMind 用户用量查询（也需要试用用户能访问）
    location /meetmind/user/ {
        proxy_pass http://127.0.0.1:8004;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # 🔒 MeetMind API（mTLS 认证）
    location /meetmind/ {
        # mTLS 强制检查
        if ($ssl_client_verify != SUCCESS) {
            return 403;
        }

        proxy_pass http://127.0.0.1:8004;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 100M;
    }

    # 默认首页
    location / {
        root /var/www/hermesai;
        index index.html;
    }
}

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name www.hermesai.ltd hermesai.ltd;
    return 301 https://$host$request_uri;
}
