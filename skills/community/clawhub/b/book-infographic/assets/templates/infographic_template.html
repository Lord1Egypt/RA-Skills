<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>书籍信息图 - {{BOOK_TITLE}}</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        :root {
            --primary-color: #2196F3;
            --secondary-color: #FFC107;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-primary: #333333;
            --text-secondary: #666666;
            --border-color: #e0e6ed;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.7;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* 头部区域 */
        .header {
            background: linear-gradient(135deg, var(--primary-color), #1976D2);
            color: white;
            padding: 48px 32px;
            border-radius: 16px;
            text-align: center;
            margin-bottom: 32px;
            box-shadow: 0 8px 32px rgba(33, 150, 243, 0.3);
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 12px;
            font-weight: 600;
        }
        
        .header .meta {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        /* 概览卡片 */
        .overview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        
        .stat-card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        .stat-card .value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary-color);
        }
        
        .stat-card .label {
            color: var(--text-secondary);
            margin-top: 8px;
        }
        
        /* 章节卡片 */
        .section-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            padding-left: 16px;
            border-left: 4px solid var(--primary-color);
        }
        
        .chapter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }
        
        .chapter-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        
        .chapter-card h3 {
            color: var(--primary-color);
            margin-bottom: 12px;
            font-size: 1.2rem;
        }
        
        .chapter-card .page-range {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }
        
        .chapter-card p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }
        
        /* 图表区域 */
        .chart-section {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 32px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        
        .chart-container {
            width: 100%;
            height: 400px;
        }
        
        /* 概念标签 */
        .concept-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 16px;
        }
        
        .concept-tag {
            background: linear-gradient(135deg, #E3F2FD, #BBDEFB);
            color: #1565C0;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        
        /* 关系图 */
        .relationship-section {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 32px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        
        /* 页脚 */
        .footer {
            text-align: center;
            padding: 32px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .header {
                padding: 32px 20px;
            }
            
            .header h1 {
                font-size: 1.8rem;
            }
            
            .container {
                padding: 12px;
            }
            
            .chart-container {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部区域 -->
        <div class="header">
            <h1>{{BOOK_TITLE}}</h1>
            <p class="meta">{{AUTHOR}} | {{PUBLICATION_YEAR}} | {{CORE_THEME}}</p>
        </div>
        
        <!-- 概览统计 -->
        <div class="overview-grid">
            <div class="stat-card">
                <div class="value">{{TOTAL_PAGES}}</div>
                <div class="label">总页数</div>
            </div>
            <div class="stat-card">
                <div class="value">{{TOTAL_CHAPTERS}}</div>
                <div class="label">章节数</div>
            </div>
            <div class="stat-card">
                <div class="value">{{TOTAL_WORDS}}</div>
                <div class="label">总字数</div>
            </div>
            <div class="stat-card">
                <div class="value">{{KEY_CONCEPTS}}</div>
                <div class="label">核心概念</div>
            </div>
        </div>
        
        <!-- 核心概念 -->
        <h2 class="section-title">核心概念</h2>
        <div class="chart-section">
            <div class="concept-list">
                {{CONCEPT_TAGS}}
            </div>
        </div>
        
        <!-- 章节概览图表 -->
        <h2 class="section-title">章节字数分布</h2>
        <div class="chart-section">
            <div id="chapterChart" class="chart-container"></div>
        </div>
        
        <!-- 章节摘要 -->
        <h2 class="section-title">章节摘要</h2>
        <div class="chapter-grid">
            {{CHAPTER_CARDS}}
        </div>
        
        <!-- 知识关系图 -->
        <h2 class="section-title">知识图谱</h2>
        <div class="relationship-section">
            <div id="relationshipChart" class="chart-container"></div>
        </div>
        
        <!-- 内容类型分布 -->
        <h2 class="section-title">内容类型分析</h2>
        <div class="chart-section">
            <div id="contentTypeChart" class="chart-container"></div>
        </div>
        
        <!-- 页脚 -->
        <div class="footer">
            <p>由 Book Infographic Skill 生成 | 生成时间: {{GENERATION_DATE}}</p>
        </div>
    </div>
    
    <script>
        // 章节字数分布图
        var chapterChart = echarts.init(document.getElementById('chapterChart'));
        chapterChart.setOption({
            tooltip: {
                trigger: 'axis',
                axisPointer: { type: 'shadow' }
            },
            grid: {
                left: '3%',
                right: '4%',
                bottom: '3%',
                containLabel: true
            },
            xAxis: {
                type: 'category',
                data: {{CHAPTER_NAMES}},
                axisLabel: {
                    interval: 0,
                    rotate: 30,
                    fontSize: 11
                }
            },
            yAxis: {
                type: 'value',
                name: '字数'
            },
            series: [{
                name: '字数',
                type: 'bar',
                data: {{CHAPTER_WORDS}},
                itemStyle: {
                    color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                        { offset: 0, color: '#2196F3' },
                        { offset: 1, color: '#64B5F6' }
                    ]),
                    borderRadius: [4, 4, 0, 0]
                },
                barWidth: '50%'
            }]
        });
        
        // 知识关系图
        var relationshipChart = echarts.init(document.getElementById('relationshipChart'));
        relationshipChart.setOption({
            tooltip: {},
            series: [{
                type: 'graph',
                layout: 'force',
                symbolSize: 50,
                roam: true,
                label: {
                    show: true,
                    fontSize: 12
                },
                edgeSymbol: ['circle', 'arrow'],
                edgeSymbolSize: [4, 10],
                data: {{KNOWLEDGE_NODES}},
                links: {{KNOWLEDGE_LINKS}},
                lineStyle: {
                    width: 2,
                    curveness: 0.2
                },
                emphasis: {
                    focus: 'adjacency'
                }
            }]
        });
        
        // 内容类型分布图
        var contentTypeChart = echarts.init(document.getElementById('contentTypeChart'));
        contentTypeChart.setOption({
            tooltip: {
                trigger: 'item',
                formatter: '{b}: {c} ({d}%)'
            },
            legend: {
                orient: 'vertical',
                left: 'left'
            },
            series: [{
                name: '内容类型',
                type: 'pie',
                radius: ['40%', '70%'],
                avoidLabelOverlap: false,
                itemStyle: {
                    borderRadius: 10,
                    borderColor: '#fff',
                    borderWidth: 2
                },
                label: {
                    show: true,
                    formatter: '{b}: {d}%'
                },
                data: {{CONTENT_TYPES}}
            }]
        });
        
        // 响应式调整
        window.addEventListener('resize', function() {
            chapterChart.resize();
            relationshipChart.resize();
            contentTypeChart.resize();
        });
    </script>
</body>
</html>
