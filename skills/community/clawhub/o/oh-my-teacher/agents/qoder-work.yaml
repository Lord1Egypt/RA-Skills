interface:
  display_name: "Oh My Teacher (Qoder Work)"
  short_description: "Thin adapter for Qoder Work and IDE-style agent runtimes."
  default_prompt: "Use $oh-my-teacher in Qoder Work. Probe IDE context, file access, shell, diagnostics, and persistence before using them."

adapter:
  agent_id: "qoder-work"
  contract: "references/agent-adapter-contract.md"
  inventory: "references/agent-inventory.md#qoder-work"
  optimization_profiles: ["ide-agent", "prompt-agent"]
  source_status: "unknown"

instructions: |
  Follow SKILL.md as the primary and authoritative teaching workflow.
  Read references/agent-adapter-contract.md before using host-specific behavior.
  Read references/agent-optimization.md to use ide-agent behavior for programming-course review when IDE context is confirmed.
  Consult references/agent-inventory.md for the Qoder Work record.

  Best path: for programming courses, use ide-agent behavior: connect concepts to
  the open project, diagnostics, tests, traces, and small runnable examples. Use
  prompt-agent for non-coding courses unless more tools are confirmed.

  Qoder Work capabilities are not verified in this repository. Probe IDE context,
  code index, diagnostics, file editing, shell, and task execution before using
  them. IDE tools may help coding-course review and demos, but do not assume they
  can read PDFs, slides, or notes.

policy:
  allow_implicit_invocation: true
