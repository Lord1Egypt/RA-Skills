<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="800" viewBox="0 0 1400 800" role="img" aria-label="VideoLens dashboard preview"><rect width="1400" height="800" fill="url(#bg)"/><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#07111f"/><stop offset="55%" stop-color="#101a3d"/><stop offset="100%" stop-color="#241044"/></linearGradient><linearGradient id="a" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#00E5FF"/><stop offset="100%" stop-color="#A855F7"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><style>.title{font:800 54px Inter,Arial,sans-serif;fill:#f8fbff}.sub{font:500 24px Inter,Arial,sans-serif;fill:#b9c7e6}.tiny{font:600 17px Inter,Arial,sans-serif;fill:#8fa7d8}.mono{font:600 18px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#d9e7ff}.card{fill:#0d1730;stroke:#233a74;stroke-width:2}.accent{fill:url(#a)}.good{fill:#39ffb6}.warn{fill:#ffd166}.bad{fill:#ff6b8a}</style></defs><circle cx="1190" cy="130" r="160" fill="#7c3aed" opacity=".22"/><circle cx="180" cy="650" r="220" fill="#06b6d4" opacity=".16"/><text x="70" y="105" class="title">VideoLens</text><text x="70" y="145" class="sub">Timestamped AI reviews for videos, demos, meetings, and launches</text><rect x="70" y="200" width="720" height="405" rx="28" class="card"/><rect x="105" y="235" width="650" height="335" rx="18" fill="#020817"/><polygon points="355,320 355,485 500,402" class="accent" filter="url(#glow)"/><rect x="835" y="200" width="490" height="405" rx="28" class="card"/><text x="875" y="255" class="sub">AI review score</text><text x="875" y="335" class="title">87</text><text x="960" y="335" class="sub">/100</text><rect x="875" y="385" width="365" height="16" rx="8" fill="#1f2b4f"/><rect x="875" y="385" width="318" height="16" rx="8" class="accent"/><text x="875" y="455" class="mono">00:12 Hook is clear, but slow</text