        distance: "1公里"
      - name: "海淀医院"
        distance: "3公里"

  advantages:
    policy: 
      - "三免两减半税收优惠"
      - "高新技术企业认定绿色通道"
      - "人才引进补贴最高50万"
    location: "位于中关村核心区，产业集聚效应显著"
    environment: "花园式办公环境，绿化率40%"
    service: "一站式企业服务平台，7*24小时服务"

# 招商信息
recruitment:
  policies:
    tax_incentive:
      name: "三免两减半"
      description: "前三年减免企业所得税，后两年减半"
      eligibility: "高新技术企业认定企业"
    rent_subsidy:
      name: "租金补贴"
      amount: "首年租金50%补贴"
      duration: "最长24个月"
    talent_bonus:
      name: "人才引进奖励"
      amount: "博士5万/人，硕士2万/人"
      
  properties:
    office:
      - id: "OFF-A"
        name: "A座写字楼"
        area_range: "100-1000㎡"
        price: 5.0  # 元/㎡/天
        condition: "精装修"
        floor: "1-15层"
      - id: "OFF-B"
        name: "B座写字楼"
        area_range: "200-2000㎡"
        price: 4.5
        condition: "简装"
        floor: "1-20层"
    factory:
      - id: "FAC-01"
        name: "1号厂房"
        area_range: "500-3000㎡"
        price: 2.0
        condition: "标准厂房"
        floor_height: "6米"
      - id: "FAC-02"
        name: "2号厂房"
        area_range: "1000-5000㎡"
        price: 1.8
        condition: "可定制"
        floor_height: "8米"
    warehouse:
      - id: "WAR-01"
        name: "物流仓库"
        area_range: "300-2000㎡"
        price: 1.2
        condition: "丙类仓库"
        
  process:
    - step: 1
      name: "提交申请"
      description: "填写入驻申请表，提交企业资料"
      duration: "1-3工作日"
    - step: 2
      name: "资质审核"
      description: "园区管理部门审核企业资质"
      duration: "5-7工作日"
    - step: 3
      name: "签订合同"
      description: "签订租赁合同及入驻协议"
      duration: "1-2工作日"
    - step: 4
      name: "装修入驻"
      description: "办理装修手续，完成入驻"
      duration: "7-30工作日"

# 企业服务
enterprise_service:
  registration:
    address_provided: true
    process_days: 7
    required_docs:
      - "营业执照"
      - "法人身份证"
      - "公司章程"
      - "注册地址证明"
      
  policy_application:
    categories:
      - name: "高新技术企业认定"
        deadline: "每年5月、10月"
        subsidy: "最高50万"
      - name: "专精特新企业"
        deadline: "每年3月"
        subsidy: "最高100万"
      - name: "研发费用加计扣除"
        deadline: "年度汇算清缴"
        ratio: "按研发费用75%加计扣除"
        
  talent_service:
    recruitment_platform: "园区人才服务网"
    apartment: true
    children_school: true
    
  financing:
    banks:
      - name: "中国银行"
        product: "科技贷"
        limit: "最高500万"
      - name: "北京银行"
        product: "新创贷"
        limit: "最高300万"
    funds:
      - name: "园区产业基金"
        scope: "1000万-5000万"
      - name: "政府引导基金"
        scope: "500万-2000万"

