<!doctype html>
<!-- Velvet v2 — Premium city magazine editorial style -->
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1080, height=1920" />

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1920px; overflow: hidden; background: #000; }
  
  :root {
    --gold: #FFD700; --gold-deep: #DAA520; --gold-dark: #B8860B;
    --font-serif: 'Georgia','Times New Roman',serif;
    --font-sans: 'Helvetica Neue','Arial',sans-serif;
  }
  
  .scene-video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
  
  #vignette {
    position: absolute; inset: 0; pointer-events: none; z-index: 5;
    background: radial-gradient(ellipse at center, transparent 25%, rgba(0,0,0,0.35) 60%, rgba(0,0,0,0.7) 92%);
  }
  
  /* ═══ City name — oversize golden serif ═══ */
  .city-name {
    position: absolute; left: 50%; transform: translateX(-50%);
    width: 90%; max-width: 1000px;
    font-family: var(--font-serif); font-weight: 700;
    color: var(--gold);
    text-shadow: 0 0 40px rgba(255,215,0,0.35), 0 4px 16px rgba(0,0,0,0.9);
    z-index: 20; opacity: 0; text-align: center;
    letter-spacing: 0.04em; line-height: 1.15;
    word-wrap: break-word; overflow-wrap: break-word;
    will-change: transform, opacity; backface-visibility: hidden;
  }
  
  /* ═══ Golden divider ═══ */
  .gold-divider {
    position: absolute; left: 50%; transform: translateX(-50%);
    width: 120px; height: 3px;
    background: linear-gradient(90deg, transparent, var(--gold-deep), var(--gold), var(--gold-deep), transparent);
    border-radius: 2px; z-index: 20; opacity: 0;
  }
  
  /* ═══ Highlight line — editorial emphasis ═══ */
  .highlight-line {
    position: absolute; left: 50%; transform: translateX(-50%);
    width: 88%; max-width: 950px;
    font-family: var(--font-serif); font-weight: 400; font-style: italic;
    color: #FFF;
    text-shadow: 0 3px 14px rgba(0,0,0,0.85);
    z-index: 20; opacity: 0; text-align: center;
    letter-spacing: 0.02em; line-height: 1.35;
    word-wrap: break-word; overflow-wrap: break-word;
  }
  .highlight-line .em {
    color: var(--gold); font-weight: 700; font-style: normal;
    text-shadow: 0 0 18px rgba(255,215,0,0.3);
  }
  
  /* ═══ Tag pills ═══ */
  .tag-row {
    position: absolute; left: 50%; transform: translateX(-50%);
    display: flex; gap: 10px; justify-content: center;
    z-index: 20; opacity: 0;
  }
  .tag-pill {
    font-family: var(--font-sans); font-weight: 600;
    color: #FFF; font-size: 24px;
    background: rgba(0,0,0,0.5);
    border: 1.5px solid var(--gold-deep);
    border-radius: 20px; padding: 6px 16px;
    letter-spacing: 0.05em;
    text-shadow: 0 2px 4px rgba(0,0,0,0.6);
    white-space: nowrap;
    will-change: transform, opacity; backface-visibility: hidden;
  }
  
  /* Progress */
  #pwrap { position: absolute; top: 8px; left: 30px; right: 30px; height: 3px; z-index: 50; }
  #pbar { width: 100%; height: 100%; background: linear-gradient(90deg, var(--gold-dark), var(--gold)); transform-origin: left; transform: scaleX(0); border-radius: 2px; opacity: 0.85; }
  
  #dots { position: absolute; top: 18px; right: 30px; display: flex; gap: 6px; z-index: 50; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.2); }
  .dot.on { background: var(--gold); box-shadow: 0 0 8px rgba(255,215,0,0.4); }
  
  /* CTA */
  #cta {
    position: absolute; top: 78%; left: 50%;
    transform: translate(-50%, -50%); z-index: 25; opacity: 0;
  }
  .cta-btn {
    font-family: var(--font-sans); font-weight: 700; font-size: 30px;
    color: #000; background: linear-gradient(135deg, var(--gold), var(--gold-deep));
    padding: 16px 40px; border-radius: 10px; text-align: center;
    box-shadow: 0 6px 24px rgba(255,215,0,0.35);
    letter-spacing: 0.01em;
  }
  
  #bbar {
    position: absolute; top: calc(78% + 56px); left: 50%;
    transform: translateX(-50%);
    display: flex; align-items: center; gap: 10px;
    z-index: 25; opacity: 0;
    background: rgba(0,0,0,0.45); border-radius: 8px; padding: 6px 20px;
    border: 1px solid rgba(255,215,0,0.15);
  }
  .b-emoji { font-size: 30px; }
  .b-domain { font-family: var(--font-sans); font-weight: 600; font-size: 26px; color: #FFF; }
  .b-follow { font-family: var(--font-sans); font-weight: 700; font-size: 24px; color: var(--gold); border: 1.5px solid var(--gold-deep); border-radius: 4px; padding: 4px 14px; }
</style>
</head>
<body>

<div id="root" data-composition-id="main" data-start="0" data-width="1080" data-height="1920">
  <div id="vignette"></div>
  <div id="pwrap"><div id="pbar"></div></div>
  <div id="dots"></div>
  <div id="layer"></div>
  
  <div id="cta"><div class="cta-btn" id="cta-txt">📥 DM us for free itinerary</div></div>
  <div id="bbar">
    <span class="b-emoji" id="b-emoji">🐼</span>
    <span class="b-domain" id="b-site">Panda-Journeys.com</span>
    <span class="b-follow" id="b-follow">+ Follow 🌏</span>
  </div>
</div>

<script>
(function() {
  window.__timelines = window.__timelines || {};
  
  var dataEl = document.getElementById('hf-data');
  if (!dataEl) return;
  var D = JSON.parse(dataEl.textContent.trim());
  
  var scenes = D.scenes || [];
  var cta = D.cta || {};
  var brand = D.brand || {};
  var totalDur = D.duration || 10;
  var root = document.getElementById('root');
  var H = D.height || 1920;
  var W = D.width || 1080;
  var isLandscape = W > H;
  
  try {
    if (D.width) root.setAttribute('data-width', D.width);
    if (D.height) root.setAttribute('data-height', D.height);
  } catch(e) {}
  
  var dots = document.getElementById('dots');
  scenes.forEach(function(_, i) {
    var d = document.createElement('span'); d.className = 'dot'; d.id = 'd'+i;
    dots.appendChild(d);
  });
  
  var layer = document.getElementById('layer');
  var trackIdx = 20;
  
  scenes.forEach(function(s, i) {
    var t = s.start, td = s.duration;
    var headline = s.headline || s.name || '';
    var subtitle = s.subtitle || '';
    var tags = s.tags || [];
    
    // ═══ City name ═══
    var cnEl = document.createElement('div');
    cnEl.className = 'city-name clip';
    cnEl.id = 'cn'+i;
    cnEl.textContent = headline;
    var cnSize = isLandscape ? 88 : 110;
    // Fit for long names
    if (headline.length > 12) cnSize = isLandscape ? 72 : 90;
    cnEl.style.fontSize = cnSize + 'px';
    cnEl.style.top = (isLandscape ? 32 : 30) + '%';
    cnEl.setAttribute('data-start', t);
    cnEl.setAttribute('data-duration', td);
    cnEl.setAttribute('data-track-index', trackIdx++);
    layer.appendChild(cnEl);
    
    // ═══ Divider ═══
    var divEl = document.createElement('div');
    divEl.className = 'gold-divider clip';
    divEl.id = 'dv'+i;
    divEl.style.top = (isLandscape ? (32 + 8) : (30 + 9)) + '%';
    divEl.setAttribute('data-start', t);
    divEl.setAttribute('data-duration', td);
    divEl.setAttribute('data-track-index', trackIdx++);
    layer.appendChild(divEl);
    
    // ═══ Highlight line ═══
    if (subtitle) {
      var hlEl = document.createElement('div');
      hlEl.className = 'highlight-line clip';
      hlEl.id = 'hl'+i;
      
      // Emphasize key attraction names
      var hlHTML = subtitle.replace(
        /(panda|hotpot|temple|mountain|lake|river|garden|palace|tower|bridge|canyon|waterfall|cave|pagoda|bazaar|market|alley|street|square|museum)/gi,
        '<span class="em">$&</span>'
      );
      hlEl.innerHTML = hlHTML;
      hlEl.style.fontSize = (isLandscape ? 38 : 48) + 'px';
      hlEl.style.top = (isLandscape ? (32 + 12) : (30 + 13)) + '%';
      hlEl.setAttribute('data-start', t);
      hlEl.setAttribute('data-duration', td);
      hlEl.setAttribute('data-track-index', trackIdx++);
      layer.appendChild(hlEl);
    }
    
    // ═══ Tag pills ═══
    if (tags && tags.length) {
      var tagRowEl = document.createElement('div');
      tagRowEl.className = 'tag-row clip';
      tagRowEl.id = 'tr'+i;
      tags.forEach(function(tag, ti) {
        tagRowEl.innerHTML += '<span class="tag-pill" id="tg'+i+'_'+ti+'">' + tag + '</span>';
      });
      tagRowEl.style.top = (isLandscape ? (32 + 22) : (30 + 24)) + '%';
      tagRowEl.setAttribute('data-start', t);
      tagRowEl.setAttribute('data-duration', td);
      tagRowEl.setAttribute('data-track-index', trackIdx++);
      layer.appendChild(tagRowEl);
    }
  });
  
  document.getElementById('cta-txt').textContent = cta.text || '📥 DM us for free itinerary';
  document.getElementById('b-emoji').textContent = brand.emoji || '🐼';
  document.getElementById('b-site').textContent = brand.domain || 'Panda-Journeys.com';
  document.getElementById('b-follow').textContent = brand.follow || '+ Follow 🌏';
  
  /* ═══ GSAP — Layered Editorial Reveal ═══ */
  var tl = gsap.timeline({ paused: true });
  
  tl.fromTo('#vignette', {opacity:0}, {opacity:1,duration:0.5}, 0);
  tl.fromTo('#pbar', {scaleX:0}, {scaleX:1,duration:totalDur,ease:'none'}, 0);
  
  scenes.forEach(function(s, i) {
    var t = s.start + 0.05, te = s.start + s.duration;
    var isLast = (i === scenes.length - 1);
    var hasHL = !!document.getElementById('hl'+i);
    var hasTags = !!document.getElementById('tr'+i);
    
    // Layer 1: City name — big scale down reveal (from 1.2→1.0)
    tl.fromTo('#cn'+i, {opacity:0,scale:1.2,y:12}, {opacity:1,scale:1,y:0,duration:0.55,ease:'power3.out'}, t);
    
    // Layer 2: Divider — scaleX draw from center
    tl.fromTo('#dv'+i, {opacity:0,scaleX:0}, {opacity:1,scaleX:1,duration:0.4,ease:'power2.out'}, t+0.2);
    
    // Layer 3: Highlight line — fade up
    if (hasHL) {
      tl.fromTo('#hl'+i, {opacity:0,y:16}, {opacity:1,y:0,duration:0.4,ease:'power2.out'}, t+0.3);
    }
    
    // Layer 4: Tag pills — staged elastic pop
    if (hasTags) {
      tl.fromTo('#tr'+i, {opacity:0,y:10}, {opacity:1,y:0,duration:0.3}, t+0.45);
      var tagEls = document.querySelectorAll('#tg'+i+'_0, #tg'+i+'_1, #tg'+i+'_2, #tg'+i+'_3');
      tagEls.forEach(function(el, ti) {
        tl.fromTo(el, {opacity:0,scale:0.7}, {opacity:1,scale:1,duration:0.25,ease:'back.out(1.6)'}, t+0.5+ti*0.1);
      });
    }
    
    // ═══ Exit — 提前淡出避免与下个场景重叠 ═══
    if (!isLast) {
      tl.to('#cn'+i, {opacity:0,scale:1.05,y:-10,duration:0.35,ease:'power2.in'}, te-0.65);
      tl.to('#dv'+i, {opacity:0,scaleX:0,duration:0.2}, te-0.55);
      if (hasHL) tl.to('#hl'+i, {opacity:0,y:-12,duration:0.3}, te-0.55);
      if (hasTags) tl.to('#tr'+i, {opacity:0,duration:0.2}, te-0.5);
    }
    
    if (i>0) tl.set('#d'+(i-1), {background:'rgba(255,255,255,0.2)',boxShadow:'none'}, t);
    tl.set('#d'+i, {background:'#FFD700',boxShadow:'0 0 8px rgba(255,215,0,0.4)'}, t);
  });
  
  var ct = cta.start || Math.max(0, totalDur - 3.5);
  tl.fromTo('#cta', {opacity:0,scale:0.85,y:20}, {opacity:1,scale:1,y:0,duration:0.5,ease:'back.out(1.5)'}, ct);
  tl.fromTo('#bbar', {opacity:0,y:10}, {opacity:1,y:0,duration:0.35,ease:'power3.out'}, ct+0.3);
  
  tl.set({}, {}, totalDur);
  window.__timelines['main'] = tl;
  window.__hf = { duration: totalDur, seek: function(t) { if(window.__timelines&&window.__timelines['main']) window.__timelines['main'].seek(t); } };
})();
</script>
</body>
</html>
