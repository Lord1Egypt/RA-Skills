name: vehicle_license_ocr
version: 1.0.0
description: 支持识别行驶证主页和副页信息·，从主页提取提取号牌号码、所有人、品牌型号、车架号及发动机号等。从副页提取档案编号、核定载人数、总质量及检验记录等。
author: SCNet
license: MIT
tags:
  - ocr
  - 文字提取
required_env_vars:
  - SCNET_API_KEY

optional_env_vars:
  - SCNET_API_BASE

primary_credential: SCNET_API_KEY

# 增加项目主页，解决 missing homepage 警告
homepage: https://github.com/SCNet-sugon/vehicle_license_ocr.git  # 请替换为实际仓库地址
dependencies:
  - python3
  - requests