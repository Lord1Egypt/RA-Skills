# ============================================================
# 健康检查配置
# ============================================================
health_check:
  interval_seconds: 30
  timeout_seconds: 10
  failure_threshold: 3
  recovery_threshold: 2
  
  endpoints:
    - id: "chief-of-staff"
      url: "/health/chief-of-staff"
      expected_status: 200
    - id: "sup-09-scheduler"
      url: "/health/sup-09-scheduler"
      expected_status: 200
    - id: "sup-10-security"
      url: "/health/sup-10-security"
      expected_status: 200

# ============================================================
# 监控指标
# ============================================================
metrics:
  sli:
    availability:
      target: 99.9
      measurement: "successful_calls / total_calls"
    latency:
      p50_target: 1000
      p95_target: 5000
      p99_target: 15000
    accuracy:
      target: 95.0
      measurement: "sup-07-quality score >= 75"

  dimensions:
    - domain
    - agent_id
    - engine_type
    - priority
    - time_bucket

  alerts:
    - name: "high_error_rate"
      condition: "error_rate > 0.05"
      severity: "warning"
    - name: "high_latency"
      condition: "p99_latency > 30000"
      severity: "warning"
    - name: "agent_down"
      condition: "health_check_failures > 3"
      severity: "critical"
