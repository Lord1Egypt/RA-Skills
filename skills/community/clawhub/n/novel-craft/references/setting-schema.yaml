# 设定条目字段定义

## 通用字段（所有类型共有）

```yaml
- id: @<type>:<name>         # 唯一ID，格式：@类型:名称
  name: string                # 显示名称
  type: string                # 类型：character|faction|item|power|world|custom
  status: string              # 状态：active|deprecated|revised
  first_appear: string        # 首次出现：vol-XX/ch-XXX
  description: string        # 详细描述（支持多行）
  tags: [string]              # 标签
  revised_from: string|null   # 修订来源（涟漪修改时记录原条目ID）
  last_updated: date          # 最后更新日期
```

## 人物设定 (characters.yaml)

```yaml
- id: @char:林凡
  name: 林凡
  type: character
  status: active
  first_appear: vol-01/ch-001
  description: |
    青云宗外门弟子，出身寒微却意志坚定。
    十六岁因意外获得上古残玉，从此踏上修仙之路。
  attributes:
    age: 18
    gender: 男
    cultivation: 练气三层
    personality: 坚韧隐忍，外冷内热
    appearance: 中等身材，面色略显苍白，眼神锐利
    background: 出身凡人村落，父母早亡，由村长抚养长大
  abilities:
    - id: @power:太极剑法
      proficiency: 初窥门径
      note: 从残玉中领悟的残缺剑法
  inventory:
    - id: @item:残破玉简
      note: 古墓中发现，上面的符文尚未解读
  faction: @faction:青云宗
  relations:
    - target: @char:苏晴
      type: 师兄妹
      note: 同期入门，互有好感
    - target: @char:叶寒
      type: 对手
      note: 同门竞争，叶寒天赋更高但心机深
  character_arc: |
    第一卷：从凡人到踏入修仙之门，经历考核、初战、师门争斗
    第二卷：（待定）
  tags: [主角, 青云宗, 剑修]
  revised_from: null
  last_updated: 2026-01-01
```

## 势力设定 (factions.yaml)

