<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="tableGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7aa2f7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#bb9af7;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7dcfff;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#7aa2f7;stop-opacity:0.3"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background glow -->
  <circle cx="256" cy="256" r="220" fill="url(#glowGrad)" filter="url(#softGlow)" opacity="0.15"/>

  <!-- Outer ring - the round table -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="url(#tableGrad)" stroke-width="6" opacity="0.8"/>

  <!-- Inner decorative ring -->
  <circle cx="256" cy="256" r="120" fill="none" stroke="#565f89" stroke-width="1.5" opacity="0.4" stroke-dasharray="8 6"/>

  <!-- Connection lines between seats (hexagonal pattern) -->
  <g opacity="0.25" stroke="#7aa2f7" stroke-width="1.5">
    <!-- Hexagon connecting the 6 seats -->
    <line x1="256" y1="96" x2="394" y2="176"/>
    <line x1="394" y1="176" x2="394" y2="336"/>
    <line x1="394" y1="336" x2="256" y2="416"/>
    <line x1="256" y1="416" x2="118" y2="336"/>
    <line x1="118" y1="336" x2="118" y2="176"/>
    <line x1="118" y1="176" x2="256" y2="96"/>
  </g>

  <!-- AI Agent seats (6 nodes around the table) -->
  <!-- Seat 1 - Top -->
  <circle cx="256" cy="96" r="20" fill="#1a1b26" stroke="#7aa2f7" stroke-width="3" filter="url(#glow)"/>
  <circle cx="256" cy="96" r="8" fill="#7aa2f7"/>

  <!-- Seat 2 - Top Right -->
  <circle cx="394" cy="176" r="20" fill="#1a1b26" stroke="#bb9af7" stroke-width="3" filter="url(#glow)"/>
  <circle cx="394" cy="176" r="8" fill="#bb9af7"/>

  <!-- Seat 3 - Bottom Right -->
  <circle cx="394" cy="336" r="20" fill="#1a1b26" stroke="#7dcfff" stroke-width="3" filter="url(#glow)"/>
  <circle cx="394" cy="336" r="8" fill="#7dcfff"/>

  <!-- Seat 4 - Bottom -->
  <circle cx="256" cy="416" r="20" fill="#1a1b26" stroke="#9ece6a" stroke-width="3" filter="url(#glow)"/>
  <circle cx="256" cy="416" r="8" fill="#9ece6a"/>

  <!-- Seat 5 - Bottom Left -->
  <circle cx="118" cy="336" r="20" fill="#1a1b26" stroke="#ff9e64" stroke-width="3" filter="url(#glow)"/>
  <circle cx="118" cy="336" r="8" fill="#ff9e64"/>

  <!-- Seat 6 - Top Left -->
  <circle cx="118" cy="176" r="20" fill="#1a1b26" stroke="#c0caf5" stroke-width="3" filter="url(#glow)"/>
  <circle cx="118" cy="176" r="8" fill="#c0caf5"/>

  <!-- Center convergence point with pulse effect -->
  <circle cx="256" cy="256" r="30" fill="none" stroke="#7aa2f7" stroke-width="1.5" opacity="0.3">
    <animate attributeName="r" values="30;40;30" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="256" cy="256" r="20" fill="none" stroke="#bb9af7" stroke-width="1.5" opacity="0.4">
    <animate attributeName="r" values="20;30;20" dur="3s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="opacity" values="0.4;0.15;0.4" dur="3s" repeatCount="indefinite" begin="0.5s"/>
  </circle>

  <!-- Central diamond / convergence symbol -->
  <g filter="url(#glow)">
    <rect x="244" y="244" width="24" height="24" rx="4" transform="rotate(45 256 256)" fill="url(#tableGrad)" opacity="0.9"/>
  </g>

  <!-- Speech activity indicators (small dots near active seats) -->
  <circle cx="280" cy="108" r="3" fill="#7aa2f7" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="270" cy="84" r="2" fill="#7aa2f7" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="2.5s" repeatCount="indefinite" begin="0.3s"/>
  </circle>

  <circle cx="416" cy="198" r="3" fill="#bb9af7" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.2s" repeatCount="indefinite" begin="0.4s"/>
  </circle>
  <circle cx="410" cy="168" r="2" fill="#bb9af7" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="1.8s" repeatCount="indefinite" begin="0.7s"/>
  </circle>

  <circle cx="256" cy="440" r="3" fill="#9ece6a" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="1.9s" repeatCount="indefinite" begin="0.2s"/>
  </circle>

  <!-- Subtle grid texture on table surface -->
  <circle cx="256" cy="256" r="155" fill="none" stroke="#565f89" stroke-width="0.5" opacity="0.15"/>
  <circle cx="256" cy="256" r="140" fill="none" stroke="#565f89" stroke-width="0.5" opacity="0.1"/>
  <circle cx="256" cy="256" r="100" fill="none" stroke="#565f89" stroke-width="0.5" opacity="0.1"/>
</svg>
