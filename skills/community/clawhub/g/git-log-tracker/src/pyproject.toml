[project]
name = "git-log-tracker"
version = "0.5.0"
description = "Git post-commit hook + SQLite commit index CLI"
requires-python = ">=3.11"
dependencies = ["sqlalchemy>=2.0", "alembic>=1.13"]

[project.optional-dependencies]
test = ["pytest>=8", "pytest-cov>=5", "pytest-mock>=3"]
dev = ["pytest>=8", "pytest-cov>=5", "pytest-mock>=3"]

[project.scripts]
git-log-tracker = "cli:main"

[tool.pytest.ini_options]
# pyproject 位于 src/，pytest 以 src/ 为 rootdir；pythonpath="." 即把 src/ 注入
# 使 flat 模块（cli/db/config/hook/models）可直接 import
pythonpath = ["."]
testpaths = ["../tests/unit", "../tests/dev-integration"]
# importlib 模式：各阶段存在同名 test 文件（test_cli.py / test_hook.py），
# 必须用 importlib 导入模式避免 basename 冲突
addopts = "-q --import-mode=importlib"

[tool.coverage.run]
# 覆盖率统计 src/ 下源码；按 CLAUDE.md §7.3 排除 __init__.py 与迁移脚本
source = ["."]
omit = ["__init__.py", "migrations/*", "*/migrations/*"]

[tool.coverage.report]
fail_under = 80
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]