name: Update Registry

# Refresh the skills registry on a schedule: discover NEW community skills,
# add their metadata to registry.json, download their full folders, and commit.
on:
  schedule:
    # ~ every 48 hours (06:00 UTC on odd days). Adjust as needed.
    - cron: "0 6 */2 * *"
  workflow_dispatch:        # allow manual runs from the Actions tab
    inputs:
      skip_content:
        description: "Only update registry metadata, skip downloading skill folders"
        type: boolean
        default: false

concurrency:
  group: update-registry
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Discover new skills → registry.json
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: python3 tools/update_registry.py

      - name: Download full folders for new skills
        if: ${{ inputs.skip_content != true }}
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 tools/bulk_download.py --source clawhub --threads 12 --delay 0.05

      - name: Commit & push if changed
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes — registry already up to date."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          NEW=$(git diff --cached --shortstat || true)
          git commit -m "chore(auto): refresh skills registry [skip ci]" -m "$NEW" -m "Co-Authored-By: Claude Opus 4.8 <noreply@anthropic.com>"
          git push
