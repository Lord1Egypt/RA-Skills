<html lang="en">
<head>
<meta charset="UTF-8" />

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1920px; overflow: hidden; background: #000; }
  
  :root {
    --warm: #E8775C; --warm-light: #F4A88C; --warm-glow: rgba(232,119,92,0.3);
    --font-serif: 'Georgia','Times New Roman',serif;
    --font-sans: 'Helvetica Neue','Arial',sans-serif;
  }
  
  .scene-video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
  
  #vignette {
    position: absolute; inset: 0; pointer-events: none; z-index: 5;
    background: radial-gradient(ellipse at center, transparent 28%, rgba(20,10,8,0.35) 62%, rgba(0,0,0,0.68) 92%);
  }
  
  /* ═══ Corner ambient glow ═══ */
  .corner-top {
    position: absolute; top: 0; left: 0; width: 100%; height: 30%;
    z-index: 6; pointer-events: none; opacity: 0;
    background: linear-gradient(180deg, rgba(232,119,92,0.12) 0%, transparent 100%);
  }
  .corner-bot {
    position: absolute; bottom: 0; left: 0; width: 100%; height: 25%;
    z-index: 6; pointer-events: none; opacity: 0;
    background: linear-gradient(0deg, rgba(232,119,92,0.1) 0%, transparent 100%);
  }
  
  /* ═══ Category tag ═══ */
  .cat-tag {
    position: absolute; left: 50%; transform: translateX(-50%);
    font-family: var(--font-sans); font-weight: 700;
    font-size: 18px; color: var(--warm-light);
    letter-spacing: 0.25em; text-transform: uppercase;
    z-index: 20; opacity: 0;
    text-shadow: 0 0 14px rgba(232,119,92,0.4), 0 1px 3px rgba(0,0,0,0.9);
  }
  
  /* ═══ Editorial headline ═══ */
  .editorial-hl {
    position: absolute; left: 50%; transform: translateX(-50%);
    font-family: var(--font-serif); font-weight: 800;
    color: #FFF; text-align: center; z-index: 20; opacity: 0;
    text-shadow:
      0 4px 20px rgba(0,0,0,0.95),
      1px 1px 0 #000, -1px 1px 0 #000, 1px -1px 0 #000, -1px -1px 0 #000,
      2px 0 0 #000, -2px 0 0 #000, 0 2px 0 #000, 0 -2px 0 #000;
    width: 82%; line-height: 1.18;
    will-change: transform, opacity; backface-visibility: hidden;
  }
  .editorial-hl .em {
    display: inline-block;
    font-family: var(--font-sans); font-weight: 900;
    color: var(--warm-light);
    text-shadow: 0 0 20px var(--warm-glow);
    font-size: 1.25em;
    letter-spacing: -0.01em;
    will-change: transform, opacity; backface-visibility: hidden;
  }
  
  /* ═══ Divider ═══ */
  .divider-row {
    position: absolute; left: 50%; transform: translateX(-50%);
    z-index: 20; opacity: 0; display: flex; align-items: center; gap: 14px;
  }
  .divider-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--warm-light);
    box-shadow: 0 0 8px var(--warm-glow);
  }
  .divider-line {
    width: 60px; height: 1.5px;
    background: linear-gradient(90deg, transparent, rgba(232,119,92,0.5), transparent);
  }
  
  /* ═══ Description ═══ */
  .body-text {
    position: absolute; left: 50%; transform: translateX(-50%);
    font-family: var(--font-sans); font-weight: 500;
    color: rgba(255,255,255,0.88); text-align: center; z-index: 20; opacity: 0;
    text-shadow:
      0 3px 14px rgba(0,0,0,0.85),
      1px 1px 0 rgba(0,0,0,0.7), -1px 1px 0 rgba(0,0,0,0.7),
      1px -1px 0 rgba(0,0,0,0.7), -1px -1px 0 rgba(0,0,0,0.7);
    width: 78%; line-height: 1.5;
  }
  .body-text .warm { color: var(--warm-light); font-weight: 600; }
  
  /* ═══ Feature pills ═══ */
  .feature-row {
    position: absolute; left: 50%; transform: translateX(-50%);
    z-index: 20; opacity: 0;
    display: flex; gap: 12px; justify-content: center;
  }
  .feature-pill {
    font-family: var(--font-sans); font-weight: 700; font-size: 22px;
    color: #FFF; background: rgba(232,119,92,0.12);
    border: 1px solid rgba(232,119,92,0.25);
    border-radius: 20px; padding: 6px 18px;
    letter-spacing: 0.06em; display: inline-block;
    will-change: transform, opacity; backface-visibility: hidden;
  }
  
  /* Progress */
  #pwrap { position: absolute; top: 8px; left: 30px; right: 30px; height: 3px; z-index: 50; }
  #pbar { width: 100%; height: 100%; background: var(--warm); transform-origin: left; transform: scaleX(0); border-radius: 2px; opacity: 0.8; }
  
  #dots { position: absolute; top: 18px; right: 30px; display: flex; gap: 6px; z-index: 50; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.2); }
  .dot.on { background: var(--warm); box-shadow: 0 0 8px var(--warm-glow); }
  
  /* CTA */
  #cta {
    position: absolute; top: 82%; left: 50%;
    transform: translate(-50%, -50%); z-index: 25; opacity: 0;
  }
  .cta-btn {
    font-family: var(--font-sans); font-weight: 800; font-size: 28px;
    color: #FFF; background: var(--warm);
    padding: 14px 38px; border-radius: 8px;
    box-shadow: 0 6px 24px var(--warm-glow);
    letter-spacing: 0.02em;
  }
  
  #bbar {
    position: absolute; top: calc(82% + 46px); left: 50%;
    transform: translateX(-50%);
    display: flex; align-items: center; gap: 10px;
    z-index: 25; opacity: 0;
    background: rgba(0,0,0,0.4); border-radius: 8px; padding: 6px 20px;
    border: 1px solid rgba(232,119,92,0.15);
  }
  .b-emoji { font-size: 20px; }
  .b-domain { font-family: var(--font-sans); font-weight: 700; font-size: 22px; color: #FFF; }
  .b-follow { font-family: var(--font-sans); font-weight: 800; font-size: 20px; color: var(--warm-light); border: 1.5px solid rgba(232,119,92,0.35); border-radius: 4px; padding: 3px 14px; }
</style>
</head>
<body>

<div id="root" data-composition-id="main" data-start="0" data-width="1080" data-height="1920">
  <div class="corner-top" id="cornerTop"></div>

  <div id="vignette"></div>

    <video class="clip scene-video" id="v2" data-start="11.68" data-duration="8.283333" data-track-index="2" muted playsinline preload="auto" src="assets/clip_2.mp4"></video>
  <div id="pwrap"><div id="pbar"></div></div>
  <div id="dots"></div>
  <div id="layer"></div>

  </div>

<script>
(function() {
  window.__timelines = window.__timelines || {};
  
  var dataEl = document.getElementById('hf-data');
  if (!dataEl) return;
  var D = JSON.parse(dataEl.textContent.trim());
  
  var scenes = D.scenes || [];
  var cta = D.cta || {};
  var brand = D.brand || {};
  var totalDur = D.duration || 10;
  var root = document.getElementById('root');
  var isLandscape = (D.width || 1080) > (D.height || 1920);
  
  try {
    if (D.width) root.setAttribute('data-width', D.width);
    if (D.height) root.setAttribute('data-height', D.height);
  } catch(e) {}
  
  var dots = document.getElementById('dots');
  scenes.forEach(function(_, i) {
    var d = document.createElement('span'); d.className = 'dot'; d.id = 'd'+i;
    dots.appendChild(d);
  });
  
  var CATS = ['FAMILY TRAVEL','KIDS-FRIENDLY','SAFE & EASY','MADE FOR FAMILIES'];
  var FEATURES = [
    ['🐼 PANDAS','🍜 KIDS MENU','🛡️ SAFE ROUTES'],
    ['🏨 FAMILY SUITES','👶 BABY SEATS','🎢 FUN STOPS'],
    ['🚗 PRIVATE CAR','🧸 PLAY AREAS','🍦 SNACK STOPS'],
    ['🎪 CULTURE SHOW','📸 PHOTO SPOTS','🩺 SAFETY FIRST'],
  ];
  var KW_RE = /kids|family|child|children|little|baby|parents|mom|dad|safe|easy|gentle|cozy|warm|together|memories|magic|wonder|fun|play|love|happy/gi;
  
  var layer = document.getElementById('layer');
  var trackIdx = 20;
  
  scenes.forEach(function(s, i) {
    var t = s.start, td = s.duration;
    var headline = s.headline || s.name || '';
    var subtitle = s.subtitle || '';
    
    // Category tag
    var cat = document.createElement('div');
    cat.className = 'cat-tag clip';
    cat.id = 'ct'+i;
    cat.textContent = CATS[i % CATS.length];
    cat.style.top = (isLandscape ? 20 : 22) + '%';
    cat.setAttribute('data-start', t);
    cat.setAttribute('data-duration', td);
    cat.setAttribute('data-track-index', trackIdx++);
    layer.appendChild(cat);
    
    // Headline — last 2-3 words get emphasis
    var words = headline.split(/\s+/);
    var emCount = Math.min(3, Math.floor(words.length/2));
    var emStart = words.length - emCount;
    var hlHTML = '';
    words.forEach(function(w, wi) {
      if (wi >= emStart) {
        hlHTML += ' <span class="em">' + w + '</span>';
      } else {
        hlHTML += (wi > 0 ? ' ' : '') + w;
      }
    });
    
    var hl = document.createElement('div');
    hl.className = 'editorial-hl clip';
    hl.id = 'hl'+i;
    hl.innerHTML = hlHTML;
    var hlSize = isLandscape ? 56 : 72;
    if (headline.length > 30) hlSize = isLandscape ? 48 : 64;
    hl.style.fontSize = hlSize + 'px';
    hl.style.top = (isLandscape ? 32 : 34) + '%';
    hl.setAttribute('data-start', t);
    hl.setAttribute('data-duration', td);
    hl.setAttribute('data-track-index', trackIdx++);
    layer.appendChild(hl);
    
    // Divider
    var dr = document.createElement('div');
    dr.className = 'divider-row clip';
    dr.id = 'dr'+i;
    dr.innerHTML = '<span class="divider-line"></span><span class="divider-dot"></span><span class="divider-line"></span>';
    dr.style.top = (isLandscape ? (32+10) : (34+11)) + '%';
    dr.setAttribute('data-start', t);
    dr.setAttribute('data-duration', td);
    dr.setAttribute('data-track-index', trackIdx++);
    layer.appendChild(dr);
    
    // Description
    if (subtitle) {
      var bt = document.createElement('div');
      bt.className = 'body-text clip';
      bt.id = 'bt'+i;
      bt.innerHTML = subtitle.replace(KW_RE, function(m) { return '<span class="warm">'+m+'</span>'; });
      bt.style.fontSize = (isLandscape ? 30 : 38) + 'px';
      bt.style.top = (isLandscape ? (32+15) : (34+17)) + '%';
      bt.setAttribute('data-start', t);
      bt.setAttribute('data-duration', td);
      bt.setAttribute('data-track-index', trackIdx++);
      layer.appendChild(bt);
    }
    
    // Feature pills
    var feats = FEATURES[i % FEATURES.length];
    var fp = document.createElement('div');
    fp.className = 'feature-row clip';
    fp.id = 'fp'+i;
    feats.forEach(function(f, fi) {
      fp.innerHTML += '<span class="feature-pill" id="fpi'+i+'_'+fi+'">' + f + '</span>';
    });
    fp.style.top = (isLandscape ? (32+22) : (34+25)) + '%';
    fp.setAttribute('data-start', t);
    fp.setAttribute('data-duration', td);
    fp.setAttribute('data-track-index', trackIdx++);
    layer.appendChild(fp);
  });
  
  document.getElementById('cta-txt').textContent = cta.text || '💌 DM us for a family itinerary';
  document.getElementById('b-emoji').textContent = brand.emoji || '🐼';
  document.getElementById('b-site').textContent = brand.domain || 'Panda-Journeys.com';
  document.getElementById('b-follow').textContent = brand.follow || '+ Follow 🌏';
  
  /* ═══ GSAP — Reliable: only opacity + transform ═══ */
  var tl = gsap.timeline({ paused: true });
  
  tl.fromTo('#vignette', {opacity:0}, {opacity:1,duration:0.5}, 0);
  tl.fromTo('#cornerTop', {opacity:0}, {opacity:1,duration:0.6}, 0);
  tl.fromTo('#cornerBot', {opacity:0}, {opacity:1,duration:0.6}, 0);
  tl.fromTo('#pbar', {scaleX:0}, {scaleX:1,duration:totalDur,ease:'none'}, 0);
  
  scenes.forEach(function(s, i) {
    var t = s.start + 0.05, te = s.start + s.duration;
    var isLast = (i === scenes.length - 1);
    
    // Category tag — fade down
    tl.fromTo('#ct'+i, {opacity:0,y:-10}, {opacity:1,y:0,duration:0.35,ease:'power2.out'}, t);
    
    // Headline block — scale in (reliable: div-level transform)
    tl.fromTo('#hl'+i, {opacity:0,scale:0.92,y:8}, {opacity:1,scale:1,y:0,duration:0.5,ease:'power3.out'}, t+0.1);
    
    // Emphasis spans — slide in from right (inline-block keeps transform working)
    var hlEl = document.getElementById('hl'+i);
    if (hlEl) {
      var emSpans = hlEl.querySelectorAll('.em');
      emSpans.forEach(function(em, ei) {
        tl.fromTo(em, {opacity:0,x:30}, {opacity:1,x:0,duration:0.35,ease:'power2.out'}, t+0.25+ei*0.08);
      });
    }
    
    // Divider — scaleX
    tl.fromTo('#dr'+i, {opacity:0,scaleX:0}, {opacity:1,scaleX:1,duration:0.4,ease:'power2.out'}, t+0.3);
    
    // Body text — fade up
    if (document.getElementById('bt'+i)) {
      tl.fromTo('#bt'+i, {opacity:0,y:10}, {opacity:1,y:0,duration:0.4,ease:'power2.out'}, t+0.45);
    }
    
    // Feature pills — staggered elastic
    tl.fromTo('#fp'+i, {opacity:0,y:12}, {opacity:1,y:0,duration:0.3}, t+0.55);
    for (var fi = 0; fi < 3; fi++) {
      var fpi = document.getElementById('fpi'+i+'_'+fi);
      if (fpi) {
        tl.fromTo(fpi, {opacity:0,scale:0.8}, {opacity:1,scale:1,duration:0.25,ease:'back.out(1.5)'}, t+0.58+fi*0.1);
      }
    }
    
    // Exit
    if (!isLast) {
      tl.to('#ct'+i, {opacity:0,y:-6,duration:0.2}, te-0.3);
      tl.to('#hl'+i, {opacity:0,scale:1.03,duration:0.25}, te-0.3);
      tl.to('#dr'+i, {opacity:0,duration:0.2}, te-0.25);
      if (document.getElementById('bt'+i)) tl.to('#bt'+i, {opacity:0,duration:0.2}, te-0.25);
      tl.to('#fp'+i, {opacity:0,y:-8,duration:0.2}, te-0.2);
    }
    
    if (i>0) tl.set('#d'+(i-1), {background:'rgba(255,255,255,0.2)',boxShadow:'none'}, t);
    tl.set('#d'+i, {background:'#E8775C',boxShadow:'0 0 8px rgba(232,119,92,0.3)'}, t);
  });
  
  var ct = cta.start || Math.max(0, totalDur - 3.5);
  tl.fromTo('#cta', {opacity:0,scale:0.85,y:20}, {opacity:1,scale:1,y:0,duration:0.5,ease:'back.out(1.5)'}, ct);
  tl.fromTo('#bbar', {opacity:0,y:10}, {opacity:1,y:0,duration:0.35,ease:'power3.out'}, ct+0.3);
  
  tl.set({}, {}, totalDur);
  window.__timelines['main'] = tl;
  window.__hf = { duration: totalDur, seek: function(t) { if(window.__timelines&&window.__timelines['main']) window.__timelines['main'].seek(t); } };
})();
</script>
