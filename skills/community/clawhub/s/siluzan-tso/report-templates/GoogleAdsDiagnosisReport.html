<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google Ads 账户诊断报告</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Inter", "PingFang SC", "Microsoft YaHei", sans-serif;
        background: #f5f7fb;
        color: #1f2937;
      }

      .diagnosis-navigation {
        margin-top: 24px;
        padding: 20px 24px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(209, 213, 219, 0.6);
        box-shadow: 0 12px 30px -24px rgba(15, 23, 42, 0.45);
        backdrop-filter: blur(12px);
        position: sticky;
        top: 24px;
        z-index: 20;
      }

      .diagnosis-navigation .nav-title {
        margin: 0 0 16px;
        font-size: 16px;
        font-weight: 600;
        color: #1e3a8a;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .diagnosis-navigation .nav-title::before {
        content: "📋";
      }

      .diagnosis-navigation .nav-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .diagnosis-navigation .nav-tag {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 16px;
        border-radius: 12px;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        font-size: 13px;
        color: #475569;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .diagnosis-navigation .nav-tag.active {
        border-color: rgba(59, 130, 246, 0.9);
        color: #1d4ed8;
        box-shadow: 0 12px 30px -24px rgba(37, 99, 235, 0.6);
        background: rgba(59, 130, 246, 0.12);
      }

      .diagnosis-navigation .nav-tag:hover {
        border-color: rgba(59, 130, 246, 0.6);
        color: #2563eb;
        box-shadow: 0 10px 20px -18px rgba(37, 99, 235, 0.45);
      }

      .report-main {
        margin-top: 32px;
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: 18px 24px;
        background: #ffffff;
        border-radius: 16px 16px 12px 12px;
        border: 1px solid rgba(226, 232, 240, 0.85);
        scroll-margin-top: 120px;
      }

      .content-wrapper[data-section-id] {
        background: #f9fafb;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 40px;
        transition: all 0.3s ease;
      }

      .content-wrapper[data-section-id]:hover,
      .section-header:hover + .content-wrapper[data-section-id] {
        /* background: #f3f5f9; */
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      .section-title {
        display: flex;
        align-items: center;
        gap: 14px;
        font-size: 26px;
        font-weight: 700;
        color: #0f172a;
        letter-spacing: -0.01em;
        line-height: 1.3;
        margin: 0;
      }

      .section-title::after {
        content: "";
        flex: 1;
        height: 3px;
        margin-left: 18px;
        border-radius: 999px;
        background: linear-gradient(
          135deg,
          rgba(59, 104, 249, 0.4),
          rgba(99, 102, 241, 0.2)
        );
      }

      .section-subtitle {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        font-size: 18px;
        font-weight: 600;
        color: #1f2937;
        line-height: 1.4;
        margin: 0 0 16px 0;
      }

      .section-subtitle::before {
        content: "";
        display: inline-block;
        width: 6px;
        height: 22px;
        border-radius: 999px;
        background: linear-gradient(135deg, #3b68f9, #5b8fff);
      }

      .section-header .section-number {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        background: linear-gradient(135deg, #3b68f9 0%, #5b8fff 100%);
        color: #fff;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 700;
      }

      .section-header .section-date {
        font-size: 14px;
        color: #666;
        font-weight: 400;
      }

      .content-wrapper[data-section-id] .info-table {
        background: #fff;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .content-wrapper[data-section-id] .info-table .table-body {
        padding: 0;
      }

      .content-wrapper[data-section-id] .info-table .table-row {
        display: flex;
        border-bottom: 1px solid #f0f0f0;
      }

      .content-wrapper[data-section-id] .info-table .table-row:last-child {
        border-bottom: none;
      }

      .content-wrapper[data-section-id] .info-table .table-cell {
        flex: 1;
        flex-shrink: 0;
        overflow: hidden;
        padding: 16px 20px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .content-wrapper[data-section-id] .info-table .table-cell:first-child {
        border-right: 1px solid #f0f0f0;
      }

      .content-wrapper[data-section-id] .info-table .label {
        font-size: 13px;
        color: #666;
        font-weight: 500;
        line-height: 1.4;
      }

      .content-wrapper[data-section-id] .info-table .value {
        font-size: 14px;
        color: #333;
        font-weight: 600;
        line-height: 1.4;
        word-break: break-word;
      }

      .content-wrapper[data-section-id] .info-table .value .website-link {
        color: #3b68f9;
        text-decoration: none;
        transition: color 0.3s ease;
      }

      .content-wrapper[data-section-id] .info-table .value .website-link:hover {
        color: #5b8fff;
        text-decoration: underline;
      }

      .health-structure-wrapper {
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      .health-structure-section {
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      .gold-account-section .section-subtitle {
        margin: 0;
      }

      .gold-rules-info {
        width: 100%;
        background: #f8fafc;
        border-radius: 12px;
        padding: 20px;
        border: 1px solid #e2e8f0;
        margin-bottom: 12px;
      }

      .gold-rules-info h4 {
        font-size: 16px;
        font-weight: 600;
        color: #1f2937;
        margin: 0 0 12px 0;
      }

      .gold-rules-info .rules-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 12px;
      }

      .gold-rules-info .rule-category {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 14px;
        background: #fff;
        border-radius: 8px;
        border: 1px solid #e5e7eb;
      }

      .gold-rules-info .rule-category .category-name {
        font-size: 14px;
        color: #1f2937;
        font-weight: 500;
      }

      .gold-rules-info .rule-category .category-count {
        font-size: 12px;
        color: #2563eb;
        background: rgba(37, 99, 235, 0.08);
        padding: 2px 8px;
        border-radius: 999px;
      }

      .table-block {
        width: 100%;
        overflow-x: auto;
        background: #fff;
        border-radius: 12px;
        border: 1px solid #e5e7eb;
        box-shadow: 0 12px 32px -24px rgba(15, 23, 42, 0.45);
      }

      .data-table {
        width: 100%;
        border-collapse: collapse;
        border-spacing: 0;
        background: transparent;
      }

      .data-table th,
      .data-table td {
        padding: 16px 20px;
        border-bottom: 1px solid #e5e7eb;
        font-size: 14px;
        text-align: left;
      }

      .data-table thead th {
        background: linear-gradient(135deg, #eff6ff 0%, #e0e7ff 100%);
        font-weight: 600;
        color: #1d4ed8;
      }

      .data-table tbody tr:last-child td {
        border-bottom: none;
      }

      .landing-page-analysis {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .landing-page-analysis .table-block .data-table tbody td {
        font-size: 13px;
        line-height: 1.6;
        color: #334155;
      }

      .status-indicator {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 500;
      }

      .status-qualified {
        background: rgba(34, 197, 94, 0.12);
        color: #16a34a;
        border: 1px solid rgba(22, 163, 74, 0.3);
      }

      .status-unqualified {
        background: rgba(239, 68, 68, 0.12);
        color: #dc2626;
        border: 1px solid rgba(220, 38, 38, 0.3);
        padding: 0 5px;
      }

      .metric-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 600;
        line-height: 1.4;
        background: rgba(148, 163, 184, 0.12);
        color: #1f2937;
        border: 1px solid rgba(148, 163, 184, 0.28);
      }

      .metric-badge--positive {
        background: rgba(16, 185, 129, 0.12);
        border-color: rgba(16, 185, 129, 0.3);
        color: #065f46;
      }

      .metric-badge--warning {
        background: rgba(245, 158, 11, 0.15);
        border-color: rgba(245, 158, 11, 0.35);
        color: #92400e;
      }

      .keyword-insights-wrapper {
        display: flex;
        flex-direction: column;
        gap: 28px;
      }

      .keyword-insights {
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      .keyword-insights .insights-section {
        padding: 24px;
        border-radius: 16px;
        background: #fff;
        border: 1px solid rgba(226, 232, 240, 0.9);
        box-shadow: 0 16px 32px -26px rgba(15, 23, 42, 0.4);
      }

      .keyword-insights .chart-container {
        margin: 20px 0;
        background: #f8fafc;
        border-radius: 12px;
        border: 1px solid #e2e8f0;
        padding: 18px;
      }

      .keyword-insights .ratio-analysis-section {
        margin-top: 16px;
        background: #f8fafc;
        border: 1px solid #dbeafe;
        border-radius: 16px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .keyword-insights .ratio-stats {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
      }

      .keyword-insights .ratio-stats .stat-item {
        flex: 1 1 180px;
        padding: 16px;
        border-radius: 12px;
        border: 1px solid #e2e8f0;
        background: #fff;
        text-align: center;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }

      .keyword-insights .ratio-stats .stat-item:hover {
        transform: translateY(-2px);
        box-shadow: 0 14px 28px -22px rgba(37, 99, 235, 0.45);
      }

      .keyword-insights .ratio-stats .stat-item.is-highlight {
        background: linear-gradient(135deg, #3b68f9 0%, #5b8fff 100%);
        color: #fff;
        border-color: rgba(59, 104, 249, 0.6);
        box-shadow: 0 18px 36px -24px rgba(59, 104, 249, 0.6);
      }

      .keyword-insights .ratio-stats .stat-item.is-highlight .stat-label {
        color: rgba(255, 255, 255, 0.85);
      }

      .keyword-insights .ratio-stats .stat-item.is-highlight .stat-value {
        color: #fff;
      }

      .keyword-insights .stat-label {
        display: block;
        font-size: 13px;
        color: #64748b;
        font-weight: 500;
        margin-bottom: 6px;
      }

      .keyword-insights .stat-value {
        font-size: 22px;
        font-weight: 700;
        color: #1f2937;
      }

      .insights-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 16px;
        margin: 16px 0;
      }

      @media (max-width: 768px) {
        .gold-rules-info .rules-grid {
          grid-template-columns: 1fr;
        }

        .data-table th,
        .data-table td {
          padding: 12px 14px;
          font-size: 13px;
        }

        .insight-card {
          padding: 16px;
        }

        .targeting-dimension {
          padding: 18px;
        }

        .targeting-layout .chart-card {
          padding: 14px;
        }

        .targeting-empty {
          padding: 36px 16px;
        }

        .keyword-insights .insights-section {
          padding: 18px;
        }

        .keyword-insights .chart-container {
          padding: 14px;
        }

        .keyword-insights .ratio-stats {
          flex-direction: column;
        }

        .keyword-insights .ratio-stats .stat-item {
          flex: 1 1 auto;
        }

        .insights-container {
          grid-template-columns: 1fr;
        }
      }

      .bidding-strategy-wrapper {
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      .bidding-strategy-section .table-block .data-table tbody td {
        font-size: 13px;
        color: #334155;
        line-height: 1.6;
      }

      .bidding-strategy-section .strategy-tag {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 12px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 600;
        background: rgba(59, 104, 249, 0.12);
        color: #1d4ed8;
        border: 1px solid rgba(59, 104, 249, 0.3);
      }

      .bidding-strategy-section .strategy-tag.is-recommended {
        background: rgba(5, 150, 105, 0.12);
        color: #047857;
        border-color: rgba(5, 150, 105, 0.3);
      }

      .bidding-strategy-section .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 48px 24px;
        text-align: center;
        background: #fff;
        border-radius: 12px;
        border: 1px solid #e2e8f0;
        box-shadow: 0 10px 28px -24px rgba(15, 23, 42, 0.4);
      }

      .bidding-strategy-section .empty-icon {
        font-size: 42px;
        margin-bottom: 12px;
      }

      .bidding-strategy-section .empty-title {
        font-size: 18px;
        font-weight: 600;
        color: #0f172a;
        margin-bottom: 6px;
      }

      .bidding-strategy-section .empty-description {
        font-size: 13px;
        color: #64748b;
        max-width: 320px;
        line-height: 1.6;
      }

      .ad-creative-section {
        display: flex;
        flex-direction: column;
        gap: 28px;
      }

      .ad-creative-section .ad-type-section {
        background: #fff;
        border-radius: 16px;
        border: 1px solid rgba(226, 232, 240, 0.9);
        box-shadow: 0 18px 36px -28px rgba(15, 23, 42, 0.45);
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .ad-creative-section .section-subtitle {
        margin: 0 0 14px 0;
        color: #1e293b;
      }

      .ad-creative-section .rules-section {
        background: #f8fafc;
        border-radius: 12px;
        border: 1px solid #e2e8f0;
        padding: 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .ad-creative-section .rules-title {
        margin: 0;
        font-size: 16px;
        font-weight: 600;
        color: #1e293b;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .ad-creative-section .rules-title::before {
        content: "📋";
        font-size: 18px;
      }

      .ad-creative-section .rules-content {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px;
      }

      .ad-creative-section .rule-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        background: #fff;
        border-radius: 10px;
        border-left: 4px solid #3b68f9;
        box-shadow: 0 6px 14px -12px rgba(37, 99, 235, 0.45);
      }

      .ad-creative-section .rule-label {
        font-size: 14px;
        font-weight: 600;
        color: #1f2937;
      }

      .ad-creative-section .rule-text {
        font-size: 13px;
        color: #475569;
      }

      .ad-creative-section .table-block .data-table tbody td {
        font-size: 13px;
        color: #334155;
        line-height: 1.6;
      }

      .ad-creative-section .creative-status-cell {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .ad-creative-section .creative-status-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 600;
        padding: 4px 12px;
        border-radius: 999px;
        border: 1px solid transparent;
        width: max-content;
      }

      .ad-creative-section .creative-status-pill.is-ok {
        background: rgba(16, 185, 129, 0.12);
        border-color: rgba(16, 185, 129, 0.3);
        color: #047857;
      }

      .ad-creative-section .creative-status-pill.is-warning {
        background: rgba(234, 179, 8, 0.12);
        border-color: rgba(234, 179, 8, 0.35);
        color: #92400e;
      }

      .ad-creative-section .creative-status-pill.is-error {
        background: rgba(239, 68, 68, 0.12);
        border-color: rgba(239, 68, 68, 0.35);
        color: #b91c1c;
      }

      .ad-creative-section .creative-status-count {
        font-size: 12px;
        font-weight: 600;
        color: #1f2937;
      }

      .ad-creative-section .creative-status-note {
        font-size: 11px;
        color: #6b7280;
        padding: 0 4px;
      }

      .ad-creative-section .creative-suggestion {
        display: flex;
        flex-direction: column;
        gap: 6px;
        color: #334155;
      }

      .ad-creative-section .creative-suggestion-text {
        display: block;
        font-size: 13px;
        line-height: 1.6;
      }

      .ad-creative-section .creative-empty {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 48px 24px;
        background: #fff;
        border-radius: 12px;
        border: 1px solid #e2e8f0;
        color: #475569;
      }

      .ad-creative-section .creative-empty .empty-icon {
        font-size: 40px;
      }

      .ad-creative-section .creative-empty .empty-title {
        font-size: 18px;
        font-weight: 600;
        color: #1f2937;
      }

      .ad-creative-section .creative-empty .empty-description {
        font-size: 13px;
        line-height: 1.6;
        max-width: 320px;
        text-align: center;
      }

      @media (max-width: 768px) {
        .ad-creative-section .ad-type-section {
          padding: 18px;
        }

        .ad-creative-section .rules-content {
          grid-template-columns: 1fr;
        }
      }

      .new-features-section {
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      .new-features-section .table-block .data-table tbody td {
        font-size: 13px;
        color: #334155;
        line-height: 1.6;
      }

      .new-features-section .feature-status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 12px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 600;
        border: 1px solid transparent;
        background: rgba(148, 163, 184, 0.16);
        color: #1f2937;
        width: max-content;
      }

      .new-features-section .feature-status.is-enabled {
        background: rgba(16, 185, 129, 0.12);
        color: #047857;
        border-color: rgba(16, 185, 129, 0.3);
      }

      .new-features-section .feature-status.is-disabled {
        background: rgba(239, 68, 68, 0.12);
        color: #b91c1c;
        border-color: rgba(239, 68, 68, 0.3);
      }

      .new-features-section .feature-status .feature-icon {
        font-size: 16px;
      }

      .new-features-section .recommendation-text {
        font-size: 13px;
        color: #1f2937;
        line-height: 1.6;
      }

      .new-features-section .recommendation-text.is-excellent {
        color: #15803d;
        font-weight: 600;
      }

      @media (max-width: 768px) {
        .new-features-section .feature-status {
          padding: 4px 10px;
        }
      }

      .summary-section {
        display: flex;
        flex-direction: column;
        gap: 32px;
      }

      .summary-section .section-subtitle {
        gap: 12px;
      }

      .summary-section .key-issues-list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .summary-section .key-issues-list .issue-item {
        display: flex;
        gap: 12px;
        padding: 16px 20px;
        border-radius: 12px;
        background: #fff;
        border: 1px solid #e5e7eb;
        box-shadow: 0 12px 24px -22px rgba(15, 23, 42, 0.45);
        font-size: 14px;
        line-height: 1.6;
        color: #374151;
      }

      .summary-section .issue-item .issue-index {
        font-weight: 700;
        color: #ef4444;
      }

      .summary-section .issue-item .issue-text {
        flex: 1;
      }

      .summary-section .roadmap-table table thead th {
        background: linear-gradient(135deg, #eef2ff 0%, #e0e7ff 100%);
        color: #1e3a8a;
      }

      .summary-section .roadmap-table table tbody td {
        font-size: 13px;
        color: #334155;
        line-height: 1.6;
        white-space: pre-line;
      }

      .summary-section .empty-summary {
        display: flex;
        flex-direction: column;
        gap: 10px;
        align-items: center;
        justify-content: center;
        padding: 48px 24px;
        background: #fff;
        border-radius: 12px;
        border: 1px solid #e2e8f0;
        text-align: center;
      }

      .summary-section .empty-summary .empty-icon {

  <body>
    <div id="report-root">
      <header class="report-header">
        <div class="header-top">
          <div class="header-main">
            <span class="report-badge">Google Ads</span>
            <h1 class="report-title">Google Ads 账户诊断报告</h1>
            <div class="report-meta" id="report-meta"></div>
          </div>
        </div>
        <div class="report-submeta" id="report-submeta"></div>
      </header>
      <nav class="diagnosis-navigation" id="diagnosis-navigation">
        <h2 class="nav-title">诊断项</h2>
        <div class="nav-tags" id="diagnosis-nav-tags"></div>
      </nav>
      <main class="report-main" id="report-main"></main>
    </div>
    <script>
      (() => {
        const data = __REPORT_DATA__;

        const escapeHtml = (str) =>
          String(str ?? "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");

        const GOLD_ACCOUNT_ITEMS = [
          { key: "conversionTrackingQualified", name: "转化追踪设置" },
          { key: "gaConfigured", name: "G A与广告账户联结" },
          { key: "expandedTextAdQualified", name: "文字广告" },
          { key: "responsiveSearchAdQualified", name: "自适应搜索广告" },
          {
            key: "multiAssetResponsiveDisplayAdQualified",
            name: "自适应展示广告",
          },
          {
            key: "adsStructuredSnippetExtensionQualified",
            name: "附加结构化信息摘要",
          },
          { key: "adsSitelinkExtensionQualified", name: "附加链接" },
          { key: "adsCalloutExtensionQualified", name: "附加宣传信息" },
          { key: "adsCallExtensionQualified", name: "附加电话信息" },
          { key: "adsNegativeQualified", name: "否定词添加" },
          { key: "audienceQualified", name: "受众群体设置" },
          { key: "biddingPolicyQualified", name: "出价策略" },
        ];

        const generateGoldAccountSuggestion = (itemName, isQualified) => {
          if (isQualified) {
            return "已达标，继续保持";
          }

          const suggestions = {
            转化追踪设置: "请设置转化追踪，这是衡量广告效果的基础",
            "G A与广告账户联结":
              "请将Google Analytics与Google Ads账户关联，以便更好地分析用户行为",
            文字广告: "请创建文字广告，这是搜索广告的基础形式",
            自适应搜索广告: "请使用自适应搜索广告，能够自动优化广告展示",
            自适应展示广告: "请使用自适应展示广告，提高展示网络的效果",
            附加结构化信息摘要: "请添加结构化信息摘要，丰富广告信息",
            附加链接: "请添加附加链接，为用户提供更多访问路径",
            附加宣传信息: "请添加宣传信息，突出产品优势",
            附加电话信息: "请添加电话信息，方便用户直接联系",
            否定词添加: "请添加否定关键词，排除不相关流量",
            受众群体设置: "请设置受众群体，提高广告精准度",
            出价策略: "请使用智能出价策略，让Google AI优化出价",
          };

          return suggestions[itemName] || "请检查并完善此项设置";
        };

        const navItems = [
          { id: "section-account-info", title: "账户基本信息与目标设定" },
          { id: "section-diagnosis-overview", title: "账户诊断概览" },
          { id: "section-kpi-snapshot", title: "核心业绩指标快照" },
          { id: "section-health-structure", title: "账户健康度与结构分析" },
          {
            id: "section-budget-competitiveness",
            title: "投放预算与竞争力分析",
          },
          { id: "section-targeting-strategy", title: "目标受众与投放策略" },
          { id: "section-landing-page", title: "着陆页分析" },
          { id: "section-keyword-insights", title: "关键词与搜索词洞察" },
          { id: "section-bidding-strategy", title: "预算与出价策略" },
          { id: "section-ad-creative", title: "广告创意与素材优化" },
          { id: "section-new-features", title: "新产品应用" },
          { id: "section-summary", title: "诊断总结" },
        ];

        const metaContainer = document.getElementById("report-meta");
        if (metaContainer) {
          const metaItems = [
            {
              label: "账户名称",
              value: data.accountInfo?.companyName || "未填写",
            },
            {
              label: "诊断周期",
              value: data.accountInfo?.period || "未设置",
            },
            {
              label: "核心转化行为",
              value: data.accountInfo?.conversionAction || "未设置",
            },
          ];

          metaContainer.innerHTML = metaItems
            .map(
              (item) =>
                `<span><strong>${escapeHtml(item.label)}：</strong>${escapeHtml(item.value)}</span>`,
            )
            .join("");
        }

        const subMeta = document.getElementById("report-submeta");
        if (subMeta) {
          const accountId = data.accountInfo?.companyId;
          const currency = data.accountInfo?.currencyCode;
          const website = data.accountInfo?.website;

          const details = [];
          if (accountId) {
            details.push(`<span>账户 ID：${escapeHtml(accountId)}</span>`);
          }
          if (currency) {
            details.push(`<span>货币单位：${escapeHtml(currency)}</span>`);
          }
          if (website) {
            details.push(
              `<span>网址：<a href="${escapeHtml(website)}" target="_blank" rel="noopener noreferrer" style="color: #fff;">${escapeHtml(website)}</a></span>`,
            );
          }

          subMeta.innerHTML = details.join(" | ");
        }

        const navContainer = document.getElementById("diagnosis-nav-tags");
        if (navContainer) {
          navContainer.innerHTML = navItems
            .map(
              (item, index) =>
                `<span class="nav-tag" data-target="${escapeHtml(item.id)}"><span class="nav-tag-number">${
                  index + 1
                }</span><span>${escapeHtml(item.title)}</span></span>`,
            )
            .join("");
        }

        const toArray = (value) => {
          if (!value) return [];
          if (Array.isArray(value))
            return value.filter((item) => item !== null && item !== undefined);
          return String(value)
            .split(/\r?\n+/)
            .map((item) => item.trim())
            .filter((item) => item.length);
        };

        const formatNumber = (value, fractionDigits = 0) => {
          const num = Number(value);
          if (!Number.isFinite(num)) return "—";
          const digits = Math.max(0, Math.min(4, fractionDigits));
          return num.toLocaleString("zh-CN", {
            minimumFractionDigits: digits,
            maximumFractionDigits: digits,
          });
        };

        const formatPercent = (value, fractionDigits = 2) => {
          const num = Number(value);
          if (!Number.isFinite(num)) return "—";
          return `${(num * 100).toFixed(fractionDigits)}%`;
        };

        const formatRateChange = (value) => {
          const num = Number(value);
          if (!Number.isFinite(num)) {
            return '<span class="rate-neutral">—</span>';
          }
          // collect / fetchData 写入的是环比比率（0.05 = 5%）
          const pctNum = Math.abs(num) <= 1 ? num * 100 : num;
          const display = `${pctNum > 0 ? "+" : ""}${pctNum.toFixed(2)}%`;
          let rateClass = "rate-neutral";
          if (num > 0) rateClass = "rate-positive";
          if (num < 0) rateClass = "rate-negative";
          return `<span class="${rateClass}">${display}</span>`;
        };

        const formatTablePercent = (value) => {
          const num = Number(value);
          if (!Number.isFinite(num)) return "—";
          // 支持 0~1 小数（CVR）与已是百分数两种输入
          const pctNum = num >= 0 && num <= 1 ? num * 100 : num;
          return `${pctNum.toFixed(2)}%`;
        };

        const processLandingPageAnalysisData = (rawData) => {
          try {
            if (!rawData) {
              return getDefaultLandingPageItems();
            }

            const { desktop = {}, mobile = {} } = rawData;
            const healthStandards = {
              desktopFirstContentfulPaint: 3,
              mobileFirstContentfulPaint: 3,
              score: 75,
            };

            const desktopFirstContentfulPaint =
              Number(desktop.firstContentfulPaint) || 0;
            const desktopPassed =
              desktopFirstContentfulPaint > 0 &&
              desktopFirstContentfulPaint <=
                healthStandards.desktopFirstContentfulPaint;

            const mobileFirstContentfulPaint =
              Number(mobile.firstContentfulPaint) || 0;
            const mobilePassed =
              mobileFirstContentfulPaint > 0 &&
              mobileFirstContentfulPaint <=
                healthStandards.mobileFirstContentfulPaint;

            const mobileScore = Number(mobile.score) || 0;
            const mobileScorePassed = mobileScore >= healthStandards.score;

            const totalMetrics = 3;
            const passedMetrics = [
              desktopPassed,
              mobilePassed,
              mobileScorePassed,
            ].filter(Boolean).length;
            const passRate = `${((passedMetrics / totalMetrics) * 100).toFixed(1)}%`;

            return [
              {
                metric: "达标率 (Compliance Rate)",
                reportValue: passRate,
                benchmark: "100%",
                action:
                  passedMetrics === totalMetrics
                    ? "基础达标。(Basic compliance.)"
                    : passedMetrics > 0
                      ? `有${passedMetrics}项指标达标，需要关注未达标项目。(${passedMetrics} metrics passed, need to focus on failed items.)`
                      : "所有指标均未达标，需要全面优化。(All metrics failed, comprehensive optimization needed.)",
              },
              {
                metric: "PC 网站打开速度 (PC Website Opening Speed)",
                reportValue: desktopFirstContentfulPaint
                  ? `${desktopFirstContentfulPaint.toFixed(2)} s`
                  : "0.00 s",
                benchmark: `≤ ${healthStandards.desktopFirstContentfulPaint} s`,
                action: desktopPassed
                  ? "良好。(Good.)"
                  : "P1(立即修复)。建议优化图片压缩、启用CDN、减少HTTP请求、优化CSS/JS加载。(P1 (Immediate fix). Optimize image compression, enable CDN, reduce HTTP requests, optimize CSS/JS loading.)",
              },
              {
                metric: "移动网站打开速度 (Mobile Website Opening Speed)",
                reportValue: mobileFirstContentfulPaint
                  ? `${mobileFirstContentfulPaint.toFixed(2)} s`
                  : "0.00 s",
                benchmark: `≤ ${healthStandards.mobileFirstContentfulPaint} s`,
                action: mobilePassed
                  ? "良好。(Good.)"
                  : "P1(立即修复)。每超过一秒就会流失 40% 的访客。这是移动端低转化的根本原因。(P1 (Immediate fix). For every second over, 40% of visitors will be lost. This is the root cause of low conversion on mobile.)",
              },
              {
                metric: "手机性能指数 (Mobile Performance Index)",
                reportValue: mobileScore ? mobileScore.toFixed(0) : "0",
                benchmark: `≥ ${healthStandards.score}`,
                action: mobileScorePassed
                  ? "良好。(Good.)"
                  : "P1(立即修复)。需核查网站在移动端的适配性是否 100%。(P1 (Immediate fix). Need to check if the website's adaptability on mobile is 100%.)",
              },
            ];
          } catch (error) {
            console.error("处理落地页分析数据失败:", error);
            return getDefaultLandingPageItems();
          }
        };

        const getDefaultLandingPageItems = () => [
          {
            metric: "达标率 (Compliance Rate)",
            reportValue: "0.0%",
            benchmark: "100%",
            action:
              "数据获取失败，请检查网站配置。(Data fetch failed, please check website configuration.)",
          },
          {
            metric: "PC 网站打开速度 (PC Website Opening Speed)",
            reportValue: "0.00 s",
            benchmark: "≤ 3 s",
            action:
              "数据获取失败，请检查网站配置。(Data fetch failed, please check website configuration.)",
          },
          {
            metric: "移动网站打开速度 (Mobile Website Opening Speed)",
            reportValue: "0.00 s",
            benchmark: "≤ 3 s",
            action:
              "数据获取失败，请检查网站配置。(Data fetch failed, please check website configuration.)",
          },
          {
            metric: "手机性能指数 (Mobile Performance Index)",
            reportValue: "0",
            benchmark: "≥ 75",
            action:
              "数据获取失败，请检查网站配置。(Data fetch failed, please check website configuration.)",
          },
        ];

        const buildLandingPageRows = (items) => {
          if (!Array.isArray(items) || !items.length) {
            return `<tr><td colspan="4" class="empty-row">暂无落地页分析数据</td></tr>`;
          }

          return items
            .map(
              (item) => `
              <tr>
                <td>${escapeHtml(item.metric)}</td>
                <td>${escapeHtml(item.reportValue)}</td>
                <td>${escapeHtml(item.benchmark)}</td>
                <td>${escapeHtml(item.action)}</td>
              </tr>
            `,
            )
            .join("");
        };

        const DEFAULT_TABLE_LIMIT = 10;
        const isEnabledStatus = (status) => {
          if (!status && status !== 0) return false;
          const value = String(status).toLowerCase();
          return value.includes("启用") || value.includes("enabled");
        };
        const tableDisplayConfig = {
          metrics: { limit: 10 },
          conversionGoals: {
            getLimit: (items = []) => {
              const enabledCount = items.filter((goal) =>
                isEnabledStatus(goal?.status),
              ).length;
              if (enabledCount > 0) {
                return Math.min(10, enabledCount);
              }
              return 10;
            },
          },
          keyMetrics: { limit: 10 },
          "targeting-geographic": { limit: 10 },
          "targeting-device": { limit: 10 },
          "targeting-audience": { limit: 10 },
          "targeting-custom": { limit: 10 },
          "keyword-performance": { limit: 20 },
          "keyword-performance-conversions": { limit: 20 },
          "search-term-performance": { limit: 20 },
          "bidding-strategy": { limit: 10 },
          "ad-creative": { limit: 10 },
          "new-features": { limit: 10 },
          "summary-roadmap": { limit: 5 },
        };

        const getTableLimit = (configKey, items = []) => {
          const config = tableDisplayConfig[configKey] || {};
          if (typeof config.getLimit === "function") {
            const dynamicLimit = Number(config.getLimit(items));
            if (Number.isInteger(dynamicLimit) && dynamicLimit > 0) {
              return dynamicLimit;
            }
          }
          const configLimit = Number(config.limit);
          if (Number.isInteger(configLimit) && configLimit > 0) {
            return configLimit;
          }
          return DEFAULT_TABLE_LIMIT;
        };

        const applyTableLimit = (items, tableKey, options = {}) => {
          const { configKey = tableKey } = options;
          if (!Array.isArray(items)) {
            return {
              displayItems: [],
              hasMore: false,
              remainingItems: [],
              total: 0,
              limit: 0,
            };
          }
          const source = items.slice();
          const limit = getTableLimit(configKey, source);
          if (!limit || limit <= 0 || source.length <= limit) {
            return {
              displayItems: source,
              hasMore: false,
              remainingItems: [],
              total: source.length,
              limit,
            };
          }
          return {
            displayItems: source.slice(0, limit),
            hasMore: true,
            remainingItems: source.slice(limit),
            total: source.length,
            limit,
          };
        };

        const tableExpandStates = {};

        const registerTableState = (tableKey, state) => {
          if (!tableKey) return;
          tableExpandStates[tableKey] = {
            limitedRows: state?.limitedRows || "",
            remainingRows: state?.remainingRows || "",
            placeholderRow: state?.placeholderRow || "",
            remainingCount: Number(state?.remainingCount) || 0,
          };
        };

        const buildExpandButtonText = (count) => `展开更多（剩余${count}项）`;

        const buildExpandButton = (tableKey, remainingCount) => {
          if (!remainingCount) return "";
          return `
            <div class="table-expand">
              <button
                class="expand-button"
                data-table-key="${tableKey}"
                data-state="collapsed"
              >
                ${buildExpandButtonText(remainingCount)}
              </button>
            </div>
          `;
        };

        const buildTableRows = (
          items,
          { tableKey, configKey, emptyRow, rowBuilder },
        ) => {
          const list = Array.isArray(items) ? items.slice() : [];
          if (!list.length) {
            registerTableState(tableKey, {
              limitedRows: "",
              remainingRows: "",
              placeholderRow: emptyRow,
              remainingCount: 0,
            });
            return {
              bodyHtml: emptyRow,
              expandHtml: "",
              hasMore: false,
              remainingCount: 0,
            };
          }

          const { displayItems, remainingItems } = applyTableLimit(
            list,
            tableKey,
            {
              configKey: configKey || tableKey,
            },
          );
          const limitedRows = displayItems.map(rowBuilder).join("");
          const remainingRows = remainingItems.map(rowBuilder).join("");
          const remainingCount = remainingItems.length;

          registerTableState(tableKey, {
            limitedRows,
            remainingRows,
            placeholderRow: emptyRow,
            remainingCount,
          });

          return {
            bodyHtml: limitedRows || emptyRow,
            expandHtml: remainingCount
              ? buildExpandButton(tableKey, remainingCount)
              : "",
            hasMore: remainingCount > 0,
            remainingCount,
          };
        };

        const buildDefaultAnalysis = (dimension) => [
          `暂无${dimension}分析数据，请结合业务实际补充洞察。`,
        ];

        const buildDefaultSuggestion = (dimension) => [
          `暂无${dimension}优化建议，请结合目标制定后续行动计划。`,
        ];

        const buildAnalysisList = (source, dimension, generator) => {
          const list = toArray(source);
          if (list.length) return list;
          if (typeof generator === "function") {
            const generated = generator();
            if (Array.isArray(generated) && generated.length) return generated;
          }
          return buildDefaultAnalysis(dimension);
        };

        const buildSuggestionList = (source, dimension, generator) => {
          const list = toArray(source);
          if (list.length) return list;
          if (typeof generator === "function") {
            const generated = generator();
            if (Array.isArray(generated) && generated.length) return generated;
          }
          return buildDefaultSuggestion(dimension);
        };

        const getItemLabel = (item, key, fallback = "未命名") => {
          const value = item?.[key];
          if (value === null || value === undefined || value === "")
            return fallback;
          return String(value);
        };

        const generateGeographicAnalysis = (items) => {
          if (!Array.isArray(items) || !items.length) return [];
          const numericItems = items.map((item) => ({
            label: getItemLabel(item, "geographic"),
            cost: Number(item?.cost) || 0,
            conversions: Number(item?.conversions) || 0,
            clicks: Number(item?.clicks) || 0,
            impressions: Number(item?.impressions) || 0,
          }));

          const totalCost = numericItems.reduce(
            (sum, item) => sum + item.cost,
            0,
          );
          const totalConversions = numericItems.reduce(
            (sum, item) => sum + item.conversions,
            0,
          );
          const topCost = numericItems.reduce(
            (max, item) => (item.cost > max.cost ? item : max),
            numericItems[0],
          );
          const topClicks = numericItems.reduce(
            (max, item) => (item.clicks > max.clicks ? item : max),
            numericItems[0],
          );
          const zeroConversionCost = numericItems
            .filter((item) => item.cost > 0 && item.conversions === 0)
            .reduce((sum, item) => sum + item.cost, 0);

          const insights = [];
          if (totalCost > 0 && topCost) {
            const share = ((topCost.cost / totalCost) * 100).toFixed(1);
            insights.push(
              `预算主要集中在 ${topCost.label}，占总消耗约 ${share}%。`,
            );
          }
          if (totalConversions > 0) {
            const topConversion = numericItems.reduce(
              (max, item) => (item.conversions > max.conversions ? item : max),
              numericItems[0],

          const priorityLabels = ["P0（立即）", "P1（本周）", "P2（本月）", "P3（下月）"];
          const colonMatch = text.match(/^([^：:]+)[：:]\s*(.+)$/s);
          if (colonMatch) {
            return {
              priority: priorityLabels[index] ?? `P${index}`,
              focusArea: colonMatch[1].trim(),
              actionItems: [colonMatch[2].trim()],
              expectedOutcome: "执行后观察 CPA、IS 与转化量变化",

              expectedOutcome: "未提供",

              case "ctr":
              case "cvr":

                break;
              case "cpa":
              case "cost":
                formatted = formatNumber(numeric, 2);

              case "conversions":
              case "clicks":
              case "impressions":
                formatted = formatNumber(numeric, 0);
                break;

                formatted = formatNumber(numeric, 2);

          } else {

            return "已暂停";
          if (value.includes("移除") || value.includes("Removed"))
            return "已移除";
          if (value.includes("未启用") || value.includes("Disabled"))
            return "已禁用";
          if (value.includes("设置") || value.includes("Set")) return "已设置";
          if (value.includes("隐藏") || value.includes("Hidden"))
            return "已隐藏";

            HIDDEN: "已隐藏",
            Hidden: "已隐藏",
            Paused: "已暂停",

          while (chartJobs.length) {
            const job = chartJobs.shift();
            if (!job) continue;
            const canvas = document.getElementById(job.id);
            if (!canvas) continue;
            const ctx = canvas.getContext("2d");
            if (!ctx) continue;
            const existing = chartInstances.get(job.id);

        const setupNavigation = () => {
          const navTags = Array.from(
            document.querySelectorAll(".diagnosis-navigation .nav-tag"),
          );
          if (!navTags.length) return;

          const observedSections = [];
          const observedSet = new Set();

          navItems.forEach((item) => {
            const contentEl = document.querySelector(
              `[data-section-id="${item.id}"]`,
            );
            if (contentEl && !observedSet.has(contentEl)) {
              observedSections.push(contentEl);
              observedSet.add(contentEl);
            }
            const headerEl = document.getElementById(item.id);
            if (headerEl && !observedSet.has(headerEl)) {
              observedSections.push(headerEl);
              observedSet.add(headerEl);
            }
          });

          const setActiveTag = (id) => {
            navTags.forEach((tag) =>
              tag.classList.toggle("active", tag.dataset.target === id),
            );
          };

          const scrollToSection = (id) => {
            const target = document.getElementById(id);
            if (!target) return;
            target.scrollIntoView({ behavior: "auto", block: "start" });
          };

          navTags.forEach((tag) => {
            tag.addEventListener("click", () => {
              const targetId = String(tag.dataset.target || "").trim();
              if (!targetId) return;
              setActiveTag(targetId);
              scrollToSection(targetId);
            });
          });

          if (!observedSections.length) {
            setActiveTag(navTags[0]?.dataset.target || "");
            return;
          }

          const observer = new IntersectionObserver(
            (entries) => {
              const visible = entries
                .filter((entry) => entry.isIntersecting)
                .sort((a, b) => b.intersectionRatio - a.intersectionRatio);

              if (visible.length) {
                const activeTarget =
                  visible[0].target.dataset.sectionId || visible[0].target.id;
                if (activeTarget) {
                  setActiveTag(activeTarget);
                }
              }
            },
            {
              root: null,
              threshold: [0.1, 0.25, 0.5],
              rootMargin: "-30% 0px -45% 0px",
            },
          );

          observedSections.forEach((section) => observer.observe(section));
          const initialTarget =
            observedSections[0]?.dataset.sectionId ||
            observedSections[0]?.id ||
            navTags[0]?.dataset.target ||
            "";
          setActiveTag(initialTarget);
        };

        setupNavigation();

        const setupTableExpanders = () => {
          const buttons = document.querySelectorAll(
            ".expand-button[data-table-key]",
          );
          if (!buttons.length) return;

          buttons.forEach((button) => {
            const tableKey = button.dataset.tableKey;
            const state = tableExpandStates[tableKey];
            if (!state || !state.remainingCount) {
              button.remove();
              return;
            }

            const updateButtonText = (isExpanded) => {
              button.textContent = isExpanded
                ? "收起"
                : buildExpandButtonText(state.remainingCount);
            };

            button.dataset.state = button.dataset.state || "collapsed";
            updateButtonText(button.dataset.state === "expanded");

            button.addEventListener("click", () => {
              const tableWrapper = document.querySelector(
                `.table-block[data-table-key="${tableKey}"]`,
              );
              if (!tableWrapper) return;
              const tableBody = tableWrapper.querySelector("tbody");
              if (!tableBody) return;

              const currentState = button.dataset.state || "collapsed";
              if (currentState === "collapsed") {
                const expandedContent =
                  `${state.limitedRows || ""}${state.remainingRows || ""}`.trim();

                  ? expandedContent
                  : state.placeholderRow;
                button.dataset.state = "expanded";
                updateButtonText(true);
              } else {
                tableBody.innerHTML = state.limitedRows.trim().length
                  ? state.limitedRows
                  : state.placeholderRow;
                button.dataset.state = "collapsed";
                updateButtonText(false);
              }
            });
          });
        };
