<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Editorial Magazine x E-ink — Seed Template</title>

<!-- ──────────────────────────────────────────────
     Google Fonts — Editorial Magazine Stack
     ────────────────────────────────────────────── -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500;600&family=Noto+Sans+SC:wght@400;500&family=Noto+Serif+SC:wght@400;500;600;700;900&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════════════
   0. Reset & Base
   ═══════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
figure { margin: 0; }
img { display: block; max-width: 100%; }
ul, ol { list-style: none; }
blockquote { margin: 0; }
a { color: inherit; text-decoration: none; }

/* ═══════════════════════════════════════════════
   1. CSS Custom Properties — Theme System
   ═══════════════════════════════════════════════ */
:root {
  /* ── Font Stacks ── */
  --serif-zh: "Noto Serif SC", "Source Han Serif SC", "Songti SC", serif;
  --serif-en: "Playfair Display", "Noto Serif SC", serif;
  --sans-zh:  "Noto Sans SC", "Source Han Sans SC", "PingFang SC", sans-serif;
  --sans-en:  "Inter", "Noto Sans SC", sans-serif;
  --mono:     "IBM Plex Mono", "JetBrains Mono", monospace;

  /* ── Default Theme: Ink Classic ── */
  --paper:      #f3f0e8;
  --paper-2:    #ebe6da;
  --ink:        #0a0a0b;
  --muted:      #68625a;
  --line:       rgba(10, 10, 11, .22);
  --accent:     #111111;
  --accent-soft:#d8d2c6;

  /* ── Grain & Wash defaults ── */
  --grain-opacity: .04;
  --grain-blend:   multiply;
  --wash-color:    rgba(10, 10, 11, .02);
  --wash-angle:    160deg;
}

/* ── Theme: Indigo Porcelain ── */
[data-theme="indigo-porcelain"] {
  --paper:      #f2f4f5;
  --paper-2:    #e5ebef;
  --ink:        #0a1f3d;
  --muted:      #5f6d78;
  --line:       rgba(10, 31, 61, .20);
  --accent:     #315d93;
  --accent-soft:#d7e1ec;
}

/* ── Theme: Forest Ink ── */
[data-theme="forest-ink"] {
  --paper:      #f5f1e8;
  --paper-2:    #e8dfcf;
  --ink:        #16251b;
  --muted:      #5d665d;
  --line:       rgba(22, 37, 27, .22);
  --accent:     #2e6b4f;
  --accent-soft:#d4dfd2;
}

/* ── Theme: Kraft Paper ── */
[data-theme="kraft-paper"] {
  --paper:      #eedfc7;
  --paper-2:    #dfc9a8;
  --ink:        #2a1e13;
  --muted:      #755f49;
  --line:       rgba(42, 30, 19, .24);
  --accent:     #9b5a2e;
  --accent-soft:#d5b58f;
}

/* ── Theme: Dune ── */
[data-theme="dune"] {
  --paper:      #f0e6d2;
  --paper-2:    #ded0b7;
  --ink:        #1f1a14;
  --muted:      #6f6557;
  --line:       rgba(31, 26, 20, .22);
  --accent:     #8f7650;
  --accent-soft:#d4c2a4;
}

/* ── Theme: Midnight Ink (dark variant) ── */
[data-theme="midnight-ink"] {
  --paper:      #0e0d0c;
  --paper-2:    #1a1714;
  --ink:        #ece2cf;
  --muted:      #9a8c75;
  --line:       rgba(236, 226, 207, .22);
  --accent:     #d4a04a;
  --accent-soft:#3a2a14;
  --grain-opacity: .06;
  --grain-blend:   overlay;
  --wash-color:    rgba(212, 160, 74, .03);
  --wash-angle:    135deg;
}

/* ═══════════════════════════════════════════════
   2. Type Scale — Editorial Magazine
   ═══════════════════════════════════════════════ */
.h-display {
  font-family: var(--serif-zh);
  font-size: 136px;
  font-weight: 500;
  letter-spacing: .04em;
  line-height: 1.1;
  color: var(--ink);
}

.h-xl {
  font-family: var(--serif-zh);
  font-size: 110px;
  font-weight: 500;
  letter-spacing: .03em;
  line-height: 1.15;
  color: var(--ink);
}

.h-md {
  font-family: var(--serif-zh);
  font-size: 60px;
  font-weight: 500;
  letter-spacing: .02em;
  line-height: 1.2;
  color: var(--ink);
}

.h-sub {
  font-family: var(--serif-en);
  font-size: 46px;
  font-weight: 400;
  font-style: italic;
  letter-spacing: normal;
  line-height: 1.3;
  color: var(--muted);
}

.pullquote {
  font-family: var(--serif-zh);
  font-size: 80px;
  font-weight: 500;
  font-style: italic;
  letter-spacing: normal;
  line-height: 1.25;
  color: var(--ink);
}

.lead {
  font-family: var(--serif-zh);
  font-size: 34px;
  font-weight: 400;
  letter-spacing: normal;
  line-height: 1.7;
  color: var(--ink);
}

.body {
  font-family: var(--serif-zh);
  font-size: 32px;
  font-weight: 400;
  letter-spacing: normal;
  line-height: 1.8;
  color: var(--ink);
}

.kicker {
  font-family: var(--mono);
  font-size: 26px;
  font-weight: 500;
  letter-spacing: .22em;
  text-transform: uppercase;
  line-height: 1.4;
  color: var(--accent);
}

.meta {
  font-family: var(--mono);
  font-size: 24px;
  font-weight: 500;
  letter-spacing: .20em;
  text-transform: uppercase;
  line-height: 1.4;
  color: var(--muted);
}

.label {
  font-family: var(--mono);
  font-size: 24px;
  font-weight: 500;
  letter-spacing: .20em;
  text-transform: uppercase;
  line-height: 1.4;
  color: var(--accent);
}

/* ═══════════════════════════════════════════════
   3. Layout Structure
   ═══════════════════════════════════════════════ */

/* ── Poster Canvas ── */
.poster {
  width: 1080px;
  height: 1440px;
  overflow: hidden;
  position: relative;
  background: var(--paper);
}

.poster.xhs {
  width: 1080px;
  height: 1440px;
}

/* ── Content Padding ── */
.pad {
  padding: 72px 64px;
  display: flex;
  flex-direction: column;
  height: 100%;
  position: relative;
  z-index: 1;
}

/* ── Footer (bottom metadata) ── */
.foot {
  margin-top: auto;
}

/* ── Issue Strip (top category bar) ── */
.issue-strip {
  display: flex;
  gap: 24px;
  padding: 16px 0;
  border-top: 1px solid var(--line);
  font-family: var(--mono);
  font-size: 22px;
  font-weight: 500;
  letter-spacing: .20em;
  text-transform: uppercase;
  color: var(--muted);
}

/* ═══════════════════════════════════════════════
   4. Image Containers
   ═══════════════════════════════════════════════ */

/* ── .frame-img — Photography container ── */
.frame-img {
  overflow: hidden;
  position: relative;
}

.frame-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* ── Aspect Ratios ── */
.r-3x4  { aspect-ratio: 3 / 4; }
.r-1x1  { aspect-ratio: 1 / 1; }
.r-4x3  { aspect-ratio: 4 / 3; }
.r-3x2  { aspect-ratio: 3 / 2; }
.r-16x9 { aspect-ratio: 16 / 9; }
.r-16x10{ aspect-ratio: 16 / 10; }
.r-21x9 { aspect-ratio: 21 / 9; }

/* ── .frame-shot — Screenshot container ── */
.frame-shot {
  overflow: hidden;
  position: relative;
  border-radius: 4px;
  box-shadow: 0 8px 32px rgba(0,0,0,.12);
  background: var(--paper);
  padding: 8px;
}

.frame-shot img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* ── .frame-shot parameter classes ── */
.corners-sm { border-radius: 4px; }
.corners-md { border-radius: 12px; }

.shadow-soft { box-shadow: 0 8px 32px rgba(0,0,0,.12); }
.shadow-ed   { box-shadow: 4px 4px 0 rgba(0,0,0,.15); }

.bg-paper-2 { background: var(--paper-2); }
.bg-paper   { background: var(--paper); }

.inset-sub { padding: 8px; }
.inset-bal { padding: 24px; }

/* ── Image Caption ── */
.img-cap {
  font-family: var(--mono);
  font-size: 22px;
  font-weight: 500;
  letter-spacing: .20em;
  text-transform: uppercase;
  line-height: 1.4;
  color: var(--muted);
  margin-top: 12px;
}

/* ═══════════════════════════════════════════════
   5. Data Display — Stat Cards
   ═══════════════════════════════════════════════ */
.stat-card {
  background: var(--paper-2);
  padding: 32px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.stat-label {
  font-family: var(--mono);
  font-size: 22px;
  font-weight: 500;
  letter-spacing: .20em;
  text-transform: uppercase;
  color: var(--muted);
}

.stat-nb {
  font-family: var(--serif-zh);
  font-size: 72px;
  font-weight: 500;
  line-height: 1;
  color: var(--accent);
}

.stat-unit {
  font-family: var(--mono);
  font-size: 22px;
  font-weight: 500;
  letter-spacing: .20em;
  color: var(--muted);
}

/* ═══════════════════════════════════════════════
   6. Pipeline — Vertical Steps
   ═══════════════════════════════════════════════ */
.pipeline-section {
  display: flex;
  flex-direction: column;
  gap: 32px;
}

.pipeline-label {
  font-family: var(--mono);
  font-size: 22px;
  font-weight: 500;
  letter-spacing: .20em;
  text-transform: uppercase;
  color: var(--muted);
}

.pipeline {
  display: flex;
  flex-direction: column;
  gap: 0;
  border-left: 2px solid var(--line);
  padding-left: 32px;
}

.step {
  position: relative;
  padding: 20px 0;
  display: flex;
  gap: 20px;
  align-items: flex-start;
}

.step-nb {
  font-family: var(--mono);
  font-size: 22px;
  font-weight: 500;
  letter-spacing: .20em;
  color: var(--accent);
  flex-shrink: 0;
  min-width: 36px;
}

.step-nb::before {
  content: "";
  position: absolute;
  left: -39px;
  top: 26px;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--accent);
}

.step-title {
  font-family: var(--serif-zh);
  font-size: 34px;
  font-weight: 500;
  line-height: 1.3;
  color: var(--ink);
  display: block;
}

.step-desc {
  font-family: var(--serif-zh);
  font-size: 28px;
  font-weight: 400;
  line-height: 1.6;
  color: var(--muted);
  display: block;
  margin-top: 4px;
}

/* ═══════════════════════════════════════════════
   7. Callout — Pull Quote Component
   ═══════════════════════════════════════════════ */
.callout {
  border-left: 3px solid var(--accent);
  padding: 32px 0 32px 40px;
}

.callout-src {
  font-family: var(--mono);
  font-size: 22px;
  font-weight: 500;
  letter-spacing: .20em;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 16px;
}

/* ═══════════════════════════════════════════════
   8. Grid Layouts
   ═══════════════════════════════════════════════ */
.grid-2-7-5 {
  display: grid;
  grid-template-columns: 7fr 5fr;
  gap: 40px;
}

.grid-2-6-6 {
  display: grid;
  grid-template-columns: 6fr 6fr;
  gap: 40px;
}

.grid-2-8-4 {
  display: grid;
  grid-template-columns: 8fr 4fr;
  gap: 40px;
}

.grid-3-3 {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 32px;
}

.grid-6 {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 24px;
}

.grid-3 {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
}

.grid-4 {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 24px;
}

/* ═══════════════════════════════════════════════
   9. Ledger — Field Ledger
   ═══════════════════════════════════════════════ */
.ledger {
  display: flex;
  flex-direction: column;
}

.ledger-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 20px 0;
  border-bottom: 1px solid var(--line);
}

.ledger-row:last-child {
  border-bottom: none;
}

.ledger-title {
  font-family: var(--serif-zh);
  font-size: 30px;
  font-weight: 500;
  color: var(--ink);
}

.ledger-note {
  font-family: var(--mono);
  font-size: 22px;
  font-weight: 500;
  letter-spacing: .20em;
  color: var(--muted);
}

/* ═══════════════════════════════════════════════
   10. Marginalia — Aside Column
   ═══════════════════════════════════════════════ */
.marginalia {
  font-family: var(--mono);
  font-size: 22px;
  font-weight: 400;
  line-height: 1.6;
  color: var(--muted);
  border-left: 1px solid var(--line);
  padding-left: 24px;
}

/* ═══════════════════════════════════════════════
   11. Background System
   ═══════════════════════════════════════════════ */

/* ── Grain — Subtle paper grain texture ── */
.grain {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 2;
  opacity: var(--grain-opacity);
  mix-blend-mode: var(--grain-blend);
  background-image:
    radial-gradient(circle at 17% 32%, rgba(0,0,0,.15) 0%, transparent 50%),
    radial-gradient(circle at 72% 18%, rgba(0,0,0,.10) 0%, transparent 40%),
    radial-gradient(circle at 45% 78%, rgba(0,0,0,.12) 0%, transparent 45%),
    radial-gradient(circle at 88% 55%, rgba(0,0,0,.08) 0%, transparent 35%);
}

/* ── Paper Wash — Ink wash atmosphere ── */
.paper-wash {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background:
    radial-gradient(ellipse at 20% 80%, var(--wash-color) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, var(--wash-color) 0%, transparent 50%),
    linear-gradient(var(--wash-angle), transparent 0%, var(--wash-color) 100%);
}

/* ── Mag BG — Placeholder for WebGL canvas ── */
.mag-bg {
  position: absolute;
  inset: 0;
  z-index: 0;
}

/* ═══════════════════════════════════════════════
   12. Device Wrappers
   ═══════════════════════════════════════════════ */

/* ── .device-browser — macOS browser chrome ── */
.device-browser {
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid var(--line);
  background: var(--paper);
}

.device-browser::before {
  content: "";
  display: block;
  height: 40px;
  background: var(--paper-2);
  border-bottom: 1px solid var(--line);
  background-image:
    radial-gradient(circle at 20px 20px, var(--muted) 4px, transparent 4px),
    radial-gradient(circle at 40px 20px, var(--muted) 4px, transparent 4px),
    radial-gradient(circle at 60px 20px, var(--muted) 4px, transparent 4px);
  background-repeat: no-repeat;
}

/* ── .device-phone — iOS phone bezel ── */
.device-phone {
  border-radius: 32px;
  overflow: hidden;
  border: 3px solid var(--ink);
  background: var(--paper);
}

.device-phone::before {
  content: "";
  display: block;
  height: 28px;
  background: var(--ink);
  clip-path: polygon(0 0, 100% 0, 100% 100%, 55% 100%, 50% 60%, 45% 100%, 0 100%);
}

/* ═══════════════════════════════════════════════
   13. Sheet Container
   ═══════════════════════════════════════════════ */
.sheet {
  background: var(--paper);
}

/* ═══════════════════════════════════════════════
   14. Utility Helpers
   ═══════════════════════════════════════════════ */
.text-ink   { color: var(--ink); }
.text-muted { color: var(--muted); }
.text-accent{ color: var(--accent); }
.bg-paper   { background: var(--paper); }
.bg-paper-2 { background: var(--paper-2); }
.border-line{ border-color: var(--line); }

.gap-sm { gap: 16px; }
.gap-md { gap: 32px; }
.gap-lg { gap: 48px; }

.flex-col { display: flex; flex-direction: column; }
.flex-row { display: flex; flex-direction: row; }
.items-end { align-items: flex-end; }
.justify-between { justify-content: space-between; }

.w-full { width: 100%; }
.h-full { height: 100%; }

.mt-auto { margin-top: auto; }
.mb-0    { margin-bottom: 0; }

.relative { position: relative; }
.overflow-hidden { overflow: hidden; }
</style>
</head>

<main class="sheet">
