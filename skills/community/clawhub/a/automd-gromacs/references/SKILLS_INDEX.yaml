      - '氢键网络: NetworkX 图'
      - 'LaTeX 格式引用: 自动生成 \includegraphics'
utils:
  preprocess_helper:
    description: 预处理辅助工具
    script: scripts/utils/preprocess.sh
  common_utils:
    description: 通用辅助工具
    script: scripts/utils/utils.sh
decision:
  method_selector:
    name: 方法选择器
    description: 在执行前进行 method routing，输出 Recommended / Why / Avoid / Next
    script: scripts/decision/method-selector.py
    references:
    - references/METHOD_SELECTION_INDEX.yaml
    - references/design/decision-target-map.md
    quick_ref:
      input:
      - goal
      - system_type
      - target_observable
      output:
      - Recommended
      - Why
      - Avoid
      - Next
usage: 'AI 使用流程:

  1. 读取此索引文件 (SKILLS_INDEX.yaml)

  2. 根据用户需求匹配 skill

  3. 查看 quick_ref 了解关键参数和常见错误

  4. 执行对应的 script (脚本内置自动修复)

  5. 如果出错, 读取 troubleshoot 文档

  6. 按需读取 references


  示例:

  用户: "帮我做配体结合自由能计算"

  → 匹配: advanced.freeenergy

  → 查看: quick_ref (了解 lambda 分布、软核参数)

  → 执行: scripts/advanced/freeenergy.sh --complex complex.pdb --ligand ligand.mol2

  → 脚本自动: 检查依赖 → 尝试安装 acpype → 多方案参数化 → 运行计算

