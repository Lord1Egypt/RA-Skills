# 抓取配置
fetch:
  days: 10  # 抓取最近多少天
  max_tweets_per_creator: 50  # 每个博主最多抓取多少条
  timeout: 30  # 请求超时时间（秒）
  retry: 3  # 失败重试次数

# 过滤配置
filter:
  min_likes: 5  # 最少点赞数
  min_retweets: 2  # 最少转发数
  min_replies: 1  # 最少回复数
  exclude_keywords:
    - "广告"
    - "推广"
    - "AD"
    - "ad"
    - "sponsor"
    - "赞助"
  require_media: false  # 是否要求包含媒体（图片/视频）

# 评分配置
scoring:
  weights:
    originality: 0.3  # 原创性权重
    practicality: 0.3  # 实用性权重
    timeliness: 0.2  # 时效性权重
    engagement: 0.2  # 互动数据权重

  # 互动数据标准化
  engagement:
    likes_weight: 1.0
    retweets_weight: 2.0
    replies_weight: 1.5
    views_weight: 0.001

# 发布配置
publish:
  platforms:
    - name: "twitter"
      enabled: true
      max_length: 280
      auto_post: true

    - name: "xiaohongshu"
      enabled: false
      max_length: 1000
      auto_post: false

    - name: "zhihu"
      enabled: false
      max_length: 0  # 无限制
      auto_post: false

  hashtags:
    - "#AI"
    - "#OpenClaw"
    - "#Agent"
    - "#MachineLearning"

  # 发布时间
  schedule:
    timezone: "Asia/Shanghai"
    default_time: "08:00"  # 默认发布时间

# 输出配置
output:
  briefing_dir: "reports"
  archive_dir: "archive/briefings"
  log_dir: "logs"

  # 文件命名格式
  filename_format: "x-creator-briefing-{date}.md"
  date_format: "%Y-%m-%d"

  # 简报模板
  template: "templates/briefing-template.md"

# 通知配置
notification:
  on_success: false
  on_failure: true
  on_empty: true  # 当没有抓取到内容时通知

  # 通知方式
  methods:
    - type: "console"
      enabled: true

    - type: "email"
      enabled: false
      address: ""

    - type: "webhook"
      enabled: false
      url: ""
