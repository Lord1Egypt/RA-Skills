# DigitalOcean App Platform Configuration
# Generated by deploy_script.sh --platform digitalocean
# Customize before deploying: doctl apps create --spec ./app.yaml

name: openclaw-multi-agent
region: nyc3
services:
  - name: openclaw-gateway
    github:
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile.openclaw
    instance_size_slug: s-1vcpu-1gb
    envs:
      - key: OPENCLAW_AGENTS
        value: "coordinator,research,builder,auditor,personal"
      - key: OPENCLAW_CONFIG
        type: secret
        value: openclaw-config
    health_check:
      http_path: /health
      initial_delay_seconds: 30
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3