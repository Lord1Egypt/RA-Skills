# 旅行创收助手 - 技能配置

# 技能基本信息
skill:
  name: 旅行创收助手
  version: 1.0.0
  description: 发现边玩边赚钱的旅行方案，让预算有限的人也能说走就走
  author: 徐文祥（出心）
  department: 飞猪 -CTO 线 - 设计部 - 用户研究

# 触发配置
trigger:
  # 触发关键词（用户说这些词时唤起技能）
  keywords:
    - 旅行赚钱
    - 边玩边赚
    - 旅行创收
    - 赚旅费
    - 旅行副业
    - 演唱会周边
    - 旅拍
    - 免税代购
    - 酒店试睡员
    - 怎么覆盖旅费
    - 旅行怎么赚钱
  
  # 触发问题（用户问这些问题时唤起技能）
  questions:
    - 有什么旅行方式可以赚钱
    - 怎么边旅行边创收
    - 预算不够怎么旅行
    - 旅行时能做什么兼职
    - 演唱会卖周边能赚多少钱

# 功能配置
features:
  # 核心功能
  core:
    - 机会发现：扫描全网活动/赛事/展会，识别创收机会
    - 收益测算：基于历史数据预测收入，计算净收益
    - 个性化匹配：技能×预算×时间 三维匹配推荐
    - 执行计划：生成倒计时任务清单
  
  # AI 支持
  ai_support:
    - 获客文案生成
    - 海报设计
    - 客服话术
    - 风险提示

# 数据源（后续迭代）
data_sources:
  activities:
    - 大麦网 API（演唱会/演出）
    - 活动行 API（展会/会议）
    - 小红书（热门活动）
  
  costs:
    - 飞猪 API（机票/酒店）
    - 携程 API（比价）
    - 历史数据估算
  
  cases:
    - 用户真实案例库
    - 收益数据沉淀

# 风险合规
compliance:
  warnings:
    - 场馆周边售卖可能涉及城管/安保
    - 代购需注意海关限额
    - 票务倒卖需合规操作
    - 内容创作注意版权
  
  disclaimers:
    - 收益预测仅供参考，实际收益可能不同
    - 建议用户自行评估风险
    - 本工具不提供法律/税务建议

# 迭代计划
roadmap:
  phase1:
    name: 创意验证
    time: 2026-04
    tasks:
      - 创意文档完成
      - 用户访谈验证
      - Mockup 设计
  
  phase2:
    name: MVP 开发
    time: 2026-05
    tasks:
      - flyai Skill 开发
      - 接入基础数据源
      - 收益测算算法
  
  phase3:
    name: 社区建设
    time: 2026-06
    tasks:
      - 用户案例分享
      - 机会池 UGC
      - 组队功能
  
  phase4:
    name: 商业化
    time: 2026-07+
    tasks:
      - 会员体系
      - 付费课程
      - 品牌合作
