<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Fixture Product</title>
    <style>
      :root {
        --brand-primary: #2563eb;
        --surface: #ffffff;
        --radius-md: 8px;
      }

      body {
        margin: 0;
        background: #f8fafc;
        color: #0f172a;
        font-family: Inter, system-ui, sans-serif;
      }

      main {
        padding: 48px;
      }

      h1 {
        margin: 0 0 16px;
        font-size: 40px;
        line-height: 48px;
        font-weight: 700;
      }

      p {
        color: #64748b;
        font-size: 16px;
        line-height: 24px;
      }

      .cta {
        height: 40px;
        padding: 8px 16px;
        border: 1px solid #1d4ed8;
        border-radius: 8px;
        background: var(--brand-primary);
        color: #ffffff;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }

      .feature-card {
        width: 360px;
        margin-top: 32px;
        padding: 24px;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        background: var(--surface);
        box-shadow: 0 12px 32px rgba(15, 23, 42, 0.12);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Fixture Product</h1>
      <p>Design extraction fixture for the local skill runner.</p>
      <button class="cta">Start now</button>
      <section class="feature-card">
        <h2>Fast setup</h2>
        <p>Evidence-rich design tokens from computed styles.</p>
      </section>
    </main>
  </body>
</html>
