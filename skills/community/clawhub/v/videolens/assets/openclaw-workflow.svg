<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="800" viewBox="0 0 1400 800" role="img" aria-label="OpenClaw VideoLens workflow"><rect width="1400" height="800" fill="url(#bg)"/><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#07111f"/><stop offset="55%" stop-color="#101a3d"/><stop offset="100%" stop-color="#241044"/></linearGradient><linearGradient id="a" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#00E5FF"/><stop offset="100%" stop-color="#A855F7"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><style>.title{font:800 54px Inter,Arial,sans-serif;fill:#f8fbff}.sub{font:500 24px Inter,Arial,sans-serif;fill:#b9c7e6}.tiny{font:600 17px Inter,Arial,sans-serif;fill:#8fa7d8}.mono{font:600 18px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#d9e7ff}.card{fill:#0d1730;stroke:#233a74;stroke-width:2}.accent{fill:url(#a)}.good{fill:#39ffb6}.warn{fill:#ffd166}.bad{fill:#ff6b8a}</style></defs><defs><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#7dd3fc"/></marker></defs><text x="70" y="100" class="title">OpenClaw video review lane</text><text x="70" y="142" class="sub">Generate video → analyze it → fix upstream → publish with confidence</text><g transform="translate(75 240)"><rect width="235" height="150" rx="26" class="card"/><text x="34" y="65" class="sub">1. Create</text><text x="34" y="105" class="tiny">script, voice, clips</text></g><g transform="translate(360 240)"><rect width="235" height="150" rx="26" class="card"/><text x="34" y="65" class="sub">2. Render</text><text x="34" y="105" class="tiny">mp4 or YouTube draft</text></g><g transform="translate(645 240)"><rect width="235" height="150" rx="26" fill="#101e3f" stroke="#00e5ff" stroke-width="3"/><text x="34" y="65" class="sub">3. VideoLens</text><text x="34" y="105" class="tiny">timestamped QA</text></g><g transform="translate(930 240)"><rect width="235" height="150" rx="26" class="card"/><text x="34" y="65" class="sub">4. Fix</text><text x="34" y="105" class="tiny">template + gates</text></g><g transform="translate(1090 490)"><rect width="235" height="150" rx="26" class="card"/><text x="34" y="65" class="sub">5. Publish</text><text x="34" y="105" class="tiny">approval-gated</text></g><path d="M310 315 H360" stroke="#7dd3fc" stroke-width="5" marker-end="url(#m)"/><path d="M595 315 H645" stroke="#7dd3fc" stroke-width="5" marker-end="url(#m)"/><path d="M880 315 H930" stroke="#7dd3fc" stroke-width="5" marker-end="url(#m)"/><path d="M1048 390 C1050 455 1125 455 1160 490" stroke="#7dd3fc" stroke-width="5" fill="none" marker-end="url(#m)"/><rect x="75" y="590" width="850" height="90" rx="24" fill="#071426" stroke="#334155"/><text x="115" y="642" class="mono">preflight → bootstrap → analyze (requires allow_credit_spend: true)</text></svg>