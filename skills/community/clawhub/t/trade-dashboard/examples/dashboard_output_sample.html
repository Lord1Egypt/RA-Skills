<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Sample</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #0f0f23; color: #e0e0e0; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-card { background: #151530; padding: 20px; border-radius: 12px; flex: 1; text-align: center; }
        .stat-value { font-size: 36px; font-weight: bold; color: #00d4ff; }
        .stat-label { color: #888; margin-top: 8px; }
    </style>
</head>
<body>
    <h1>📈 Trade Dashboard Sample</h1>
    
    <div class="stats">
        <div class="stat-card">
            <div class="stat-value">20</div>
            <div class="stat-label">发现客户</div>
        </div>
        <div class="stat-card">
            <div class="stat-value">8</div>
            <div class="stat-label">高价值目标</div>
        </div>
        <div class="stat-card">
            <div class="stat-value">23.5%</div>
            <div class="stat-label">回复率</div>
        </div>
        <div class="stat-card">
            <div class="stat-value">3.2x</div>
            <div class="stat-label">ROI</div>
        </div>
    </div>
    
    <p>Full interactive dashboard available in <code>trade_dashboard.html</code></p>
</body>
</html>
