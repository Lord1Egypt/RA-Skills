<!-- ca-table — 数据表格 -->
<div class="content-area" style="align-items:flex-start;padding:40px 80px;flex-direction:column">
  {{#if title}}
  <h2 style="font-family:var(--font);font-size:26px;font-weight:600;color:var(--color-text);margin:0 0 24px 0;width:100%">{{title}}</h2>
  {{/if}}
  <table style="width:100%;border-collapse:collapse;font-family:var(--font);font-size:15px">
    <thead>
      <tr>
        {{#each headers}}
        <th style="background:var(--color-primary);color:#fff;font-weight:600;text-align:left;padding:14px 20px;font-size:15px;white-space:nowrap">
          {{#if icon}}
          <span style="margin-right:8px">{{icon}}</span>
          {{/if}}
          {{text}}
        </th>
        {{/each}}
      </tr>
    </thead>
    <tbody>
      {{#each rows}}
      <tr style="background:{{#if @odd}}var(--color-bg){{else}}var(--color-bg-alt){{/if}}">
        {{#each cells}}
        <td style="padding:12px 20px;color:var(--color-text);border-bottom:1px solid var(--color-border);line-height:1.5">{{text}}</td>
        {{/each}}
      </tr>
      {{/each}}
    </tbody>
  </table>
  {{#if note}}
  <div style="margin-top:16px;font-family:var(--font);font-size:13px;color:var(--color-text-secondary)">{{note}}</div>
  {{/if}}
</div>
