datasource:
  url: "jdbc:mysql://localhost:3306/your_database?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
  driver: "com.mysql.cj.jdbc.Driver"
  username: "${DB_USER}"
  password: "${DB_PASS}"
  pool:
    maxSize: 10
    minIdle: 2
    connectionTimeout: 30000
    idleTimeout: 600000
    maxLifetime: 1800000
    validationTimeout: 5000
