<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">人生岔路复盘 demo 预览</title>
  <desc id="desc">移动端报告预览，展示强判词、一次选择分出三种结果的分叉图，以及现实结果、假设结果、回补结果三张卡片。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbf6ea"/>
      <stop offset="0.55" stop-color="#f4efe4"/>
      <stop offset="1" stop-color="#eaf2ef"/>
    </linearGradient>
    <linearGradient id="phone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f6f1e7"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#183f46" flood-opacity="0.18"/>
    </filter>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#183f46" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <circle cx="1050" cy="92" r="150" fill="#e9c87a" opacity="0.18"/>
  <circle cx="120" cy="630" r="180" fill="#7dbfb8" opacity="0.16"/>

  <g transform="translate(70 78)">
    <text x="0" y="0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="24" font-weight="700" fill="#1d5b6f" letter-spacing="2">LIFE FORK SIMULATION STACK</text>
    <text x="0" y="58" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="56" font-weight="800" fill="#163f49">人生岔路复盘报告</text>
    <text x="0" y="108" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="28" font-weight="600" fill="#2b6172">如果当年去了北京，我会变成另一个人吗？</text>
    <rect x="0" y="146" width="520" height="5" rx="3" fill="#d9b15f"/>
    <text x="0" y="214" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="34" font-weight="800" fill="#173f4a">你反复想起北京，</text>
    <text x="0" y="260" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="34" font-weight="800" fill="#173f4a">其实在想那个更早被看见的自己。</text>
    <text x="0" y="330" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="24" fill="#526c70">把遗憾拆成三种结果、事件冲击和今天能验证的小动作。</text>

    <g transform="translate(0 390)">
      <rect width="210" height="86" rx="22" fill="#ffffff" opacity="0.82" filter="url(#cardShadow)"/>
      <circle cx="42" cy="43" r="16" fill="#d9b15f"/>
      <text x="76" y="37" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="19" font-weight="800" fill="#173f4a">现实结果</text>
      <text x="76" y="65" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="17" fill="#5d7072">留深圳</text>
    </g>
    <g transform="translate(235 390)">
      <rect width="210" height="86" rx="22" fill="#ffffff" opacity="0.82" filter="url(#cardShadow)"/>
      <circle cx="42" cy="43" r="16" fill="#78bcb6"/>
      <text x="76" y="37" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="19" font-weight="800" fill="#173f4a">假设结果</text>
      <text x="76" y="65" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="17" fill="#5d7072">去北京</text>
    </g>
    <g transform="translate(470 390)">
      <rect width="210" height="86" rx="22" fill="#ffffff" opacity="0.82" filter="url(#cardShadow)"/>
      <circle cx="42" cy="43" r="16" fill="#8ea8bd"/>
      <text x="76" y="37" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="19" font-weight="800" fill="#173f4a">回补结果</text>
      <text x="76" y="65" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="17" fill="#5d7072">补回可见度</text>
    </g>
  </g>

  <g transform="translate(780 50)" filter="url(#softShadow)">
    <rect x="0" y="0" width="340" height="620" rx="42" fill="#163f49"/>
    <rect x="18" y="18" width="304" height="584" rx="32" fill="url(#phone)"/>
    <rect x="128" y="34" width="82" height="8" rx="4" fill="#d8d0c2"/>

    <g transform="translate(44 70)">
      <text x="0" y="0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="800" fill="#1d5b6f" letter-spacing="1.5">那次选择</text>
      <text x="0" y="36" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="23" font-weight="850" fill="#173f4a">一次选择，后来</text>
      <text x="0" y="66" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="23" font-weight="850" fill="#173f4a">分出了三种结果</text>

      <g transform="translate(0 96)">
        <rect x="-10" y="-10" width="270" height="220" rx="24" fill="#fffaf0" stroke="#eadfc9"/>
        <path d="M20 102 C58 82, 88 118, 120 102" fill="none" stroke="#a5b4b5" stroke-width="9" stroke-linecap="round"/>
        <path d="M122 102 C166 44, 208 42, 248 38" fill="none" stroke="#d9b15f" stroke-width="9" stroke-linecap="round"/>
        <path d="M122 102 C166 96, 210 100, 248 102" fill="none" stroke="#78bcb6" stroke-width="9" stroke-linecap="round"/>
        <path d="M122 102 C166 158, 208 170, 248 176" fill="none" stroke="#8ea8bd" stroke-width="9" stroke-linecap="round"/>
        <circle cx="20" cy="102" r="9" fill="#fff7df" stroke="#a5b4b5" stroke-width="5"/>
        <circle cx="122" cy="102" r="12" fill="#173f4a" stroke="#fff7df" stroke-width="5"/>
        <circle cx="248" cy="38" r="10" fill="#d9b15f" stroke="#fff7df" stroke-width="4"/>
        <circle cx="248" cy="102" r="10" fill="#78bcb6" stroke="#fff7df" stroke-width="4"/>
        <circle cx="248" cy="176" r="10" fill="#8ea8bd" stroke="#fff7df" stroke-width="4"/>
        <text x="148" y="30" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="800" fill="#173f4a">现实结果</text>
        <text x="148" y="94" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="800" fill="#173f4a">假设结果</text>
        <text x="148" y="168" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="800" fill="#173f4a">回补结果</text>
      </g>

      <g transform="translate(0 348)">
        <rect width="252" height="58" rx="18" fill="#ffffff" stroke="#eadfc9"/>
        <rect x="0" y="0" width="8" height="58" rx="4" fill="#d9b15f"/>
        <text x="22" y="24" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="850" fill="#173f4a">它给你的</text>
        <text x="22" y="45" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#617276">稳定半径、产业现场、低摩擦生活</text>
      </g>
      <g transform="translate(0 420)">
        <rect width="252" height="58" rx="18" fill="#ffffff" stroke="#eadfc9"/>
        <rect x="0" y="0" width="8" height="58" rx="4" fill="#78bcb6"/>
        <text x="22" y="24" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="850" fill="#173f4a">它拿走的</text>
        <text x="22" y="45" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#617276">更早进入高密度网络的可能性</text>
      </g>
    </g>
  </g>
</svg>
