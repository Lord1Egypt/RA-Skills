<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <meta name="description" content="{{DESCRIPTION}}">
  <meta name="keywords" content="{{KEYWORDS}}">
  <link rel="canonical" href="{{CANONICAL_URL}}">

  <!-- Open Graph -->
  <meta property="og:type" content="article">
  <meta property="og:title" content="{{TITLE}}">
  <meta property="og:description" content="{{DESCRIPTION}}">
  <meta property="og:url" content="{{CANONICAL_URL}}">
  <meta property="og:image" content="{{HERO_IMAGE_URL}}">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="article:published_time" content="{{PUBLISHED_AT}}">
  <meta property="article:author" content="{{AUTHOR}}">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{TITLE}}">
  <meta name="twitter:description" content="{{DESCRIPTION}}">
  <meta name="twitter:image" content="{{HERO_IMAGE_URL}}">

  <!-- JSON-LD Article -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Article",
    "headline": "{{TITLE}}",
    "description": "{{DESCRIPTION}}",
    "image": "{{HERO_IMAGE_URL}}",
    "datePublished": "{{PUBLISHED_AT}}",
    "dateModified": "{{PUBLISHED_AT}}",
    "author": {"@type": "Person", "name": "{{AUTHOR}}"},
    "publisher": {
      "@type": "Organization",
      "name": "OJS Intel",
      "logo": {"@type": "ImageObject", "url": "{{PUBLISHER_LOGO}}"}
    },
    "mainEntityOfPage": {"@type": "WebPage", "@id": "{{CANONICAL_URL}}"},
    "keywords": "{{KEYWORDS}}",
    "isBasedOn": "{{SOURCE_URL}}"
  }
  </script>

  <style>
    /* Inline CSS budget <100KB. Keep minimal. */
    :root {
      --bg: #ffffff;
      --fg: #0f172a;
      --muted: #64748b;
      --accent: #2563eb;
      --border: #e2e8f0;
      --max-w: 720px;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.65;
      font-size: 18px;
    }
    main { max-width: var(--max-w); margin: 0 auto; padding: 32px 20px; }
    article header h1 {
      font-size: clamp(28px, 4vw, 40px);
      line-height: 1.2;
      margin: 0 0 12px;
    }
    .meta {
      color: var(--muted);
      font-size: 15px;
      margin: 0 0 24px;
    }
    .meta time, .meta span { margin-right: 12px; }
    figure { margin: 0 0 32px; }
    figure img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 8px;
    }
    figcaption {
      color: var(--muted);
      font-size: 14px;
      padding: 8px 0;
      font-style: italic;
    }
    article section h2 {
      font-size: 24px;
      margin: 32px 0 12px;
      line-height: 1.3;
    }
    article section p { margin: 0 0 16px; }
    blockquote {
      margin: 24px 0;
      padding: 16px 20px;
      border-left: 4px solid var(--accent);
      background: #f8fafc;
      font-style: italic;
      color: var(--fg);
    }
    blockquote::before { content: '"'; }
    blockquote::after { content: '"'; }
    aside.sources {
      margin-top: 48px;
      padding: 24px;
      border-top: 1px solid var(--border);
      background: #f8fafc;
      border-radius: 8px;
      font-size: 16px;
    }
    aside.sources h2 {
      font-size: 18px;
      margin: 0 0 12px;
    }
    aside.sources h3 {
      font-size: 16px;
      margin: 16px 0 8px;
    }
    aside.sources a {
      color: var(--accent);
      word-break: break-all;
    }
    aside.sources a:hover { text-decoration: underline; }
    aside.sources ul {
      margin: 0;
      padding-left: 20px;
    }
    aside.sources li { margin: 6px 0; }
    a:focus-visible {
      outline: 3px solid var(--accent);
      outline-offset: 2px;
    }
    @media (max-width: 480px) {
      body { font-size: 17px; }
      main { padding: 20px 16px; }
    }
  </style>
</head>
<body>
  <main>
    <article itemscope itemtype="https://schema.org/Article">
      <header>
        <h1 itemprop="headline">{{TITLE}}</h1>
        <p class="meta">
          <time datetime="{{PUBLISHED_AT}}" itemprop="datePublished">{{PUBLISHED_AT_HUMAN}}</time>
          <span itemprop="author">{{AUTHOR}}</span>
        </p>
      </header>

      <figure>
        <img src="{{HERO_IMAGE_URL}}" alt="{{HERO_IMAGE_ALT}}"
             loading="lazy" decoding="async" width="1200" height="630">
        <figcaption>{{HERO_IMAGE_ALT}}</figcaption>
      </figure>

      <section itemprop="articleBody">
        {{ARTICLE_BODY}}
      </section>

      <aside class="sources" aria-label="Sumber">
        <h2>Sumber</h2>
        <p>Sumber utama:
          <a href="{{SOURCE_URL}}" rel="noopener external" target="_blank">{{SOURCE_URL}}</a>
        </p>
        <h3>Sumber sekunder</h3>
        {{SECONDARY_SOURCES_HTML}}
      </aside>
    </article>
  </main>
</body>
</html>
