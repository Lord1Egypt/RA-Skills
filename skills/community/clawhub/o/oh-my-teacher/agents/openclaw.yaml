interface:
  display_name: "Oh My Teacher (OpenClaw)"
  short_description: "Thin adapter for OpenClaw-style agent runtimes."
  default_prompt: "Use $oh-my-teacher in OpenClaw. Probe the runtime tools first and keep platform-specific assumptions conservative."

adapter:
  agent_id: "openclaw"
  contract: "references/agent-adapter-contract.md"
  inventory: "references/agent-inventory.md#openclaw"
  optimization_profiles: ["prompt-agent", "file-agent"]
  source_status: "unknown"

instructions: |
  Follow SKILL.md as the primary and authoritative teaching workflow.
  Read references/agent-adapter-contract.md before using host-specific behavior.
  Read references/agent-optimization.md to upgrade from prompt-agent to file-agent or scripted-agent only after tools are confirmed.
  Consult references/agent-inventory.md for the OpenClaw record.

  Best path: start as prompt-agent, then switch to file-agent or scripted-agent
  for course materials, persistent artifacts, and code demos once OpenClaw
  exposes those tools.

  OpenClaw capabilities are not verified in this repository. Treat file, shell,
  search, memory, planning, and rendering support as unknown until exposed by the
  host. Use shared Markdown fallbacks whenever a capability is missing or
  uncertain.

  Opt-in reminders: if and only if OpenClaw exposes proactive-message or
  scheduler tools and the user explicitly asks to enable reminders or daily/weekly
  knowledge digests, read references/opt-in-reminders.md and use the shared
  reminder-agent path. Without explicit opt-in, never send or schedule background
  messages. If proactive delivery is unavailable, generate the requested digest
  inline and provide a copyable reminder configuration.

policy:
  allow_implicit_invocation: true
