      - 'ERROR-006: grompp失败 → 检查拓扑和MDP参数'
      - 'ERROR-007: 能量最小化失败 → 检查系统结构和QM/MM配置'
      - 'ERROR-008: NVT平衡失败 → 减小时间步长或检查温度耦合'
