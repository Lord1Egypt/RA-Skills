<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>挣值分析报告</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #ffffff;
  --bg-secondary: #F1EFE8;
  --bg-card: #f8f7f4;
  --text: #2C2C2A;
  --text-secondary: #5F5E5A;
  --text-muted: #888780;
  --border: #D3D1C7;
  --primary: #534AB7;
  --positive: #1D9E75;
  --negative: #E24B4A;
  --warning: #EF9F27;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; padding: 24px; background: var(--bg); color: var(--text); }
h1 { font-size: 20px; font-weight: 500; margin: 0 0 4px; }
h2 { font-size: 16px; font-weight: 500; margin: 28px 0 12px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
h3 { font-size: 14px; font-weight: 500; margin: 20px 0 8px; }
table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 13px; }
th, td { padding: 8px 12px; text-align: right; border: 1px solid var(--border); }
th { background: var(--bg-secondary); font-weight: 500; text-align: center; }
td:first-child { text-align: left; font-weight: 500; }
.positive-text { color: var(--positive); }
.negative-text { color: var(--negative); }
.metric-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin: 12px 0; }
.metric-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; text-align: center; }
.metric-card.positive { border-left: 4px solid var(--positive); }
.metric-card.negative { border-left: 4px solid var(--negative); }
.metric-card.warning { border-left: 4px solid var(--warning); }
.metric-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
.metric-value { font-size: 22px; font-weight: 500; }
.metric-note { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }
.chart-wrapper { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin: 12px 0; }
.section-title { font-weight: 500; margin-top: 16px; margin-bottom: 8px; }
.analysis-item { padding: 10px 14px; margin: 6px 0; border-radius: 8px; font-size: 13px; line-height: 1.5; }
.analysis-item.positive { background: #E1F5EE; border-left: 3px solid var(--positive); }
.analysis-item.warning { background: #FAEEDA; border-left: 3px solid var(--warning); }
.analysis-item.danger { background: #FCEBEB; border-left: 3px solid var(--negative); }
.subtitle { font-size: 13px; color: var(--text-secondary); margin-bottom: 16px; }
.status-badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 500; }
.status-ahead { background: #E1F5EE; color: #0F6E56; }
.status-behind { background: #FCEBEB; color: #A32D2D; }
.status-on-track { background: #E6F1FB; color: #185FA5; }
.status-under { background: #E1F5EE; color: #0F6E56; }
.status-over { background: #FCEBEB; color: #A32D2D; }
#app { max-width: 900px; margin: 0 auto; }
</style>
</head>
<body>
<div id="app"></div>
<script>
const DATA = {{REPORT_DATA_JSON}};

function badge(cls, label) {
  return `<span class="status-badge ${cls}">${label}</span>`;
}

function init() {
  const d = DATA;
  const app = document.getElementById('app');

  // SPI / CPI 评判
  const spiStatus = d.spi > 1 ? 'status-ahead' : d.spi < 1 ? 'status-behind' : 'status-on-track';
  const spiLabel = d.spi > 1 ? '进度超前' : d.spi < 1 ? '进度落后' : '按计划';
  const cpiStatus = d.cpi > 1 ? 'status-under' : d.cpi < 1 ? 'status-over' : 'status-on-track';
  const cpiLabel = d.cpi > 1 ? '成本节约' : d.cpi < 1 ? '成本超支' : '按预算';

  let html = `<h1>${d.project_name} — 挣值分析报告</h1>
    <div class="subtitle">分析时点：${d.analysis_period} · BAC=${d.bac} · 计划工期=${d.total_plan_duration}天</div>`;

  // 1. 绩效快照
  html += `<h2>一、绩效快照（${d.analysis_period}）</h2>
    <div class="metric-grid">
      <div class="metric-card">
        <div class="metric-label">计划成本 (PV)</div>
        <div class="metric-value">${d.pv.toFixed(2)}</div>
        <div class="metric-note">计划进度 ${d.plan_progress}%</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">挣值 (EV)</div>
        <div class="metric-value">${d.ev.toFixed(2)}</div>
        <div class="metric-note">实际进度 ${d.actual_progress}%</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">实际成本 (AC)</div>
        <div class="metric-value">${d.ac.toFixed(2)}</div>
        <div class="metric-note">实际支出</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">进度偏差 (SV)</div>
        <div class="metric-value ${d.sv >= 0 ? 'positive-text' : 'negative-text'}">${d.sv >= 0 ? '+' : ''}${d.sv.toFixed(2)}</div>
        <div class="metric-note">${badge(spiStatus, spiLabel)}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">进度绩效 (SPI)</div>
        <div class="metric-value ${d.spi >= 1 ? 'positive-text' : 'negative-text'}">${d.spi.toFixed(4)}</div>
        <div class="metric-note">${d.spi >= 1 ? '效率达标' : '效率不足'}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">成本偏差 (CV)</div>
        <div class="metric-value ${d.cv >= 0 ? 'positive-text' : 'negative-text'}">${d.cv >= 0 ? '+' : ''}${d.cv.toFixed(2)}</div>
        <div class="metric-note">${badge(cpiStatus, cpiLabel)}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">成本绩效 (CPI)</div>
        <div class="metric-value ${d.cpi >= 1 ? 'positive-text' : 'negative-text'}">${d.cpi.toFixed(4)}</div>
        <div class="metric-note">${d.cpi >= 1 ? '效率达标' : '效率不足'}</div>
      </div>
    </div>`;

  // 2. 各阶段明细表
  if (d.phases && d.phases.length > 0) {
    html += `<h2>二、各阶段明细</h2>
      <table>
        <thead><tr><th>阶段</th><th>天数</th><th>计划进度</th><th>实际进度</th><th>PV</th><th>EV</th><th>AC</th></tr></thead>
        <tbody>`;
    for (const p of d.phases) {
      const evDisplay = p.ev !== undefined ? p.ev.toFixed(2) : '-';
      const acDisplay = p.ac !== undefined ? p.ac.toFixed(2) : '-';
      const progPlan = p.plan_progress !== undefined ? p.plan_progress + '%' : '-';
      const progActual = p.actual_progress !== undefined ? p.actual_progress + '%' : '-';
      html += `<tr><td>${p.phase_name}</td><td>${p.cumulative_days}</td><td>${progPlan}</td><td>${progActual}</td><td>${p.pv.toFixed(2)}</td><td>${evDisplay}</td><td>${acDisplay}</td></tr>`;
    }
    html += `</tbody></table>`;
  }

  // 3. 完工预测
  html += `<h2>三、完工预测</h2>
    <table>
      <thead><tr><th>指标</th><th>不修正（按当前绩效）</th><th>修正（按计划）</th><th>说明</th></tr></thead>
      <tbody>
        <tr><td>EAC</td><td>${d.eac_uncorrected.toFixed(2)}</td><td>${d.eac_corrected.toFixed(2)}</td><td>完工估算</td></tr>
        <tr><td>ETC</td><td>${d.etc_uncorrected.toFixed(2)}</td><td>${d.etc_corrected.toFixed(2)}</td><td>剩余成本估算</td></tr>
        <tr><td>VAC</td><td class="${d.vac_uncorrected >= 0 ? 'positive-text' : 'negative-text'}">${d.vac_uncorrected.toFixed(2)}</td><td class="${d.vac_corrected >= 0 ? 'positive-text' : 'negative-text'}">${d.vac_corrected.toFixed(2)}</td><td>预算偏差（>0节约）</td></tr>
      </tbody>
    </table>`;

  // 4. SPI/CPI 双轴图
  if (d.phases && d.phases.length > 1) {
    html += `<h2>四、SPI/CPI 趋势</h2>
      <div class="chart-wrapper"><canvas id="evmChart"></canvas></div>`;
  }

  // 5. 分析结论
  html += `<h2>五、分析结论</h2><div id="evmConclusions"></div>`;
  app.innerHTML = html;

  // 结论
  const conclusions = document.getElementById('evmConclusions');
  const items = [];

  if (d.sv > 0) items.push({type:'positive', text:`<strong>进度评估：</strong>SV=${d.sv.toFixed(2)}>0，SPI=${d.spi.toFixed(4)}>1，进度超前于计划，效率良好。`});
  else if (d.sv < 0) items.push({type:'warning', text:`<strong>进度评估：</strong>SV=${d.sv.toFixed(2)}<0，SPI=${d.spi.toFixed(4)}<1，进度落后于计划，需加快节奏。`});
  else items.push({type:'positive', text:`<strong>进度评估：</strong>SV≈0，SPI≈1，进度与计划基本一致。`});

  if (d.cv > 0) items.push({type:'positive', text:`<strong>成本评估：</strong>CV=${d.cv.toFixed(2)}>0，CPI=${d.cpi.toFixed(4)}>1，成本节约，效率良好。`});
  else if (d.cv < 0) items.push({type:'danger', text:`<strong>成本评估：</strong>CV=${d.cv.toFixed(2)}<0，CPI=${d.cpi.toFixed(4)}<1，成本超支，需控制支出。`});
  else items.push({type:'positive', text:`<strong>成本评估：</strong>CV≈0，CPI≈1，成本与预算基本一致。`});

  const vacU = d.vac_uncorrected;
  if (vacU > 0) items.push({type:'positive', text:`<strong>完工预测（不修正）：</strong>EAC=${d.eac_uncorrected.toFixed(2)}<BAC=${d.bac.toFixed(2)}，VAC=${vacU.toFixed(2)}>0，按当前绩效可节约成本。`});
  else if (vacU < 0) items.push({type:'warning', text:`<strong>完工预测（不修正）：</strong>EAC=${d.eac_uncorrected.toFixed(2)}>BAC=${d.bac.toFixed(2)}，VAC=${vacU.toFixed(2)}<0，按当前绩效将超支。建议采取措施纠偏。`});
  else items.push({type:'positive', text:`<strong>完工预测（不修正）：</strong>EAC≈BAC，按当前绩效可基本按预算完成。`});

  const vacC = d.vac_corrected;
  if (vacC > 0) items.push({type:'positive', text:`<strong>完工预测（修正）：</strong>EAC=${d.eac_corrected.toFixed(2)}<BAC=${d.bac.toFixed(2)}，VAC=${vacC.toFixed(2)}>0，后续按计划执行可节约成本。`});
  else if (vacC < 0) items.push({type:'warning', text:`<strong>完工预测（修正）：</strong>EAC=${d.eac_corrected.toFixed(2)}>BAC=${d.bac.toFixed(2)}，后续按计划执行仍将超支。`});
  else items.push({type:'positive', text:`<strong>完工预测（修正）：</strong>EAC≈BAC，后续按计划执行可按预算完成。`});

  conclusions.innerHTML = items.map(a => `<div class="analysis-item ${a.type}"><span class="analysis-icon">${a.type==='positive'?'&#x2705;':a.type==='warning'?'&#x26A0;&#xFE0F;':'&#x274C;'}</span>${a.text}</div>`).join('');

  // SPI/CPI 趋势图
  if (d.phases && d.phases.length > 1) {
    const ctx = document.getElementById('evmChart').getContext('2d');
    const labels = d.phases.map(p => p.phase_name);
    // 每阶段的 SPI/CPI
    const spis = [], cpis = [];
    for (let i = 0; i < d.phases.length; i++) {
      const p = d.phases[i];
      const thisPv = p.pv;
      const thisEv = p.ev !== undefined ? p.ev : 0;
      const thisAc = p.ac !== undefined ? p.ac : 0;
      spis.push(thisPv > 0 ? +(thisEv / thisPv).toFixed(4) : 1);
      cpis.push(thisAc > 0 ? +(thisEv / thisAc).toFixed(4) : 1);
    }
    new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [
          { label: 'SPI', data: spis, borderColor: '#534AB7', backgroundColor: 'rgba(83,74,183,0.1)', fill: false, tension: 0.3, pointRadius: 5 },
          { label: 'CPI', data: cpis, borderColor: '#1D9E75', backgroundColor: 'rgba(29,158,117,0.1)', fill: false, tension: 0.3, pointRadius: 5 },
        ]
      },
      options: {
        responsive: true,
        plugins: {
          title: { display: true, text: '各阶段 SPI/CPI 趋势', font: { size: 14 } },
          legend: { display: true },
        },
        scales: {
          y: { min: 0.5, max: 1.5, title: { display: true, text: '绩效指数' } },
          x: { title: { display: true, text: '阶段' } }
        }
      }
    });
  }
}
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
