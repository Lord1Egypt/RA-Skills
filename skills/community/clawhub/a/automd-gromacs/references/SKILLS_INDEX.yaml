        cp2k:
          pros: GROMACS内置支持、开源、GPU加速
          cons: 编译复杂、文档较少
          use_case: 推荐用于生产模拟
        orca:
          pros: 功能丰富、易用、文档完善
          cons: 外部接口、性能较低
          use_case: 方法开发和测试
      qm_region_guidelines:
      - 包含反应中心、配体、关键残基
      - 避免切断共价键 (使用Link atom)
      - 'QM区域大小: 30-100原子 (平衡精度和效率)'
      - 边界距离活性位点 > 0.5 nm
      - 检查电荷和多重度
      performance_tips:
      - 减小QM区域 (只包含关键原子)
      - 使用GPU加速MM部分
      - 并行化QM计算 (QM_NPROC)
      - 使用更快的泛函 (PBE > B3LYP)
      - 使用更小的基组 (DZVP > TZVP)
      - 时间步长 0.5-1 fs (平衡稳定性和速度)
  scattering_analysis:
    name: 散射分析
    description: SAXS/SANS/Experiment Comparison - gmx saxs/gmx sans + q-range、对比因子、Guinier/Kratky 与实验对照摘要
    script: scripts/analysis/scattering-analysis.sh
    troubleshoot: references/troubleshoot/scattering-analysis-errors.md
    quick_ref:
      dependencies:
      - gmx (SAXS/SANS 计算可选)
      - python3
      - matplotlib (可选)
      auto_install: false
      auto_fix:
      - curve_normalization
      - q_overlap_check
      - unit_hint_for_1A_to_1nm
      - guinier_window_screening
      - graceful_plot_fallback
      key_params:
      - 'mode: saxs/sans/compare/interpret/report/all'
      - 'group: System (默认) / Protein / 自定义索引组'
      - 'curve: 已有模拟曲线文件 (q I [err])'
      - 'exp: 实验曲线文件 (q I [err])'
      - 'sans: 已有 SANS/scattering 曲线文件'
      - 'qmin/qmax: q 范围建议；实验对照时优先使用公共区间'
      - 'qpoints: 200 (生成 q 网格点数)'
      - 'contrast: SANS 对比因子记录/报告字段'
      - 'buffer_density: 缓冲液密度提示字段'
      - 'skip/begin/end: 轨迹抽帧与时间窗口'
      common_errors:
      - 'ERROR-001: gmx 不可用 → 安装 GROMACS 或改用 --curve/--sans 导入'
      - 'ERROR-002: sans/scattering 命令缺失 → 使用现有 SANS 数据文件导入'
      - 'ERROR-003: 缺少模拟曲线 → 提供 --curve 或先运行计算'
      - 'ERROR-004: 缺少实验曲线 → 提供 --exp'
      - 'ERROR-005: 没有可解释曲线 → 提供 --curve/--exp/--sans'
      - q overlap insufficient → 对齐单位并限制到公共 q 区间
      - Guinier 异常 → 检查低 q 聚集/单位/背景扣除
      - 无图输出 → 安装 matplotlib，文本报告仍可用
      output:
      - curves/*.dat
      - compare/curve_comparison.tsv
      - compare/deviation_summary.txt
      - interpret/guinier_summary.txt
      - interpret/kratky_summary.txt
      - figures/scattering_plot.png
      - export/scattering_export.tsv
      - export/scattering_export.json
      - SCATTERING_REPORT.md
      experiment_compare_guidance:
      - '低 q 偏差主导: 优先检查整体尺寸、聚集、浓度效应、溶剂扣除'
      - '高 q 偏差主导: 优先检查局部堆积、水化层、力场和 form factor'
      - SANS 解读必须同时记录 D2O/H2O 比例、同位素标记和 contrast
      - 若实验 q 单位为 1/A，比较前先转换到 1/nm (乘以 10)
      interpretation_rules:
        guinier:
          rule: 仅在 qRg < 1.3 时可靠
          output: Rg、I(0)、拟合窗口、R^2
        kratky:
          folded_hint: 峰接近 qRg=sqrt(3), 高度约 3 → 紧凑球状
          flexible_hint: 高 q 尾部偏高/变宽 → 柔性、无序或异质性增加
      downstream_export:
        publication_viz: 提供 curves/*.dat 或 export/scattering_export.tsv
        automd_viz: automd-viz --type data --input scattering-analysis/export/ --style nature
