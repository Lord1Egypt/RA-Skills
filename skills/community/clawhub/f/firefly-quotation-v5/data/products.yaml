# ===== 定价规则 =====
pricing_rules:
  # 折扣规则
  discount_tiers:
    - min_total: 0      # 万元
      max_total: 10
      discount_pct: 0     # 无折扣
    - min_total: 10
      max_total: 30
      discount_pct: 3     # 3%
    - min_total: 30
      max_total: 50
      discount_pct: 5     # 5%
    - min_total: 50
      max_total: 100
      discount_pct: 8     # 8%
    - min_total: 100
      max_total: 9999
      discount_pct: 10    # 10%

  # 运费估算
  freight:
    base_fee_wan: 0.15                       # 基础运费（万元）
    per_km_rate_wan: 0.0005                  # 每公里（万元）
    included_km: 200                          # 包邮里程
    note: "200公里内免运费，超出按 5元/公里 计费，偏远地区另议"

  # 税费
  tax:
    vat_rate: 0.13                            # 增值税 13%
    include_vat_default: true                 # 默认含税报价

  # 安装调试
  installation:
    rate_pct: 3                               # 安装调试费 = 设备总价 × 3%
    min_fee_wan: 0.15                         # 最低 1500 元
    note: "标准安装含：设备就位、管道连接、电气接线、调试运行"

  # 质保延期
  warranty_extension:
    per_year_wan: 0.30                        # 每延保一年 3000 元
    max_years: 5

  # 备品备件包
  spare_parts_kit:
    price_wan: 0.18                           # 标准备件包
    contents: [空滤芯×2, 油滤芯×2, 油分芯×1, 润滑油 20L]
