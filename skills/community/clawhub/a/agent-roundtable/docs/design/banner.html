<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>roundtable-ai — Banner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px;
    height: 640px;
    overflow: hidden;
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
  }
  .container {
    width: 1280px;
    height: 640px;
    background: #1a1b26;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  /* Subtle grid pattern */
  .container::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle at 1px 1px, rgba(122,162,247,0.04) 1px, transparent 0);
    background-size: 40px 40px;
  }
  /* Gradient glow */
  .glow {
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(122,162,247,0.15) 0%, rgba(187,154,247,0.08) 40%, transparent 70%);
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
  }
  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    text-align: center;
    padding: 0 80px;
  }
  /* Logo area */
  .logo-wrap svg {
    width: 200px;
    height: 200px;
    filter: drop-shadow(0 0 40px rgba(122,162,247,0.3));
  }
  .project-name {
    font-size: 72px;
    font-weight: 800;
    letter-spacing: -2px;
    background: linear-gradient(135deg, #7aa2f7 0%, #bb9af7 50%, #7dcfff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
  }
  .tagline {
    font-size: 24px;
    color: #a9b1d6;
    line-height: 1.5;
    font-weight: 400;
    max-width: 600px;
  }
  .tagline em {
    font-style: normal;
    color: #7dcfff;
  }
  .badges {
    display: flex;
    gap: 12px;
    margin-top: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 500;
    border: 1px solid rgba(122,162,247,0.2);
    color: #7aa2f7;
    background: rgba(122,162,247,0.06);
  }
  .badge.green { color: #9ece6a; border-color: rgba(158,206,106,0.2); background: rgba(158,206,106,0.06); }
  .badge.purple { color: #bb9af7; border-color: rgba(187,154,247,0.2); background: rgba(187,154,247,0.06); }
  .badge.cyan { color: #7dcfff; border-color: rgba(125,207,255,0.2); background: rgba(125,207,255,0.06); }
  .version {
    color: #565f89;
    font-size: 14px;
    margin-top: 8px;
  }
  /* Corner accents */
  .corner {
    position: absolute;
    width: 60px;
    height: 60px;
    border-color: rgba(122,162,247,0.15);
    border-style: solid;
    border-width: 0;
  }
  .corner.tl { top: 24px; left: 24px; border-top-width: 2px; border-left-width: 2px; border-radius: 4px 0 0 0; }
  .corner.tr { top: 24px; right: 24px; border-top-width: 2px; border-right-width: 2px; border-radius: 0 4px 0 0; }
  .corner.bl { bottom: 24px; left: 24px; border-bottom-width: 2px; border-left-width: 2px; border-radius: 0 0 0 4px; }
  .corner.br { bottom: 24px; right: 24px; border-bottom-width: 2px; border-right-width: 2px; border-radius: 0 0 4px 0; }
</style>
</head>
<body>
<div class="container">
  <div class="glow"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
  <div class="content">
    <div class="logo-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="200" height="200">
        <defs>
          <linearGradient id="tableGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#7aa2f7;stop-opacity:1"/>
            <stop offset="100%" style="stop-color:#bb9af7;stop-opacity:1"/>
          </linearGradient>
          <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="6" result="blur"/>
            <feMerge>
              <feMergeNode in="blur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>
        <circle cx="256" cy="256" r="160" fill="none" stroke="url(#tableGrad)" stroke-width="8" opacity="0.85"/>
        <g opacity="0.3" stroke="#7aa2f7" stroke-width="2.5">
          <line x1="256" y1="96" x2="394" y2="176"/>
          <line x1="394" y1="176" x2="394" y2="336"/>
          <line x1="394" y1="336" x2="256" y2="416"/>
          <line x1="256" y1="416" x2="118" y2="336"/>
          <line x1="118" y1="336" x2="118" y2="176"/>
          <line x1="118" y1="176" x2="256" y2="96"/>
        </g>
        <circle cx="256" cy="96" r="24" fill="#1a1b26" stroke="#7aa2f7" stroke-width="4"/>
        <circle cx="256" cy="96" r="10" fill="#7aa2f7"/>
        <circle cx="394" cy="176" r="24" fill="#1a1b26" stroke="#bb9af7" stroke-width="4"/>
        <circle cx="394" cy="176" r="10" fill="#bb9af7"/>
        <circle cx="394" cy="336" r="24" fill="#1a1b26" stroke="#7dcfff" stroke-width="4"/>
        <circle cx="394" cy="336" r="10" fill="#7dcfff"/>
        <circle cx="256" cy="416" r="24" fill="#1a1b26" stroke="#9ece6a" stroke-width="4"/>
        <circle cx="256" cy="416" r="10" fill="#9ece6a"/>
        <circle cx="118" cy="336" r="24" fill="#1a1b26" stroke="#ff9e64" stroke-width="4"/>
        <circle cx="118" cy="336" r="10" fill="#ff9e64"/>
        <circle cx="118" cy="176" r="24" fill="#1a1b26" stroke="#c0caf5" stroke-width="4"/>
        <circle cx="118" cy="176" r="10" fill="#c0caf5"/>
        <g filter="url(#glow)">
          <rect x="242" y="242" width="28" height="28" rx="5" transform="rotate(45 256 256)" fill="url(#tableGrad)"/>
        </g>
      </svg>
    </div>
    <div class="project-name">roundtable-ai</div>
    <div class="tagline">让多个 AI Agent 坐下来开会讨论<br>自动追踪共识与分歧，<em>智能产出结论</em></div>
    <div class="badges">
      <span class="badge">🪶 Zero Dependencies</span>
      <span class="badge green">📊 Convergence Tracking</span>
      <span class="badge purple">🔌 Framework Agnostic</span>
      <span class="badge cyan">🔔 Real-time Notify</span>
    </div>
    <div class="version">v0.1.0 · MIT License · Hermes Skill Hub</div>
  </div>
</div>
</body>
</html>
