name: personal_card_ocr
version: 1.0.4
description: 将图片中的文字、身份证、银行卡、社保卡、户口本、出生医学证明、往来港澳通行证、往来台湾通行证、台湾居民来往大陆通行证、港澳居民来往内地通行证等信息识别并提取出来。本技能应在用户需要 OCR 识别图片中的文字，或识别身份证、银行卡、社保卡、户口本、出生医学证明、往来港澳通行证、往来台湾通行证、台湾居民来往大陆通行证、港澳居民来往内地通行证,中国香港身份证，外国人永久居留身份证，结婚证，不动产权证书，机动车行驶证正页，机动车行驶证副页，机动车驾驶证正页，机动车驾驶证副页，中国护照，学历证书，学历证书电子注册备案表，学位证书等信息识别并提取出来
author: SCNet
license: MIT
tags:
  - ocr
  - 文字提取

required_env_vars:
  - SCNET_API_KEY

optional_env_vars:
  - SCNET_API_BASE

primary_credential: SCNET_API_KEY

# 增加项目主页，解决 missing homepage 警告
homepage: https://github.com/SCNet-sugon/personal_card_ocr.git  # 请替换为实际仓库地址

dependencies:
  - python3
  - requests