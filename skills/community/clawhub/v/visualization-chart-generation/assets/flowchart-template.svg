<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" width="100%">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- 标题 -->
  <text x="340" y="30" text-anchor="middle" fill="#2C2C2A" font-size="15" font-weight="500" font-family="system-ui, -apple-system, sans-serif">流程图模板</text>

  <!-- 开始节点 -->
  <g>
    <rect x="270" y="50" width="140" height="44" rx="22" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="340" y="72" text-anchor="middle" dominant-baseline="central" fill="#04342C" font-size="13" font-weight="500" font-family="system-ui, -apple-system, sans-serif">开始</text>
  </g>

  <!-- 箭头1 -->
  <line x1="340" y1="94" x2="340" y2="120" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 步骤1节点 -->
  <g>
    <rect x="250" y="120" width="180" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
    <text x="340" y="142" text-anchor="middle" dominant-baseline="central" fill="#042C53" font-size="13" font-weight="500" font-family="system-ui, -apple-system, sans-serif">步骤1</text>
    <text x="340" y="160" text-anchor="middle" dominant-baseline="central" fill="#0C447C" font-size="12" font-family="system-ui, -apple-system, sans-serif">执行操作A</text>
  </g>

  <!-- 箭头2 -->
  <line x1="340" y1="176" x2="340" y2="200" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 条件判断节点 -->
  <g>
    <rect x="270" y="200" width="140" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
    <text x="340" y="222" text-anchor="middle" dominant-baseline="central" fill="#412402" font-size="13" font-weight="500" font-family="system-ui, -apple-system, sans-serif">条件判断？</text>
  </g>

  <!-- 是分支箭头 -->
  <line x1="340" y1="244" x2="340" y2="270" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="350" y="260" fill="#27500A" font-size="12" font-family="system-ui, -apple-system, sans-serif">是</text>

  <!-- 步骤2节点 -->
  <g>
    <rect x="250" y="270" width="180" height="56" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
    <text x="340" y="292" text-anchor="middle" dominant-baseline="central" fill="#173404" font-size="13" font-weight="500" font-family="system-ui, -apple-system, sans-serif">步骤2</text>
    <text x="340" y="310" text-anchor="middle" dominant-baseline="central" fill="#27500A" font-size="12" font-family="system-ui, -apple-system, sans-serif">执行操作B</text>
  </g>

  <!-- 否分支 -->
  <line x1="410" y1="222" x2="500" y2="222" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="450" y="215" fill="#A32D2D" font-size="12" font-family="system-ui, -apple-system, sans-serif">否</text>

  <!-- 步骤3节点 -->
  <g>
    <rect x="500" y="200" width="140" height="44" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
    <text x="570" y="222" text-anchor="middle" dominant-baseline="central" fill="#501313" font-size="13" font-weight="500" font-family="system-ui, -apple-system, sans-serif">步骤3</text>
  </g>

  <!-- 结束节点 -->
  <g>
    <rect x="270" y="340" width="140" height="44" rx="22" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="340" y="362" text-anchor="middle" dominant-baseline="central" fill="#04342C" font-size="13" font-weight="500" font-family="system-ui, -apple-system, sans-serif">结束</text>
  </g>

  <!-- 步骤2到结束的箭头 -->
  <line x1="340" y1="326" x2="340" y2="340" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

</svg>