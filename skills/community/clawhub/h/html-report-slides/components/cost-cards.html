<!-- ============================================
     COMPONENT: Cost Cards (成本概览卡片)
     用途：展示 3~5 个关键成本指标 KPI
     布局：自适应网格，最少 220px 宽
     ============================================ -->
<div class="cost-cards">

  <!-- 指标卡 1 -->
  <div class="cost-card">
    <div class="cost-card-label">__LABEL_1__</div>
    <div class="cost-card-value">__VALUE_1__</div>
    <div class="cost-card-change up">&#9650; __CHANGE_1__</div>
    <!-- up=涨（红色），down=降（绿色） -->
  </div>

  <!-- 指标卡 2 -->
  <div class="cost-card">
    <div class="cost-card-label">__LABEL_2__</div>
    <div class="cost-card-value">__VALUE_2__</div>
    <div class="cost-card-change down">&#9660; __CHANGE_2__</div>
  </div>

  <!-- 指标卡 3 -->
  <div class="cost-card">
    <div class="cost-card-label">__LABEL_3__</div>
    <div class="cost-card-value">__VALUE_3__</div>
    <div class="cost-card-change up">&#9650; __CHANGE_3__</div>
  </div>

  <!-- 按需追加... -->

</div>
