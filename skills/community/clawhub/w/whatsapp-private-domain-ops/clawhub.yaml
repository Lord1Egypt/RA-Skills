name: whatsapp-private-domain-ops
title: WhatsApp全域私域运营策略规划技能（合规适配版）
description: |
  Meta合规框架内的WhatsApp私域运营策略规划工具。
  
  **核心方法论**：三层合规自适应运营策略——根据账号质量评分规划运营强度。
  
  **功能覆盖**：
  - 账号基建与合规底层设计
  - 五层用户标签体系与全生命周期策略
  - 三层合规自适应运营体系（策略层）
  - AI拟人化运营策略建议
  - 数据观察与标准化迭代流程
  - 合规自检清单
  
  **适用场景**：跨境电商、出海营销、SCRM运营
  
  **安全声明**：纯策略规划工具，不连接WhatsApp API，不执行任何消息操作。
