# === 上升星座粗略计算 ===
rising_sign_formula:
  日出(6:00左右): 上升 ≈ 太阳星座
  上午(9:00左右): 上升 = 太阳星座 + 2
  正午(12:00左右): 上升 = 太阳星座 + 4
  下午(15:00): 上升 = 太阳星座 + 6
  傍晚(18:00): 上升 = 太阳星座 + 8
  夜晚(21:00): 上升 = 太阳星座 + 10
  深夜(0:00): 上升 = 太阳星座 + 12
  note: 星座顺序从白羊开始数，精确上升需要出生地点

