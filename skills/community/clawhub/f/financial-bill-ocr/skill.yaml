name: financial_bill_ocr
version: 1.0.0
description: 支持金融单据识别,支持识别多种金融单据，包括银行承兑汇票、电子银行承兑汇票、商业承兑汇票、电子商业承兑汇票、银行支票、银行回单、进账单、电汇凭证、支款凭证、移动支付账单，结构化提取关键信息。
author: SCNet
license: MIT
tags:
  - ocr
  - 文字提取
required_env_vars:
  - SCNET_API_KEY

optional_env_vars:
  - SCNET_API_BASE

primary_credential: SCNET_API_KEY

# 增加项目主页，解决 missing homepage 警告
homepage: https://github.com/SCNet-sugon/financial_bill_ocr.git  # 请替换为实际仓库地址
dependencies:
  - python3
  - requests