<!-- ============================================
     COMPONENT: Decision Cards (关键决策 / 方案对比)
     用途：展示 2~4 个待决策项，每个含 A/B 选项
     布局：2 列 grid，full-width 可跨列
     ============================================ -->
<div class="decisions">

  <!-- 决策卡 1 -->
  <div class="decision-card">
    <div class="decision-icon blue">&#9733;</div>
    <div class="decision-title">__DECISION_1_TITLE__</div>
    <div class="decision-content">
      __DECISION_1_DESC__
      <div class="decision-options">
        <div class="option option-a"><div class="option-dot"></div>方案 A：__OPTION_A__</div>
        <div class="option option-b"><div class="option-dot"></div>方案 B：__OPTION_B__</div>
      </div>
    </div>
  </div>

  <!-- 决策卡 2 -->
  <div class="decision-card">
    <div class="decision-icon purple">&#9881;</div>
    <div class="decision-title">__DECISION_2_TITLE__</div>
    <div class="decision-content">
      __DECISION_2_DESC__
      <div class="decision-options">
        <div class="option option-a"><div class="option-dot"></div>方案 A：__OPTION_A__</div>
        <div class="option option-b"><div class="option-dot"></div>方案 B：__OPTION_B__</div>
      </div>
    </div>
  </div>

  <!-- 决策卡 3（可选，跨列示例） -->
  <div class="decision-card full-width">
    <div class="decision-icon orange">&#9889;</div>
    <div class="decision-title">__DECISION_3_TITLE__</div>
    <div class="decision-content">
      __DECISION_3_DESC__
    </div>
  </div>

</div>
