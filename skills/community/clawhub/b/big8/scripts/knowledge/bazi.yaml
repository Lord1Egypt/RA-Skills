# === 五行喜忌简表 ===
element_profile:
  日干为木:
    身强喜: [火, 土, 金]
    身弱喜: [水, 木]
    忌: [金过旺]
  日干为火:
    身强喜: [土, 金, 水]
    身弱喜: [木, 火]
    忌: [水过旺]
  日干为土:
    身强喜: [金, 水, 木]
    身弱喜: [火, 土]
    忌: [木过旺]
  日干为金:
    身强喜: [水, 木, 火]
    身弱喜: [土, 金]
    忌: [火过旺]
  日干为水:
    身强喜: [木, 火, 土]
    身弱喜: [金, 水]
    忌: [土过旺]

# === 十神关系 ===
ten_gods:
  比肩: 同五行同阴阳 → 兄弟姐妹、朋友、竞争
  劫财: 同五行不同阴阳 → 朋友但会分财
  食神: 我生异阴阳 → 才华、美食、享受
  伤官: 我生同阴阳 → 聪明叛逆、口才好
  正财: 克我异阴阳 → 稳定收入、妻子
  偏财: 克我同阴阳 → 偏财、投资、父亲
  正官: 克我异阴阳 → 事业、地位、丈夫
  七杀: 克我同阴阳 → 压力、魄力、权威
  正印: 生我异阴阳 → 长辈、学业、贵人
  偏印: 生我同阴阳 → 后妈、偏门学问

# === 大运 ===
luck_palace_rules:
  阳男阴女: 顺排大运
  阴男阳女: 逆排大运
  起运年龄: 从出生日到下一个节气天数 ÷ 3
  大运每十年: 一步大运管十年

# === 命格简评 ===
fate_notes:
  伤官配印: 聪明有才华,适合文化艺术
  杀印相生: 有魄力能担当,适合管理
  食神生财: 温和有财运,适合经商
  官印相生: 正直有官运,适合体制内
  比劫夺财: 合作难成,易破财
  财星破印: 为财奔波,学业受阻
