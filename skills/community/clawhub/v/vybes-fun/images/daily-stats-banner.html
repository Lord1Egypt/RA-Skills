<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; }
  .banner {
    width: 1200px;
    height: 675px;
    background: radial-gradient(ellipse at 35% 50%, #1e1040 0%, #140a2e 40%, #0c0620 70%, #08041a 100%);
    position: relative;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
  }

  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(120, 62, 255, 0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(120, 62, 255, 0.04) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  .grid-green {
    position: absolute;
    right: 0;
    top: 0;
    width: 600px;
    height: 100%;
    background-image:
      linear-gradient(rgba(0, 217, 165, 0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 217, 165, 0.06) 1px, transparent 1px);
    background-size: 60px 60px;
    -webkit-mask-image: linear-gradient(90deg, transparent 0%, rgba(0,0,0,0.5) 40%, black 100%);
    mask-image: linear-gradient(90deg, transparent 0%, rgba(0,0,0,0.5) 40%, black 100%);
  }

  .glow-purple {
    position: absolute;
    left: 280px;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 500px;
    background: radial-gradient(ellipse, rgba(120, 62, 255, 0.25) 0%, rgba(90, 40, 200, 0.08) 50%, transparent 70%);
  }

  .glow-green {
    position: absolute;
    right: -80px;
    top: 50%;
    transform: translate(0, -50%);
    width: 650px;
    height: 550px;
    background: radial-gradient(ellipse at 65% 50%, rgba(0, 217, 165, 0.35) 0%, rgba(0, 217, 165, 0.15) 35%, rgba(0, 217, 165, 0.04) 60%, transparent 80%);
  }

  .glow-green-2 {
    position: absolute;
    right: -40px;
    top: -80px;
    width: 400px;
    height: 300px;
    background: radial-gradient(ellipse, rgba(0, 217, 165, 0.2) 0%, rgba(0, 217, 165, 0.05) 50%, transparent 75%);
  }

  .green-ray-1 {
    position: absolute;
    right: -100px;
    top: -80px;
    width: 500px;
    height: 660px;
    background: linear-gradient(160deg, transparent 0%, rgba(0, 217, 165, 0.08) 25%, rgba(0, 217, 165, 0.2) 50%, rgba(0, 217, 165, 0.08) 75%, transparent 100%);
    transform: skewX(-12deg);
  }

  .green-ray-2 {
    position: absolute;
    right: 100px;
    top: -50px;
    width: 180px;
    height: 600px;
    background: linear-gradient(160deg, transparent 0%, rgba(0, 217, 165, 0.05) 30%, rgba(0, 217, 165, 0.14) 50%, rgba(0, 217, 165, 0.05) 70%, transparent 100%);
    transform: skewX(-12deg);
  }

  .scan-line {
    position: absolute;
    right: 0;
    width: 700px;
    height: 1px;
  }
  .scan-line-1 {
    top: 150px;
    background: linear-gradient(90deg, transparent 0%, rgba(0, 217, 165, 0.15) 30%, rgba(0, 217, 165, 0.4) 70%, rgba(0, 217, 165, 0.6) 100%);
  }
  .scan-line-2 {
    top: 350px;
    background: linear-gradient(90deg, transparent 0%, rgba(0, 217, 165, 0.1) 40%, rgba(0, 217, 165, 0.3) 80%, rgba(0, 217, 165, 0.5) 100%);
  }

  .green-accent {
    position: absolute;
    right: 55px;
    top: 50px;
    bottom: 50px;
    width: 2px;
    background: linear-gradient(180deg, transparent 0%, rgba(0, 217, 165, 0.6) 25%, rgba(0, 217, 165, 0.9) 50%, rgba(0, 217, 165, 0.6) 75%, transparent 100%);
    box-shadow: 0 0 8px rgba(0, 217, 165, 0.3);
  }

  .green-accent-2 {
    position: absolute;
    right: 35px;
    top: 80px;
    bottom: 80px;
    width: 1px;
    background: linear-gradient(180deg, transparent 0%, rgba(0, 217, 165, 0.3) 30%, rgba(0, 217, 165, 0.5) 50%, rgba(0, 217, 165, 0.3) 70%, transparent 100%);
  }

  .green-hash {
    position: absolute;
    right: 42px;
    width: 22px;
    height: 1px;
    background: rgba(0, 217, 165, 0.4);
  }

  .corner-bracket-tr {
    position: absolute;
    right: 20px;
    top: 30px;
    width: 30px;
    height: 30px;
    border-top: 2px solid rgba(0, 217, 165, 0.5);
    border-right: 2px solid rgba(0, 217, 165, 0.5);
  }

  .corner-bracket-br {
    position: absolute;
    right: 20px;
    bottom: 30px;
    width: 30px;
    height: 30px;
    border-bottom: 2px solid rgba(0, 217, 165, 0.5);
    border-right: 2px solid rgba(0, 217, 165, 0.5);
  }

  .status-dot {
    position: absolute;
    right: 28px;
    top: 250px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #00D9A5;
    box-shadow: 0 0 12px rgba(0, 217, 165, 0.8), 0 0 24px rgba(0, 217, 165, 0.4);
  }

  /* 3D Green Arrow */
  .arrow-wrap {
    position: absolute;
    left: 50px;
    top: 50%;
    transform: translateY(-50%);
    width: 240px;
    height: 240px;
    filter: drop-shadow(0 0 40px rgba(0, 217, 165, 0.5)) drop-shadow(0 0 80px rgba(0, 217, 165, 0.25));
  }

  .arrow-3d {
    width: 100%;
    height: 100%;
  }

  .text-area {
    position: absolute;
    left: 310px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .accent-line {
    position: absolute;
    left: 310px;
    bottom: 130px;
    width: 500px;
    height: 1px;
    background: linear-gradient(90deg, rgba(120, 62, 255, 0) 0%, rgba(120, 62, 255, 0.5) 20%, rgba(0, 217, 165, 0.5) 70%, rgba(0, 217, 165, 0.8) 100%);
  }

  .url {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 14px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.2);
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  .dot {
    position: absolute;
    border-radius: 50%;
  }
  .dot-1 { left: 100px; top: 80px; width: 4px; height: 4px; background: #00C6FF; opacity: 0.3; box-shadow: 0 0 8px #00C6FF; }
  .dot-2 { left: 300px; top: 420px; width: 3px; height: 3px; background: #783EFF; opacity: 0.4; box-shadow: 0 0 8px #783EFF; }
  .dot-3 { right: 300px; top: 70px; width: 5px; height: 5px; background: #00D9A5; opacity: 0.45; box-shadow: 0 0 12px #00D9A5; }
  .dot-4 { right: 100px; bottom: 90px; width: 5px; height: 5px; background: #00D9A5; opacity: 0.6; box-shadow: 0 0 14px rgba(0, 217, 165, 0.8); }
  .dot-5 { left: 700px; top: 50px; width: 2px; height: 2px; background: #fff; opacity: 0.15; }
  .dot-6 { right: 75px; top: 140px; width: 4px; height: 4px; background: #00D9A5; opacity: 0.5; box-shadow: 0 0 10px #00D9A5; }
  .dot-7 { left: 80px; bottom: 180px; width: 3px; height: 3px; background: #00C6FF; opacity: 0.2; box-shadow: 0 0 6px #00C6FF; }
</style>
</head>
<body>
<div class="banner">
  <div class="grid"></div>
  <div class="grid-green"></div>
  <div class="glow-purple"></div>
  <div class="glow-green"></div>
  <div class="glow-green-2"></div>

  <div class="green-ray-1"></div>
  <div class="green-ray-2"></div>

  <div class="scan-line scan-line-1"></div>
  <div class="scan-line scan-line-2"></div>

  <div class="green-accent"></div>
  <div class="green-accent-2"></div>
  <div class="green-hash" style="top: 110px;"></div>
  <div class="green-hash" style="top: 170px;"></div>
  <div class="green-hash" style="top: 250px;"></div>
  <div class="green-hash" style="top: 330px;"></div>
  <div class="green-hash" style="top: 390px;"></div>

  <div class="corner-bracket-tr"></div>
  <div class="corner-bracket-br"></div>
  <div class="status-dot"></div>

  <div class="dot dot-1"></div>
  <div class="dot dot-2"></div>
  <div class="dot dot-3"></div>
  <div class="dot dot-4"></div>
  <div class="dot dot-5"></div>
  <div class="dot dot-6"></div>
  <div class="dot dot-7"></div>

  <!-- 3D Green Arrow - replaces mascot position -->
  <div class="arrow-wrap">
    <svg class="arrow-3d" viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- 3D arrow gradient - front face -->
        <linearGradient id="arrowFront" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#00FFB8"/>
          <stop offset="50%" stop-color="#00D9A5"/>
          <stop offset="100%" stop-color="#00B88A"/>
        </linearGradient>
        <!-- 3D arrow gradient - right face (darker) -->
        <linearGradient id="arrowSide" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#00B88A"/>
          <stop offset="100%" stop-color="#007A5C"/>
        </linearGradient>
        <!-- 3D arrow gradient - bottom face (darkest) -->
        <linearGradient id="arrowBottom" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#009970"/>
          <stop offset="100%" stop-color="#006648"/>
        </linearGradient>
        <!-- Glow filter -->
        <filter id="arrowGlow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="8" result="blur"/>
          <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
        <!-- Shadow -->
        <filter id="arrowShadow" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="4" dy="8" stdDeviation="12" flood-color="rgba(0,0,0,0.4)"/>
        </filter>
      </defs>

      <!-- Shadow ellipse -->
      <ellipse cx="140" cy="255" rx="60" ry="12" fill="rgba(0,217,165,0.15)" filter="url(#arrowGlow)"/>

      <!-- 3D Arrow pointing UP -->
      <g filter="url(#arrowShadow)">
        <!-- Front face of arrow -->
        <polygon points="140,30 200,130 170,130 170,220 110,220 110,130 80,130" fill="url(#arrowFront)"/>
        <!-- Right face (3D depth) -->
        <polygon points="200,130 215,145 185,145 170,130" fill="url(#arrowSide)"/>
        <polygon points="170,130 185,145 185,235 170,220" fill="url(#arrowSide)"/>
        <!-- Bottom face (3D depth) -->
        <polygon points="110,220 170,220 185,235 125,235" fill="url(#arrowBottom)"/>
        <!-- Top edge highlight -->
        <polygon points="140,30 155,45 200,130 140,30" fill="rgba(255,255,255,0.15)"/>
        <!-- Left face subtle highlight -->
        <polygon points="80,130 140,30 140,45 95,130" fill="rgba(255,255,255,0.08)"/>
      </g>

      <!-- Sparkle effects -->
      <circle cx="140" cy="50" r="3" fill="white" opacity="0.6">
        <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="195" cy="110" r="2" fill="#00FFB8" opacity="0.4">
        <animate attributeName="opacity" values="0.4;0.1;0.4" dur="1.5s" repeatCount="indefinite"/>
      </circle>
    </svg>
  </div>

  <div class="text-area">
    <svg width="540" height="96" viewBox="0 0 540 96" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="statsGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#00D9A5"/>
          <stop offset="40%" stop-color="#00FFB8"/>
          <stop offset="100%" stop-color="white"/>
        </linearGradient>
      </defs>
      <text x="0" y="80" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="92" font-weight="900" letter-spacing="-3" fill="url(#statsGrad)">Daily Stats</text>
    </svg>
    <svg width="620" height="30" viewBox="0 0 620 30" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="tagGrad" x1="0" y1="0" x2="1" y2="0">
          <stop stop-color="#00C6FF"/>
          <stop offset="1" stop-color="#783EFF"/>
        </linearGradient>
      </defs>
      <text x="0" y="22" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="500" letter-spacing="5" fill="url(#tagGrad)">TOKENS. VOLUME. PREDICTIONS.</text>
    </svg>
  </div>

  <!-- Purple glow behind frog -->
  <div style="position: absolute; right: 30px; top: 50%; transform: translateY(-50%); width: 400px; height: 400px; background: radial-gradient(ellipse, rgba(120, 62, 255, 0.3) 0%, rgba(90, 40, 200, 0.12) 40%, transparent 65%); pointer-events: none;"></div>

  <!-- Frog mascot on the right -->
  <div style="position: absolute; right: 80px; top: 50%; transform: translateY(-50%); width: 320px; height: 320px; z-index: 2;">
    <img src="vybes-frog.png" alt="Vybes Frog" style="width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 0 30px rgba(120, 62, 255, 0.5)) brightness(1.1); -webkit-mask-image: radial-gradient(ellipse 55% 55% at 50% 48%, black 45%, transparent 72%); mask-image: radial-gradient(ellipse 55% 55% at 50% 48%, black 45%, transparent 72%);" />
  </div>

  <div class="accent-line"></div>

  <div class="url">vybes.fun</div>
</div>
</body>
</html>
