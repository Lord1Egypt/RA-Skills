# ============================================================
# 调度配置
# ============================================================
scheduling:
  default_strategy: "weighted_least_connections"
  fallback_strategy: "round_robin"
  
  priority_rules:
    P0: "immediate"
    P1: "within_60s"
    P2: "within_300s"
  
  concurrency_limits:
    per_agent_default: 5
    per_domain_default: 20
    cluster_default: 50

  retry_policy:
    max_retries: 3
    backoff_multiplier: 2
    initial_delay_ms: 1000
    max_delay_ms: 30000

  circuit_breaker:
    failure_threshold: 5
    recovery_timeout_seconds: 60
    half_open_max_calls: 3

# ============================================================
# 引擎配置
# ============================================================
engines:
  claude-ma:
    instances: 18
    token_limit: 200000
    concurrent_per_instance: 10
    fallback: "local"
    priority_domains: ["geo", "amazon"]

  local:
    instances: 8
    token_limit: 32000
    concurrent_per_instance: 20
    fallback: "deepseek"
    priority_domains: ["support"]

  deepseek:
    instances: 4
    token_limit: 64000
    concurrent_per_instance: 15
    fallback: "local"
    priority_domains: ["support", "geo"]

