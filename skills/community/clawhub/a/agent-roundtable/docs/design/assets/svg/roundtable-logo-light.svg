<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="tableGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2e7de9;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#9854d1;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="url(#tableGrad)" stroke-width="8" opacity="0.9"/>

  <!-- Connection lines (hexagon) -->
  <g opacity="0.2" stroke="#2e7de9" stroke-width="2.5">
    <line x1="256" y1="96" x2="394" y2="176"/>
    <line x1="394" y1="176" x2="394" y2="336"/>
    <line x1="394" y1="336" x2="256" y2="416"/>
    <line x1="256" y1="416" x2="118" y2="336"/>
    <line x1="118" y1="336" x2="118" y2="176"/>
    <line x1="118" y1="176" x2="256" y2="96"/>
  </g>

  <!-- 6 Agent seats - light background version (white fills, colored strokes) -->
  <circle cx="256" cy="96" r="24" fill="#ffffff" stroke="#2e7de9" stroke-width="4"/>
  <circle cx="256" cy="96" r="10" fill="#2e7de9"/>

  <circle cx="394" cy="176" r="24" fill="#ffffff" stroke="#9854d1" stroke-width="4"/>
  <circle cx="394" cy="176" r="10" fill="#9854d1"/>

  <circle cx="394" cy="336" r="24" fill="#ffffff" stroke="#0986a3" stroke-width="4"/>
  <circle cx="394" cy="336" r="10" fill="#0986a3"/>

  <circle cx="256" cy="416" r="24" fill="#ffffff" stroke="#587539" stroke-width="4"/>
  <circle cx="256" cy="416" r="10" fill="#587539"/>

  <circle cx="118" cy="336" r="24" fill="#ffffff" stroke="#b15c00" stroke-width="4"/>
  <circle cx="118" cy="336" r="10" fill="#b15c00"/>

  <circle cx="118" cy="176" r="24" fill="#ffffff" stroke="#343b58" stroke-width="4"/>
  <circle cx="118" cy="176" r="10" fill="#343b58"/>

  <!-- Central convergence diamond -->
  <g filter="url(#glow)">
    <rect x="242" y="242" width="28" height="28" rx="5" transform="rotate(45 256 256)" fill="url(#tableGrad)"/>
  </g>
</svg>
