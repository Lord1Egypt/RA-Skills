  level2: 历史行情
  level3: 历史行情
  name: A 股历史行情
  ak_function: stock_zh_a_hist
  description: 获取单只 A 股日 / 周 / 月频历史行情，支持前复权、后复权。
  docs_url: https://akshare.akfamily.xyz/data/stock/stock.html#id24
  params:
  - name: symbol
    label: 股票代码
    type: string
    required: true
    default: '000001'
    placeholder: 例如 000001
    description: 不带交易所前缀的六位股票代码。
  - name: period
    label: 周期
    type: select
    required: true
    default: daily
    options:
    - daily
    - weekly
    - monthly
  - name: start_date
    label: 开始日期
    type: date
    required: true
    default: '2024-01-01'
  - name: end_date
    label: 结束日期
    type: date
    required: true
    default: '2024-12-31'
  - name: adjust
    label: 复权
    type: select
    required: false
    default: ''
    options:
    - ''
    - qfq
    - hfq
  source: eastmoney
  source_name: 东方财富
  update_frequency: daily
