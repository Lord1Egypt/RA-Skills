[agreement]
contract_id = ADSA-2026-0142
agreement_date = 2026-05-18
effective_date = 2026-05-25
project_name = Customer Support Email Triage Agent (Pilot)
services_summary = Design, build, evaluate, and document a bounded agentic email-triage workflow that classifies inbound customer support email, drafts suggested replies, and routes each case to the correct queue, with human approval required before any customer-facing send.
fee_type = Fixed fee
fee_amount = USD 28,000
deposit = USD 8,400 due at signing
delivery_schedule = Discovery: 1 week; Prototype: 3 weeks; Evaluation: 2 weeks; Documentation and handoff: 1 week; buffer: 1 week.
term = Initial pilot term of eight (8) weeks, followed by month-to-month support only if ordered in writing.

[agentic_development]
system_description = Multi-step support-email triage agent: intake classification, reply drafting with retrieval over approved help-center content, queue routing, logging, and a mandatory human approval gate before any outbound customer reply.
autonomy_level = Bounded autonomy: the agent classifies, drafts, and routes, but a support agent must approve or edit every customer-facing reply before it is sent.
human_in_loop = Required before any customer-facing send, queue escalation to a human specialist, refund or credit suggestion, and any change to production routing rules.
model_or_stack = Configurable hosted LLM API plus a retrieval index over Northwind's approved help-center articles; specific model identifiers fixed in the statement of work.
deployment_environment = Northwind-controlled sandbox mailbox and staging helpdesk until acceptance; production rollout only by written change order.
evaluation_plan = Labeled triage test set, reply-quality rubric, prompt-injection checks on inbound email, routing-accuracy regression suite, and an acceptance demonstration on held-out cases.
monitoring_plan = Run logs, misclassification register, approval-override tracking, and recommended post-launch accuracy and escalation dashboards.
