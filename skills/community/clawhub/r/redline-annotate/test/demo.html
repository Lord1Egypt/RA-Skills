<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>AcmeAI - 智能助手</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, sans-serif;
      color: #1f2937;
      line-height: 1.6;
    }
    .hero {
      padding: 80px 24px;
      text-align: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }
    .hero h1 {
      font-size: 60px;
      margin-bottom: 16px;
    }
    .hero p {
      font-size: 18px;
      margin-bottom: 32px;
      opacity: 0.9;
    }
    .cta {
      display: inline-block;
      padding: 12px 32px;
      background: #f97316;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 4px 12px rgba(249, 115, 22, 0.35);
    }
    .features {
      max-width: 960px;
      margin: 64px auto;
      padding: 0 24px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 32px;
    }
    .feature {
      padding: 24px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
    }
    .feature h3 {
      font-size: 18px;
      margin-bottom: 8px;
    }
    .feature p {
      color: #6b7280;
      font-size: 14px;
    }
    footer {
      text-align: center;
      padding: 32px;
      color: #9ca3af;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <section class="hero">
    <h1>AcmeAI</h1>
    <p>让 AI 帮你完成任何工作</p>
    <button class="cta">立即体验</button>
  </section>

  <section class="features">
    <div class="feature">
      <h3>挺好</h3>
      <p style="color: #eab308;">毫秒级响应，不再等待。</p>
    </div>
    <div class="feature">
      <h3>智能</h3>
      <p style="color: #16a34a;">基于 Claude 4.7，理解上下文与意图。</p>
    </div>
    <div class="feature">
      <h3>安全</h3>
      <p>数据加密传输，本地处理优先。</p>
    </div>
  </section>

  <footer>
    © 2026 AcmeAI Inc.
  </footer>
</body>
</html>
