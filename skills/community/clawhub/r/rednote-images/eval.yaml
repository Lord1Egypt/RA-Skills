version: "1"
defaults:
  trials: 3
  timeout: 300
  threshold: 0.8

trigger_tests:
  - id: explicit-rednote-images
    should_trigger: true
    prompt: "Use the rednote-images skill to build a RedNote card series."
  - id: implicit-rednote-images
    should_trigger: true
    prompt: "Turn this topic into a 5-card RedNote image set with a cover card and summary card."
  - id: negative-control-single-cover
    should_trigger: false
    prompt: "Make one single article cover image for this blog post."

outcome_tests:
  - id: file-structure
    type: deterministic
    checks:
      - file_exists: "SKILL.md"
      - file_exists: "package.json"
      - file_exists: "scripts/scaffold.ts"
      - file_exists: "scripts/build-prompts.ts"
      - file_exists: "scripts/build-batch.ts"
