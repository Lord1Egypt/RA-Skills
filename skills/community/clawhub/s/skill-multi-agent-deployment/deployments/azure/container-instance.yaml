# Azure Container Instances Configuration
# Generated by deploy_script.sh --platform azure
# Deploy: az container create --resource-group openclaw --file ./container-instance.yaml

apiVersion: 2018-10-01
location: eastus
name: openclaw-multi-agent
properties:
  containers:
  - name: openclaw-gateway
    properties:
      image: openclaw/gateway:latest
      environmentVariables:
      - name: OPENCLAW_AGENTS
        value: "coordinator,research,builder,auditor,personal"
      ports:
      - port: 8080
        protocol: TCP
      resources:
        requests:
          cpu: 1.0
          memoryInGB: 1.0
  ipAddress:
    type: Public
    ports:
    - protocol: tcp
      port: 8080
  osType: Linux
tags:
  project: openclaw-multi-agent
type: Microsoft.ContainerInstance/containerGroups