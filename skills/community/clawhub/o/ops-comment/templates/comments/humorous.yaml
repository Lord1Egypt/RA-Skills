# 评论模板 - 幽默风趣风格
# 带点小幽默和自嘲，拉近距离

style: humorous
description: "幽默自嘲型评论，适合轻松话题"

templates:
  # 自嘲类
  self_deprecating:
    - "看完默默打开了交易软件"
    - "每次看到这种分析都觉得自己还有救"
    - "已收藏 等我赚钱了再来感谢"
    - "先收藏为敬 能不能学会另说"
    - "存了 虽然我知道大概率不会再看"
    - "看完感觉自己之前都在瞎搞"

  # 夸张赞美类
  exaggerated_praise:
    - "这种好内容不应该这么少赞"
    - "看一遍不够 再看一遍"
    - "免费看到这种质量的内容 赚了"
    - "这要是收费课我也愿意听"
    - "小红书就应该多点这样的内容"

  # 调侃生活类
  life_humor:
    - "深夜看到这个 明天又要激情下单了"
    - "钱包已经在瑟瑟发抖了"
    - "分享给朋友 让他也清醒一下"
    - "看完想辞职全职搞这个（不是"
    - "这不收藏还是人吗"

  # 互动邀请类
  engagement:
    - "坐等下一篇 不更新我就天天来催"
    - "这系列能出到第 100 集吗"
    - "更新频率能不能再高一点"

emoji_pool:
  - "😂"
  - "🤣"
  - "😭"
  - "🙈"
  - "💀"
  - "🫡"
  - "🔥"
  - "👏"
