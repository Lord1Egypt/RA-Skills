<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="#F4A460"/>

  <!-- Face base -->
  <ellipse cx="100" cy="110" rx="75" ry="70" fill="#FFDAB9"/>

  <!-- Ears -->
  <ellipse cx="45" cy="50" rx="25" ry="35" fill="#DAA520" transform="rotate(-20 45 50)"/>
  <ellipse cx="155" cy="50" rx="25" ry="35" fill="#DAA520" transform="rotate(20 155 50)"/>
  <ellipse cx="45" cy="55" rx="15" ry="22" fill="#FFDAB9" transform="rotate(-20 45 55)"/>
  <ellipse cx="155" cy="55" rx="15" ry="22" fill="#FFDAB9" transform="rotate(20 155 55)"/>

  <!-- Forehead marking -->
  <path d="M100 40 L85 75 L100 70 L115 75 Z" fill="#DAA520"/>

  <!-- Eyes -->
  <ellipse cx="70" cy="95" rx="12" ry="14" fill="#2C1810"/>
  <ellipse cx="130" cy="95" rx="12" ry="14" fill="#2C1810"/>
  <circle cx="73" cy="92" r="4" fill="white"/>
  <circle cx="133" cy="92" r="4" fill="white"/>

  <!-- Eyebrows -->
  <path d="M55 78 Q70 72 85 78" stroke="#8B4513" stroke-width="3" fill="none"/>
  <path d="M115 78 Q130 72 145 78" stroke="#8B4513" stroke-width="3" fill="none"/>

  <!-- Snout -->
  <ellipse cx="100" cy="130" rx="35" ry="25" fill="#FFF8DC"/>

  <!-- Nose -->
  <ellipse cx="100" cy="125" rx="12" ry="10" fill="#2C1810"/>
  <ellipse cx="98" cy="122" rx="4" ry="3" fill="#4A3728"/>

  <!-- Mouth -->
  <path d="M100 135 L100 145" stroke="#2C1810" stroke-width="2"/>
  <path d="M85 148 Q100 158 115 148" stroke="#2C1810" stroke-width="2" fill="none"/>

  <!-- Tongue -->
  <ellipse cx="100" cy="158" rx="8" ry="10" fill="#FF6B6B"/>

  <!-- Cheek markings -->
  <ellipse cx="50" cy="120" rx="10" ry="8" fill="#FFB6C1" opacity="0.5"/>
  <ellipse cx="150" cy="120" rx="10" ry="8" fill="#FFB6C1" opacity="0.5"/>

  <!-- Whisker dots -->
  <circle cx="65" cy="135" r="2" fill="#8B4513"/>
  <circle cx="55" cy="140" r="2" fill="#8B4513"/>
  <circle cx="135" cy="135" r="2" fill="#8B4513"/>
  <circle cx="145" cy="140" r="2" fill="#8B4513"/>
</svg>
