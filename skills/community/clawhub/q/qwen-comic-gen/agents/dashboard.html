<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent 工作看板</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            margin: 0;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .agent-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }
        
        .agent-card:hover {
            transform: translateY(-5px);
        }
        
        .agent-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .agent-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-right: 15px;
        }
        
        .health { background: #4CAF50; }
        .parenting { background: #FF9800; }
        .startup { background: #2196F3; }
        .investment { background: #9C27B0; }
        
        .agent-name {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
        }
        
        .agent-desc {
            color: #666;
            font-size: 0.9em;
            margin-top: 5px;
        }
        
        .task-list {
            list-style: none;
            padding: 0;
            margin: 15px 0;
        }
        
        .task-item {
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
        }
        
        .task-item:last-child {
            border-bottom: none;
        }
        
        .task-checkbox {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            border: 2px solid #ddd;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: white;
        }
        
        .task-checkbox.completed {
            background: #4CAF50;
            border-color: #4CAF50;
        }
        
        .task-checkbox.pending {
            background: #f0f0f0;
        }
        
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid #f0f0f0;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4CAF50;
        }
        
        .status-text {
            font-size: 0.9em;
            color: #666;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #f0f0f0;
            border-radius: 4px;
            margin-top: 10px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            border-radius: 4px;
            transition: width 0.3s ease;
        }
        
        .refresh-btn {
            display: block;
            margin: 20px auto;
            padding: 12px 30px;
            background: white;
            color: #667eea;
            border: none;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .refresh-btn:hover {
            background: #f0f0f0;
            transform: scale(1.05);
        }
        
        .last-updated {
            text-align: center;
            color: white;
            margin-top: 20px;
            font-size: 0.9em;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Agent 工作看板</h1>
        
        <div class="agents-grid" id="agentsGrid">
            <!-- Agent 卡片将通过 JavaScript 动态生成 -->
        </div>
        
        <button class="refresh-btn" onclick="refreshDashboard()">🔄 刷新看板</button>
        
        <p class="last-updated" id="lastUpdated">最后更新：刚刚</p>
    </div>
    
    <script>
        // Agent 数据
        const agents = [
            {
                id: 'health_advisor',
                name: '健康顾问',
                icon: '🏃',
                color: 'health',
                desc: '负责健康、运动、饮食、体检提醒',
                tasks: [
                    { name: '检查用户健康状态', completed: false },
                    { name: '提醒运动计划', completed: false },
                    { name: '饮食建议', completed: false },
                    { name: '体检提醒（如有）', completed: false }
                ]
            },
            {
                id: 'parenting_advisor',
                name: '育儿顾问',
                icon: '👶',
                color: 'parenting',
                desc: '负责育儿、教育、家庭活动、成长记录',
                tasks: [
                    { name: '检查孩子学习进度', completed: false },
                    { name: '安排今日活动', completed: false },
                    { name: '教育建议', completed: false },
                    { name: '家庭互动提醒', completed: false }
                ]
            },
            {
                id: 'startup_advisor',
                name: '创业顾问',
                icon: '🚀',
                color: 'startup',
                desc: '负责创业、流量、AI 咨询、内容创作',
                tasks: [
                    { name: '浏览器自动化学习', completed: false },
                    { name: '子代理进阶使用', completed: false },
                    { name: 'D-ID 数字人测试', completed: false },
                    { name: '写流量号脚本', completed: false }
                ]
            },
            {
                id: 'investment_advisor',
                name: '投资顾问',
                icon: '📈',
                color: 'investment',
                desc: '负责投资、理财、财务规划、风险评估',
                tasks: [
                    { name: '检查投资组合', completed: false },
                    { name: '市场分析', completed: false },
                    { name: '风险评估', completed: false },
                    { name: '财务规划建议', completed: false }
                ]
            }
        ];
        
        function renderAgents() {
            const grid = document.getElementById('agentsGrid');
            grid.innerHTML = '';
            
            agents.forEach(agent => {
                const completedTasks = agent.tasks.filter(t => t.completed).length;
                const progress = (completedTasks / agent.tasks.length) * 100;
                
                const card = document.createElement('div');
                card.className = 'agent-card';
                card.innerHTML = `
                    <div class="agent-header">
                        <div class="agent-icon ${agent.color}">${agent.icon}</div>
                        <div>
                            <div class="agent-name">${agent.name}</div>
                            <div class="agent-desc">${agent.desc}</div>
                        </div>
                    </div>
                    
                    <ul class="task-list">
                        ${agent.tasks.map(task => `
                            <li class="task-item">
                                <div class="task-checkbox ${task.completed ? 'completed' : 'pending'}">
                                    ${task.completed ? '✓' : ''}
                                </div>
                                <span>${task.name}</span>
                            </li>
                        `).join('')}
                    </ul>
                    
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${progress}%"></div>
                    </div>
                    
                    <div class="status-bar">
                        <div class="status-indicator">
                            <div class="status-dot"></div>
                            <span class="status-text">${completedTasks}/${agent.tasks.length} 任务完成</span>
                        </div>
                        <span class="status-text">${Math.round(progress)}%</span>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }
        
        function refreshDashboard() {
            // 这里可以添加从服务器或文件读取最新数据的逻辑
            renderAgents();
            
            const now = new Date();
            document.getElementById('lastUpdated').textContent = 
                `最后更新：${now.toLocaleTimeString('zh-CN')}`;
        }
        
        // 初始化
        renderAgents();
        
        // 每 30 秒自动刷新
        setInterval(refreshDashboard, 30000);
    </script>
</body>
</html>
