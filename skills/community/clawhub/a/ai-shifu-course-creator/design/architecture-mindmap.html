# Course Creator

Convert raw course material into runnable, optimized Teaching Prompts (per-lesson) and a Course Prompt (course-level), then deploy them as a live AI-Shifu course. Both prompt artifacts are written in MarkdownFlow.

Two modes apply uniformly across all phases (Segmentation / Orchestration / Generation / Optimization):

- **Standard mode** (default): Input quality is sufficient; run phases in full with standard schemas.
- **Fallback mode**: When input is incomplete, conflicting, or low-quality — produce coarse outputs, mark uncertainty explicitly, and provide focused rerun hints. Output schemas extend with phase-specific fallback fields per `references/data-contracts.md#fallback-output-extensions`.

Each phase has its own fallback shape — see `examples/fallback-mode.md` for the four phase scenarios.

## Authoring Control Inputs

Use these optional controls across all phases:

- `course_profile` (json): audience and pedagogical parameters.
- `delivery_constraints` (json): platform limits, topic policy, and non-negotiable fragments.
- `target_language` (BCP-47 string, e.g. `zh-CN` / `en-US` / `fr-FR`): explicit output language; takes priority over prompt-language detection. Full priority order in `references/data-contracts.md#language-resolution`.

Field-level schemas with example JSON in `references/data-contracts.md#recommended-object-shapes`.

## Authoring Leakage Rules

Keep author-side scaffolding out of Teaching Prompt and Course Prompt outputs:

- Avoid author-side meta labels such as “Knowledge Block 1/2/3”, “Lesson Objective”, or “Deliverable”. Keep those as implicit structure, not visible narration.
- Authoring rules, pipeline notes, and process instructions stay in skill docs and references, not in lesson outputs.
- Internal design notes may appear only in HTML comments when needed.

## Teaching Prompt and Course Prompt Authoring Hard Rules (Must Follow)

These are the five red-line rules every Teaching Prompt and Course Prompt must satisfy. Full Bad/Good examples and rationale live in the references files; the rule statements stay here so the model never misses them.

1. **Script style: directive, not manuscript.** Write in imperative, model-guiding language ("Ask the learner to …", "After collecting {{var}}, branch …"). Do not produce polished learner-facing prose or author/lesson-plan meta narration. See `references/pedagogy.md#script-style`.

2. **Interaction syntax: prompt outside, options inside.** Keep the learner-facing question on the line **before** the interaction; put only option labels or a short `...` input placeholder inside `?[%{{var}} ...]`. Each `?[]` is on its own line. See `references/markdownflow.md#interactions` for full Bad/Good examples and the `...` input-marker rules.

3. **Mandatory anchoring + downstream effect.** After every interaction, restate the learner's selection as an instruction (`Restate the learner's current choice as {{var}}.`) and use `{{var}}` to drive a visible downstream effect (branching explanation, examples, difficulty, feedback). See `references/pedagogy.md#interaction-design`.

4. **Visuals: describe, do not inline source markup.** Use natural-language image instructions ("Show an image that …") paired with text explanation. Do not inline SVG/HTML/Mermaid/PlantUML/Graphviz markup unless the user explicitly asks for that format. See `references/pedagogy.md#visual-text-coordination`.

5. **Output language must be resolved before any prompt content.** Run Language Resolution per `references/data-contracts.md#language-resolution` before producing Teaching Prompt or Course Prompt content. The user's invocation language counts as `prompt_language_detection` (priority 4) and must be used when no higher-priority directive exists. Examples in this skill and in `references/` are written in English for canonical illustration only — do NOT let example language override the resolved output language. If the user invokes in Chinese, all interactions, option labels, downstream text, and the Course Prompt itself must be in Chinese.

## Pipeline Overview

The stages are **not** a flat linear pipeline. **Orchestration is an end-to-end driver** that internally calls Segmentation and Generation. Only Optimization and Deployment actually run in linear sequence after Orchestration completes.

```
Raw material
   │
   ▼
Orchestration                            ← end-to-end driver
   ├── calls Segmentation                 (cleanup + semantic segmentation)
   └── calls Generation                   (per-lesson Teaching Prompts)
        │
        │  Orchestration outputs: Teaching Prompts + course_index
        │                 + global_variable_table
        ▼
Optimization                              (audit + optimize)
        │
        ▼
Deployment                                (build + import + publish to platform)
```

Segmentation, Generation, and Optimization can each be invoked standalone — see [Usage Paths](#usage-paths) Path B for the sub-paths (Segment only / Generate only / Optimize only).

## Usage Paths

### Path A: End-to-End

Run the full pipeline from raw material to a live deployed course.

1. **Orchestration** drives Segmentation and Generation end-to-end, then runs cross-lesson gating to produce Teaching Prompts + course_index + variable table.
2. **Optimization** audits and improves Orchestration's output, plus produces the Course Prompt.
3. **Deployment** writes the course directory, builds, imports, and publishes to the AI-Shifu platform.

### Path B: Author Only

Run Segmentation through Optimization to produce optimized Teaching Prompts and a Course Prompt without deploying. Sub-paths:
- **Segment only**: Segmentation alone for structured segments and manual review.
- **Generate only**: Generation alone on pre-existing segments to produce Teaching Prompts.
- **Optimize only**: Optimization alone to audit and improve existing Teaching Prompts.

### Path C: Deploy Only

Run Deployment alone to deploy pre-existing Teaching Prompts and a Course Prompt to the AI-Shifu platform.

### Path D: Manage Existing

Use Deployment management commands (list, show, update, rename, reorder, delete, publish, archive) on courses already on the platform.

## Segmentation

Turn messy course source material into a reliable intermediate structure for downstream lesson generation.

### Workflow

See `references/pedagogy.md#segmentation-methodology` for the full methodology (cleanup, immutable-block marking, semantic segmentation, lesson-boundary proposal, source linking).

### Outputs

Segment list per `references/data-contracts.md#segment-schema` (each segment carries id, type, core point, preservation flag, source span, and transfer signals), plus lesson boundary candidates with one core question each.

### Validation

- Segment output covers all valid source spans in traceable order.
- `transfer_signals` object populated and usable downstream (schema per `references/data-contracts.md#segment-schema`).
- Preservation, one-core-question, and information-fidelity constraints pass — see `references/markdownflow.md#preservation` and `references/pedagogy.md#lesson-loop`.

## Orchestration

**Role**: end-to-end orchestrator for Path A. Orchestration calls Segmentation (segmentation) and Generation (generation) internally, then performs the cross-lesson work that those atomic phases cannot — course index, global variable table, and mandatory gating.

### Workflow

1. Normalize source ordering and merge input material.
2. Run Segmentation for cleanup and semantic segmentation.
3. Finalize lesson cuts from Segmentation's boundary candidates (one core question each).
4. Run Generation to generate per-lesson Teaching Prompts.
5. Build course index and global variable table.
6. Recompute only failed lessons through strict gating.

### Mandatory Gates

All gates must pass before Orchestration declares lessons complete:

- **Syntax / runtime gates** (violation → script fails to run): preservation of code, images, and required source spans per `references/markdownflow.md#preservation`; no unresolved or uncollected variable references; `?[]` on standalone lines; deterministic blocks used only for truly fixed content per `references/markdownflow.md#deterministic-blocks`.
- **Pedagogical gates** (violation → teaching quality fails): one core question per lesson, minimum teaching loop, at least one deepening interaction, max five interactions per lesson, variable-collection pacing, viewpoint branching, and visual-text pairing — all per `references/pedagogy.md#lesson-loop`, `#interaction-design`, `#variable-strategy`, and `#visual-text-coordination`.

Recompute lessons that fail any gate; do not partially-pass.

### Rerun Rules

- Recompute only impacted lessons.
- Recompute dependency-linked lessons when shared variables change.
- Recompute full course only when global source order changes.

### Failure Handling

Under fallback mode (see `## Execution Modes`), Orchestration:

- Delivers coarse lesson drafts first; continues with best-effort generation instead of stopping.
- Marks uncertain spans explicitly on `course_index` entries.
- Emits a `rerun_plan` listing lessons that need recompute and why.

Fallback field shapes per `references/data-contracts.md#fallback-output-extensions`.

### Outputs

See `references/data-contracts.md#output-contract` for the Teaching Prompts, course index, and global variable table schemas; preservation rules per `references/markdownflow.md#preservation`.

### Validation

- All artifacts present per `references/data-contracts.md#output-contract`.
- Fallback outputs include explicit uncertainty markers and rerun hints.
- All Mandatory Gates above pass.

## Generation

Generate a runnable Teaching Prompt for each lesson.

### Teaching Pattern Baseline

Apply the patterns and constraints in `references/pedagogy.md#teaching-patterns`, `#cognitive-techniques`, `#variable-strategy`, `#interaction-design`, and `#visual-text-coordination` unless content requires a justified variation.

### Single-Lesson Generation Strategy

Required anchors per lesson:

1. Opening objective plus visual cover.
2. Evidence-chain explanation.
3. At least one effective interaction with visible downstream effect.
4. At least one reusable deliverable.
5. Lesson close with summary or decision checkpoint.

Optional modules: viewpoint calibration, misconception correction, dual deliverables (understanding + action), cross-lesson bridge sentence, additional visual-text reinforcement blocks.

### Outputs

Per-lesson schema in `references/data-contracts.md#lesson-schema`.

### Validation

- Each `teaching_prompt` is valid runnable MarkdownFlow.
- Per-lesson schema populated per `references/data-contracts.md#lesson-schema`.
- Pedagogical and syntax constraints pass per `references/pedagogy.md` and `references/markdownflow.md`.

## Optimization

Audit and improve existing Teaching Prompts (and the Course Prompt). This phase is not for writing from scratch.

### When to Use

Use Optimization when existing Teaching Prompts or a Course Prompt need audit and targeted improvement — gap analysis against source, quality upgrades without full rewrites, and lowering runtime failure risk. Not for from-scratch authoring.

### High-Standard Constraints

Apply Optimization audits against the full constraint set:

- Pedagogical constraints (variable strategy, interaction design, visual-text coordination, lesson loop, information density): `references/pedagogy.md`.
- Syntax / runtime constraints (preservation, deterministic blocks, variable references): `references/markdownflow.md`.
- Exhaustive audit checklist (failure modes are these constraints negated): `references/review-checklist.md`.

### Optimization Workflow

1. Define scope (single lesson vs full course); if multiple script versions exist, declare the authoritative one before editing.
2. Build a coverage matrix mapping source points to script coverage.
3. Run the full audit per `references/review-checklist.md`, classify findings using the issue taxonomy in `references/pedagogy.md#optimization-methodology`, and apply smallest safe edits first.

### Course Prompt

Optimization also produces a course-level `course_prompt` artifact when input includes course material. Generate it by **filling the template at `references/course-prompt.md#fillable-template` section-by-section, not by free-form composition**. Each of the six required sections has a Must-Specify list in `references/course-prompt.md#authoring-rules` (Rules 1–12) — every listed bullet must appear in the generated `course_prompt`'s corresponding section (in the resolved output language). Do not omit a Must-Specify bullet just because the source material does not explicitly demand it; these bullets are platform-level constraints.

Auto-fill placeholders from existing artifacts (`course_profile`, `delivery_constraints`, resolved target language per `references/data-contracts.md#language-resolution`, Segmentation visual cues, `term_policy`) instead of re-asking the author. Do not duplicate per-lesson interaction logic or variable collection there — those belong in Teaching Prompts.

### Validation

- Conclusion and overall risk level presented first (report structure per `references/report-template.md`).
- Full review against `references/review-checklist.md` passes, or remaining gaps are explicitly listed as non-blocking suggestions.
- A `course_prompt` artifact is produced when input includes course material, with all six required sections present. `# Translation Rules` may be omitted when its trigger condition does not apply.
- Generated `course_prompt` covers every Must-Specify bullet in `references/course-prompt.md` Rules 1–12 (audit each section against its rule list — especially `# Drawing`, which is the most commonly under-filled section).

## Deployment

Deploy optimized Teaching Prompts to the AI-Shifu platform as live courses.

### Prerequisites

- Python 3 with `requests` and `python-dotenv` packages installed.
- CLI script: `{skillDir}/scripts/shifu-cli.py`

### Authentication

When no valid token is available, guide the user through `shifu-cli.py login` (SMS flow: phone number + 4-digit verification code; CLI defaults to `https://app.ai-shifu.cn`). Full flow in `references/cli/cli-reference.md#authentication`.

Always use CLI commands. Never make raw HTTP/API calls directly.

### Course Directory

Teaching Prompts must be organized in a course directory (one MarkdownFlow file per lesson under `lessons/`) before deployment. See `references/cli/course-directory-spec.md` for the full specification. When continuing from Optimization (Path A), write the optimized Teaching Prompts and Course Prompt into this structure automatically.

### CLI Commands

All commands documented in `references/cli/cli-reference.md` (deployment: `build` / `import` / `publish` / `show`; management for Path D: `list` / `update-meta` / `update-lesson` / `rename-lesson` / `reorder` / `delete-lesson` / `archive`). JSON schema in `references/cli/import-json-format.md`.

### Deployment Workflow

**From pipeline (Path A continuation):**
1. Write Optimization outputs into the course directory: `lessons/lesson-*.md`, `README.md`, `course-prompt.md` (the Optimization `course_prompt` artifact, structured per `references/course-prompt.md#fillable-template`), optional `structure.json`.
2. Run `build --course-dir <dir>` to generate `shifu-import.json`.
3. Run `import --new --json-file <dir>/shifu-import.json` to create the course.
4. Run `publish <shifu_bid>` to make it live.
5. Verify via platform URL.

**Standalone deployment (Path C):**
1. Ensure course directory is ready with Teaching Prompt files (one MarkdownFlow file per lesson under `lessons/`) and a `course-prompt.md`. If the Course Prompt is not yet authored, follow `references/course-prompt.md#fillable-template` (and `references/course-prompt.md#authoring-rules` for guidance) before running `build`.
2. Run `build`, `import`, `publish` as above.

### Verification

After any deployment or management operation, verify the result:
1. Show the user three verification URLs — admin console, course preview, and lesson preview. The script (`shifu-cli.py publish` / `import` / `create` / `show`) prints a `Verification URLs:` block — copy those URLs verbatim and wrap each in a Markdown link per `references/report-template.md` (Deployment → Verification URLs, plus the top-level Formatting Rules). Never reconstruct URLs from a template by hand.
2. Use `show <shifu_bid>` to get the lesson `outline_bid`, then check each lesson's Teaching Prompt, variable collection, and interaction logic.

### Validation

- Import completes without errors.
- Course is accessible via platform URL.
- Lesson count and structure match the source directory.
- Published course is reachable in preview mode.

---

## Report Template

Use `references/report-template.md` to produce the user-facing report at the end of each phase. Per-phase anchors:

- `references/report-template.md#segmentation-report`
- `references/report-template.md#orchestration-report`
- `references/report-template.md#generation-report`
- `references/report-template.md#optimization-report`
- `references/report-template.md#deployment-report`

Top-level formatting rules (Markdown links required for URLs, etc.) in `references/report-template.md#formatting-rules`.

## Examples

- `examples/pipeline-full.md`
- `examples/segmentation-only.md`
- `examples/generation-only.md`
- `examples/optimization-only.md`
- `examples/fallback-mode.md`
- `examples/end-to-end-deploy.md`
- `examples/deploy-only.md`

<script type="text/markdown" id="md-markdownflow">
# MarkdownFlow Spec

MarkdownFlow is the **format** (a small DSL) used to author both **Teaching Prompts** (per-lesson, runtime teaching instructions) and **Course Prompts** (course-level AI persona / style / drawing rules). This file is the authoritative source for the format itself — syntax, runtime constraints, and preservation rules. Violating anything here makes the prompt fail to parse, reference an uncollected variable, or silently lose source content.

For pedagogical / quality-of-teaching constraints (which apply to Teaching Prompts), see [pedagogy.md](pedagogy.md). For Course Prompt structure and authoring rules, see [course-prompt.md](course-prompt.md).

## Variables

- Reference syntax: `{{var_name}}`
- No spaces in variable names
- Undefined variables resolve to `UNKNOWN`
- Variables must be collected (via an interaction line) before being referenced in learner-facing text
- See [pedagogy.md#variable-strategy](pedagogy.md#variable-strategy) for collection pacing, downstream-effect, and semantic-duplication rules
- See [data-contracts.md#variable-table](data-contracts.md#variable-table) for the `global_variable_table` schema

## Interactions

- Single-select: `?[%{{var}} Option A | Option B | Option C]`
- Multi-select: `?[%{{var}} Option A || Option B || Option C]`
- Input: `?[%{{var}} ...Enter your answer]`
- Single-select + input: `?[%{{var}} Option A | Option B | ...Other, please specify]`
- Multi-select + input: `?[%{{var}} Option A || Option B || ...Other, please specify]`

### Prompt Placement Rules

- Put the learner-facing question or prompt in the script text immediately before the interaction line.
- Put each `?[]` interaction on its own line.
- Inside the interaction line, include only interaction content: option labels for select interactions, and input markers/placeholders such as `...Other` or `...Brief situation` where applicable.
- Do not place learner-facing question text after `%{{var}}`; it will become part of the interaction content.
- For input interactions, include both the full question before the interaction line and a shorter placeholder after `...`.

Correct:

```markdown
Ask the learner: Which option best matches your situation?
?[%{{choice}} Option A | Option B | Option C | ...Other]

Ask the learner: What is one specific situation where you want to apply this idea this week?
?[%{{example}} ...Brief situation]
```

Incorrect:

```markdown
?[%{{choice}} Which option best matches your situation? Option A | Option B | Option C | ...Other]
?[%{{example}} What is one situation where you want to apply this idea this week? ...Describe your situation]
Ask the learner: Which option best matches your situation? ?[%{{choice}} Option A | Option B | Option C]
```

### Input Marker Rules

- `...` is an input marker, not punctuation.
- `...` must appear immediately before the short free-text placeholder or free-text option label.
- For pure input, use `?[%{{var}} ...Short placeholder]` after a fuller learner-facing question.
- For select + input, put `...` at the start of the option that opens text entry, such as `...Other, please specify`.
- Do not move `...` to the end of the prompt text.
- Do not write `?[%{{var}} Prompt text...]`.
- Do not write `?[%{{var}} Option A | Option B | Other, please specify...]`.

### Input Marker Examples

- Correct:
  Ask the learner: What is one goal you want this lesson to help you achieve in your current work?
  ?[%{{learner_goal}} ...One-sentence goal]
- Correct: `?[%{{difficulty_type}} Concept unclear | Need practice | ...Other, please specify]`
- Incorrect: `?[%{{learner_goal}} Describe your goal in one sentence...]`
- Incorrect: `?[%{{difficulty_type}} Concept unclear | Need practice | Other, please specify...]`

For interaction-design quality (concrete prompts, branching, deepening interactions), see [pedagogy.md#interaction-design](pedagogy.md#interaction-design).

## Deterministic Blocks

- Single-line fixed text: `===fixed text===`
- Multi-line fixed text:

```markdown
!===
Line 1
Line 2
!===
```

Use deterministic blocks only for truly fixed content (legally or operationally locked statements, fixed images). Do not lock entire lessons in fixed syntax — that defeats the model-guiding purpose of MarkdownFlow.

## Preservation

### Immutable Assets

- Code blocks and fence language.
- Image URLs, alt text, and ordering.
- Regulated wording or fixed numeric thresholds.

### Controlled Rewriting

Allowed:
- Filler removal.
- Sentence smoothing.
- Structural reorganization for lesson clarity.

Not allowed:
- Silent factual changes.
- Unmarked omission of required source evidence.
- Variable references before collection.

### Deterministic Block Policy

Use deterministic blocks only for truly fixed content. Do not lock entire lessons in fixed syntax. For images that must remain unchanged, use single-line deterministic syntax per image.

## Common Mistakes

- `?[%{{var}} Prompt text…]` — `...` placed at end of prompt instead of before placeholder.
- `?[%{{var}} A | B | Other, please specify…]` — same issue inside an option label.
- `?[%{{var}} Question prompt? Option A | Option B]` — question inside the interaction line; move it to the line above.
- `Ask the learner the question. ?[%{{var}} A | B | C]` — interaction not on its own line.
- Wrapping an entire lesson body in `=== … ===` or `!=== … !===`.
- Referencing `{{var}}` in learner-facing text before any `?[%{{var}} …]` collects it.

</script>
<script type="text/markdown" id="md-pedagogy">
# Pedagogy

Authoritative source for **Teaching Prompt** design constraints — patterns, cognitive techniques, segmentation methodology, optimization methodology, and the teaching-side rules around variables, interactions, and visual-text coordination. Violating anything here generally produces a Teaching Prompt that *runs* but teaches poorly.

For format syntax / runtime constraints (which make any prompt fail to parse), see [markdownflow.md](markdownflow.md). For Course Prompt design (the course-level AI persona / style document), see [course-prompt.md](course-prompt.md).

## Script Style

A Teaching Prompt is the per-lesson MarkdownFlow document the AI engine reads at runtime — it is a *script that guides teaching*, not a polished learner-facing lecture. Write in imperative, model-guiding language.

Preferred patterns:
- "Explain to the learner …"
- "Ask the learner to …"
- "Have the learner choose …"
- "After collecting {{var}}, restate the choice and branch …"

Disallowed patterns:
- Long, polished prose written as if it is the final learner-facing lecture.
- Author/lesson-plan meta narration (e.g., "Knowledge Block …", "In this lesson you will …", "Deliverable: …").
- Author-side meta labels such as "Knowledge Block 1/2/3", "Lesson Objective", or "Deliverable" — keep those as implicit structure, not visible narration.
- Exposing internal authoring terms in learner-facing text.

## Teaching Patterns

### Pattern A: Evidence Chain

1. Observable phenomenon
2. Mechanism explanation
3. Practical implication
4. Learner interaction
5. Summary and action

### Pattern B: Misconception Repair

1. Surface common misconception
2. Explain why it sounds plausible
3. Correct with mechanism and boundary
4. Run interaction check
5. Apply corrected model to a real case

### Pattern C: Comparison-Driven Learning

1. Baseline response capture
2. Alternate scenario or constraint
3. Side-by-side interpretation
4. Updated decision path

## Cognitive Techniques

Increase learner understanding through targeted cognitive moves rather than information dumping. Each lesson should include at least one of these as a deepening interaction.

1. **Calibration prompt** — Ask learners to make a concrete judgment before explanation.
2. **Boundary framing** — Clarify where the concept works and where it breaks.
3. **Counterintuitive contrast** — Introduce a surprising but valid case to deepen mental models.
4. **Action translation** — Turn conceptual understanding into an immediately executable step.
5. **Reflection loop** — Ask learners to compare current understanding with prior assumptions.

## Lesson Loop

Every lesson must satisfy a minimum teaching loop and a few cross-cutting constraints:

- **Minimum teaching loop**: setup → explanation → interaction → close. A lesson missing any of these four phases is incomplete.
- **One core question per lesson**: each lesson resolves exactly one teachable question.
- **Action tasks** must be either immediately executable by the learner or explicitly linked to a downstream lesson — no orphan actions.
- **Variable naming** must be consistent and traceable across lessons (use the same name for the same concept; cross-check with [data-contracts.md#variable-table](data-contracts.md#variable-table)).
- **Source information density** must be preserved through optimization — do not trade substance for fluency.
- **Carryover statements** are allowed only when cross-lesson dependency is explicitly permitted; otherwise remove them along with any unbound carryover variables.

## Segmentation Methodology

### Objective

Produce stable lesson-oriented semantic segments from noisy source material while preserving immutable artifacts.

### Core Rules

1. Preserve source order unless explicit ordering hints are provided.
2. Keep code/image/table blocks immutable.
3. Segment by semantic shift, not heading depth alone.
4. Keep each lesson candidate centered on one teachable question.
5. Attach source spans to every segment.

### Segment Types

- `concept`: explanatory statements and definitions.
- `example`: concrete demonstrations and walkthroughs.
- `code`: executable or pseudo-code blocks.
- `image`: visual references and diagrams.
- `exercise`: learner action prompts.
- `transition`: bridge text that links ideas.

### Transfer Signals

Every segment should include transferable signals for downstream script quality:
- learner hook
- evidence type
- visual cue
- concept conflict
- boundary cue
- action cue
- density cue
- quote cue
- visual-text-pair cue
- interaction-intent cue
- compare cue

### Failure Handling

If structure is weak, output a fallback segmentation and mark uncertain spans for focused reruns.

## Optimization Methodology

### Principles

1. Correctness before style.
2. Minimal safe edits before broad rewrites.
3. Learner impact before formatting polish.
4. Traceable changes with explicit rationale.

### Issue Taxonomy

- Coverage gap
- Meaning shift
- Explanation clarity
- Interaction no-branching
- Visual requirement missing
- Variable or syntax risk

### Execution Sequence

1. Build source-to-script coverage matrix.
2. Rank issues by learner risk and runtime risk.
3. Fix blockers first.
4. Revalidate variable lifecycle and interaction effects.
5. Run final syntax and density checks.

## Variable Strategy

These are the *teaching* rules around variables — when to collect, how often, how to ensure they matter. For variable *syntax* see [markdownflow.md#variables](markdownflow.md#variables); for variable *schema* see [data-contracts.md#variable-table](data-contracts.md#variable-table).

- Prefer at most one variable collection per module; distribute, don't front-load.
- Max five interactions per lesson (recommended three to four).
- No more than three consecutive variable collections before learner-visible feedback.
- Reuse global variables when possible; add lesson-local variables only when required.
- Every variable must have downstream utility (branching, depth control, or deliverable variation).
- Do not recollect the same variable unless explicitly marked as staged comparison.
- Prevent semantic duplicates even when variable names differ.
- Spread global variable collection across lessons.

## Interaction Design

These are the *teaching* rules around interactions. For interaction *syntax* see [markdownflow.md#interactions](markdownflow.md#interactions).

- Each lesson includes at least one deepening interaction (calibration, boundary check, or misconception correction — see [Cognitive Techniques](#cognitive-techniques)).
- Interaction prompts must be concrete and directly answerable.
- Place interactions at decision points, not only at lesson start.
- Every interaction must trigger immediate feedback **and** a visible downstream effect (branching explanation, examples, practice difficulty, feedback).
- After every interaction, restate the learner's selection explicitly as an instruction (e.g., `Restate the learner's current choice as {{var}}.`), not as polished narration.
- `*_viewpoint_check` interactions must branch by option and drive different next steps.
- Use no more than one `viewpoint_check` per lesson unless justified.
- Avoid repetitive interaction semantics across lessons unless comparison intent is explicit.
- For input interactions, the pre-interaction question must be more specific than the short `...` placeholder.

## Visual-Text Coordination

- If a visual is needed, describe it in natural language (e.g., "Show an image that …").
- Pair every visual instruction with a brief explanation of what the visual is meant to convey.
- Do not embed raw SVG/HTML/Mermaid/PlantUML/Graphviz markup inside Teaching Prompts unless the user explicitly asks for that format.
- Default to natural-language image/diagram placeholders.
- Every core concept needs visual + textual explanation together; the visual carries structural prompting, the text carries the full explanation (assume the learner has not seen the image).

</script>
<script type="text/markdown" id="md-data-contracts">
# Data Contracts

Authoritative source for all schemas crossing the skill boundary: what comes in (input), what goes out (output), how output target language is resolved, and the per-lesson and per-variable shapes.

## Input Contract

### Required

Provide one of:
- A single long transcript or course document.
- A set of topic-aligned documents with intended order.

### Optional

- Learner persona.
- Lesson granularity preference (`short`, `medium`, `long`).
- Terminology and tone constraints.
- Non-negotiable source fragments.
- `course_profile` object.
- `delivery_constraints` object.
- `target_language` (BCP-47 recommended, for example `fr-FR`, `ja-JP`, `zh-CN`).
- `bilingual_output` (`true|false`).
- `term_policy` (`preserve|translate|mixed`).
- `quote_policy` (`translate_only|original_plus_translation`).

### Recommended Object Shapes

#### `course_profile`

```json
{
  "audience_level": "beginner|intermediate|advanced",
  "prerequisite_level": "none|basic|strong",
  "lesson_duration_minutes": 12,
  "lesson_count_target": 8,
  "assessment_mode": "quiz|project|discussion|mixed"
}
```

#### `delivery_constraints`

```json
{
  "interaction_density": "low|medium|high",
  "platform_limits": ["no_iframe", "markdown_only"],
  "must_cover_topics": ["topic-a", "topic-b"],
  "avoid_topics": ["topic-x"],
  "non_negotiable_fragments": ["exact quote or code block id"]
}
```

### Minimal Input Payload Example

```json
{
  "course_material": "long transcript or merged markdown",
  "generation_constraints": {
    "persona": "hands-on mentor",
    "lesson_granularity": "short"
  },
  "course_profile": {
    "audience_level": "beginner",
    "lesson_duration_minutes": 10,
    "lesson_count_target": 6,
    "assessment_mode": "project"
  },
  "delivery_constraints": {
    "interaction_density": "medium",
    "must_cover_topics": ["core workflow", "failure handling"]
  }
}
```

### Validation Rules

- Input files must be readable text or markdown.
- If multiple files are provided, ordering must be explicit.
- Source language and expected output language should be specified when multilingual content exists.
- Explicit output language requests must not be overridden by source-language mixes (see [Language Resolution](#language-resolution)).

## Output Contract

### Required Artifacts

1. `lesson_teaching_prompts` — one Teaching Prompt per lesson (written in MarkdownFlow). Instructional/directive language only (model-guiding), not a final learner manuscript. See [Lesson Schema](#lesson-schema).
2. `course_index` — `lesson_id`, `lesson_title`, `core_question`, `source_span_map`.
3. `global_variable_table` — see [Variable Table](#variable-table).
4. `course_prompt` — markdown string (runnable AI-Shifu course-level system prompt) following [course-prompt.md](course-prompt.md). Required sections: `# Role`, `# Task`, `# Teaching Techniques`, `# Writing Style`, `# Format`, `# Drawing`. Conditional section: `# Translation Rules`.

### `course_index` Schema (array, required)

Each item:
- `lesson_id` (string, required)
- `lesson_title` (string, required)
- `core_question` (string, required)
- `source_span_map` (array of `{source_id, start, end}`, required)

### `course_prompt` (string, required)

- Markdown string starting with `# Role`.
- Six required `# Section` blocks: `# Role`, `# Task`, `# Teaching Techniques`, `# Writing Style`, `# Format`, `# Drawing`.
- Conditional `# Translation Rules` section per [course-prompt.md](course-prompt.md) `## Conditional Sections`.
- Single source of truth at the course level; do not embed per-lesson interaction logic.

### Minimal Output Example

```json
{
  "lesson_teaching_prompts": [
    {
      "lesson_id": "L01",
      "lesson_title": "Core Loop Setup",
      "teaching_prompt": "## Objective\n...\n?[%{{learner_goal}} Option A | Option B]\n...",
      "used_variables": ["learner_goal"],
      "depends_on_lessons": []
    }
  ],
  "course_index": [
    {
      "lesson_id": "L01",
      "lesson_title": "Core Loop Setup",
      "core_question": "What makes this loop stable in production?",
      "source_span_map": [{"source_id": "doc-1", "start": 120, "end": 286}]
    }
  ],
  "global_variable_table": [
    {
      "name": "learner_goal",
      "collected_in": "L01",
      "used_in": ["L01", "L02"],
      "effect_scope": "cross_lesson"
    }
  ],
  "course_prompt": "# Role\nYou are ...\n\n# Task\n- The current course is *...*. ...\n\n# Teaching Techniques\n- ...\n\n# Writing Style\n- ...\n\n# Format\n- ...\n\n# Drawing\n- ..."
}
```

### Artifacts

5. `deployed_course_url` — Platform URL of the deployed course.
6. `shifu_bid` — Course BID on the AI-Shifu platform.

#### `deployment_result` (object, optional)

- `shifu_bid` (string, required)
- `deployed_course_url` (string, required)
- `lesson_count` (number, required)
- `status` (string enum: `published|draft`, required)

### Delivery Guarantees

- Stable schema across reruns.
- Deterministic references for lesson ids and source spans.
- Partial rerun support for changed lessons.

## Segment Schema

Each item in the Segmentation output (consumed by Orchestration and Generation):

- `segment_id` (string, required) — stable identifier within the run.
- `segment_type` (string enum, required) — one of `concept`, `example`, `code`, `image`, `exercise`, `transition`; semantics in [pedagogy.md#segment-types](pedagogy.md#segment-types).
- `core_point` (string, required) — the single teachable point this segment carries.
- `preserve_block` (boolean, required) — `true` for code/image/table/required-quote blocks that must reach the lesson verbatim per [markdownflow.md#preservation](markdownflow.md#preservation).
- `source_span` (string, required) — traceable reference back to the source material.
- `transfer_signals` (object, required) — downstream teaching-quality cues; field names and meanings defined in [pedagogy.md#transfer-signals](pedagogy.md#transfer-signals).

For segmentation rules and methodology see [pedagogy.md#segmentation-methodology](pedagogy.md#segmentation-methodology).

## Variable Table

`global_variable_table` is an array. Each item:

- `name` (string, required) — the variable name as referenced in `{{var}}` / `?[%{{var}} ...]`.
- `collected_in` (string, required) — `lesson_id` where the variable is first collected.
- `used_in` (array of lesson ids, required) — every lesson that references the variable.
- `effect_scope` (string enum: `local|cross_lesson`, required).

For variable *syntax* see [markdownflow.md#variables](markdownflow.md#variables); for variable *strategy and pacing* see [pedagogy.md#variable-strategy](pedagogy.md#variable-strategy).

## Lesson Schema

Each item in `lesson_teaching_prompts` (Generation per-lesson output):

- `lesson_id` (string, required) — stable, deterministic identifier.
- `lesson_title` (string, required) — concise learner-facing title.
- `teaching_prompt` (string, required) — the per-lesson Teaching Prompt content (written in MarkdownFlow); instructional/directive language only.
- `used_variables` (array of strings, required) — every variable referenced or collected in this lesson; cross-check with [Variable Table](#variable-table).
- `depends_on_lessons` (array of lesson ids, required) — explicit list; empty list if none.

### Minimal Example

```json
{
  "lesson_id": "L03",
  "lesson_title": "Diagnose the Bottleneck",
  "teaching_prompt": "## Objective\nFind the bottleneck and test one fix.\n---\n?[%{{bottleneck_guess}} CPU bound | IO bound | Lock contention]\n---\nBased on {{bottleneck_guess}}, run the matching test first.",
  "used_variables": ["bottleneck_guess"],
  "depends_on_lessons": ["L02"]
}
```

## Language Resolution

### Priority Order

Resolve target language with this strict priority:

1. `explicit_output_language_request` — language explicitly stated in the current user prompt.
2. `target_language_parameter` — `target_language` field supplied in the input payload (BCP-47 recommended).
3. `prior_context_language_directive` — language requirement declared **outside** the current prompt but visible to the skill: project/system instructions (e.g. `CLAUDE.md`), earlier turns of the same conversation, or directives injected by the calling agent. The skill cannot read external platform/account locale settings, so only in-context directives count here.
4. `prompt_language_detection` — language detected from the wording of the current user prompt itself.
5. `source_material_dominant_language` — the dominant language of the supplied course material.
6. `default_fallback_language` — `zh-CN`.

### Control Fields

- `target_language` (BCP-47 recommended, for example `fr-FR`, `ja-JP`, `zh-CN`)
- `bilingual_output` (`true|false`)
- `term_policy` (`preserve|translate|mixed`)
- `quote_policy` (`translate_only|original_plus_translation`)

### Rules

- Do not restrict supported languages to a fixed list.
- If output language is explicit, source-language distribution must not override it.
- Learner-facing script text must follow resolved target language unless `bilingual_output` is true.

## Fallback Output Extensions

When a phase runs under fallback mode (see SKILL.md `## Execution Modes`), its standard output is augmented with the following fields. Standard-mode output omits these fields entirely; fallback-mode output adds them on top of the standard schema.

### Segmentation fallback fields

Per-segment (extends [Segment Schema](#segment-schema)):

- `uncertainty` (string enum: `low|medium|high`) — confidence on the segment's interpretation.

Top-level addition to the Segmentation output:

- `rerun_hints` (array of strings) — user-facing prompts describing what authoritative input would resolve the uncertainty.

### Orchestration fallback fields

Per-lesson (extends `course_index` items):

- `uncertainty` (string enum: `low|medium|high`).

Top-level addition:

- `rerun_plan` (object, required when any lesson is uncertain):
  - `lessons_to_rerun` (array of lesson ids).
  - `reason` (string) — why the rerun is needed.

### Generation fallback fields

Per-lesson (extends [Lesson Schema](#lesson-schema)):

- `fallback_mode` (boolean) — `true` when this lesson was generated under fallback.
- `assumptions` (array of strings) — assumptions made due to incomplete input.
- `upgrade_notes` (array of strings) — what additional input would upgrade this lesson.

### Optimization fallback fields

Inside `risk_and_issue_report`:

- `coverage_status` (string enum: `complete|partial|unknown_without_source`).

Top-level addition:

- `follow_up` (array of strings) — required inputs to complete a full-coverage audit.

For the four end-to-end fallback scenarios, see `examples/fallback-mode.md`.
</script>
<script type="text/markdown" id="md-course-prompt">
# Course Prompt

Authoritative source for the course-level prompt artifact: what it is, the 12 authoring rules with Bad/Good contrasts, the fillable template, the substitution map, and a filled example.

## Purpose

The course prompt defines the AI engine's **course-level persona and operating rules** — the role it plays, how it teaches, how it writes, how it formats output, and how it draws and translates. It is loaded once per course and applied to every lesson.

**Both Teaching Prompt and Course Prompt are written in MarkdownFlow**, but they serve different roles:

- **Teaching Prompt** (per-lesson) carries **single-lesson teaching instructions**: what to explain, what variable to collect, what to branch on. There is one per lesson. Design rules: see [pedagogy.md](pedagogy.md).
- **Course Prompt** (course-level) carries **cross-lesson constants**: identity, voice, format, terminology, drawing policy. There is one per course. Design rules: this file.

Do not duplicate per-lesson interaction logic, variable collection, or branching here. If a rule only applies to one lesson, it belongs in that lesson's Teaching Prompt, not in the Course Prompt.

## Required Sections

The fillable template has six required `# Section` blocks. Every course prompt must include all six:

1. `# Role` — identity, professional and teaching identity, optional platform affiliation.
2. `# Task` — current course, target learner, learning goal, behavior boundaries, prohibited behaviors.
3. `# Teaching Techniques` — how to design explanation paths.
4. `# Writing Style` — tone, register, restraint.
5. `# Format` — Markdown rules, heading policy, bold usage, spacing.
6. `# Drawing` — image-generation rules covering both safety guardrails and visual quality.

`# Drawing` is required even for courses that do not use visuals. Without it, the AI has zero guardrails on its multimodal output and may spontaneously render uncontrolled images. Always include the full block; the rules cost nothing when the AI never draws and become essential the moment it does.

## Conditional Sections

One additional section is added only when the course needs it:

- `# Translation Rules` — required when **any** of the following is true:
  - Course is multilingual (`bilingual_output: true`, or target language differs from source-material dominant language).
  - Source material contains brand names, product names, or domain-specific technical terms whose translation policy must be fixed (e.g., AI, Token, vibe coding, ChatGPT, Gemini, DeepSeek).
  - `term_policy` is `preserve` or `mixed`.

When the condition is not met, omit the section entirely. Do not insert an empty placeholder section.

## Authoring Rules

The 12 conceptual rules below map to the actual `# Section` blocks in the template. Each rule lists the must-include points and a Bad/Good contrast.

### Rule 1 — Define the Teacher Role

Maps to: `# Role`.

Must include:
- Name (real or course-specific persona name).
- Professional identity (domain expertise).
- Teaching identity (the angle from which they teach this topic).

Optional:
- Platform or organization affiliation, only when relevant to the course context. Do not hard-code any specific platform name by default; the same course prompt may run on different deployments.

Bad: `You are a helpful assistant.`
Good: `You are Hebi. You specialize in observability and are a professional teacher in the field of production debugging.`

### Rule 2 — Define the Current Course

Maps to: `# Task` (top bullets).

Must clarify:
- Course name.
- Course topic and goal.
- Target learner.
- Learning boundary (what is in scope, what is not).

Bad: `The current course will teach you something useful.`
Good: `The current course is *Metric Drift Diagnosis*. Your goal is to help the user master a four-step loop for diagnosing metric drift in production. The course is designed for beginner SREs and focuses on helping them solve metric drift problems within ten minutes of detection.`

### Rule 3 — Clarify That User Messages Are Teaching Instructions

Maps to: `# Task` (instruction bullets).

Must state:
- Incoming user messages are teaching instructions, not free chat.
- Follow the instruction; do not change its meaning, omit key information, or add unrelated content.

Bad: `Respond to the user's questions.`
Good: `The user messages you receive are all teaching instructions. Follow the instructions and explain the course content to the user. Do not change the original meaning of the instructions. Do not omit key information. Do not add content unrelated to the course.`

### Rule 4 — Emphasize the One-on-One Teaching Experience

Maps to: `# Task` (audience bullets).

Must state:
- The session is one-on-one with a single learner.
- Address the learner as "you" only.
- Do not use group-addressing terms.

Bad: `Welcome everyone to this lesson, students!`
Good: `You are teaching one-on-one. There is only one learner. You may address the user as "you". Do not use group-addressing terms such as "everyone", "class", or "students".`

### Rule 5 — Define Prohibited Behaviors

Maps to: `# Task` (prohibition bullets).

Must list (at minimum):
- Do not introduce yourself.
- Do not greet the user.
- Do not use group-addressing terms.
- Do not proactively guide the user to the next step at the end.
- Do not freely elaborate beyond the instruction.
- Do not output content unrelated to the course.

Note: rhetorical questions used **inside** an explanation are allowed as a teaching device. The prohibition is on tail-prompts that ask the learner to continue, answer, or move on at the end of a turn — that role belongs to the Teaching Prompt's interactions.

Bad (tail-prompt): `So, are you ready to move on to the next part?`
Good (rhetorical inside explanation): `Why does this metric jump matter? Because it tells us the upstream queue stalled — and that is the real failure signal we want to catch.`

### Rule 6 — Define Teaching Techniques

Maps to: `# Teaching Techniques`.

Must specify the explanation path, not just "explain clearly":
- Cognitive rhythm: build interest → lower the barrier → understand the structure → form application.
- Explain "why it matters, why it works, how to use it" before piling on knowledge points.
- Break complex content down before expanding.
- Prefer clear structures (binary distinctions, three-layer structures, step-by-step paths, comparisons).
- Use concrete scenarios, real examples, analogies, before/after comparisons.
- Correct misconceptions before continuing.
- Each paragraph has a single clear function.
- End with a judgment, scenario, or actionable understanding — not an empty summary.

Bad: `Explain the topic clearly and concisely.`
Good: See the full block in [Fillable Template](#fillable-template) below.

### Rule 7 — Define Writing Style

Maps to: `# Writing Style`.

Must specify:
- Tone (conversational, natural, restrained, warm).
- What to avoid (slogans, exaggerated emotion, vague generalities).
- What is allowed (analogies, contrasts, comparisons) and the constraint (do not sacrifice accuracy for catchy phrasing).

Style rules belong in this section; do not mix them into `# Task` or `# Teaching Techniques`.

### Rule 8 — Define Output Format

Maps to: `# Format`.

Must specify:
- Markdown output.
- Heading policy. **Default to "Do not output headings of any level"** because the host platform typically renders the module title separately; opt-in to headings only when a specific course needs them and the module render confirms support.
- Bold usage.
- Mixed-script spacing (Chinese ↔ English, Chinese ↔ numbers).

### Rule 9 — Define How to Highlight Key Content

Maps to: `# Format` (bold bullets).

Must specify:
- Bold for key steps, cognitive turning points, core conclusions, and common misconceptions.
- Only bold truly important information.
- Do not bold an entire paragraph.

### Rule 10 — Drawing Rules in a Separate Section

Maps to: `# Drawing` (required).

Must specify:
- Draw only when explicitly instructed; never proactively.
- Selectable options must never be rendered inside the image. Choice options live in the MarkdownFlow `?[%{{var}} A | B | C]` line outside the image; in-image labels are not interactive on the platform.
- In-image text is concise and prompt-like.
- After drawing, explain the image in text.
- Element layout rules (fully visible, no overlap, simple hierarchy).

### Rule 11 — Image-Text Relationship

Maps to: `# Drawing` (required, last bullets).

Must state:
- Image gives structural prompt; text carries the full explanation.
- Text must assume the user has not seen the image.
- Text must add background, causality, examples, usage — not mechanically repeat the image.

Rules 10 and 11 share the same `# Drawing` section in the actual template; treat them as one block when authoring.

### Rule 12 — Translation and Terminology Rules

Maps to: `# Translation Rules` (conditional).

Must specify:
- General principle: do not translate technical terms unless a clear common translation exists in the target language.
- Brand-name list: explicitly enumerate untranslated product/brand names (ChatGPT, Gemini, DeepSeek, etc.).
- Course-name policy: state how the course's own brand or product name is rendered in the target language (provide an explicit mapping when an authoritative translation exists).

When a course is single-language and contains no brand-name decisions, this section is omitted entirely (see [Conditional Sections](#conditional-sections)).

## Inputs to Pull From

When generating the course prompt, consume already-collected artifacts instead of asking the user again:

- `course_profile.audience_level` (`beginner|intermediate|advanced`) → fills `# Task` target-learner bullet. See [data-contracts.md#input-contract](data-contracts.md#input-contract).
- `course_profile.prerequisite_level` → informs `# Task` boundary bullet.
- `delivery_constraints.must_cover_topics` / `avoid_topics` → informs `# Task` boundary bullet.
- Resolved target language (per [data-contracts.md#language-resolution](data-contracts.md#language-resolution)) → drives `# Writing Style` language and any `# Translation Rules` decisions.
- `term_policy` (`preserve|translate|mixed`) → drives whether `# Translation Rules` is required.
- Segmentation `visual_cue` / `visual_text_pair_cue` presence → informs how detailed the `# Drawing` guidance should be (`# Drawing` itself is always required).
- Course title from `README.md` → fills `# Task` course-name bullet.

`# Teaching Techniques`, `# Writing Style`, `# Format`, `# Drawing`, and `# Translation Rules` are constants — copy verbatim and adjust only when a course has a justified reason. Document any deviation in the course `README.md` so future updates know it is intentional.

## What Not to Put Here

- Per-lesson variable collection or branching logic — belongs in the Teaching Prompt for that lesson.
- Specific lesson-cut decisions, lesson titles, or lesson order — belongs in `course_index` and `structure.json`.
- Source-material excerpts or learner-facing scripts — belongs in the Teaching Prompt for that lesson.
- Pipeline / authoring instructions for downstream phases — belongs in skill docs, not in a runtime prompt.
- HTML comments (`<!-- -->`) — the MarkdownFlow parser strips them, so the AI engine never sees them. Write instructions as plain Markdown.

<script type="text/markdown" id="md-review-checklist">
# Review Checklist

Optimization 全面审计清单 — Optimization Optimization 必须把每条都过一遍。其他 Phase 的阶段交付检查见 SKILL.md 各 Phase 内的 Validation 段。

## Coverage

- All critical source points are present.
- No unsupported additions alter meaning.
- Source information density preserved (no substance traded for fluency).

## Script Style

- Directive / model-guiding language; no polished learner-facing manuscript prose.
- No author-side meta labels ("Knowledge Block", "Lesson Objective", "Deliverable").
- No internal authoring terms exposed in learner-facing text.

## Lesson Loop

- Minimum teaching loop satisfied: setup → explanation → interaction → close.
- One core question per lesson; resolved by lesson close.
- Action tasks executable now or explicitly linked to a downstream lesson.
- Variable naming consistent and traceable across lessons.
- Carryover statements only where cross-lesson dependency is allowed.
- Lesson structure follows the content, not a forced uniform template that erases lesson specificity.

## Interaction Quality

- Interactions are concrete and answerable.
- Learner-facing questions appear before interaction syntax, not after `%{{var}}` inside `?[%{{var}} ...]`.
- Each `?[]` interaction appears on its own line.
- Input interactions include a specific pre-interaction question plus a shorter `...` placeholder.
- At least one deepening interaction per lesson (calibration, boundary check, or misconception correction).
- Branching paths are distinct where required; `*_viewpoint_check` interactions branch by option.
- Interaction results affect later content (visible downstream effect).
- Repeated interaction semantics avoided across lessons unless comparison intent is explicit.
- After every interaction, the script restates the learner's selection and uses `{{var}}` to drive downstream content.

## Variable Safety

- Variables are collected before use.
- No duplicate semantic collection unless comparison intent is explicit.
- No unresolved placeholders in learner-facing content.
- No more than three consecutive variable collections before feedback.
- Every variable has downstream utility (branching, depth control, deliverable variation).

## Visual-Text Coordination

- Every core concept has visual-plus-text explanation when a visual is used.
- Visuals described in natural language, not inlined as SVG/HTML/Mermaid markup.
- Text adds context (background / causality / examples), not just a restatement of the image.

## Runtime Stability

- MarkdownFlow syntax is valid.
- Deterministic blocks used only where necessary; not wrapping full lessons.
- Interaction count per lesson at most five (recommended three to four).
- Code, image, and required source spans preserved per `markdownflow.md#preservation`.

## Course Prompt

- A `course_prompt` artifact is produced when input includes course material.
- All six required sections present (`# Role`, `# Task`, `# Teaching Techniques`, `# Writing Style`, `# Format`, `# Drawing`).
- `# Translation Rules` included when (and only when) trigger condition applies.

# Course Author Report Template

Use the section matching the executed phase. Omit sections for phases not run.

## Formatting Rules

These rules apply to every report produced from this template, and to any other user-visible chat output that includes URLs.

- **Links must be Markdown, never bare URLs.** Whenever you show a URL to the user (admin console, course preview, lesson preview, contact page, etc.), wrap it in Markdown link syntax `[descriptive text](URL)`. Never emit a bare `https://...` on its own line.
- **Why:** the AI-Shifu chat client only treats Markdown links as clickable / copy-on-tap. A bare URL renders as plain text — the user cannot click it and cannot copy it cleanly on mobile.
- **Where this applies:** phase reports below, the opening introduction, the contact line, and any ad-hoc message that surfaces a URL to the user.

<script type="text/markdown" id="md-cli-reference">
# CLI Reference

All commands use `{skillDir}/scripts/shifu-cli.py`. Prefix every call with:

```bash
python3 {skillDir}/scripts/shifu-cli.py <command>
```

## Authentication

Run login once — the token persists in `{skillDir}/.env` for subsequent commands:

```bash
# Step 1: Send SMS verification code
login --phone 13800138000

# Step 2: Complete login with the code
login --phone 13800138000 --sms-code 1234
```

The CLI always talks to `https://app.ai-shifu.cn`. To skip the SMS login, set `--token` / `SHIFU_TOKEN` directly.

### Agent Login Flow

When no valid token is available, guide the user through login. AI-Shifu's SMS login auto-creates an account on first use, so the same flow works for both new and returning users.

**Do not ask the user whether they have registered for AI-Shifu.** Do not present a "have you signed up yet?" question, an A/B choice between "log in" and "sign up", or any other registration-status branch. Go straight to asking for the phone number:

1. Ask the user which phone number they want to use with AI-Shifu.
2. Send SMS code:
   `python3 {skillDir}/scripts/shifu-cli.py login --phone <phone>`
3. Ask the user for the 4-digit verification code they received.
4. Complete login:
   `python3 {skillDir}/scripts/shifu-cli.py login --phone <phone> --sms-code <4-digit-code>`
5. Token is automatically saved — proceed with the requested operation.

Always use CLI commands. Never make raw HTTP/API calls directly.

## Query Commands

```bash
list                                          # List all courses
show <shifu_bid>                              # Show course details + outline tree
show <shifu_bid> <outline_bid>                # Read a lesson's Teaching Prompt
history <shifu_bid> <outline_bid>             # Teaching Prompt revision history
export <shifu_bid> [-o file.json]             # Export course as JSON
```

`show` (without `outline_bid`), `create`, `import`, and `publish` all print a `Verification URLs:` block — admin console, course preview, and one preview URL per lesson. Copy those URLs as-is when reporting deployment results; never reconstruct them from a template.

## Create Commands

```bash
create --name "Title" [--description "Desc"]
add-chapter <shifu_bid> --name "Chapter Name"
add-lesson <shifu_bid> --name "Name" --teaching-prompt-file lesson.md --parent-bid <chapter_bid>
```

## Update Commands

```bash
update-meta <shifu_bid> [--name "..."] [--description "..."] [--course-prompt-file prompt.md]
update-lesson <shifu_bid> <outline_bid> --teaching-prompt-file lesson.md   # Uses optimistic locking
rename-lesson <shifu_bid> <outline_bid> --name "New Name"
reorder <shifu_bid> --order bid1,bid2,bid3
```

`update-lesson` fetches the current revision before saving. If another user modified the lesson since you last read it, the server returns a conflict.

## Delete Commands

```bash
delete-lesson <shifu_bid> <outline_bid>
```

## Bulk Import

```bash
# Flat JSON import
import <shifu_bid> --json-file course.json
import --new --json-file course.json

# One-step build + import from course directory
import <shifu_bid> --course-dir ./course-a/ [--title "..."] [--chapter-name "..."]
import --new --course-dir ./course-a/ [--title "..."] [--chapter-name "..."]

# Local build only (offline, generates shifu-import.json)
build --course-dir ./course-a/ [-o shifu-import.json] [--title "..."] [--chapter-name "..."]
```

The `build` command works entirely offline — it reads the course directory's Teaching Prompts (one MarkdownFlow file per lesson under `lessons/`) and the Course Prompt, then produces `shifu-import.json` without any network calls. The `import --course-dir` option combines build + import in one step.

Build behavior:

- **Course title** resolution order: `--title` CLI arg -> first heading in `README.md` -> directory name
- **Chapter structure**: if `structure.json` exists, generates multi-chapter structure per its definition; otherwise creates a single chapter (named via `--chapter-name` or defaults to course title) containing all `lesson-*.md` files in sorted order
- **Lesson title** resolution order: `title` field in `structure.json` -> `lesson_title: ...` line in the Teaching Prompt -> filename derived (e.g., `lesson-01.md` -> "Lesson 01")

## State Management

```bash
publish <shifu_bid>       # Publish course (makes it live)
archive <shifu_bid>       # Archive course
unarchive <shifu_bid>     # Restore archived course
```

<script type="text/markdown" id="md-course-directory-spec">
# Course Directory Specification

## Directory Structure

```
<course>/
  README.md            # Course metadata (title from first heading)
  course-prompt.md     # Course-level prompt (AI role and teaching style)
  shifu-import.json    # Generated import file (output of build)
  structure.json       # Chapter structure (optional, for multi-chapter courses)
  lessons/
    lesson-01.md       # Teaching Prompt (MarkdownFlow)
    lesson-02.md
    ...
```

## Lesson Files

When `structure.json` is not present, `build` auto-discovers only `lesson-*.md` files (e.g., `lesson-01.md`, `lesson-02.md`) and ignores other filenames. When `structure.json` is present, lesson files are taken from `chapters[].lessons[].file` and any filename is accepted as long as it exists.

## course-prompt.md

Defines the AI engine's role, teaching style, and interaction rules at the course level. The `build` command reads this file and populates `shifu.course_prompt` in the import JSON automatically (which the CLI maps to the platform API field `system_prompt` on import).

Authoring rules and a fillable template live in `../course-prompt.md`.

Note: MarkdownFlow files do not support HTML comments (`<!-- -->`). The parser discards them entirely, so the AI engine never sees them. Write instructions as plain text directly in the Course Prompt content.

## structure.json

Defines multi-chapter course structure. If this file exists, `build` uses it to organize lessons into chapters; otherwise all lessons are placed under a single auto-generated chapter.

Schema:

```json
{
  "chapters": [
    {
      "title": "Chapter Title",
      "lessons": [
        {"file": "lesson-01.md", "title": "Lesson Title"},
        {"file": "lesson-02.md"}
      ]
    }
  ]
}
```

Field reference:

- `chapters[].title` (required): Chapter display name
- `chapters[].lessons[]` (required): Array of lesson objects
- `chapters[].lessons[].file` (required): Filename in the `lessons/` directory (must exist)
- `chapters[].lessons[].title` (optional): Lesson display name. If omitted, auto-extracted from the Teaching Prompt (`lesson_title: ...` line in the MarkdownFlow content) or derived from filename

<script type="text/markdown" id="md-import-json-format">
# Import JSON Format

The `build` command generates a `shifu-import.json` file that can be imported to the AI-Shifu platform.

## Schema

```json
{
  "version": "1.0",
  "shifu": {
    "shifu_bid": "<UUID>",
    "title": "Course Title",
    "description": "Description",
    "keywords": "keywords",
    "llm": "",
    "llm_temperature": 0,
    "course_prompt": "<content from course-prompt.md>",
    "ask_enabled_status": 5101,
    "price": 0.0
  },
  "outline_items": [
    {
      "outline_item_bid": "<UUID>",
      "title": "Lesson Title",
      "type": 401,
      "parent_bid": "",
      "position": "0",
      "content": "<MarkdownFlow content>"
    }
  ],
  "structure": { "bid": "<shifu_bid>", "type": "shifu", "children": [] }
}
```

## Key Fields

- `course_prompt`: Course-level AI role definition (from `course-prompt.md`). The CLI maps this to the platform API field `system_prompt` when calling `/shifus/<bid>/detail`.
- `type: 401`: Regular lesson node
- `parent_bid`: Empty string = chapter (top-level container); non-empty = lesson (child node with MarkdownFlow content). Use `add-chapter` to create chapters, then pass the chapter BID as `--parent-bid` when creating lessons
- `content`: The MarkdownFlow prompt content (this is the core teaching material)
- `ask_enabled_status: 5101`: Enables learner questions

// ── Build flat index ───────────────────────────────────────────────
const nodesById = {};
function indexNode(n, parentFile) {
  if (!n.id) return;
  nodesById[n.id] = { ...n, file: n.file || parentFile };
  (n.children || []).forEach(c => indexNode(c, n.file || parentFile));
}
// SKILL nodes
TREE.skill.children.forEach(c => indexNode(c, 'SKILL'));
// Add a virtual root for SKILL
nodesById['skill-root'] = { id: 'skill-root', label: 'SKILL.md', file: 'SKILL', anchor: null, desc: TREE.skill.desc };
// References
TREE.refs.files.forEach(f => {
  indexNode(f, f.file);
});

// ── Configure marked with anchor IDs on headings ───────────────────
const renderer = new marked.Renderer();
renderer.heading = function({ text, depth }) {
  // marked 12 calls with object; fallback for older versions
  if (typeof text === 'object') { depth = text.depth; text = text.text || ''; }
  const slug = String(text)
    .toLowerCase()
    .replace(/[^\w一-龥\s-]/g, '')
    .replace(/\s+/g, '-')
    .replace(/^-+|-+$/g, '');
  return `<h${depth} id="${slug}">${text}</h${depth}>\n`;
};
// Handle both old and new marked signatures
const origHeading = renderer.heading;
renderer.heading = function() {
  let text, depth;
  if (arguments.length === 1 && typeof arguments[0] === 'object') {
    text = arguments[0].text;
    depth = arguments[0].depth;
  } else {
    text = arguments[0];
    depth = arguments[1];
  }
  const slug = String(text)
    .toLowerCase()
    .replace(/<[^>]+>/g, '')
    .replace(/[^\w一-龥\s-]/g, '')
    .replace(/\s+/g, '-')
    .replace(/^-+|-+$/g, '');
  return `<h${depth} id="${slug}">${text}</h${depth}>\n`;
};
marked.use({ renderer, gfm: true, breaks: false });

// ── Render tree ────────────────────────────────────────────────────
function renderTree() {
  const $tree = document.getElementById('tree');

  // SKILL section
  let html = '<div class="tree-section-title">📘 SKILL.md (主入口)</div>';
  html += `<div class="file-node node-clickable" data-id="skill-root">${TREE.skill.label}</div>`;
  TREE.skill.children.forEach(c => {
    const hasRefs = c.refs && c.refs.length > 0;
    html += `<div class="node node-clickable" data-id="${c.id}"><span>${c.label}</span>${hasRefs ? `<span class="refs-badge">→${c.refs.length}</span>` : ''}</div>`;
  });

  // References section
  html += '<div class="tree-section-title">📂 references/</div>';
  TREE.refs.files.forEach(f => {
    if (f.children && f.children.length > 0) {
      html += `<details>
        <summary class="file-node node-clickable" data-id="${f.id}">${f.label}</summary>
        <div>`;
      f.children.forEach(c => {
        html += `<div class="node node-clickable" data-id="${c.id}"><span>${c.label}</span></div>`;
      });
      html += `</div></details>`;
    } else {
      html += `<div class="file-node node-clickable" data-id="${f.id}">${f.label}</div>`;
    }
  });

  $tree.innerHTML = html;

  // Attach click handlers
  document.querySelectorAll('.node-clickable').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      selectNode(el.dataset.id);
    });
  });
}

// ── Select node and render detail ──────────────────────────────────
let currentNodeId = null;

function selectNode(nodeId) {
  const node = nodesById[nodeId];
  if (!node) return;
  currentNodeId = nodeId;

  // Update active state in tree
  document.querySelectorAll('.node-clickable').forEach(el => {
    el.classList.remove('active', 'related');
  });
  const activeEl = document.querySelector(`.node-clickable[data-id="${nodeId}"]`);
  if (activeEl) {
    activeEl.classList.add('active');
    // If inside <details>, open it
    let parent = activeEl.parentElement;
    while (parent && parent !== document.body) {
      if (parent.tagName === 'DETAILS') parent.open = true;
      parent = parent.parentElement;
    }
    // Scroll into view if needed
    activeEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }

  // Highlight related nodes (cross-references)
  if (node.refs && node.refs.length > 0) {
    node.refs.forEach(refId => {
      const el = document.querySelector(`.node-clickable[data-id="${refId}"]`);
      if (el && !el.classList.contains('active')) el.classList.add('related');
      // open ancestor <details>
      if (el) {
        let p = el.parentElement;
        while (p && p !== document.body) {
          if (p.tagName === 'DETAILS') p.open = true;
          p = p.parentElement;
        }
      }
    });
  }

  // Render detail
  renderDetail(node);
}

function renderDetail(node) {
  const $detail = document.getElementById('detail');
  const fileKey = node.file;
  if (!fileKey) {
    $detail.innerHTML = '<div class="empty-detail">未指定文件</div>';
    return;
  }
  const md = (document.getElementById('md-' + fileKey).textContent || '').trim();
  const html = marked.parse(md);

  // Breadcrumb
  const fileLabel = (TREE.refs.files.find(f => f.file === fileKey) || {}).label || (fileKey === 'SKILL' ? 'SKILL.md' : fileKey + '.md');
  const breadcrumb = `
    <div class="breadcrumb">
      <code>${fileLabel}</code>
      ${node.anchor ? `<span class="sep">›</span> <code>#${node.anchor}</code>` : ''}
      <span class="desc">${node.desc || ''}</span>
    </div>
  `;

  // Related-from indicator (this node is referenced by which SKILL.md sections)
  const incomingRefs = [];
  TREE.skill.children.forEach(c => {
    if (c.refs && c.refs.includes(node.id)) incomingRefs.push(c);
  });
  let relatedHtml = '';
  if (incomingRefs.length > 0 && fileKey !== 'SKILL') {
    relatedHtml = `<div class="related-indicator">📍 被 SKILL.md 引用： ${incomingRefs.map(r => `<a href="#" data-jump="${r.id}">${r.label}</a>`).join(' · ')}</div>`;
  }

  // Outgoing refs (for SKILL.md nodes)
  let outgoingHtml = '';
  if (node.refs && node.refs.length > 0) {
    const refLabels = node.refs.map(rid => {
      const r = nodesById[rid];
      return r ? `<a href="#" data-jump="${rid}">${r.label}</a>` : rid;
    });
    outgoingHtml = `<div class="related-indicator">🔗 引用： ${refLabels.join(' · ')}</div>`;
  }

  $detail.innerHTML = breadcrumb + relatedHtml + outgoingHtml + '<div class="markdown">' + html + '</div>';

  // Wire jump links
  $detail.querySelectorAll('a[data-jump]').forEach(a => {
    a.addEventListener('click', (e) => {
      e.preventDefault();
      selectNode(a.dataset.jump);
    });
  });

  // Scroll to anchor
  if (node.anchor) {
    requestAnimationFrame(() => {
      const target = $detail.querySelector('#' + CSS.escape(node.anchor));
      if (target) {
        target.classList.add('anchor-target');
        target.scrollIntoView({ block: 'start', behavior: 'smooth' });
        setTimeout(() => target.classList.remove('anchor-target'), 3000);
      } else {
        $detail.scrollTop = 0;
      }
    });
  } else {
    $detail.scrollTop = 0;
  }
}

// ── Init ───────────────────────────────────────────────────────────
renderTree();
// Default: show SKILL.md overview
selectNode('skill-root');
</script>
