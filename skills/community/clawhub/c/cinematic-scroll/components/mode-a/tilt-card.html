<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>TiltCard</title><style>
:root{--bg:#F7F5F1;--surface:#EFEBE4;--fg:#161310;--fg-dim:#574F45;--accent:#C9A96E;--line:#16131024;
--font-display:"Cormorant Garamond",Georgia,serif;--font-body:"EB Garamond",Georgia,serif;
--font-ui:Inter,system-ui,-apple-system,sans-serif;
--size-caption:.78rem;--size-body-lg:1.125rem;--size-h4:1.953rem;
--space-md:16px;--space-lg:24px;--space-xl:32px;--space-4xl:96px;
--radius-lg:16px;
--ease-reveal:cubic-bezier(.16,1,.3,1);--ease-playful:cubic-bezier(.34,1.56,.64,1);
--dur-base:500ms;--dur-micro:300ms;--lh-tight:1.1;--lh-relaxed:1.7;}
*{box-sizing:border-box;margin:0}
body{background:var(--bg);color:var(--fg);font-family:var(--font-body);line-height:var(--lh-relaxed);
  min-height:100vh;display:grid;place-items:center;padding:var(--space-4xl) var(--space-lg)}
.eyebrow{font-family:var(--font-ui);font-size:var(--size-caption);letter-spacing:.22em;text-transform:uppercase;color:var(--fg-dim)}
.title{font-family:var(--font-display);font-size:var(--size-h4);line-height:var(--lh-tight);font-weight:600}
.body{color:var(--fg-dim);max-width:34ch}
:focus-visible{outline:2px solid var(--accent);outline-offset:3px}

/* The card sits flat by default. --rx/--ry/--gx/--gy are written by JS (rAF). */
.card{--rx:0deg;--ry:0deg;--gx:50%;--gy:50%;
  position:relative;display:grid;gap:var(--space-md);max-width:24rem;
  padding:var(--space-xl);border:1px solid var(--line);border-radius:var(--radius-lg);
  background:var(--surface);transform-style:preserve-3d;will-change:transform}
/* opacity-only specular sheen — a fixed radial layer; only opacity animates */
.card::after{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;
  background:radial-gradient(40% 45% at var(--gx) var(--gy),#ffffff80,#ffffff00 70%);
  opacity:0;transition:opacity var(--dur-micro) var(--ease-reveal)}

/* TILT is desktop-only: hover + fine pointer, never on touch (guardrails 1.9). */
@media (hover:hover) and (pointer:fine){
  .card{transition:transform var(--dur-base) var(--ease-playful);
    transform:perspective(900px) rotateX(var(--rx)) rotateY(var(--ry))}
  .card.is-tilting{transition:none}            /* live tracking; no lag while pointer moves */
  .card.is-tilting::after{opacity:1}
}

@media (max-width:768px){
  .title{font-size:1.6rem}
  .card{padding:var(--space-lg);max-width:none;width:100%}
}
@media (prefers-reduced-motion:reduce){
  .card{transition:none;transform:none}
  .card::after{display:none}
}
</style></head><body><main>
<section class="wrap" aria-labelledby="tc-title">
  <article class="card" tabindex="0">
    <p class="eyebrow">Edition 04</p>
    <h2 class="title" id="tc-title">It leans toward the light.</h2>
    <p class="body">Move the pointer across the card — it tilts up to eight degrees with a specular sheen, then settles flat on the playful curve when you leave.</p>
  </article>
</section>
</main><script>
// Pointer-3D is gated: fine pointer + real hover, never touch, never reduced-motion (guardrails 1.9).
const fine=matchMedia("(hover:hover) and (pointer:fine)").matches;
const still=matchMedia("(prefers-reduced-motion:reduce)").matches;
const touch=matchMedia("(pointer:coarse)").matches||"ontouchstart" in window;
const card=document.querySelector(".card");
if(card&&fine&&!still&&!touch){
  const MAX=8;                 // max degrees of tilt — subtle, never queasy
  let raf=0,px=0,py=0;
  const apply=()=>{
    raf=0;
    const r=card.getBoundingClientRect();
    const nx=(px-r.left)/r.width-.5;   // -.5..+.5
    const ny=(py-r.top)/r.height-.5;
    card.style.setProperty("--ry",(nx*MAX).toFixed(2)+"deg");
    card.style.setProperty("--rx",(-ny*MAX).toFixed(2)+"deg");
    card.style.setProperty("--gx",((nx+.5)*100).toFixed(1)+"%");
    card.style.setProperty("--gy",((ny+.5)*100).toFixed(1)+"%");
  };
  card.addEventListener("pointermove",(e)=>{           // rAF-throttled: one DOM write per frame
    px=e.clientX;py=e.clientY;card.classList.add("is-tilting");
    if(!raf)raf=requestAnimationFrame(apply);
  });
  card.addEventListener("pointerleave",()=>{           // ease back to flat on the playful curve
    if(raf){cancelAnimationFrame(raf);raf=0;}
    card.classList.remove("is-tilting");
    card.style.setProperty("--rx","0deg");card.style.setProperty("--ry","0deg");
  });
}
</script></body></html>
