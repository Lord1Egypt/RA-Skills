services:
  mysql:
    image: mysql:8.0.36
    container_name: ${MYSQL_CONTAINER:-codai_db}
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-secret}
      MYSQL_DATABASE: ${MYSQL_MAIN_DB:-codai_main}
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - codai_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  mysql_data:

networks:
  codai_net:
    driver: bridge
    name: ${CODAI_NETWORK:-nginx-proxy_net}
