      - 'qm_software: auto/cp2k/orca (auto=自动检测)'
      - 'qm_method: PBE/B3LYP/BLYP/PBE0/CAM-B3LYP/WB97X'
      - 'qm_dispersion: none/D3/D3BJ (色散校正)'
      - 'qm_basis: DZVP-MOLOPT-SR-GTH (CP2K) / def2-SVP (ORCA)'
      - 'qm_selection: auto/residue/index/manual'
      - 'qm_charge: 0 (QM区域总电荷)'
      - 'qm_multiplicity: 1 (自旋多重度)'
      - 'link_atom_method: auto/hydrogen/none'
      - 'mm_embedding: electrostatic/mechanical'
      - 'dt: 0.0005-0.001 ps (0.5-1 fs, 比纯MM小)'
      - 'mm_forcefield: amber99sb-ildn/charmm36/oplsaa'
      common_errors:
      - 'ERROR-001: QM软件不可用 → 安装CP2K/ORCA或重编译GROMACS'
