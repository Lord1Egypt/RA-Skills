[project]
site_name = "Peerberry SDK Documentation"
site_description = "Unofficial Python SDK for Peerberry"
repo_url = "https://github.com/FortressQuant/peerberry-sdk"
repo_name = "FortressQuant/peerberry-sdk"
edit_uri = "edit/main/docs/"

nav = [
    { Home = "index.md" },
    { "Getting Started" = [
        { Installation = "getting-started/installation.md" },
        { Quickstart = "getting-started/quickstart.md" },
    ] },
    { Guides = [
        { Authentication = "guides/authentication.md" },
        { Configuration = "guides/configuration.md" },
        { "Error Handling" = "guides/error-handling.md" },
        { Models = "guides/models.md" },
    ] },
    { API = [
        { "Client API (Generated)" = "api/client.md" },
        { "Module Reference (Generated)" = "api/reference.md" },
    ] },
]

[project.theme]
variant = "classic"
features = [
    "navigation.sections",
    "navigation.expand",
    "content.code.copy",
    "search.suggest",
    "search.highlight",
]

[project.plugins.search]

[project.plugins."gen-files"]
scripts = [
    "docs/gen_client_reference.py",
    "docs/gen_api.py",
]

[project.plugins.mkdocstrings.handlers.python]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "sphinx"
show_source = false
members_order = "source"
filters = ["!^_"]
merge_init_into_class = true
separate_signature = true
show_root_heading = true
show_root_full_path = false

[project.markdown_extensions.admonition]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.def_list]

[project.markdown_extensions.footnotes]

[project.markdown_extensions.tables]

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions."pymdownx.highlight"]

[project.markdown_extensions."pymdownx.inlinehilite"]

[project.markdown_extensions."pymdownx.superfences"]

[project.markdown_extensions."pymdownx.snippets"]
