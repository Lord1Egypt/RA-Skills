<!-- ============================================
     COMPONENT: Storylines (故事线 / 路径)
     用途：展示 2~4 条并行路径/策略线
     每条线：左彩条 + 编号 + 标题 + 路径节点 + 描述
     配色：storyline-1(蓝) storyline-2(绿) storyline-3(橙)
     ============================================ -->
<div class="storylines">

  <!-- 故事线 1 -->
  <div class="storyline storyline-1">
    <div class="storyline-header">
      <div class="storyline-num">1</div>
      <div class="storyline-title">__STORYLINE_1_TITLE__</div>
    </div>
    <div class="storyline-path">
      <div class="path-node">__NODE_A__</div>
      <div class="path-arrow">&#10140;</div>
      <div class="path-node">__NODE_B__</div>
      <div class="path-arrow">&#10140;</div>
      <div class="path-node">__NODE_C__</div>
    </div>
    <div class="storyline-desc">
      __DESCRIPTION_1__
    </div>
  </div>

  <!-- 故事线 2 -->
  <div class="storyline storyline-2">
    <div class="storyline-header">
      <div class="storyline-num">2</div>
      <div class="storyline-title">__STORYLINE_2_TITLE__</div>
    </div>
    <div class="storyline-path">
      <div class="path-node">__NODE_A__</div>
      <div class="path-arrow">&#10140;</div>
      <div class="path-node">__NODE_B__</div>
      <div class="path-arrow">&#10140;</div>
      <div class="path-node">__NODE_C__</div>
    </div>
    <div class="storyline-desc">
      __DESCRIPTION_2__
    </div>
  </div>

  <!-- 故事线 3（可选，按需添加/删除） -->
  <div class="storyline storyline-3">
    <div class="storyline-header">
      <div class="storyline-num">3</div>
      <div class="storyline-title">__STORYLINE_3_TITLE__</div>
    </div>

      <div class="path-node">__NODE_A__</div>
