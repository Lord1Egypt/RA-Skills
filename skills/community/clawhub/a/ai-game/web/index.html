// Category order for display
const CATEGORY_ORDER = ["行业与公司", "游戏内AI体验", "开发与工具", "AI生成与创作", "前沿与研究", "运营与商业化"];

let currentFilter = "all";

function renderFilterBar() {
  const bar = document.getElementById("filterBar");
  bar.innerHTML = DATA.categories.map(c => {
    const count = c.key === "all" ? DATA.items.length : DATA.items.filter(i => i.category === c.key).length;
    if (c.key !== "all" && count === 0) return "";
    return '<span class="filter-tab' + (currentFilter === c.key ? ' active' : '') + '" data-key="' + c.key + '">' + c.label + (count > 0 ? ' (' + count + ')' : '') + '</span>';
  }).join("");

  bar.querySelectorAll(".filter-tab").forEach(tab => {
    tab.addEventListener("click", function() {
      currentFilter = this.dataset.key;
      renderFilterBar();
      renderContent();
    });
  });
}

function renderContent() {
  const container = document.getElementById("content");
  let filtered = currentFilter === "all" ? DATA.items : DATA.items.filter(i => i.category === currentFilter);

  // Group by category
  let grouped = {};
  filtered.forEach(item => {
    if (!grouped[item.category]) grouped[item.category] = [];
    grouped[item.category].push(item);
  });

  let html = "";
  let num = 1;

  CATEGORY_ORDER.forEach(cat => {
    if (!grouped[cat] || grouped[cat].length === 0) return;
    html += '<div class="category-section">';
    html += '<div class="category-title">' + cat + '</div>';
    grouped[cat].forEach(item => {
      html += '<div class="news-item">';
      html += '<div class="item-header">';
      html += '<span class="item-number">' + num + '.</span>';
      html += '<span class="item-title">' + item.title + ' <span class="item-date">(' + item.date + ')</span></span>';
      html += '</div>';
      html += '<div class="item-source">' + item.source + '</div>';
      html += '<div class="item-desc">' + item.description + '</div>';
      html += '<div class="item-reason"><span class="reason-label">推荐原因：</span>' + item.reason + '</div>';
      html += '<div class="item-link"><a href="' + item.url + '" target="_blank" rel="noopener">' + item.url + '</a></div>';
      html += '</div>';
      num++;
    });
    html += '</div>';
  });

  container.innerHTML = html;
}

renderFilterBar();
renderContent();
