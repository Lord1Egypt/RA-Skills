name: yunlv-customs-scout
version: 1.0.2
license: MIT-0
type: openclaw-skill
description: Use when user needs to find import/export trade data, competitor customers,
  or market intelligence from customs data. Use when searching for active buyers of
  specific products in target markets. Use when performing competitor client mining
  via trade records. Use when user mentions "海关数据", "进出口数据", "采购商", "竞争对手客户", "挖客户",
  "贸易数据", "Import Intel".
emoji: 🤖
homepage: https://yunlvai.com
publisher:
  name: 云旅AI团队
  website: https://yunlvai.com
