<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hermes Cyber Terminal</title>
<link rel="stylesheet" href="../../../assets/fonts.css">
<link rel="stylesheet" href="../../../assets/base.css">
<link rel="stylesheet" href="style.css">
</head>
<body class="tpl-hermes-cyber-terminal">
<div class="deck">
  <section class="slide is-active">
    <div class="hc-grid"></div>
    <div class="hc-vignette"></div>
    <div class="hc-scanlines"></div>
    <div class="hc-chrome"><div class="dots"><span></span><span></span><span></span></div><div>~/your-deck · zsh</div></div>
    <div style="margin:auto 0">
      <p class="hc-prompt">cat your_deck.md</p>
      <h1 class="hc-h1">终端风
演示模板<span class="hc-cursor"></span></h1>
      <p class="hc-lede">替换这里的内容为你的技术分享。</p>
    </div>
    <div class="hc-footer"><span>your-deck</span><span>01 / 08</span></div>
  </section>
</div>
<script src="../../../assets/runtime.js"></script>
</body>
</html>
