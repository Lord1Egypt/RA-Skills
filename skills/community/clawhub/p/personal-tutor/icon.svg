<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="brain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#f5a623"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Open book -->
  <g transform="translate(256,280)">
    <!-- Left page -->
    <path d="M-2,0 Q-2,-100 -60,-120 L-130,-110 Q-100,-80 -98,0 Z" fill="#2d3561" stroke="#4a5599" stroke-width="2"/>
    <!-- Right page -->
    <path d="M2,0 Q2,-100 60,-120 L130,-110 Q100,-80 98,0 Z" fill="#353f72" stroke="#4a5599" stroke-width="2"/>
    <!-- Spine -->
    <line x1="0" y1="-125" x2="0" y2="0" stroke="#4a5599" stroke-width="3"/>
    <!-- Page lines left -->
    <line x1="-20" y1="-95" x2="-90" y2="-90" stroke="#4a5599" stroke-width="1" opacity="0.4"/>
    <line x1="-15" y1="-75" x2="-85" y2="-70" stroke="#4a5599" stroke-width="1" opacity="0.4"/>
    <line x1="-12" y1="-55" x2="-82" y2="-50" stroke="#4a5599" stroke-width="1" opacity="0.4"/>
    <!-- Page lines right -->
    <line x1="20" y1="-95" x2="90" y2="-90" stroke="#4a5599" stroke-width="1" opacity="0.4"/>
    <line x1="15" y1="-75" x2="85" y2="-70" stroke="#4a5599" stroke-width="1" opacity="0.4"/>
    <line x1="12" y1="-55" x2="82" y2="-50" stroke="#4a5599" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Brain / knowledge node network -->
  <g transform="translate(256,165)">
    <!-- Connection lines -->
    <line x1="0" y1="-30" x2="-55" y2="-65" stroke="#e94560" stroke-width="2" opacity="0.6"/>
    <line x1="0" y1="-30" x2="55" y2="-65" stroke="#e94560" stroke-width="2" opacity="0.6"/>
    <line x1="0" y1="-30" x2="-75" y2="-20" stroke="#f5a623" stroke-width="2" opacity="0.6"/>
    <line x1="0" y1="-30" x2="75" y2="-20" stroke="#f5a623" stroke-width="2" opacity="0.6"/>
    <line x1="0" y1="-30" x2="-40" y2="20" stroke="#e94560" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="-30" x2="40" y2="20" stroke="#e94560" stroke-width="2" opacity="0.5"/>
    <line x1="-55" y1="-65" x2="-75" y2="-20" stroke="#f5a623" stroke-width="1.5" opacity="0.4"/>
    <line x1="55" y1="-65" x2="75" y2="-20" stroke="#f5a623" stroke-width="1.5" opacity="0.4"/>
    <line x1="-55" y1="-65" x2="55" y2="-65" stroke="#e94560" stroke-width="1.5" opacity="0.3"/>
    <line x1="-75" y1="-20" x2="75" y2="-20" stroke="#f5a623" stroke-width="1.5" opacity="0.3"/>

    <!-- Central node -->
    <circle cx="0" cy="-30" r="18" fill="#e94560" opacity="0.9"/>
    <text x="0" y="-25" text-anchor="middle" fill="white" font-size="16" font-weight="bold" font-family="sans-serif">🧠</text>

    <!-- Sub nodes -->
    <circle cx="-55" cy="-65" r="12" fill="#f5a623" opacity="0.85"/>
    <circle cx="55" cy="-65" r="12" fill="#f5a623" opacity="0.85"/>
    <circle cx="-75" cy="-20" r="10" fill="#e94560" opacity="0.7"/>
    <circle cx="75" cy="-20" r="10" fill="#e94560" opacity="0.7"/>
    <circle cx="-40" cy="20" r="9" fill="#f5a623" opacity="0.6"/>
    <circle cx="40" cy="20" r="9" fill="#f5a623" opacity="0.6"/>
  </g>

  <!-- Checkmark -->
  <g transform="translate(370,400)">
    <circle cx="0" cy="0" r="30" fill="#00d2a0" opacity="0.15"/>
    <path d="M-15,0 L-5,10 L18,-12" stroke="#00d2a0" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Arrow down -->
  <g transform="translate(142,400)">
    <circle cx="0" cy="0" r="30" fill="#f5a623" opacity="0.15"/>
    <path d="M0,-12 L0,12 M-8,4 L0,12 L8,4" stroke="#f5a623" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
