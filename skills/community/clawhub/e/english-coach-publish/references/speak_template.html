<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>口语练习</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; padding: 20px; }
.container { max-width: 600px; margin: 0 auto; }
h1 { text-align: center; margin: 20px 0; font-size: 1.5em; color: #e94560; }
.sentence-card { background: #16213e; border-radius: 12px; padding: 20px; margin: 15px 0; border-left: 4px solid #0f3460; }
.sentence-card.done { border-left-color: #00b894; }
.sentence-num { font-size: 0.85em; color: #888; margin-bottom: 8px; }
.target { font-size: 1.2em; color: #fff; margin-bottom: 15px; line-height: 1.6; }
.target strong { color: #e94560; }
.rec-area { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.btn { padding: 10px 24px; border: none; border-radius: 8px; font-size: 1em; cursor: pointer; transition: all 0.2s; }
.btn-record { background: #e94560; color: #fff; }
.btn-record:hover { background: #c73652; }
.btn-record:disabled { background: #555; cursor: not-allowed; }
.btn-record.recording { background: #ff6b6b; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
.result { margin-top: 12px; padding: 10px; border-radius: 6px; font-size: 0.95em; }
.result.success { background: rgba(0,184,148,0.15); border: 1px solid #00b894; }
.result.error { background: rgba(233,69,96,0.15); border: 1px solid #e94560; }
.status { font-size: 0.85em; color: #aaa; margin-top: 4px; }
.submit-section { text-align: center; margin-top: 30px; }
.btn-submit { background: #0f3460; color: #fff; padding: 14px 48px; font-size: 1.1em; }
.btn-submit:hover { background: #1a4a8a; }
.btn-submit:disabled { background: #333; cursor: not-allowed; }
.hint { text-align: center; color: #888; font-size: 0.85em; margin-top: 10px; }
</style>
</head>
<body>
<div class="container">
<h1>🗣️ 口语练习</h1>

<div class="sentence-card" id="card-1">
<div class="sentence-num">句子 1 / 3</div>
<div class="target" id="target-1">📖 请朗读：[SENTENCE_1]</div>
<div class="rec-area">
<button class="btn btn-record" id="btn-1" onclick="toggleRecord(1)">🎤 开始录音</button>
<span class="status" id="status-1">等待录音</span>
</div>
<div id="result-1"></div>
</div>

<div class="sentence-card" id="card-2">
<div class="sentence-num">句子 2 / 3</div>
<div class="target" id="target-2">📖 请朗读：[SENTENCE_2]</div>
<div class="rec-area">
<button class="btn btn-record" id="btn-2" onclick="toggleRecord(2)">🎤 开始录音</button>
<span class="status" id="status-2">等待录音</span>
</div>
<div id="result-2"></div>
</div>

<div class="sentence-card" id="card-3">
<div class="sentence-num">句子 3 / 3</div>
<div class="target" id="target-3">📖 请朗读：[SENTENCE_3]</div>
<div class="rec-area">
<button class="btn btn-record" id="btn-3" onclick="toggleRecord(3)">🎤 开始录音</button>
<span class="status" id="status-3">等待录音</span>
</div>
<div id="result-3"></div>
</div>

<div class="submit-section">
<button class="btn btn-submit" id="btn-submit" onclick="submitAll()" disabled>提交批改</button>
<p class="hint" id="submit-hint">完成所有 3 句录音后可提交</p>
</div>
</div>

<script>
const SERVER = 'http://localhost:8765';
let mediaRecorder = null;
let audioChunks = [];
let currentSentence = null;
const results = {};
const doneSentences = new Set();

async function toggleRecord(num) {
if (currentSentence !== null && currentSentence !== num) return;

const btn = document.getElementById('btn-' + num);
const status = document.getElementById('status-' + num);

if (currentSentence === num) {
mediaRecorder.stop();
btn.textContent = '⏳ 识别中...';
btn.classList.remove('recording');
btn.disabled = true;
status.textContent = '正在识别...';
currentSentence = null;
return;
}

try {
const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
audioChunks = [];
mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
mediaRecorder.onstop = async () => {
stream.getTracks().forEach(t => t.stop());
const blob = new Blob(audioChunks, { type: 'audio/webm' });

const reader = new FileReader();
reader.onload = async () => {
const base64 = reader.result.split(',')[1];
try {
const resp = await fetch(SERVER + '/transcribe', {
method: 'POST', headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({ audio: base64 })
});
const data = await resp.json();
results[num] = data.text || '';
showResult(num, data.text || '', true);
} catch(e) {
status.textContent = '识别失败: ' + e.message;
btn.textContent = '🎤 重试';
btn.disabled = false;
btn.classList.remove('recording');
}
};
reader.readAsDataURL(blob);
};
mediaRecorder.start();
currentSentence = num;
btn.textContent = '⏹ 停止录音';
btn.classList.add('recording');
status.textContent = '录音中...';
} catch(e) {
status.textContent = '麦克风权限未授权: ' + e.message;
}
}

function showResult(num, text, success) {
const div = document.getElementById('result-' + num);
const btn = document.getElementById('btn-' + num);
const status = document.getElementById('status-' + num);
const card = document.getElementById('card-' + num);

div.innerHTML = '<div class="result ' + (success ? 'success' : 'error') + '">' +
'<strong>识别结果：</strong>' + (text || '(未识别到内容)') + '</div>';
btn.textContent = success ? '✅ 已完成' : '🎤 重试';
btn.disabled = false;
btn.classList.remove('recording');
status.textContent = success ? '✓ 已识别' : '✗ 重试';

if (success) {
doneSentences.add(num);
card.classList.add('done');
} else {
doneSentences.delete(num);
card.classList.remove('done');
}
updateSubmitButton();
}

function updateSubmitButton() {
const allDone = doneSentences.size === 3;
document.getElementById('btn-submit').disabled = !allDone;
document.getElementById('submit-hint').textContent = allDone ? '全部完成，点击提交！' : '完成所有 3 句录音后可提交 (' + doneSentences.size + '/3)';
}

async function submitAll() {
const sentences = [
document.getElementById('target-1').textContent.replace('📖 请朗读：', ''),
document.getElementById('target-2').textContent.replace('📖 请朗读：', ''),
document.getElementById('target-3').textContent.replace('📖 请朗读：', '')
];
const payload = {
targets: sentences,
results: { "1": results[1] || "", "2": results[2] || "", "3": results[3] || "" },
timestamp: new Date().toISOString()
};
try {
const resp = await fetch(SERVER + '/submit-results', {
method: 'POST', headers: { 'Content-Type': 'application/json' },
body: JSON.stringify(payload)
});
if (resp.ok) {
document.getElementById('btn-submit').textContent = '✅ 已提交，回到聊天查看批改';
document.getElementById('btn-submit').disabled = true;
}
} catch(e) {
alert('提交失败: ' + e.message);
}
}
</script>
</body>
</html>
