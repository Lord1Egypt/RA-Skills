  coarse_grained:
    name: 粗粒化模拟
    description: Coarse-Grained - MARTINI力场、AA↔CG转换、多尺度模拟
    script: scripts/advanced/coarse-grained.sh
    troubleshoot: references/troubleshoot/coarse-grained-errors.md
    quick_ref:
      dependencies:
      - gmx
      - martinize2/martinize.py
      - backward.py (反向映射)
      auto_install: true
      auto_fix:
      - martini_forcefield_download
      - martinize_installation
      - timestep_validation
      - checkpoint_recovery
      key_params:
      - 'mode: aa2cg (全原子→粗粒化) / cg (直接CG) / backmapping (CG→全原子) / multiscale (多尺度)'
      - 'martini_version: 2 (MARTINI 2.x) / 3 (MARTINI 3.x, 推荐)'
      - 'dt: 0.020-0.030 ps (20-30 fs, 比全原子大10倍)'
      - 'cg_water: W (标准) / PW (极性) / SW (小珠子)'
      - 'rcoulomb/rvdw: 1.1 nm (MARTINI标准)'
      - 'coulombtype: reaction-field (ε_r=15, ε_rf=0)'
      - 'tau_t: 1.0 ps (V-rescale)'
      - 'tau_p: 12.0 ps (Parrinello-Rahman, 比全原子大)'
      - 'compressibility: 3e-4 bar⁻¹ (比全原子小)'
      - 'elastic_network: -ef 500 -el 0.5 -eu 0.9 (martinize参数)'
      common_errors:
      - 'ERROR-001: MARTINI力场不可用 → auto-download或手动安装'
      - 'ERROR-002: martinize未找到 → pip install vermouth-martinize'
      - 'ERROR-003: AA→CG转换失败 → 检查PDB格式/残基类型'
      - 'ERROR-004: 时间步长不合理 → auto-fix到20-30 fs'
      - 'ERROR-005: 溶剂化失败 → 创建CG水模型/使用insane'
      - 'ERROR-006: 离子添加失败 → 使用W组/MARTINI离子名'
      - 'ERROR-007: EM不收敛 → 增加步数/放宽标准'
      - 'ERROR-008: NVT/NPT不稳定 → 减小dt/延长平衡'
      - 'ERROR-009: 反向映射失败 → 安装backward.py/CG2AT'
      - 'ERROR-010: 截断距离警告 → 增大盒子/使用1.1 nm'
      - 'ERROR-011: 静电处理错误 → 使用reaction-field (ε_r=15)'
      - 'ERROR-012: 压力振荡 → 增大tau_p到12-20 ps'
      - 'ERROR-013: 虚拟位点问题 → 使用-elastic选项'
      - 'ERROR-014: 多尺度失败 → 分步执行各阶段'
      output:
      - cg_protein.pdb
      - cg_topol.top
      - em.gro
      - nvt.gro
      - npt.gro
      - md.xtc
      - CG_REPORT.md
  non_equilibrium:
    name: 非平衡分子动力学
    description: Non-Equilibrium MD - 流动/剪切/热流模拟，粘度测量
    script: scripts/advanced/non-equilibrium.sh
    troubleshoot: references/troubleshoot/non-equilibrium-errors.md
    quick_ref:
      dependencies:
      - gmx
      auto_fix:
      - cosine_accel_validation
      - deform_params_validation
      - acceleration_groups_validation
      - wall_params_validation
      - checkpoint_recovery
      key_params:
      - 'nemd_type: cosine (余弦加速) / deform (盒子变形) / acceleration (恒定加速) / walls (壁面驱动)'
      - 'cos_accel: 0.01-1.0 nm/ps² (余弦加速振幅)'
      - 'deform_rate: 0.001-0.01 nm/ps (变形速率)'
      - 'deform_axis: xy (b(x)剪切) / xz (c(x)剪切) / yz (c(y)剪切)'
      - 'accel_x/y/z: 0.01-1.0 nm/ps² (恒定加速度)'
      - 'wall_speed: 0.001-0.1 nm/ps (壁面速度)'
      - 'shear_rate: < 0.1 ps⁻¹ (简单液体), < 0.001 ps⁻¹ (聚合物)'
      - 'comm-mode: None (禁用质心运动移除)'
      - 'pcoupl: no (禁用压力耦合，deform方法)'
      - 'viscosity_formula: η = σ_xy / γ̇ (deform) 或自动计算 (cosine)'
      common_errors:
      - 'ERROR-001: 余弦加速仅支持md积分器 → 确保integrator=md'
      - 'ERROR-002: 加速度过大系统崩溃 → 减小到0.01-0.1'
      - 'ERROR-003: 变形与压力耦合冲突 → pcoupl=no'
      - 'ERROR-004: 变形速率过大 → 减小到0.001-0.01'
      - 'ERROR-005: 加速组不存在 → 检查索引文件/组名'
      - 'ERROR-006: 质心漂移 → comm-mode=None'
      - 'ERROR-007: 壁面位置限制缺失 → 生成posre文件'
      - 'ERROR-008: LINCS警告 → 减小驱动力/时间步长'
      - 'ERROR-009: 粘度异常 → 检查剪切率/延长时间'
      - 'ERROR-010: 速度剖面不符合预期 → 延长模拟达到稳态'
      - 'ERROR-011: 剪切变稀 → 运行多个剪切率外推'
      output:
      - nemd.xtc
      - nemd.edr
      - viscosity.xvg
      - pressure_tensor.xvg
      - NON_EQUILIBRIUM_REPORT.md
      method_comparison:
        cosine:
          pros: 简单、自动计算粘度、盒子不变形
          cons: 仅适合简单液体
          use_case: 快速粘度估计
        deform:
          pros: 直接模拟剪切、适用范围广
          cons: 需要手动计算粘度
          use_case: 一般流变学研究
        acceleration:
          pros: 灵活、可控制特定组
          cons: 需要控制质心运动
          use_case: 复杂流动、多组分系统
        walls:
          pros: 真实边界条件、研究壁面效应
          cons: 设置复杂
          use_case: 受限流体、摩擦研究
      physics_background:
      - '非平衡态: 系统偏离热力学平衡，存在宏观流动/热流/电流'
      - '粘度测量: η = σ_xy / γ̇ (牛顿流体)'
      - '剪切变稀: η(γ̇) = η₀ / (1 + (λγ̇)ⁿ)'
      - '推荐剪切率: γ̇ << 1/τ_relax (避免非线性效应)'
      - '余弦加速: a_x(z) = A cos(2πz/L_z) → v_x(z) = V cos(2πz/L_z)'
      - '速度剖面振幅: V = A (ρ/η) (L_z/2π)²'
  qmmm:
    name: QM/MM 混合模拟
    description: QM/MM Hybrid Simulation - CP2K/ORCA 接口，量子力学/分子力学混合模拟
    script: scripts/advanced/qmmm.sh
