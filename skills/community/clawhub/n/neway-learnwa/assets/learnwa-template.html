<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />

  <title>学习娃 LearnWa</title>
  <style>
    :root {
      --primary:#ff6b35; --secondary:#004e89; --accent:#ffd166;
      --bg-scene-top:#9ad8ff; --bg-scene-bottom:#dff5ff; --ground-color:#7b8d6f;
      --item-color:#ff6b35; --card-bg:#fff8f0; --ink:#182230; --muted:#667085;
      --panel:#ffffff; --line:#d0d5dd; --shadow:0 10px 24px rgba(16,24,40,.14);
      --radius:22px; --font:'PingFang SC','Microsoft YaHei',Arial,sans-serif;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent} html,body{margin:0;min-height:100%;font-family:var(--font);color:var(--ink);background:#f4f7fb} body{display:flex;justify-content:center}
    .app{width:min(100vw,430px);min-height:100vh;background:var(--card-bg);overflow:hidden;position:relative;display:flex;flex-direction:column}
    header{height:54px;padding:8px 10px;display:flex;align-items:center;justify-content:space-between;gap:8px;background:#fff;border-bottom:3px solid rgba(24,34,48,.08)}
    .brand{display:flex;align-items:center;gap:8px;min-width:0}.logo{width:36px;height:36px;border-radius:13px;background:var(--primary);color:#fff;display:grid;place-items:center;font-weight:1000;font-size:20px;box-shadow:0 4px 0 rgba(0,0,0,.16)}
    h1{font-size:17px;line-height:1.05;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:270px}.subtitle{font-size:10px;color:var(--muted);margin-top:3px}.pill{border:0;border-radius:999px;background:#fff;color:var(--secondary);font-weight:900;padding:8px 10px;min-width:50px;box-shadow:0 4px 12px rgba(16,24,40,.12)}
    .content{flex:1;padding:8px;display:flex;flex-direction:column;gap:8px}.kid-zone{height:318px;background:linear-gradient(180deg,var(--bg-scene-top),var(--bg-scene-bottom));border-radius:var(--radius);box-shadow:var(--shadow);border:3px solid rgba(255,255,255,.85);overflow:hidden;position:relative}.decor{position:absolute;inset:0;pointer-events:none}.sun{position:absolute;right:18px;top:16px;width:42px;height:42px;border-radius:50%;background:#ffe08a;box-shadow:0 0 0 8px rgba(255,224,138,.32)}.cloud{position:absolute;left:22px;top:24px;width:72px;height:24px;background:rgba(255,255,255,.82);border-radius:99px}.cloud:before,.cloud:after{content:"";position:absolute;border-radius:50%;background:inherit}.cloud:before{width:28px;height:28px;left:10px;top:-12px}.cloud:after{width:34px;height:34px;right:11px;top:-17px}.hill{position:absolute;left:-30px;right:-30px;bottom:0;height:70px;background:var(--ground-color);border-radius:50% 50% 0 0/80% 80% 0 0}.track{position:absolute;left:18px;right:18px;bottom:44px;height:8px;border-radius:9px;background:rgba(255,255,255,.42);box-shadow:0 16px 0 rgba(255,255,255,.25)}
    .stage{position:relative;z-index:1;padding:12px 10px 0;height:100%;display:grid;grid-template-rows:84px 62px 1fr;gap:6px}.hero-row{display:flex;align-items:center;justify-content:center;gap:9px}.hero{width:92px;height:82px;filter:drop-shadow(0 8px 0 rgba(0,0,0,.13));animation:heroBob 2.2s ease-in-out infinite}.speech{max-width:190px;background:#fff;border:3px solid rgba(255,255,255,.9);border-radius:20px;padding:9px 10px;font-size:16px;font-weight:1000;line-height:1.15;box-shadow:0 7px 0 rgba(16,24,40,.1);position:relative}.speech:before{content:"";position:absolute;left:-12px;top:32px;border:9px solid transparent;border-right-color:#fff}@keyframes heroBob{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-8px) rotate(1deg)}}
    .big-text{align-self:center;justify-self:center;width:calc(100% - 18px);background:rgba(255,255,255,.9);border:3px solid #fff;border-radius:20px;text-align:center;padding:9px 10px;font-size:31px;line-height:1.08;font-weight:1000;color:var(--secondary);box-shadow:0 6px 0 rgba(16,24,40,.1)}
    .items-wrap{align-self:end;padding:4px 4px 16px}.items-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:5px}.items-grid.break-ten-grid{grid-template-columns:repeat(10,1fr);row-gap:11px}.items-grid.break-ten-grid .item.ones-group{grid-row:2}.items-grid.break-ten-grid .item.ten-group{grid-row:1}.item{height:33px;border-radius:10px;display:grid;place-items:center;background:#fff;box-shadow:0 4px 0 rgba(16,24,40,.16);transition:all .42s cubic-bezier(.2,.9,.2,1.2);position:relative;border:2px solid rgba(255,255,255,.85);overflow:hidden}.item svg{width:100%;height:100%;display:block}.item.ten-group{outline:2px solid rgba(34,197,94,.72)}.item.ones-group{outline:2px solid rgba(236,72,153,.7)}.item.same-number-part{outline:2px solid rgba(34,197,94,.78)}.item.to-ten-part,.item.remain-part,.item.second-addend-part{outline:2px solid rgba(239,68,68,.78)}.item.pending{opacity:.42;transform:scale(.86);filter:saturate(.5)}.item.removed{opacity:.15;transform:translateY(10px) rotate(10deg) scale(.7);filter:grayscale(1)}.item.added{animation:pop .45s ease-out}@keyframes pop{from{transform:scale(.42);opacity:.2}to{transform:scale(1);opacity:1}}
    .parent-panel{background:var(--panel);border-radius:var(--radius);box-shadow:var(--shadow);padding:10px;border:2px solid rgba(255,255,255,.8)}.progress{display:flex;align-items:center;gap:8px;margin-bottom:8px}.bar{flex:1;height:9px;background:#eef2f6;border-radius:99px;overflow:hidden}.bar-fill{height:100%;width:0;background:var(--primary);transition:width .25s}.step-count{font-size:11px;font-weight:1000;color:var(--muted)}.guide-card{background:#f8fafc;border-radius:17px;padding:9px 10px;margin-bottom:8px;border-left:5px solid var(--primary)}.guide-title{font-size:12px;font-weight:1000;color:var(--primary);margin-bottom:4px}.guide-text{font-size:15px;line-height:1.34;font-weight:800}.answer-row{display:grid;grid-template-columns:1fr 1fr;gap:7px}.mini-card{background:#fff;border-radius:15px;padding:8px;border:2px dashed #e4e7ec;min-height:54px}.mini-card strong{display:block;font-size:11px;color:var(--muted);margin-bottom:3px}.mini-card span{font-size:14px;line-height:1.18;font-weight:900}.hint{display:none;margin-top:8px;background:#fffbeb;border:2px solid #fedf89;color:#93370d;border-radius:15px;padding:8px;font-size:14px;font-weight:800;line-height:1.3}.hint.show{display:block}.controls{display:grid;grid-template-columns:1fr 1.25fr;gap:8px;margin-top:9px}button{font-family:inherit;cursor:pointer;touch-action:manipulation}.btn{border:2px solid #182230;border-radius:16px;padding:12px 10px;min-height:46px;font-size:15px;font-weight:1000;box-shadow:0 5px 0 #182230;letter-spacing:.02em}.btn:active{transform:translateY(3px);box-shadow:0 2px 0 #182230}.btn-hint{background:#fff7d6;color:#7a3b00}.btn-next{background:var(--accent);color:#182230}.btn-restart{display:none;grid-column:1/-1;background:#e8f7ff;color:#17405f}.btn-restart.show{display:block}
    .practice{display:none;background:#fff;border-radius:var(--radius);padding:12px;box-shadow:var(--shadow);text-align:center}.practice.show{display:block}.practice h2{margin:0 0 6px;color:var(--secondary);font-size:21px}.practice p{margin:0;color:var(--muted);font-size:13px}.practice-list{display:grid;gap:8px;margin-top:10px}.practice-item{background:#f8fafc;border-radius:15px;padding:10px;font-size:20px;font-weight:1000}.tips{margin-top:10px;color:var(--muted);font-size:12px;line-height:1.35}.confetti{position:absolute;width:9px;height:13px;top:-20px;animation:fall 1.7s linear forwards;z-index:10}@keyframes fall{to{transform:translateY(100vh) rotate(540deg);opacity:.2}}
    @media (max-width:380px){header{height:50px}.content{padding:6px;gap:6px}.kid-zone{height:292px;border-radius:19px}.stage{grid-template-rows:74px 55px 1fr;padding:9px 7px 0;gap:4px}.hero{width:78px;height:70px}.speech{font-size:14px;max-width:165px;padding:8px}.big-text{font-size:27px;padding:8px}.items-grid{gap:4px}.item{height:28px;border-radius:8px}.parent-panel{padding:8px;border-radius:18px}.guide-card{padding:8px;margin-bottom:6px}.guide-text{font-size:14px}.mini-card{padding:7px;min-height:48px}.mini-card span{font-size:13px}.hint{font-size:13px;padding:7px}.btn{min-height:44px;padding:10px 8px;font-size:14px}.controls{margin-top:7px}.practice-item{font-size:18px;padding:8px}}
    @media (max-width:330px){h1{font-size:15px;max-width:210px}.subtitle{display:none}.pill{padding:7px 8px}.kid-zone{height:270px}.stage{grid-template-rows:66px 50px 1fr}.hero{width:68px;height:61px}.speech{font-size:13px;max-width:145px}.big-text{font-size:24px}.item{height:24px}.answer-row{gap:5px}.guide-text{font-size:13px}.mini-card span{font-size:12px}.btn{font-size:13px}}
  </style>
</head>
<body>
  <div class="app" id="app">
    <header><div class="brand"><div class="logo">学</div><div><h1 id="title">学习娃</h1><div class="subtitle">家长控制 · 孩子观察回答</div></div></div><button class="pill" id="soundBtn">朗读</button></header>
    <main class="content">
      <section class="kid-zone"><div class="decor"><div class="sun"></div><div class="cloud"></div><div class="hill"></div><div class="track"></div></div><div class="stage"><div class="hero-row"><div class="hero" id="heroSvg"></div><div class="speech" id="speech">准备开始</div></div><div class="big-text" id="childText">13 - 8</div><div class="items-wrap"><div class="items-grid" id="itemsGrid"></div></div></div></section>
      <section class="parent-panel" id="parentPanel"><div class="progress"><div class="bar"><div class="bar-fill" id="barFill"></div></div><div class="step-count" id="stepCount">1/6</div></div><div class="guide-card"><div class="guide-title">家长说</div><div class="guide-text" id="parentSay"></div></div><div class="answer-row"><div class="mini-card"><strong>期待回答</strong><span id="expected"></span></div><div class="mini-card"><strong>实物操作</strong><span id="materials"></span></div></div><div class="hint" id="hint"></div><div class="controls"><button class="btn btn-hint" id="hintBtn">给点线索</button><button class="btn btn-next" id="nextBtn">开始摆出来</button><button class="btn btn-restart" id="restartBtn">没关系，再摆一次</button></div></section>
      <section class="practice" id="practicePanel"><h2>迁移练习</h2><p>让孩子用瓶盖或卡片再摆一摆。</p><div class="practice-list" id="practiceList"></div><div class="tips" id="offlineTips"></div></section>
    </main>
  </div>
<script>
const CONFIG = __CONFIG_PLACEHOLDER__;
let currentStep=0,soundEnabled=true;const stepState={};const $=id=>document.getElementById(id);const els={title:$('title'),speech:$('speech'),childText:$('childText'),itemsGrid:$('itemsGrid'),parentSay:$('parentSay'),expected:$('expected'),hint:$('hint'),hintBtn:$('hintBtn'),nextBtn:$('nextBtn'),restartBtn:$('restartBtn'),barFill:$('barFill'),stepCount:$('stepCount'),heroSvg:$('heroSvg'),materials:$('materials'),practicePanel:$('practicePanel'),practiceList:$('practiceList'),offlineTips:$('offlineTips'),soundBtn:$('soundBtn')};
function svgHero(){const theme=CONFIG.themeId, kind=CONFIG.visualKind||'', c=CONFIG.story?.character||''; if(kind==='cat_fishing')return `<svg viewBox="0 0 120 100" aria-hidden="true"><path d="M24 72c7-23 22-34 43-29 19 4 31 18 28 35-3 17-22 22-43 18-19-3-34-10-28-24Z" fill="${css('--primary')}"/><path d="M42 43 35 19l21 16M72 43l18-20 2 27" fill="${css('--secondary')}"/><circle cx="52" cy="61" r="5" fill="#182230"/><circle cx="76" cy="61" r="5" fill="#182230"/><path d="M61 70c6 5 12 5 18 0" stroke="#182230" stroke-width="4" stroke-linecap="round" fill="none"/><path d="M87 35c20 7 25 21 13 37" stroke="${css('--secondary')}" stroke-width="5" stroke-linecap="round" fill="none"/><path d="M99 72c8 2 13 7 15 14" stroke="${css('--accent')}" stroke-width="4" stroke-linecap="round" fill="none"/><path d="M12 88c17-10 35-10 54 0 16 8 31 8 45 0" stroke="#74c0fc" stroke-width="8" stroke-linecap="round" fill="none"/></svg>`; if(theme==='card_collection')return `<svg viewBox="0 0 120 100" aria-hidden="true"><rect x="24" y="18" width="56" height="70" rx="10" fill="#fff" stroke="${css('--secondary')}" stroke-width="5" transform="rotate(-8 52 53)"/><rect x="42" y="12" width="58" height="72" rx="10" fill="${css('--primary')}" stroke="#fff" stroke-width="5" transform="rotate(9 71 48)"/><circle cx="70" cy="47" r="13" fill="${css('--accent')}"/><path d="M64 69h24" stroke="#fff" stroke-width="7" stroke-linecap="round"/></svg>`; if(theme==='dinosaur')return `<svg viewBox="0 0 120 100" aria-hidden="true"><path d="M26 63c2-28 22-45 49-40 17 3 27 16 27 31 0 24-20 36-47 34-19-1-31-9-29-25Z" fill="${css('--primary')}"/><path d="M24 64 9 75M77 82l7 14M48 83l-7 13" stroke="${css('--secondary')}" stroke-width="9" stroke-linecap="round"/><circle cx="80" cy="44" r="5" fill="#111827"/><path d="M34 22l8 13 10-16 10 17 10-13" fill="${css('--accent')}"/><path d="M86 61c-9 7-20 7-30 0" stroke="#fff" stroke-width="5" stroke-linecap="round"/></svg>`; if(theme==='animal_bear')return `<svg viewBox="0 0 120 100" aria-hidden="true"><circle cx="35" cy="30" r="18" fill="${css('--secondary')}"/><circle cx="85" cy="30" r="18" fill="${css('--secondary')}"/><circle cx="60" cy="53" r="38" fill="${css('--primary')}"/><circle cx="45" cy="48" r="5" fill="#182230"/><circle cx="75" cy="48" r="5" fill="#182230"/><ellipse cx="60" cy="64" rx="20" ry="15" fill="#FFE7B8"/><circle cx="60" cy="59" r="5" fill="#182230"/><path d="M52 68c5 6 11 6 16 0" stroke="#182230" stroke-width="4" stroke-linecap="round" fill="none"/><path d="M29 79c18 12 45 14 63 0" stroke="${css('--accent')}" stroke-width="8" stroke-linecap="round"/></svg>`; if(c.includes('火车'))return `<svg viewBox="0 0 120 100" aria-hidden="true"><rect x="18" y="35" width="70" height="38" rx="10" fill="${css('--primary')}"/><rect x="75" y="24" width="26" height="49" rx="8" fill="${css('--secondary')}"/><rect x="28" y="43" width="18" height="15" rx="4" fill="#dff5ff"/><rect x="52" y="43" width="18" height="15" rx="4" fill="#dff5ff"/><circle cx="35" cy="76" r="11" fill="#182230"/><circle cx="82" cy="76" r="11" fill="#182230"/><path d="M15 88h92" stroke="${css('--accent')}" stroke-width="7" stroke-linecap="round"/></svg>`; if(c.includes('飞机'))return `<svg viewBox="0 0 120 100" aria-hidden="true"><path d="M15 55 109 25 82 64 96 87 68 72 46 92 53 67Z" fill="${css('--primary')}" stroke="#fff" stroke-width="5" stroke-linejoin="round"/><path d="M53 67 109 25" stroke="${css('--secondary')}" stroke-width="5" stroke-linecap="round"/></svg>`; return `<svg viewBox="0 0 120 100" aria-hidden="true"><rect x="18" y="43" width="82" height="32" rx="14" fill="${css('--primary')}"/><path d="M36 43h38l12 17H24z" fill="${css('--secondary')}"/><rect x="42" y="47" width="18" height="11" rx="3" fill="#dff5ff"/><rect x="64" y="47" width="16" height="11" rx="3" fill="#dff5ff"/><circle cx="37" cy="76" r="11" fill="#182230"/><circle cx="81" cy="76" r="11" fill="#182230"/><circle cx="37" cy="76" r="5" fill="#fff"/><circle cx="81" cy="76" r="5" fill="#fff"/><path d="M14 88h92" stroke="${css('--accent')}" stroke-width="7" stroke-linecap="round"/></svg>`}
function itemSvg(){const theme=CONFIG.themeId,kind=CONFIG.visualKind||'';if(kind==='cat_fishing')return `<svg viewBox="0 0 40 40"><path d="M8 23c7-9 18-9 26 0-7 9-18 9-26 0Z" fill="${css('--accent')}" stroke="${css('--secondary')}" stroke-width="3"/><circle cx="27" cy="22" r="2" fill="#182230"/><path d="M10 23 4 17M10 23 4 29" stroke="${css('--secondary')}" stroke-width="3" stroke-linecap="round"/></svg>`;if(theme==='card_collection')return `<svg viewBox="0 0 40 40"><rect x="7" y="4" width="26" height="32" rx="6" fill="${css('--primary')}"/><circle cx="20" cy="18" r="6" fill="${css('--accent')}"/><path d="M13 29h14" stroke="#fff" stroke-width="4" stroke-linecap="round"/></svg>`; if(theme==='dinosaur')return `<svg viewBox="0 0 40 40"><ellipse cx="20" cy="22" rx="13" ry="16" fill="#fff"/><path d="M11 20c7-4 12-4 18 0" stroke="${css('--primary')}" stroke-width="4" stroke-linecap="round"/><circle cx="15" cy="15" r="2.5" fill="${css('--accent')}"/><circle cx="25" cy="27" r="2.5" fill="${css('--secondary')}"/></svg>`; if(theme==='animal_bear')return `<svg viewBox="0 0 40 40"><path d="M11 17c0-6 4-10 9-10s9 4 9 10v12c0 4-4 7-9 7s-9-3-9-7Z" fill="${css('--accent')}" stroke="${css('--secondary')}" stroke-width="3"/><path d="M16 10h8" stroke="#fff7d6" stroke-width="4" stroke-linecap="round"/><path d="M15 29h10" stroke="${css('--secondary')}" stroke-width="3" stroke-linecap="round"/></svg>`; return `<svg viewBox="0 0 40 40"><rect x="9" y="6" width="22" height="28" rx="7" fill="${css('--primary')}"/><rect x="13" y="10" width="14" height="6" rx="3" fill="#fff" opacity=".75"/><path d="M15 22h10" stroke="#fff" stroke-width="4" stroke-linecap="round"/></svg>`}
function css(name){return getComputedStyle(document.documentElement).getPropertyValue(name).trim()||'#ff6b35'}
function applyTheme(){Object.entries(CONFIG.themeCSS||{}).forEach(([k,v])=>document.documentElement.style.setProperty(k,v));els.title.textContent=CONFIG.title||'学习娃';els.heroSvg.innerHTML=svgHero()}
function itemCountForStep(step){const q=CONFIG.question;if(CONFIG.skillId==='make_ten'){if(['intro','ask_need_to_ten'].includes(step.id))return{active:q.a,pending:q.b};if(step.id==='split_b')return{active:q.a,pending:q.b};if(step.id==='make_ten')return{active:10,pending:q.remain};if(['add_remain','summary'].includes(step.id))return{active:q.answer,pending:0};return{active:q.a,pending:q.b}}if(CONFIG.skillId==='break_ten'){if(['intro','split_to_10'].includes(step.id))return{mode:'ten_first_ones_second',tenLeft:10,onesLeft:q.ones};if(step.id==='borrow_from_ten')return{mode:'ten_first_ones_second',tenLeft:stepState.borrowRemoved?q.tenMinus:10,onesLeft:q.ones};if(['add_ones_back','summary'].includes(step.id))return{mode:'ten_first_ones_second',tenLeft:q.tenMinus,onesLeft:q.ones,answer:true};return{mode:'ten_first_ones_second',tenLeft:10,onesLeft:q.ones}}const removed=step.id==='split_subtrahend'?0:(step.id==='subtract_to_ten'?q.toTen:(step.id==='continue_subtract'||step.id==='summary'?q.b:0));return{active:q.a-removed,pending:0}}
function renderItems(step){const q=CONFIG.question,s=itemCountForStep(step),total=CONFIG.skillId==='make_ten'?Math.max(q.answer,q.a+q.b):q.a,svg=itemSvg(),prev=els.itemsGrid.dataset.stepId;els.itemsGrid.innerHTML='';els.itemsGrid.classList.toggle('break-ten-grid',CONFIG.skillId==='break_ten');els.itemsGrid.classList.toggle('level-ten-grid',CONFIG.skillId==='level_ten');for(let i=1;i<=total;i++){const d=document.createElement('div');d.className='item';d.innerHTML=svg;if(CONFIG.skillId==='make_ten'){if(i>s.active&&i<=s.active+s.pending)d.classList.add('pending');if(i<=10)d.classList.add('ten-group');else d.classList.add('ones-group');if(['split_b','make_ten','add_remain','summary'].includes(step.id)&&i>q.a&&i<=q.answer)d.classList.add('second-addend-part');if(i<=s.active)d.classList.add('added')}else if(CONFIG.skillId==='break_ten'){const isTenRow=i<=10;d.classList.add(isTenRow?'ten-group':'ones-group');if(isTenRow&&i>s.tenLeft)d.classList.add('removed');if(!isTenRow&&i>10+s.onesLeft)d.classList.add('removed');if(s.answer&&prev!==step.id)d.style.transition='none'}else{if(i<=10)d.classList.add('ten-group');else d.classList.add('ones-group');if(i>10)d.classList.add('same-number-part');if(['split_subtrahend','subtract_to_ten','continue_subtract','summary'].includes(step.id)){if(i>10)d.classList.add('to-ten-part');else if(i>10-q.remain)d.classList.add('remain-part')}if(CONFIG.skillId==='level_ten'&&step.id==='subtract_to_ten'&&i>10)d.classList.add('removed');else if(i>s.active)d.classList.add('removed')}els.itemsGrid.appendChild(d)}els.itemsGrid.dataset.stepId=step.id}
function shortSpeech(step){if(step.type==='summary')return'完成啦';if(step.type==='question')return'想一想';if(step.type==='split')return'先分一分';if(step.type==='remove_items')return'慢慢拿走';if(step.type==='add_items')return'凑成10';return CONFIG.story?.goal||'开始'}
function renderStep(){const steps=CONFIG.steps||[],step=steps[currentStep];if(!step)return showPractice();const isLast=currentStep===steps.length-1;els.childText.textContent=step.childText;els.speech.textContent=shortSpeech(step);els.parentSay.textContent=step.parentGuide?.say||'';els.expected.textContent=step.parentGuide?.expected||'跟着观察';els.hint.textContent=isLast?'先让孩子不看屏幕，自己用实物说一遍怎么算。如果说不清楚，就点“没关系，再摆一次”，从第一步慢慢来。':(step.parentGuide?.wrongHint||'可以让孩子用实物摆一遍。');els.hint.classList.remove('show');els.restartBtn.classList.toggle('show',isLast);els.stepCount.textContent=`${currentStep+1}/${steps.length}`;els.barFill.style.width=`${(currentStep+1)/steps.length*100}%`;els.nextBtn.textContent=isLast?'我会说给你听':actionLabel(step);els.materials.textContent=step.id==='borrow_from_ten'&&!stepState.borrowRemoved?'先观察，不拿走':(step.id==='borrow_from_ten'?'第一排已拿走，准备合起来':(step.id==='add_ones_back'?'数一数两排剩几个':(isLast?'遮住屏幕复述 / 再摆一次':'摆一摆 / 数一数')));renderItems(step);speak(step.childText)}
function actionLabel(step){if(CONFIG.skillId==='break_ten'&&step.id==='borrow_from_ten'&&stepState.borrowRemoved)return'两排合起来';const map={intro:'开始摆出来',split_to_10:'摆成两排',borrow_from_ten:'第一排拿走',add_ones_back:'说出答案',remove_ones:'拿走多出来的',ask_remain:'问还差几',remove_remain:'从10里拿',ask_need_to_ten:'看看缺几',split_b:'把数分开',make_ten:'先凑满10',add_remain:'把剩下放进来',subtract_to_ten:'先退到10',split_subtrahend:'看看还要退几',continue_subtract:'继续往回退',summary:'收工，去摆一摆'};return map[step.id]||'接着看'}
function showPractice(){$('parentPanel').style.display='none';els.practicePanel.classList.add('show');els.childText.textContent=CONFIG.story?.reward||'你学会啦';els.speech.textContent='再练几题';burstConfetti();els.practiceList.innerHTML='';(CONFIG.practice||[]).forEach(p=>{const d=document.createElement('div');d.className='practice-item';d.textContent=`${p.text} = ${p.answer}`;els.practiceList.appendChild(d)});els.offlineTips.textContent=(CONFIG.offlineMaterials||[]).join(' · ');speak('你学会啦，再用实物练几题吧')}
function speechText(text){return String(text).replace(/\s*\+\s*/g,' 加 ').replace(/\s*-\s*/g,' 减 ').replace(/\s*=\s*/g,' 等于 ').replace(/\?/g,'几').replace(/\s+/g,' ').trim()}
function speak(text){if(!soundEnabled||!('speechSynthesis'in window))return;window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(speechText(text));u.lang='zh-CN';u.rate=.88;u.pitch=1.12;window.speechSynthesis.speak(u)}
function burstConfetti(){['#f59e0b','#ec4899','#22c55e','#3b82f6','#a855f7'].forEach((col,i)=>{for(let j=0;j<7;j++){const c=document.createElement('div');c.className='confetti';c.style.left=`${Math.random()*100}%`;c.style.background=col;c.style.animationDelay=`${Math.random()*.5}s`;document.body.appendChild(c);setTimeout(()=>c.remove(),2200)}})}
function restartLesson(){currentStep=0;Object.keys(stepState).forEach(k=>delete stepState[k]);els.itemsGrid.dataset.stepId='';els.practicePanel.classList.remove('show');$('parentPanel').style.display='block';renderStep();speak('没关系，我们再摆一次')}
els.hintBtn.onclick=()=>{els.hint.classList.toggle('show');speak(els.hint.textContent)};els.nextBtn.onclick=()=>{const step=(CONFIG.steps||[])[currentStep];if(CONFIG.skillId==='break_ten'&&step?.id==='borrow_from_ten'&&!stepState.borrowRemoved){stepState.borrowRemoved=true;renderStep();return}currentStep++;renderStep()};els.restartBtn.onclick=restartLesson;els.soundBtn.onclick=()=>{soundEnabled=!soundEnabled;els.soundBtn.textContent=soundEnabled?'朗读':'静音'};applyTheme();renderStep();
</script>
</body>
