<!-- ======== EDIT PANEL (sidebar) ======== -->
<div class="edit-panel" id="editPanel">
    <div class="panel-header">
        <span class="panel-title">🎨 <span data-i18n="panel_title">样式面板</span></span>
        <button class="panel-close-btn" onclick="toggleEditMode()">✕</button>
    </div>

    <!-- Tabs -->
    <div class="panel-tabs">
        <button class="panel-tab active" data-tab="colors" onclick="switchPanelTab('colors')" data-i18n="tab_colors">颜色</button>
        <button class="panel-tab" data-tab="presets" onclick="switchPanelTab('presets')" data-i18n="tab_presets">预设</button>
        <button class="panel-tab" data-tab="layout" onclick="switchPanelTab('layout')" data-i18n="tab_layout">布局</button>
        <button class="panel-tab" data-tab="size" onclick="switchPanelTab('size')" data-i18n="tab_size">字号</button>
    </div>

    <!-- Tab: Colors (entire content generated by generate_panel) -->
    <div class="panel-tab-content active" id="tab-colors">
{{COLOR_TAB_CONTENT}}
    </div>

    <!-- Tab: Presets -->
    <div class="panel-tab-content" id="tab-presets">
        <div class="panel-section">
            <div class="panel-section-title" data-i18n="style_prompt">风格 Prompt</div>
            <div class="panel-section-hint" data-i18n="style_prompt_hint">点击复制风格 Prompt 给 AI</div>
            <div class="preset-row">
{{PRESET_BUTTONS}}
            </div>
            <div class="panel-section-flow-hint" data-i18n="style_card_flow_hint">复制后 → 粘贴到 AI 对话 → AI 会改写 CSS</div>
        </div>
    </div>

    <!-- Tab: Layout (entire content generated by generate_panel) -->
    <div class="panel-tab-content" id="tab-layout">
{{LAYOUT_TAB_CONTENT}}
    </div>

    <!-- Tab: Size (entire content generated by generate_panel) -->
    <div class="panel-tab-content" id="tab-size">
{{SIZE_TAB_CONTENT}}
    </div>

    <div class="panel-actions">
        <div class="panel-autosave-hint" data-i18n="autosave_hint">✓ 修改自动保存到当前浏览器（导出请用顶部工具栏）</div>
        <button class="action-btn action-btn-secondary" onclick="resetAll()"><span data-i18n="reset_default">🔄 恢复默认设置</span></button>
    </div>
</div>
