# M-A3 30-Agent集群 注册表
# agent-cluster/30-expansion/agent_registry.yaml
# 版本: v1.0 | 更新: 2026-04-14

cluster:
  name: "M-A3 30-Agent Enterprise Cluster"
  version: "3.0.0"
  chief_of_staff_id: "chief-of-staff"
  registry_version: "2026-04-14"

# ============================================================
# 第0层：幕僚长与基础设施
# ============================================================
tier_0:
  - agent_id: "chief-of-staff"
    display_name: "M-A3 幕僚长"
    domain: "orchestration"
    engine: "claude-ma"
    role: "dispatcher"
    description: "全局协调、任务分配、策略建议"
    capabilities:
      - intent_recognition
      - task_decomposition
      - agent_scheduling
      - result_aggregation
      - report_generation
    max_concurrent: 1
    timeout_seconds: 600
    keywords:
      - "调度"
      - "协调"
      - "全局"
      - "策略"
    priority: P0
    skippable: false
    health_check_endpoint: "/health/chief-of-staff"

# ============================================================
# 第1层：基础设施Agent（Tier 1）
# ============================================================
tier_1:
  # --- 支撑域基础设施 ---
  - agent_id: "sup-09-scheduler"
    display_name: "调度协调Agent"
    domain: "support"
    engine: "local"
    role: "infrastructure"
    description: "智能调度所有Agent任务，优化执行效率"
    capabilities:
      - task_queue_management
      - dag_parsing
      - parallel_optimization
      - load_balancing
      - resource_quota
      - retry_policy
    max_concurrent: 1
    timeout_seconds: 120
    keywords: ["任务调度", "并行执行", "工作流", "协调"]
    priority: P0
    skippable: false
    health_check_endpoint: "/health/sup-09-scheduler"

  - agent_id: "sup-10-security"
    display_name: "安全审计Agent"
    domain: "support"
    engine: "local"
    role: "infrastructure"
    description: "保障集群安全运行，主动防御MCP协议漏洞"
    capabilities:
      - api_key_management
      - rbac_maintenance
      - operation_audit
      - pii_detection
      - anomaly_detection
      - soc2_reporting
      - mcp_security_scan
    max_concurrent: 2
    timeout_seconds: 300
    keywords: ["安全审计", "权限管理", "日志审计", "合规报告"]
    priority: P0
    skippable: false
    health_check_endpoint: "/health/sup-10-security"

  - agent_id: "sup-01-data-collect"
    display_name: "数据采集Agent"
    domain: "support"
    engine: "local"
    role: "infrastructure"
    description: "统一数据采集入口，支持所有Agent的数据需求"
    capabilities:
      - multi_source_collection
      - data_cleaning
      - quality_validation
      - incremental_collection
      - pipeline_monitoring
    max_concurrent: 5
    timeout_seconds: 600
    keywords: ["数据采集", "爬虫", "数据清洗", "数据导入"]
    priority: P0
    skippable: false
    health_check_endpoint: "/health/sup-01-data-collect"

  - agent_id: "sup-08-memory"
    display_name: "记忆管理Agent"
    domain: "support"
    engine: "local"
    role: "infrastructure"
    description: "统一管理集群的长期记忆和知识"
    capabilities:
      - cross_agent_memory
      - memory_tiering
      - semantic_retrieval
      - deduplication
      - context_optimization
      - experience_accumulation
    max_concurrent: 20
    timeout_seconds: 60
    keywords: ["记忆管理", "知识库", "上下文", "长期记忆"]
    priority: P1
    skippable: false
    health_check_endpoint: "/health/sup-08-memory"

  - agent_id: "sup-02-content-gen"
    display_name: "内容生成Agent"
    domain: "support"
    engine: "claude-ma"
    role: "infrastructure"
    description: "批量生成高质量营销和运营内容"
    capabilities:
      - multi_format_generation
      - brand_voice
      - template_management
      - batch_generation
      - ab_testing
      - quality_scoring
      - multilingual_generation
    max_concurrent: 8
    timeout_seconds: 300
    keywords: ["内容生成", "批量文案", "产品描述", "脚本生成"]
    priority: P0
    skippable: false
    health_check_endpoint: "/health/sup-02-content-gen"

  - agent_id: "sup-04-compliance"
    display_name: "合规检查Agent"
    domain: "support"
    engine: "deepseek"
    role: "infrastructure"
    description: "确保所有运营行为符合平台政策和法规"
    capabilities:
      - amazon_policy_check
      - ad_compliance
      - gdpr_check
      - content_compliance
      - multi_region_adaptation
      - risk_rating
    max_concurrent: 5
    timeout_seconds: 180
    keywords: ["合规检查", "政策合规", "风险审核", "GDPR"]
    priority: P0
    skippable: false
    health_check_endpoint: "/health/sup-04-compliance"

  - agent_id: "sup-03-translation"
    display_name: "翻译Agent"
    domain: "support"
    engine: "deepseek"
    role: "infrastructure"
    description: "专业级多语言翻译与本地化"
    capabilities:
      - multi_language_translation
      - industry_glossary
      - cultural_adaptation
      - quality_self_assessment
      - translation_memory
      - batch_processing
    max_concurrent: 10
    timeout_seconds: 120
    keywords: ["翻译", "中英翻译", "本地化", "多语言"]
    priority: P1
    skippable: true
    health_check_endpoint: "/health/sup-03-translation"

  - agent_id: "sup-07-quality"
    display_name: "质量评分Agent"
    domain: "support"
    engine: "claude-ma"
    role: "infrastructure"
    description: "为所有Agent产出提供统一的质量评估"
    capabilities:
      - multi_dimension_scoring
      - baseline_management
      - trend_tracking
      - anomaly_alert
      - human_review_trigger
      - improvement_suggestions
      - agent_capability_profile
    max_concurrent: 5
    timeout_seconds: 120
    keywords: ["质量评分", "效果评估", "质量监控"]
    priority: P1
    skippable: true
    health_check_endpoint: "/health/sup-07-quality"

  # --- GEO域基础设施 ---
  - agent_id: "geo-07-knowledge-graph"
    display_name: "知识图谱Agent"
    domain: "geo"
    engine: "claude-ma"
    role: "infrastructure"
    description: "构建和维护品牌的知识图谱（GEO基础设施）"
    capabilities:
      - entity_recognition
      - knowledge_graph_construction
      - jsonld_generation
      - graph_completion
      - multi_source_fusion
      - freshness_management
    max_concurrent: 2
    timeout_seconds: 600
    keywords: ["知识图谱", "Schema", "实体识别", "结构化数据"]
    priority: P0
    skippable: false
    health_check_endpoint: "/health/geo-07-knowledge-graph"

  - agent_id: "amz-09-keywords"
    display_name: "关键词Agent"
    domain: "amazon"
    engine: "claude-ma"
    role: "infrastructure"
    description: "发现、管理和优化所有广告与Listing关键词"
    capabilities:
      - keyword_library
      - search_volume_analysis
      - negative_keywords
      - longtail_mining
      - trend_tracking
      - asin_keyword_reverse
    max_concurrent: 3
    timeout_seconds: 300
    keywords: ["关键词", "keyword", "长尾词", "否定词"]
    priority: P1
    skippable: false
    health_check_endpoint: "/health/amz-09-keywords"

