<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- 橙白圆猫 - 占位参考图 -->
  <!-- Body: extremely round squat dumpling shape -->
  <ellipse cx="200" cy="260" rx="85" ry="65" fill="#F5A623" stroke="#1a1a1a" stroke-width="3"/>
  <!-- Cream-white belly -->
  <ellipse cx="200" cy="275" rx="55" ry="40" fill="#FFF8E7" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Head: round -->
  <circle cx="200" cy="180" r="55" fill="#F5A623" stroke="#1a1a1a" stroke-width="3"/>
  <!-- Cream-white muzzle area -->
  <ellipse cx="200" cy="195" rx="30" ry="22" fill="#FFF8E7" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Left ear: small triangle -->
  <polygon points="160,135 150,95 180,125" fill="#F5A623" stroke="#1a1a1a" stroke-width="3"/>
  <!-- Right ear: small triangle -->
  <polygon points="240,135 250,95 220,125" fill="#F5A623" stroke="#1a1a1a" stroke-width="3"/>
  <!-- Left eye: tiny black oval -->
  <ellipse cx="180" cy="178" rx="7" ry="9" fill="#1a1a1a"/>
  <!-- Right eye: tiny black oval -->
  <ellipse cx="220" cy="178" rx="7" ry="9" fill="#1a1a1a"/>
  <!-- Nose: small black -->
  <ellipse cx="200" cy="192" rx="5" ry="3.5" fill="#1a1a1a"/>
  <!-- Mouth: short line -->
  <path d="M195,198 Q200,203 205,198" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Whiskers -->
  <line x1="130" y1="188" x2="165" y2="192" stroke="#1a1a1a" stroke-width="1" opacity="0.5"/>
  <line x1="130" y1="198" x2="165" y2="197" stroke="#1a1a1a" stroke-width="1" opacity="0.5"/>
  <line x1="270" y1="188" x2="235" y2="192" stroke="#1a1a1a" stroke-width="1" opacity="0.5"/>
  <line x1="270" y1="198" x2="235" y2="197" stroke="#1a1a1a" stroke-width="1" opacity="0.5"/>
  <!-- Front paws -->
  <ellipse cx="170" cy="310" rx="18" ry="12" fill="#FFF8E7" stroke="#1a1a1a" stroke-width="2"/>
  <ellipse cx="230" cy="310" rx="18" ry="12" fill="#FFF8E7" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Tail hint -->
  <path d="M280,260 Q310,240 300,210" fill="none" stroke="#F5A623" stroke-width="4" stroke-linecap="round"/>
  <!-- Label -->
  <text x="200" y="360" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#999">Orange-Cream Cat · 占位参考图 · 可用 ImageGen 重新生成</text>
</svg>
