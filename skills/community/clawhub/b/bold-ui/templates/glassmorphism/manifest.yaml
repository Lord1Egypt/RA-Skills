# Glassmorphism — Template Manifest

meta:
  name: "Glassmorphism"
  id: glassmorphism
  version: "1.0"
  tags: [glass, blur, translucent, layered, modern, premium]
  best_for:
    - 金融科技应用
    - 高端品牌
    - 创意作品集
    - 仪表盘卡片
  not_for:
    - 无障碍关键应用
    - 低对比度环境
  flexibility:
    colors: moderate
    typography: moderate
    spacing: loose
    motion: moderate
    layout: loose
  icon_preferences:
    primary_source: phosphor
    fallback_sources: [lucide]
    style: fill
    stroke_width: 1.5
    size: 24

# ====== Design Tokens ======
tokens:
  colors:
    primary:
      base: "#6366F1"       # Indigo
      light: "#818CF8"
      dark: "#4F46E5"
    secondary:
      base: "#EC4899"       # Pink
      light: "#F472B6"
      dark: "#DB2777"
    background:
      page: "#0F0F23"       # Deep gradient base
      surface: "rgba(255, 255, 255, 0.05)"
      elevated: "rgba(255, 255, 255, 0.08)"
    text:
      primary: "#FFFFFF"
      secondary: "rgba(255, 255, 255, 0.75)"
      muted: "rgba(255, 255, 255, 0.5)"
    border:
      default: "rgba(255, 255, 255, 0.12)"
      focus: "rgba(99, 102, 241, 0.5)"
    functional:
      success: "#34D399"
      warning: "#FBBF24"
      error: "#F87171"
      info: "#60A5FA"

  typography:
    heading_font: "'Inter', 'SF Pro Display', -apple-system, sans-serif"
    body_font: "'Inter', 'SF Pro Text', -apple-system, sans-serif"
    mono_font: "'JetBrains Mono', 'Fira Code', monospace"
    scale:
      xs:   "0.75rem"       # 12px
      sm:   "0.875rem"      # 14px
      base: "1rem"          # 16px
      lg:   "1.125rem"      # 18px
      xl:   "1.25rem"       # 20px
      2xl:  "1.5rem"        # 24px
      3xl:  "2rem"          # 32px
      4xl:  "3rem"          # 48px
    weight:
      normal: 400
      medium: 500
      semibold: 600
      bold: 700

  spacing:
    unit: 4
    scale: [0, 4, 8, 12, 16, 20, 24, 32, 40, 48, 64, 80, 96]

  border:
    radius:
      none:  "0"
      sm:    "0.5rem"        # 8px
      md:    "0.75rem"       # 12px
      lg:    "1rem"          # 16px
      xl:    "1.5rem"        # 24px
      full:  "9999px"
    width:
      thin:  "1px"
      normal: "1px"
      thick:  "2px"

  shadows:
    none: "none"
    sm:   "0 4px 16px rgba(0, 0, 0, 0.12)"
    md:   "0 8px 32px rgba(0, 0, 0, 0.16)"
    lg:   "0 16px 48px rgba(0, 0, 0, 0.2)"
    xl:   "0 24px 64px rgba(0, 0, 0, 0.24)"

  motion:
    duration:
      instant: "0ms"
      fast:    "150ms"
      normal:  "250ms"
      slow:    "400ms"
      gradual: "600ms"
    easing:
      default: "cubic-bezier(0.4, 0, 0.2, 1)"
      in:      "cubic-bezier(0.4, 0, 1, 1)"
      out:     "cubic-bezier(0, 0, 0.2, 1)"
      spring:  "cubic-bezier(0.34, 1.56, 0.64, 1)"

  decorations:
    gradient_primary: "linear-gradient(135deg, #6366F1 0%, #8B5CF6 33%, #EC4899 66%, #F472B6 100%)"
    gradient_subtle: "linear-gradient(180deg, rgba(99, 102, 241, 0.05) 0%, rgba(236, 72, 153, 0.05) 100%)"
    gradient_orb_1: "radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.3) 0%, transparent 50%)"
    gradient_orb_2: "radial-gradient(circle at 80% 20%, rgba(236, 72, 153, 0.2) 0%, transparent 50%)"
    gradient_orb_3: "radial-gradient(circle at 50% 80%, rgba(139, 92, 246, 0.2) 0%, transparent 50%)"
    backdrop_blur: "16px"
    glass_border: "rgba(255, 255, 255, 0.18)"
    glass_bg: "rgba(255, 255, 255, 0.05)"
