mailAccounts:
  - id: "aliyun-work"              # Must be unique
    displayName: "Alibaba Cloud Enterprise Mail"
    protocol:
      receive: "imap"              # imap | pop3
      send: "smtp"
    imap:
      host: "imap.qiye.aliyun.com"
      port: 993
      useTLS: true
    pop3:
      host: "pop.qiye.aliyun.com"
      port: 995
      useTLS: true
    smtp:
      host: "smtp.qiye.aliyun.com"
      port: 465
      useTLS: true
    auth:
      username: "bot@your-company.com"
      password: "APP_SPECIFIC_PASSWORD"   # Recommended: use an app-specific password
    defaults:
      inboxFolder: "INBOX"
      sentFolder: "Sent"
      maxListLimit: 50

  # Example: Gmail
  - id: "gmail-personal"
    displayName: "Gmail Personal"
    protocol:
      receive: "imap"
      send: "smtp"
    imap:
      host: "imap.gmail.com"
      port: 993
      useTLS: true
    smtp:
      host: "smtp.gmail.com"
      port: 465
      useTLS: true
    auth:
      username: "yourname@gmail.com"
      password: "APP_SPECIFIC_PASSWORD"
    defaults:
      inboxFolder: "INBOX"
      sentFolder: "[Gmail]/Sent Mail"
      maxListLimit: 50
