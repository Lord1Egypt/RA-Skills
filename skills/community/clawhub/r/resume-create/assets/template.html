<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --page-w: 210mm;
    --margin: 15mm;
    --margin-bottom: 15mm;
    --font: 'Noto Sans CJK SC', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    --color-text: #000;
    --color-body: #222;
    --color-light: #555;
    --color-muted: #777;
    --color-faint: #999;
    --color-border: #ccc;
    --dot-size: 1mm;
  }
  body {
    font-family: var(--font);
    color: var(--color-text);
    background: #f5f5f5;
    line-height: 1.7;
    font-size: 10.5pt;
    font-weight: 400;
  }

  /* ====== Web 端：模拟 A4 纸 ====== */
  .page {
    width: var(--page-w);
    min-height: 297mm;
    margin: 10mm auto;
    padding: var(--margin);
    padding-bottom: var(--margin);
    background: #fff;
  }

  /* ====== 头部 ====== */
  .header { margin-bottom: 3mm; }
  .header h1 { font-size: 19.5pt; font-weight: 600; letter-spacing: 1.5pt; margin-bottom: 2mm; }
  .tagline { font-size: 10.5pt; color: #333; margin-bottom: 1mm; letter-spacing: 0.4pt; }
  .info-row { display: flex; flex-wrap: wrap; font-size: 9.4pt; color: var(--color-muted); line-height: 2; }
  .sep { margin: 0 2mm; color: var(--color-faint); }

  /* ====== 摘要 ====== */
  .summary { color: var(--color-body); font-size: 10.5pt; line-height: 1.9; }

  /* ====== 区块 ====== */
  .section { margin-top: 8mm; }
  .section-title {
    font-size: 8.5pt; font-weight: 400; letter-spacing: 2pt; text-transform: uppercase;
    color: var(--color-light); margin-bottom: 5mm; display: flex; align-items: center; gap: 3mm;
  }
  .section-title::after { content: ''; flex: 1; height: 0.5px; background: var(--color-border); }

  /* ====== 项目 & 工作 & 教育 ====== */
  .proj, .work, .edu { margin-bottom: 6mm; break-inside: avoid; page-break-inside: avoid; }
  .proj:last-child, .work:last-child, .edu:last-child { margin-bottom: 0; }
  .proj-header, .work-header, .edu-header {
    display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 1mm;
  }
  .proj-name, .work-company, .edu-school { font-size: 10.5pt; font-weight: 700; }
  .proj-date, .work-date, .edu-date { font-size: 9pt; color: var(--color-light); white-space: nowrap; }
  .proj-link { display: block; font-size: 8.5pt; color: var(--color-muted); text-decoration: none; margin-bottom: 2mm; }
  .work-role, .edu-major { font-size: 10pt; color: #444; margin-bottom: 2mm; }
  .proj-body, .work-body, .edu-body { font-size: 10pt; color: var(--color-body); line-height: 1.85; }
  .proj-body ul { margin-top: 2mm; }
  .proj-para { font-size: 10pt; color: var(--color-body); line-height: 1.8; }

  /* 列表圆点 */
  .proj-body ul, .work-body ul, .edu-body ul { list-style: none; padding: 0; }
  .proj-body ul li, .work-body ul li, .edu-body ul li { position: relative; padding-left: 4mm; margin-bottom: 0.5mm; }
  .proj-body ul li::before, .work-body ul li::before, .edu-body ul li::before {
    content: ''; position: absolute; left: 0; top: 3mm;
    width: var(--dot-size); height: var(--dot-size); border-radius: 50%; background: var(--color-light);
  }

  /* 技术栈 */
  .tech-tags { margin-top: 2mm; font-size: 10pt; color: var(--color-muted); line-height: 1.8; }
  .tech-tags::before { content: '技能标签：'; color: var(--color-muted); }
  .tech-tag { font-size: 10pt; color: var(--color-muted); }
  .tech-tag::after { content: ' · '; color: var(--color-faint); }
  .tech-tag:last-child::after { content: ''; }

  /* ====== 打印 ====== */
  @media print {
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    body { background: #fff !important; }
    .page {
      margin: 0 !important;
      padding: 0 !important;
      width: 210mm !important;
      min-height: auto !important;
      background: #fff !important;
    }
  }
  @page {
    size: A4 portrait !important;
    margin: 15mm !important;
  }
</style>
</head>
<body>

<div class="page" id="app"></div>

<script>
// ============================================================
// 简历数据 — 由技能自动填充
// ============================================================
const resumeData = __RESUME_DATA__;

// ============================================================
// 渲染函数
// ============================================================

function renderHeader(data) {
  const infoHtml = data.info.map((item, i) => {
    const sep = i < data.info.length - 1 ? '<span class="sep">|</span>' : '';
    return `<span>${item}</span>${sep}`;
  }).join('');

  return `
    <div class="header">
      <h1>${data.name}</h1>
      <div class="tagline">${data.tagline}</div>
      <div class="info-row">${infoHtml}</div>
    </div>
  `;
}

function renderSummary(text) {
  return `<div class="summary">${text}</div>`;
}

function renderSectionTitle(title) {
  return `<div class="section-title">${title}</div>`;
}

function renderWorkList(workList) {
  const items = workList.map(w => `
    <div class="work">
      <div class="work-header">
        <span class="work-company">${w.company}</span>
        <span class="work-date">${w.date}</span>
      </div>
      <div class="work-role">${w.role}</div>
      <div class="work-body">
        <ul>${w.items.map(i => `<li>${i}</li>`).join('')}</ul>
      </div>
    </div>
  `).join('');

  return `
    <div class="section">
      ${renderSectionTitle('工作经历')}
      ${items}
    </div>
  `;
}

function renderProjectList(projList) {
  const items = projList.map(p => {
    const techHtml = p.tech.map(t => `<span class="tech-tag">${t}</span>`).join('');
    const linkHtml = p.link ? `<a class="proj-link" href="${p.link}" target="_blank">${p.link}</a>` : '';
    const listHtml = p.items.length > 0
      ? `<ul>${p.items.map(i => `<li>${i}</li>`).join('')}</ul>`
      : '';
    const nameHtml = p.name
      ? `${p.name}${p.alias ? '<span style="display:inline-block;width:16px"></span>' + p.alias : ''}`
      : (p.alias || '');

    return `
      <div class="proj">
        <div class="proj-header">
          <span class="proj-name">${nameHtml}</span>
          <span class="proj-date">${p.date}</span>
        </div>
        ${linkHtml}
        <div class="proj-body">
          ${p.desc}
          ${listHtml}
        </div>
        <div class="tech-tags">${techHtml}</div>
      </div>
    `;
  }).join('');

  return `
    <div class="section">
      ${renderSectionTitle('项目经验')}
      ${items}
    </div>
  `;
}

function renderEducationList(eduList) {
  const items = eduList.map(e => {
    const listHtml = e.items && e.items.length > 0
      ? `<ul>${e.items.map(i => `<li>${i}</li>`).join('')}</ul>`
      : '';

    return `
      <div class="edu">
        <div class="edu-header">
          <span class="edu-school">${e.school}</span>
          <span class="edu-date">${e.date}</span>
        </div>
        <div class="edu-major">${e.major}</div>
        ${listHtml ? `<div class="edu-body">${listHtml}</div>` : ''}
      </div>
    `;
  }).join('');

  return `
    <div class="section">
      ${renderSectionTitle('教育经历')}
      ${items}
    </div>
  `;
}

// ============================================================
// 主渲染
// ============================================================
function render() {
  const app = document.getElementById('app');
  const d = resumeData;
  const sections = [];

  if (d.header) sections.push(renderHeader(d.header));
  if (d.summary) sections.push(renderSummary(d.summary));
  if (d.workExperience && d.workExperience.length) sections.push(renderWorkList(d.workExperience));
  if (d.projects && d.projects.length) sections.push(renderProjectList(d.projects));
  if (d.education && d.education.length) sections.push(renderEducationList(d.education));

  app.innerHTML = sections.join('');
}

document.addEventListener('DOMContentLoaded', render);
</script>

</body>
</html>
