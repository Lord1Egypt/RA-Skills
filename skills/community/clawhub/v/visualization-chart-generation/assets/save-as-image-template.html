<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图表标题</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #ffffff;
            color: #2C2C2A;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        h1 {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 20px;
        }
        .chart-container {
            width: 100%;
            max-width: 680px;
            background: #F1EFE8;
            border-radius: 12px;
            padding: 24px;
            border: 0.5px solid #B4B2A9;
        }
        .chart-item {
            background: #ffffff;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            border: 0.5px solid #D3D1C7;
        }
        .chart-item:last-child {
            margin-bottom: 0;
        }
        .chart-item h3 {
            font-size: 13px;
            font-weight: 500;
            color: #2C2C2A;
            margin-bottom: 8px;
        }
        .chart-item p {
            font-size: 12px;
            color: #5F5E5A;
            line-height: 1.6;
        }
        .save-btn {
            margin-top: 20px;
            padding: 10px 24px;
            background: #378ADD;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .save-btn:hover {
            background: #185FA5;
        }
        .save-btn:active {
            background: #0C447C;
        }
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
    </style>
</head>
<body>
    <h2 class="sr-only">这是一个带有保存为图片功能的图表模板</h2>

    <h1>图表标题</h1>

    <div class="chart-container" id="chart">
        <div class="chart-item">
            <h3>项目1</h3>
            <p>这是第一个项目的描述内容，可以根据实际需求修改。</p>
        </div>
        <div class="chart-item">
            <h3>项目2</h3>
            <p>这是第二个项目的描述内容，可以根据实际需求修改。</p>
        </div>
        <div class="chart-item">
            <h3>项目3</h3>
            <p>这是第三个项目的描述内容，可以根据实际需求修改。</p>
        </div>
    </div>

    <button class="save-btn" onclick="saveAsImage()">保存为图片</button>

    <script>
        function saveAsImage() {
            // 获取图表容器
            const chart = document.getElementById('chart');
            const rect = chart.getBoundingClientRect();

            // 创建canvas
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const scale = 2; // 高清导出

            canvas.width = rect.width * scale;
            canvas.height = rect.height * scale;
            ctx.scale(scale, scale);

            // 绘制背景
            ctx.fillStyle = '#F1EFE8';
            ctx.beginPath();
            ctx.roundRect(0, 0, rect.width, rect.height, 12);
            ctx.fill();

            // 绘制边框
            ctx.strokeStyle = '#B4B2A9';
            ctx.lineWidth = 0.5;
            ctx.stroke();

            // 绘制子项
            const items = chart.querySelectorAll('.chart-item');
            let y = 24;

            items.forEach((item, index) => {
                const itemRect = item.getBoundingClientRect();
                const relY = itemRect.top - rect.top;

                // 绘制子项背景
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.roundRect(24, relY, rect.width - 48, itemRect.height, 8);
                ctx.fill();

                // 绘制子项边框
                ctx.strokeStyle = '#D3D1C7';
                ctx.lineWidth = 0.5;
                ctx.stroke();

                // 绘制标题
                const h3 = item.querySelector('h3');
                ctx.fillStyle = '#2C2C2A';
                ctx.font = '500 13px system-ui, -apple-system, sans-serif';
                ctx.fillText(h3.textContent, 40, relY + 28);

                // 绘制描述
                const p = item.querySelector('p');
                ctx.fillStyle = '#5F5E5A';
                ctx.font = '400 12px system-ui, -apple-system, sans-serif';
                ctx.fillText(p.textContent, 40, relY + 48);
            });

            // 导出图片
            const link = document.createElement('a');
            link.download = '图表.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
    </script>
</body>
</html>
