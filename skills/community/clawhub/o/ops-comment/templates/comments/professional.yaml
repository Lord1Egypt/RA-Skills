# 评论模板 - ��业讨论风格
# 适用于财经/期货赛道

style: professional
description: "专业但平易近人，适合财经/投资类内容"

templates:
  # 专业认可类
  professional_approval:
    - "分析得很透彻 受教了"
    - "这个角度很独特 值得思考"
    - "总结得很系统 感谢分享"
    - "逻辑很清晰 赞一个"
    - "这个框架可以直接用"
    - "简洁明了 新手也能看懂"

  # 经验分享类
  experience:
    - "作为同行深有同感"
    - "实战中确实是这样"
    - "这个经验很实用 感谢"
    - "踩过坑之后才知道这些的重要性"
    - "跟我的操作习惯很像"

  # 提问/讨论类
  discussion:
    - "请问后续会出更详细的分析吗"
    - "这个策略在震荡行情下效果怎么样"
    - "想请教一下持仓周期一般多久"
    - "这个思路可以用在短线上吗"
    - "请问入场信号一般怎么确认"

  # 期货/交易专用
  trading_specific:
    - "风控这块讲得很到位"
    - "仓位管理确实是关键"
    - "纪律比技术重要 说得好"
    - "心态管理是最难的一关"
    - "感谢分享实盘经验"
    - "止损这块总结得很好"

emoji_pool:
  - "👍"
  - "💯"
  - "📊"
  - "📈"
  - "💡"
  - "🎯"
  - "✅"
