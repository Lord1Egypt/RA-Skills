server {
    listen 80;
    server_name xilejie-silk.com www.xilejie-silk.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name xilejie-silk.com www.xilejie-silk.com;

    ssl_certificate /etc/nginx/ssl/xilejie-silk.com_bundle.pem;
    ssl_certificate_key /etc/nginx/ssl/xilejie-silk.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /parking-mcp/ {
        proxy_pass http://127.0.0.1:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /parking-mcp {
        return 301 /parking-mcp/;
    }

    location /liuyang-life/ {
        proxy_pass http://127.0.0.1:8002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /liuyang-life {
        return 301 /liuyang-life/;
    }
}
