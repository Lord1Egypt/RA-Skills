      total_spaces: 2000
      visitor_spaces: 200
      fee: "首2小时免费，此后5元/小时"

  amenities:
    dining:
      - name: "园区食堂"
        capacity: 500人
        hours: "7:00-20:00"
      - name: "咖啡厅"
        count: 3
      - name: "便利店"
        count: 5
    accommodation:
      - name: "人才公寓"
        rooms: 300
