<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>记忆管理</title>
<style>
:root{--bg:#0e0e14;--surface:#16161e;--surface2:#1e1e2a;--border:rgba(255,255,255,0.06);--text:#e4e4ec;--text2:#8888a0;--text3:#6b6b80;--accent:#6c8cff;--accent2:#8caaff;--danger:#ff5c6c;--success:#4cdf8b;--attention:#ff6b6b;--active:#ffd93d;--flash:#4cdf8b;--settled:#6c8cff;--radius:12px;--radius-sm:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
.container{max-width:1200px;margin:0 auto;padding:24px 20px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;flex-wrap:wrap;gap:12px}
.header h1{font-size:20px;font-weight:700;letter-spacing:-0.3px;display:flex;align-items:center;gap:8px}
.header h1 span{background:linear-gradient(135deg,var(--accent),var(--success));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.actions{display:flex;gap:6px;flex-wrap:wrap}
.actions button,.actions label{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:12px;cursor:pointer;transition:all 0.2s}
.actions button:hover,.actions label:hover{background:var(--surface2);color:var(--text);border-color:rgba(255,255,255,0.12)}
.actions input[type=file]{display:none}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;position:relative;overflow:hidden}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat:nth-child(1)::before{background:linear-gradient(90deg,var(--accent),transparent)}
.stat:nth-child(2)::before{background:linear-gradient(90deg,var(--success),transparent)}
.stat:nth-child(3)::before{background:linear-gradient(90deg,var(--active),transparent)}
.stat:nth-child(4)::before{background:linear-gradient(90deg,var(--attention),transparent)}
.stat-val{font-size:28px;font-weight:700;letter-spacing:-0.5px}
.stat-lbl{font-size:12px;color:var(--text3);margin-top:2px}
.layer-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px}
.layer-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.layer-head span{font-size:13px;font-weight:600;color:var(--text2)}
.layer-bar{display:flex;height:10px;border-radius:6px;overflow:hidden;gap:2px}
.layer-seg{border-radius:6px;transition:flex 0.5s ease}
.layer-legend{display:flex;gap:20px;margin-top:10px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text3);cursor:pointer;transition:color 0.2s}
.legend-item:hover{color:var(--text2)}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.search-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px}
.search-row{display:flex;gap:8px}
.search-row input{flex:1;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:14px;transition:border 0.2s}
.search-row input:focus{outline:none;border-color:var(--accent)}
.search-row input::placeholder{color:var(--text3)}
.search-row .clear-btn{display:flex;align-items:center;justify-content:center;width:38px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text3);cursor:pointer;transition:all 0.2s;font-size:16px}
.search-row .clear-btn:hover{color:var(--text);border-color:rgba(255,255,255,0.12)}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;background:rgba(108,140,255,0.1);border:1px solid rgba(108,140,255,0.15);border-radius:20px;font-size:12px;color:var(--accent2);cursor:pointer;transition:all 0.2s}
.tag:hover{background:rgba(108,140,255,0.18);border-color:rgba(108,140,255,0.25)}
.tag .count{color:var(--text3);font-size:11px}
.import-result{display:none;padding:10px 14px;background:rgba(76,223,139,0.1);border:1px solid rgba(76,223,139,0.2);border-radius:var(--radius-sm);margin-bottom:12px;font-size:13px;color:var(--success)}
.import-result.show{display:block}
.list-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.list-toolbar{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;flex-wrap:wrap;gap:8px;border-bottom:1px solid var(--border)}
.filters{display:flex;gap:4px;flex-wrap:wrap}
.filter-btn{padding:5px 12px;border-radius:20px;border:none;background:transparent;color:var(--text3);font-size:12px;cursor:pointer;transition:all 0.2s}
.filter-btn:hover{color:var(--text2);background:rgba(255,255,255,0.04)}
.filter-btn.active{background:rgba(108,140,255,0.15);color:var(--accent2);font-weight:600}
.select-all-wrap{display:flex;align-items:center;gap:5px;color:var(--text3);font-size:12px}
.select-all-wrap input{accent-color:var(--accent);width:14px;height:14px}
.batch-bar{display:none;align-items:center;gap:8px;padding:10px 16px;background:rgba(108,140,255,0.06);border-bottom:1px solid var(--border);flex-wrap:wrap}
.batch-bar.show{display:flex}
.batch-bar .count{font-size:12px;color:var(--accent2);font-weight:600}
.batch-btn{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:11px;cursor:pointer;transition:all 0.2s}
.batch-btn:hover{background:var(--surface2);color:var(--text);border-color:rgba(255,255,255,0.12)}
.batch-btn.danger{color:var(--danger);border-color:rgba(255,92,108,0.3)}
.batch-btn.danger:hover{background:rgba(255,92,108,0.1);border-color:rgba(255,92,108,0.4)}
.mem-list{max-height:560px;overflow-y:auto}
.mem-list::-webkit-scrollbar{width:6px}
.mem-list::-webkit-scrollbar-track{background:transparent}
.mem-list::-webkit-scrollbar-thumb{background:var(--text3);border-radius:3px}
.mem-item{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border-left:3px solid var(--border);cursor:pointer;transition:all 0.15s;border-bottom:1px solid rgba(255,255,255,0.03);animation:fadeIn 0.2s ease}
.mem-item:last-child{border-bottom:none}
.mem-item:hover{background:rgba(255,255,255,0.025)}
.mem-item.selected{background:rgba(108,140,255,0.04)}
.mem-item .cb{margin-top:4px;accent-color:var(--accent);width:14px;height:14px;flex-shrink:0}
.mem-item .content{flex:1;min-width:0}
.mem-item .title{font-size:14px;font-weight:600;margin-bottom:2px;color:var(--text)}
.mem-item .summary{font-size:12px;color:var(--text3);line-height:1.5;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.mem-item .meta{display:flex;gap:8px;margin-top:6px;font-size:11px;color:var(--text3);flex-wrap:wrap;align-items:center}
.mem-item .meta .badge{display:inline-flex;align-items:center;gap:3px;padding:1px 7px;border-radius:10px;font-size:10px}
.mem-item .meta .mtag{background:rgba(255,255,255,0.04);padding:1px 7px;border-radius:10px;font-size:10px;color:var(--text3)}
.mem-item.attention{border-left-color:var(--attention)}
.mem-item.active{border-left-color:var(--active)}
.mem-item.flash{border-left-color:var(--flash)}
.mem-item.settled{border-left-color:var(--settled)}
.clr-attention{color:var(--attention)}
.clr-active{color:var(--active)}
.clr-flash{color:var(--flash)}
.clr-settled{color:var(--settled)}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:92%;max-width:660px;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:18px 20px;border-bottom:1px solid var(--border)}
.modal-head h2{font-size:16px;font-weight:600}
.modal-head .close-btn{background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;transition:all 0.2s}
.modal-head .close-btn:hover{background:var(--surface2);color:var(--text)}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.modal-body label{display:block;color:var(--text2);font-size:12px;font-weight:500;margin:12px 0 4px;letter-spacing:0.3px}
.modal-body input,.modal-body textarea,.modal-body select{width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:13px;transition:border 0.2s;font-family:inherit}
.modal-body textarea{min-height:80px;resize:vertical}
.modal-body input:focus,.modal-body textarea:focus,.modal-body select:focus{outline:none;border-color:var(--accent)}
.modal-body .info-row{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--text3);padding:10px 12px;background:var(--bg);border-radius:var(--radius-sm);margin-top:12px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;padding:14px 20px;border-top:1px solid var(--border)}
.modal-footer button{padding:8px 18px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-size:13px;transition:all 0.2s}
.modal-footer .btn-save{background:var(--accent);color:#fff}
.modal-footer .btn-save:hover{background:var(--accent2)}
.modal-footer .btn-del{background:rgba(255,92,108,0.12);color:var(--danger)}
.modal-footer .btn-del:hover{background:rgba(255,92,108,0.2)}
.modal-footer .btn-close{background:var(--surface2);color:var(--text2)}
.modal-footer .btn-close:hover{color:var(--text)}
.confirm-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);z-index:2000;align-items:center;justify-content:center}
.confirm-overlay.show{display:flex}
.confirm-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;max-width:380px;width:90%;box-shadow:0 16px 48px rgba(0,0,0,0.4)}
.confirm-box p{font-size:14px;color:var(--text);margin-bottom:18px;line-height:1.6}
.confirm-actions{display:flex;gap:8px;justify-content:flex-end}
.confirm-actions button{padding:8px 20px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-size:13px;transition:all 0.2s}
.confirm-actions .yes{background:var(--danger);color:#fff}
.confirm-actions .yes:hover{filter:brightness(1.15)}
.confirm-actions .no{background:var(--surface2);color:var(--text2)}
.confirm-actions .no:hover{color:var(--text)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--surface);border:1px solid var(--border);padding:10px 24px;border-radius:var(--radius-sm);color:var(--text);font-size:13px;z-index:9999;opacity:0;visibility:hidden;transition:all 0.3s ease;box-shadow:0 4px 20px rgba(0,0,0,0.4)}
.toast.show{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0)}
.loading{text-align:center;padding:48px 20px;color:var(--text3);font-size:13px}
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty .icon{font-size:36px;margin-bottom:8px}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:640px){.stats{grid-template-columns:repeat(2,1fr)}.container{padding:16px 12px}.header h1{font-size:17px}.modal{width:96%;max-height:92vh}}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1><span>记忆管理</span></h1>
<div class="actions">
<button onclick="exportAll()">导出</button>
<label for="importFile">导入<input type="file" id="importFile" accept=".json" onchange="importMemories(this)"></label>
<button onclick="runDream()">梦境</button>
<button onclick="loadData()" title="刷新">&#x21bb;</button>
</div>
</div>

<div class="stats">
<div class="stat"><div class="stat-val" id="statTotal" style="color:var(--accent)">-</div><div class="stat-lbl">总记忆</div></div>
<div class="stat"><div class="stat-val" id="statTags" style="color:var(--success)">-</div><div class="stat-lbl">标签数</div></div>
<div class="stat"><div class="stat-val" id="statExpiring" style="color:var(--active)">-</div><div class="stat-lbl">即将过期</div></div>
<div class="stat"><div class="stat-val" id="statDreams" style="color:var(--attention)">-</div><div class="stat-lbl">梦境次数</div></div>
</div>

<div class="layer-wrap">
<div class="layer-head"><span>层级分布</span><span id="layerTotal" style="color:var(--text3);font-weight:400;font-size:12px"></span></div>
<div class="layer-bar" id="layerBar"></div>
<div class="layer-legend" id="layerLegend"></div>
</div>

<div class="import-result" id="importResult"></div>

<div class="search-wrap">
<div class="search-row">
<input type="text" id="searchInput" placeholder="搜索记忆内容或标签...">
<button class="clear-btn" onclick="doClear()">&#x2715;</button>
</div>
<div class="tags" id="tagCloud"></div>
</div>

<div class="list-wrap">
<div class="list-toolbar">
<div class="filters" id="filterGroup">
<button class="filter-btn active" onclick="setLayer('all')">全部</button>
<button class="filter-btn" onclick="setLayer('attention')">关注</button>
<button class="filter-btn" onclick="setLayer('active')">活跃</button>
<button class="filter-btn" onclick="setLayer('flash')">闪存</button>
<button class="filter-btn" onclick="setLayer('settled')">沉淀</button>
</div>
<div class="select-all-wrap"><input type="checkbox" id="selectAll" onchange="toggleAll(this.checked)"> <label for="selectAll">全选</label></div>
</div>
<div class="batch-bar" id="batchBar">
<span class="count" id="batchCount">已选 0 条</span>
<button class="batch-btn" onclick="batchLayer('attention')">关注层</button>
<button class="batch-btn" onclick="batchLayer('active')">活跃层</button>
<button class="batch-btn" onclick="batchLayer('flash')">闪存层</button>
<button class="batch-btn" onclick="batchLayer('settled')">沉淀层</button>
<button class="batch-btn" onclick="confirmBatch('archive')">归档</button>
<button class="batch-btn danger" onclick="confirmBatch('delete')">删除</button>
</div>
<div class="mem-list" id="memoryList"><div class="loading">加载中...</div></div>
</div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
<div class="modal">
<div class="modal-head"><h2 id="modalTitle">记忆详情</h2><button class="close-btn" onclick="closeModal()">&#x2715;</button></div>
<div class="modal-body">
<label>标题</label><input id="editTitle">
<label>摘要</label><textarea id="editSummary" rows="2"></textarea>
<label>内容</label><textarea id="editContent" rows="5"></textarea>
<label>层级</label>
<select id="editLayer">
<option value="attention">关注层</option>
<option value="active">活跃层</option>
<option value="flash">闪存层</option>
<option value="settled">沉淀层</option>
</select>
<label>标签</label><input id="editTags" placeholder="用逗号分隔">
<label>ID</label><input id="editId" readonly style="color:var(--text3);font-size:12px">
<div class="info-row">
<span>&#x1f504; 召回 <span id="editRecall">0</span> 次</span>
<span>&#x1f4c5; <span id="editCreated">-</span></span>
<span>&#x1f3f7; <span id="editType">-</span></span>
<span>&#x1f4cc; <span id="editStatus">-</span></span>
</div>
</div>
<div class="modal-footer">
<button class="btn-del" onclick="deleteCurrent()">删除</button>
<button class="btn-close" onclick="closeModal()">取消</button>
<button class="btn-save" onclick="saveEdit()">保存</button>
</div>
</div>
</div>

<div class="confirm-overlay" id="confirmOverlay" onclick="if(event.target===this)confirmClose()">
<div class="confirm-box">
<p id="confirmMsg">确定执行此操作？</p>
<div class="confirm-actions">
<button class="no" onclick="confirmClose()">取消</button>
<button class="yes" onclick="confirmExec()">确定</button>
</div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '/mem-api';
let allMemories = [], currLayer = 'all', selected = new Set(), modalId = null, pending = null;
let searchTimer = null;

async function api(path, opts = {}) {
  const r = await fetch(API + path, {
    method: opts.method || 'GET',
    headers: { 'Content-Type': 'application/json', ...opts.headers },
    body: opts.body
  });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2500);
}

async function loadData() {
  try {
    const [s, m] = await Promise.all([api('/api/stats'), api('/api/memories')]);
    allMemories = m.memories || [];
    document.getElementById('statTotal').textContent = allMemories.length;
    document.getElementById('statTags').textContent = (s.tags || []).length;
    document.getElementById('statExpiring').textContent = (s.expiring || []).length;
    document.getElementById('statDreams').textContent = (s.dreamLogs || []).length;
    renderLayer(s);
    renderTags(s.tags || []);
    renderFilter();
    renderList();
  } catch (e) {
    document.getElementById('memoryList').innerHTML = '<div class="loading">加载失败: ' + e.message + '</div>';
  }
}

function renderLayer(s) {
  const l = s.layers || [];
  const c = { attention: '#ff6b6b', active: '#ffd93d', flash: '#4cdf8b', settled: '#6c8cff' };
  const n = { attention: '关注', active: '活跃', flash: '闪存', settled: '沉淀' };
  const total = l.reduce((a, x) => a + x.count, 0);
  document.getElementById('layerTotal').textContent = '共 ' + total + ' 条';
  document.getElementById('layerBar').innerHTML = l.map(x =>
    '<div class="layer-seg" style="flex:' + x.count + ';background:' + (c[x.layer] || '#444') + '" title="' + (n[x.layer] || x.layer) + ': ' + x.count + '"></div>'
  ).join('');
  document.getElementById('layerLegend').innerHTML = l.map(x =>
    '<div class="legend-item" onclick="setLayer(\'' + x.layer + '\')"><span class="legend-dot" style="background:' + (c[x.layer] || '#444') + '"></span>' + (n[x.layer] || x.layer) + ' <span style="color:var(--text3)">' + x.count + '</span></div>'
  ).join('');
}

function renderTags(tags) {
  document.getElementById('tagCloud').innerHTML = tags.slice(0, 24).map(t => {
    const safe = t.tag.replace(/'/g, "\\'");
    return '<div class="tag" onclick="setSearch(\'' + safe + '\')">' + t.tag + ' <span class="count">' + t.count + '</span></div>';
  }).join('');
}

function setSearch(q) {
  document.getElementById('searchInput').value = q;
  doSearch(q);
}

function renderFilter() {
  const c = {};
  allMemories.forEach(m => { c[m.layer] = (c[m.layer] || 0) + 1; });
  const n = { all: '全部', attention: '关注', active: '活跃', flash: '闪存', settled: '沉淀' };
  document.querySelectorAll('#filterGroup .filter-btn').forEach(b => {
    const txt = b.textContent.replace(/\d+/g, '').trim();
    if (txt === '全部') b.textContent = '全部 ' + allMemories.length;
    else for (const [k, v] of Object.entries(n)) {
      if (txt === v) b.textContent = v + ' ' + (c[k] || 0);
    }
  });
}

function setLayer(l) {
  currLayer = l;
  const n = { all: '全部', attention: '关注', active: '活跃', flash: '闪存', settled: '沉淀' };
  document.querySelectorAll('#filterGroup .filter-btn').forEach(b => {
    const txt = b.textContent.replace(/\d+/g, '').trim();
    b.classList.toggle('active', txt === n[l]);
  });
  renderList();
}

function doClear() {
  document.getElementById('searchInput').value = '';
  doSearch('');
}

function doSearch(q) {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    if (!q || q.trim() === '') { renderList(); return; }
    (async () => {
      try {
        const r = await api('/api/search', { method: 'POST', body: JSON.stringify({ query: q, limit: 50 }) });
        const results = r.results || [];
        renderItems(results.map(x => ({
          id: x.id, title: x.title, summary: x.snippet || x.summary,
          layer: x.layer || 'active', recall_count: x.recallCount || 0,
          created_at: x.createdAt || '-', tags: x.tags || []
        })));
      } catch {
        const kw = q.toLowerCase();
        renderItems(allMemories.filter(m =>
          (m.title || '').toLowerCase().includes(kw) ||
          (m.summary || '').toLowerCase().includes(kw) ||
          (m.tags || []).some(t => t.toLowerCase().includes(kw))
        ));
      }
    })();
  }, 200);
}

function renderList() {
  let list = allMemories;
  if (currLayer !== 'all') list = list.filter(m => m.layer === currLayer);
  renderItems(list);
}

function renderItems(list) {
  const n = { attention: '关注', active: '活跃', flash: '闪存', settled: '沉淀' };
  const col = { attention: '#ff6b6b', active: '#ffd93d', flash: '#4cdf8b', settled: '#6c8cff' };
  if (list.length === 0) {
    document.getElementById('memoryList').innerHTML = '<div class="empty"><div class="icon">&#x1f4ad;</div><div class="text">暂无记忆</div></div>';
    return;
  }
  const html = list.slice(0, 100).map(m =>
    '<div class="mem-item ' + m.layer + (selected.has(m.id) ? ' selected' : '') + '" data-id="' + m.id + '">' +
      '<input type="checkbox" class="cb" ' + (selected.has(m.id) ? 'checked' : '') + ' onchange="toggleS(\'' + m.id + '\',this.checked)" onclick="event.stopPropagation()">' +
      '<div class="content" onclick="openM(\'' + m.id + '\')">' +
        '<div class="title">' + (m.title || '(无标题)').substring(0, 80) + '</div>' +
        '<div class="summary">' + ((m.summary || '').substring(0, 150)) + '</div>' +
        '<div class="meta">' +
          '<span class="badge" style="background:' + col[m.layer] + '18;color:' + col[m.layer] + '">&#x25cf; ' + (n[m.layer] || m.layer) + '</span>' +
          '<span>&#x1f504; ' + (m.recall_count || 0) + '</span>' +
          (m.created_at !== '-' ? '<span>&#x1f4c5; ' + m.created_at + '</span>' : '') +
          (m.tags || []).slice(0, 4).map(t => '<span class="mtag">' + t + '</span>').join('') +
        '</div>' +
      '</div>' +
    '</div>'
  ).join('');
  document.getElementById('memoryList').innerHTML = html;
  selected.clear();
  document.getElementById('selectAll').checked = false;
  updateBatch();
}

function toggleS(id, ch) {
  if (ch) selected.add(id); else selected.delete(id);
  const el = document.querySelector('.mem-item[data-id="' + id + '"]');
  if (el) el.classList.toggle('selected', ch);
  updateBatch();
}

function toggleAll(ch) {
  document.querySelectorAll('.mem-item').forEach(el => {
    const cb = el.querySelector('.cb');
    if (cb) cb.checked = ch;
    const id = el.dataset.id;
    if (id) { if (ch) selected.add(id); else selected.delete(id); }
    el.classList.toggle('selected', ch);
  });
  updateBatch();
}

function updateBatch() {
  const c = selected.size;
  document.getElementById('batchCount').textContent = '已选 ' + c + ' 条';
  document.getElementById('batchBar').classList.toggle('show', c > 0);
}

async function batchLayer(l) {
  const ids = [...selected];
  if (!ids.length) return;
  let ok = 0;
  for (const id of ids) {
    try { await api('/api/memories/' + id, { method: 'PATCH', body: JSON.stringify({ layer: l }) }); ok++; } catch {}
  }
  toast('已切换 ' + ok + ' 条');
  await loadData();
}

function confirmBatch(action) {
  pending = action;
  const msgs = {
    delete: '确定删除 ' + selected.size + ' 条记忆？不可恢复！',
    archive: '确定归档 ' + selected.size + ' 条记忆？'
  };
  document.getElementById('confirmMsg').textContent = msgs[action] || '确定？';
  document.getElementById('confirmOverlay').classList.add('show');
}

async function confirmExec() {
  document.getElementById('confirmOverlay').classList.remove('show');
  if (pending === 'deleteOne') {
    try {
      await api('/api/memories/' + modalId, { method: 'DELETE' });
      toast('已删除');
      closeModal();
      await loadData();
    } catch (e) { toast('删除失败'); }
    pending = null;
    return;
  }

  const ids = [...selected];
  let ok = 0;
  if (pending === 'delete') {
    for (const id of ids) {
      try { await api('/api/memories/' + id, { method: 'DELETE' }); ok++; } catch {}
    }
    toast('已删除 ' + ok + ' 条');
  } else if (pending === 'archive') {
    for (const id of ids) {
      try { await api('/api/memories/' + id, { method: 'PATCH', body: JSON.stringify({ status: 'archived' }) }); ok++; } catch {}
    }
    toast('已归档 ' + ok + ' 条');
  }
  selected.clear();
  await loadData();
  pending = null;
}

function confirmClose() {
  document.getElementById('confirmOverlay').classList.remove('show');
  pending = null;
}

function openM(id) {
  const m = allMemories.find(x => x.id === id);
  if (!m) return;
  modalId = id;
  document.getElementById('modalTitle').textContent = '编辑记忆';
  document.getElementById('editId').value = m.id || '';
  document.getElementById('editTitle').value = m.title || '';
  document.getElementById('editSummary').value = m.summary || '';
  document.getElementById('editContent').value = m.content || '';
  document.getElementById('editLayer').value = m.layer || 'active';
  document.getElementById('editTags').value = (m.tags || []).join(', ');
  document.getElementById('editRecall').textContent = m.recall_count || 0;
  document.getElementById('editCreated').textContent = m.created_at || '-';
  document.getElementById('editType').textContent = m.type || '-';
  document.getElementById('editStatus').textContent = m.status || '-';
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
  modalId = null;
}

async function saveEdit() {
  if (!modalId) return;
  const tags = document.getElementById('editTags').value.split(/[,，]/).map(t => t.trim()).filter(Boolean);
  const data = {
    title: document.getElementById('editTitle').value,
    summary: document.getElementById('editSummary').value,
    content: document.getElementById('editContent').value,
    layer: document.getElementById('editLayer').value,
    tags: tags
  };
  try {
    await api('/api/memories/' + modalId, { method: 'PATCH', body: JSON.stringify(data) });
    toast('已保存');
    closeModal();
    await loadData();
  } catch (e) { toast('保存失败: ' + e.message); }
}

function deleteCurrent() {
  if (!modalId) return;
  pending = 'deleteOne';
  document.getElementById('confirmMsg').textContent = '确定删除这条记忆？不可恢复！';
  document.getElementById('confirmOverlay').classList.add('show');
}

async function exportAll() {
  try {
    const r = await api('/api/export');
    const blob = new Blob([JSON.stringify(r, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'memories-' + new Date().toISOString().slice(0, 10) + '.json';
    a.click();
    URL.revokeObjectURL(url);
    toast('已导出');
  } catch (e) { toast('导出失败: ' + e.message); }
}

async function importMemories(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async function(e) {
    try {
      const data = JSON.parse(e.target.result);
      const body = JSON.stringify({
        memories: data.memories || (Array.isArray(data) ? data : [data]),
        mode: 'skip'
      });
      const r = await api('/api/import', { method: 'POST', body: body });
      const el = document.getElementById('importResult');
      el.textContent = '导入 ' + (r.imported || 0) + ' 条 (跳过 ' + (r.skipped || 0) + ' 条)';
      el.classList.add('show');
      await loadData();
    } catch (e) { toast('导入失败: ' + e.message); }
    input.value = '';
  };
  reader.readAsText(file);
}

async function runDream() {
  try {
    const r = await api('/api/dream/run', { method: 'POST' });
    toast(r.message);
    await loadData();
  } catch (e) { toast('梦境失败: ' + e.message); }
}

// Search input with debounce
document.getElementById('searchInput').addEventListener('input', function() {
  doSearch(this.value);
});

loadData();
setInterval(loadData, 30000);
</script>
