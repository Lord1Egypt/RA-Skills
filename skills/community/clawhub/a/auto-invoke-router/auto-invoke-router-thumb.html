<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 600px;
    height: 600px;
    background: #07090F;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .bg-grid {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(139,92,246,0.12) 1px, transparent 1px);
    background-size: 28px 28px;
  }

  .glow-center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -55%);
    width: 500px;
    height: 500px;
    background: radial-gradient(ellipse, rgba(139,92,246,0.14) 0%, transparent 60%);
    pointer-events: none;
  }

  .top-line {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, rgba(139,92,246,0) 0%, #8B5CF6 50%, rgba(139,92,246,0) 100%);
  }

  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  .clawhub-tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: #A78BFA;
    border: 1px solid rgba(139,92,246,0.3);
    padding: 4px 12px;
    border-radius: 3px;
    background: rgba(139,92,246,0.07);
    margin-bottom: 32px;
  }

  .icon-wrap {
    margin-bottom: 28px;
  }

  .title-line1 {
    font-size: 52px;
    font-weight: 900;
    letter-spacing: -2px;
    color: #F9FAFB;
    line-height: 1;
  }

  .title-line2 {
    font-size: 52px;
    font-weight: 900;
    letter-spacing: -2px;
    color: #A78BFA;
    line-height: 1;
    margin-bottom: 24px;
  }

  .count-pill {
    font-size: 13px;
    font-weight: 600;
    color: #6B7280;
    background: rgba(17,24,39,0.8);
    border: 1px solid rgba(55,65,81,0.5);
    padding: 6px 16px;
    border-radius: 20px;
    margin-bottom: 28px;
    letter-spacing: 0.02em;
  }

  .price-badge {
    font-size: 28px;
    font-weight: 800;
    color: #EDE9FE;
    background: rgba(139,92,246,0.12);
    border: 1px solid rgba(139,92,246,0.45);
    padding: 10px 32px;
    border-radius: 10px;
    letter-spacing: -0.5px;
  }

  .publisher {
    position: absolute;
    bottom: 28px;
    right: 28px;
    font-size: 12px;
    font-weight: 600;
    color: #374151;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

  <div class="bg-grid"></div>
  <div class="glow-center"></div>
  <div class="top-line"></div>

  <div class="content">
    <div class="clawhub-tag">ClawHub</div>

    <!-- Routing icon -->
    <div class="icon-wrap">
      <svg width="72" height="72" viewBox="0 0 24 24" fill="none">
        <!-- Input node -->
        <circle cx="4" cy="12" r="2.2" fill="#8B5CF6"/>
        <!-- Output nodes -->
        <circle cx="20" cy="6" r="2.2" fill="#6D28D9"/>
        <circle cx="20" cy="12" r="2.2" fill="#7C3AED"/>
        <circle cx="20" cy="18" r="2.2" fill="#6D28D9"/>
        <!-- Routing lines -->
        <line x1="6.2" y1="12" x2="17.8" y2="6" stroke="#8B5CF6" stroke-width="1.6" stroke-linecap="round"/>
        <line x1="6.2" y1="12" x2="17.8" y2="12" stroke="#8B5CF6" stroke-width="1.6" stroke-linecap="round"/>
        <line x1="6.2" y1="12" x2="17.8" y2="18" stroke="#8B5CF6" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </div>

    <div class="title-line1">Auto-Invoke</div>
    <div class="title-line2">Router</div>

    <div class="count-pill">intent → skill · no slash commands</div>

    <div class="price-badge">Free</div>
  </div>

  <div class="publisher">ordo-tech</div>

</body>
</html>
