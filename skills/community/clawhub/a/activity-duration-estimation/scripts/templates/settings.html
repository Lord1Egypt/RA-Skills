<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>activity-duration-estimation — 全局设置</title>
<style>
  :root {
    --bg: #f5f5f7;
    --card: #ffffff;
    --border: #e0e0e5;
    --text: #1d1d1f;
    --text-secondary: #6e6e73;
    --accent: #6c5ce7;
    --accent-hover: #5a4bd1;
    --success: #00b894;
    --error: #e17055;
    --radius: 10px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px;
    max-width: 780px;
    margin: 0 auto;
  }
  h1 {
    font-size: 24px; font-weight: 700; margin-bottom: 2px;
    background: linear-gradient(135deg, #6c5ce7, #00cec9);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle { font-size: 13px; color: var(--text-secondary); margin-bottom: 20px; }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 18px 20px; margin-bottom: 14px;
  }
  .card-title {
    font-size: 14px; font-weight: 600; margin-bottom: 14px;
    padding-bottom: 10px; border-bottom: 1px solid var(--border);
  }
  .setting-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; margin-bottom: 8px;
    border: 1px solid #eeeef0; border-radius: 8px;
    transition: border-color .2s;
  }
  .setting-row:last-child { margin-bottom: 0; }
  .setting-row:hover { border-color: var(--accent); }
  .setting-label { font-size: 13.5px; font-weight: 500; min-width: 80px; white-space: nowrap; }
  select, input[type="text"] {
    padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px;
    font-size: 13px; background: #fafafa; color: var(--text); outline: none;
    min-width: 130px; flex-shrink: 0;
  }
  select:focus, input[type="text"]:focus {
    border-color: var(--accent); box-shadow: 0 0 0 2px rgba(108,92,231,.2);
  }
  select:disabled { opacity: .45; cursor: not-allowed; }
  .setting-desc { font-size: 11.5px; color: var(--text-secondary); flex: 1; text-align: right; line-height: 1.4; }
  .actions { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
  button {
    padding: 8px 18px; border: none; border-radius: 6px; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all .2s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-secondary { background: #e8e8ed; color: var(--text); }
  .btn-secondary:hover { background: #d1d1d6; }
  .toast {
    position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 8px;
    font-size: 13px; font-weight: 500; opacity: 0; transform: translateY(-10px);
    transition: all .3s; z-index: 999; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.success { background: var(--success); color: #fff; }
  .toast.error { background: var(--error); color: #fff; }
  .toast.info { background: #636e72; color: #fff; }
  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; color: var(--text-secondary); margin-top: 12px;
    padding-top: 12px; border-top: 1px solid var(--border);
  }
  @media (max-width: 600px) {
    .setting-row { flex-wrap: wrap; }
    .setting-desc { text-align: left; width: 100%; }
  }
</style>
</head>
<body>

<h1>⚙️ activity-duration-estimation</h1>
<div class="subtitle">全局设置面板 — 修改自动同步，保存后立即生效</div>

<div class="card">
  <div class="card-title">🔗 信息通道</div>
  <div class="setting-row">
    <span class="setting-label">联网搜索</span>
    <select id="s-web_search_mode">
      <option value="auto">自动执行</option>
      <option value="manual">每次手动</option>
    </select>
    <span class="setting-desc">auto = 自动联网搜索补充；manual = 每次询问</span>
  </div>
</div>

<div class="card">
  <div class="card-title">🧠 知识库</div>
  <div class="setting-row">
    <span class="setting-label">知识库采集</span>
    <select id="s-kb_collect_mode">
      <option value="auto">自动执行</option>
      <option value="manual">每次手动</option>
    </select>
    <span class="setting-desc">auto = 估算完成自动写入知识库；manual = 询问用户</span>
  </div>
  <div class="setting-row">
    <span class="setting-label">知识库调用</span>
    <select id="s-kb_query_mode">
      <option value="auto">自动执行</option>
      <option value="manual">每次手动</option>
    </select>
    <span class="setting-desc">auto = 估算前自动查历史基准；manual = 询问用户</span>
  </div>
</div>

<div class="card">
  <div class="card-title">📄 文档</div>
  <div class="setting-row">
    <span class="setting-label">文档指定</span>
    <input type="text" id="s-doc_template" placeholder="留空或输入模板名" />
    <span class="setting-desc">留空 = LLM 自动选择；填写模板名 = 使用指定模板</span>
  </div>
  <div class="setting-row">
    <span class="setting-label">文档撰写</span>
    <select id="s-doc_write_mode">
      <option value="auto">自动执行</option>
      <option value="manual">每次手动</option>
      <option value="template">模板要求</option>
    </select>
    <span class="setting-desc">auto = 按节自动生成；manual = 纯手动/混合；template = 按模板要求混合</span>
  </div>
</div>

<div class="actions">
  <button class="btn-primary" onclick="saveAll()">💾 保存全部</button>
  <button class="btn-secondary" onclick="resetDefaults()">↺ 恢复默认</button>
</div>

<div class="status-bar">
  <span id="status-text">就绪</span>
  <span id="updated-text"></span>
</div>

<div id="toast" class="toast"></div>

<script>
const KEYS = ["web_search_mode", "kb_collect_mode", "kb_query_mode", "doc_template", "doc_write_mode"];
const FIELD_OPTIONS = {
  web_search_mode: ["auto", "manual"],
  kb_collect_mode: ["auto", "manual"],
  kb_query_mode: ["auto", "manual"],
  doc_template: null,
  doc_write_mode: ["auto", "manual", "template"],
};
const OPT_LABELS = { auto: "自动执行", manual: "每次手动", template: "模板要求" };

let settings = {};
let dirty = false;

function getEl(key) {
  return document.getElementById("s-" + key);
}

function readUI() {
  KEYS.forEach(key => {
    const el = getEl(key);
    if (!el) return;
    if (el.tagName === "SELECT") {
      settings[key] = el.value;
    } else {
      const v = el.value.trim();
      settings[key] = v || null;
    }
  });
}

function writeUI() {
  KEYS.forEach(key => {
    const el = getEl(key);
    if (!el) return;
    if (el.tagName === "SELECT") {
      el.value = settings[key] || "manual";
    } else {
      el.value = settings[key] || "";
    }
  });
  applyConstraints();
}

function applyConstraints() {
  readUI();
  const tpl = settings.doc_template;
  const ws = getEl("doc_write_mode");
  if (!ws) return;
  Array.from(ws.options).forEach(opt => {
    opt.disabled = opt.value === "template" && !tpl;
  });
  if (!tpl && ws.value === "template") {
    ws.value = "auto";
    settings.doc_write_mode = "auto";
  }
}

// 所有输入控件监听变更
KEYS.forEach(key => {
  const el = getEl(key);
  if (!el) return;
  el.addEventListener("change", () => {
    readUI();
    dirty = true;
    applyConstraints();
    updateStatus();
  });
  if (el.tagName === "INPUT") {
    el.addEventListener("blur", () => {
      readUI();
      dirty = true;
      applyConstraints();
      updateStatus();
    });
  }
});

async function loadSettings() {
  try {
    const r = await fetch("/api/load");
    settings = await r.json();
    writeUI();
    updateStatus(settings.updated_at || "N/A");
    dirty = false;
  } catch (e) {
    showToast("加载设置失败: " + e.message, "error");
  }
}

async function saveAll() {
  readUI();
  const errs = validate();
  if (errs.length > 0) {
    showToast("校验失败: " + errs.join("; "), "error");
    return;
  }
  showToast("保存中...", "info");
  try {
    const r = await fetch("/api/save", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(settings),
    });
    const result = await r.json();
    if (result.ok) {
      settings = result.data;
      writeUI();
      showToast("✅ 设置已保存，下次执行时生效", "success");
      updateStatus(result.data.updated_at || "刚刚");
      dirty = false;
    } else {
      showToast("❌ " + result.error, "error");
    }
  } catch (e) {
    showToast("保存失败: " + e.message, "error");
  }
}

async function resetDefaults() {
  showToast("恢复默认中...", "info");
  try {
    const r = await fetch("/api/reset", { method: "POST" });
    const result = await r.json();
    if (result.ok) {
      settings = result.data;
      writeUI();
      showToast("✅ 已恢复默认设置", "success");
      updateStatus(result.data.updated_at || "刚刚");
      dirty = false;
    } else {
      showToast("❌ " + result.error, "error");
    }
  } catch (e) {
    showToast("重置失败: " + e.message, "error");
  }
}

function validate() {
  const errs = [];
  for (const [key, opts] of Object.entries(FIELD_OPTIONS)) {
    if (opts && !opts.includes(settings[key])) {
      errs.push(key + " 值无效: " + settings[key]);
    }
  }
  if (!settings.doc_template && settings.doc_write_mode === "template") {
    errs.push("文档指定为空时，文档撰写不能为「模板要求」");
  }
  return errs;
}

function updateStatus(updatedAt) {
  if (updatedAt) {
    document.getElementById("updated-text").textContent = "上次更新: " + updatedAt;
  }
  document.getElementById("status-text").textContent = dirty ? "⚠️ 有未保存的修改" : "✅ 已同步";
}

function showToast(msg, type) {
  const toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.className = "toast" + (type ? " " + type : "");
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), type === "error" ? 5000 : 2500);
}

// start
loadSettings();
</script>
</body>
</html>
