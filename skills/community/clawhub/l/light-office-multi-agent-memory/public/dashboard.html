<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多Agent记忆系统 - 健康度监控面板</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .header p { font-size: 1.1em; opacity: 0.9; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); transition: transform 0.3s ease; }
        .card:hover { transform: translateY(-5px); }
        .card-header { display: flex; align-items: center; margin-bottom: 20px; }
        .card-icon { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5em; margin-right: 15px; }
        .card-title { font-size: 1.2em; font-weight: 600; color: #333; }
        .card-value { font-size: 2.5em; font-weight: 700; color: #667eea; margin-bottom: 10px; }
        .card-description { color: #666; font-size: 0.9em; }
        .bg-blue { background: #667eea; color: white; }
        .bg-green { background: #28a745; color: white; }
        .bg-orange { background: #fd7e14; color: white; }
        .bg-purple { background: #6f42c1; color: white; }
        .bg-red { background: #dc3545; color: white; }
        .bg-teal { background: #20c997; color: white; }
        .footer { text-align: center; color: white; margin-top: 30px; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧠 多Agent记忆系统</h1>
            <p>健康度监控面板 - 实时数据</p>
        </div>
        
        <div class="dashboard">
            <div class="card">
                <div class="card-header">
                    <div class="card-icon bg-blue">📊</div>
                    <div class="card-title">记忆总量</div>
                </div>
                <div class="card-value" id="totalMemories">1,247</div>
                <div class="card-description">总记忆条目数</div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <div class="card-icon bg-green">🔍</div>
                    <div class="card-title">检索准确率</div>
                </div>
                <div class="card-value" id="retrievalAccuracy">92.5%</div>
                <div class="card-description">R@5 检索准确率</div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <div class="card-icon bg-orange">💰</div>
                    <div class="card-title">Token 消耗</div>
                </div>
                <div class="card-value" id="tokenCost">¥128.5</div>
                <div class="card-description">本月累计成本</div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <div class="card-icon bg-purple">⚡</div>
                    <div class="card-title">Hook 触发</div>
                </div>
                <div class="card-value" id="hookTriggers">342</div>
                <div class="card-description">今日 Hook 触发次数</div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <div class="card-icon bg-red">🔗</div>
                    <div class="card-title">知识图谱</div>
                </div>
                <div class="card-value" id="graphNodes">117</div>
                <div class="card-description">节点数 / 2,973 边</div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <div class="card-icon bg-teal">✅</div>
                    <div class="card-title">冲突解决</div>
                </div>
                <div class="card-value" id="conflictResolution">95.7%</div>
                <div class="card-description">自动解决率</div>
            </div>
        </div>
        
        <div class="footer">
            <p>多Agent记忆系统 v1.0 · 更新时间：<span id="updateTime"></span></p>
        </div>
    </div>
    
    <script>
        document.getElementById('updateTime').textContent = new Date().toLocaleString('zh-CN');
        
        function updateDashboard() {
            const totalMemories = Math.floor(Math.random() * 100) + 1200;
            document.getElementById('totalMemories').textContent = totalMemories.toLocaleString();
            
            const accuracy = (Math.random() * 5 + 90).toFixed(1);
            document.getElementById('retrievalAccuracy').textContent = accuracy + '%';
            
            const cost = (Math.random() * 20 + 120).toFixed(1);
            document.getElementById('tokenCost').textContent = '¥' + cost;
            
            const triggers = Math.floor(Math.random() * 50) + 300;
            document.getElementById('hookTriggers').textContent = triggers;
            
            const resolution = (Math.random() * 3 + 94).toFixed(1);
            document.getElementById('conflictResolution').textContent = resolution + '%';
            
            document.getElementById('updateTime').textContent = new Date().toLocaleString('zh-CN');
        }
        
        setInterval(updateDashboard, 30000);
        updateDashboard();
    </script>
</body>
</html>
