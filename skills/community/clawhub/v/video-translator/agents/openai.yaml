interface:
  display_name: "Video Translator"
  short_description: "调用线上视频翻译服务并返回预览链接"
  default_prompt: "Use $video-translator to translate a user-provided video, send targetLanguage (zh/en, default en), sourceLanguage when specified (en/zh/ko/ja/fr/ru/es/de, default inferred), show/bilingual subtitle flags when requested, and return the final preview_url."
  required_env_vars:
    - "VIDEO_TRANSLATE_SERVICE_API_KEY"
  primary_credential: "VIDEO_TRANSLATE_SERVICE_API_KEY"
  external_service_domain: "audiox-api-global.luoji.cn"

policy:
  allow_implicit_invocation: true
