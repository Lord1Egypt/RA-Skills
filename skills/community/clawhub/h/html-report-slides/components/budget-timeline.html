<!-- ============================================
     COMPONENT: Budget Timeline (预算进度条)
     用途：展示各项预算的使用进度/占比
     每行：标签 + 进度条 + 数值
     ============================================ -->
<div class="budget-timeline">

  <!-- 预算项 1 -->
  <div class="budget-item">
    <div class="budget-label">__LABEL_1__</div>
    <div class="budget-bar-track">
      <div class="budget-bar-fill" style="width: __PCT_1__%;">__PCT_1__%</div>
    </div>
    <div class="budget-value">__VALUE_1__</div>
  </div>

  <!-- 预算项 2 -->
  <div class="budget-item">
    <div class="budget-label">__LABEL_2__</div>
    <div class="budget-bar-track">
      <div class="budget-bar-fill" style="width: __PCT_2__%;">__PCT_2__%</div>
    </div>
    <div class="budget-value">__VALUE_2__</div>
  </div>

  <!-- 预算项 3 -->
  <div class="budget-item">
    <div class="budget-label">__LABEL_3__</div>
    <div class="budget-bar-track">
      <div class="budget-bar-fill" style="width: __PCT_3__%;">__PCT_3__%</div>
    </div>
    <div class="budget-value">__VALUE_3__</div>
  </div>

  <!-- 按需追加... -->

</div>
