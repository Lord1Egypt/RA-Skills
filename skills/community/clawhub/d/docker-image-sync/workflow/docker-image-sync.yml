name: Docker Image Sync to CNB

on:
  push:
    paths:
      - 'images.txt'

env:
  CNB_REGISTRY: ${{ secrets.CNB_REGISTRY }}
  CNB_REPO_SLUG: ${{ secrets.CNB_REPO_SLUG_LOWERCASE }}

jobs:
  sync-images:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录到 CNB Docker 制品库
        uses: docker/login-action@v3
        with:
          registry: ${{ env.CNB_REGISTRY }}
          username: cnb
          password: ${{ secrets.CNB_TOKEN }}

      - name: 读取镜像列表并同步
        run: |
          set -e
          set -o pipefail

          while IFS= read -r image || [[ -n "$image" ]]; do
            [[ -z "$image" || "$image" =~ ^#.*$ ]] && continue

            echo "处理镜像: $image"

            docker pull "$image" --quiet

            IFS=':' read -r name tag <<< "$image"
            [[ -z "$tag" ]] && tag="latest"

            IFS='/' read -r prefix rest <<< "$name"
            if echo "$rest" | grep -q '/'; then
              repo=$(echo "$rest" | tr '/' '-' )
            else
              repo="$name"
            fi

            target_image="${CNB_REGISTRY}/${CNB_REPO_SLUG}/${repo}:${tag}"

            docker tag "$image" "$target_image" --quiet
            docker push "$target_image" --quiet

            echo "✓ 镜像 $image 已同步到 $target_image"
          done < images.txt

          echo "全部同步完成"