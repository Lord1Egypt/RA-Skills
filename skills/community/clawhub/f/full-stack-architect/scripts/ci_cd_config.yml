# CI/CD配置文件
# 用于自动化知识库更新和PRD校验

name: Full Stack Architect CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 2 * * *'  # 每天凌晨2点执行

jobs:
  update-knowledge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 安装必要的依赖
      
      - name: Update knowledge base
        run: |
          cd .claude/skills/full-stack-architect/scripts
          python knowledge_organizer.py
      
      - name: Lint PRD files
        run: |
          cd .claude/skills/full-stack-architect/scripts
          # 检查所有PRD文件
          find ../.. -name "prd-*.md" -type f | xargs -I {} python prd_linter.py {}
      
      - name: Create backup
        run: |
          cd .claude/skills/full-stack-architect/scripts
          python auto_update_backup.py
      
      - name: Upload backup
        uses: actions/upload-artifact@v3
        with:
          name: full-stack-architect-backup
          path: full-stack-architect-backup_*.tar.gz

  test-skills:
    runs-on: ubuntu-latest
    needs: update-knowledge
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Test PRD linter
        run: |
          cd .claude/skills/full-stack-architect/scripts
          # 创建测试PRD文件
          cat > test-prd.md << 'EOF'
          # 测试项目 产品需求文档

          ## 1. 项目概述
          - 项目背景：测试PRD校验
          - 项目目标：验证PRD格式
          - 核心功能：测试功能
          - 目标用户：测试用户

          ## 2. 技术栈
          - 前端：React
          - 后端：Node.js
          - 数据库：MongoDB

          ## 3. 用户故事

          ### 3.1 故事1：测试功能
          - **描述**：测试PRD校验功能
          - **验收标准**：
            1. PRD格式正确
            2. 校验通过
          - **依赖关系**：无
          - **优先级**：高
          - **类型**：fullstack

          ## 4. 非目标
          - 生产部署

          ## 5. 成功指标
          - 校验通过率100%
          EOF
          # 运行校验
          python prd_linter.py test-prd.md
