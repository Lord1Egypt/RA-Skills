function render(data) {
  const projects = data.projects || [];
  const active = projects.filter(p => p.status === 'in_progress');
  const completed = projects.filter(p => p.status === 'completed');
  const high = projects.filter(p => p.priority === 'high');
  
  document.getElementById('subtitle').innerHTML = `
    最后更新: ${new Date(data.last_updated).toLocaleString('zh-CN')} · 
    更新者: ${data.updated_by} · 
    数据版本: ${data.schema_version}
  `;
  
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="stat-number" style="color:#58a6ff">${projects.length}</div><div class="stat-label">总项目数</div></div>
    <div class="stat-card"><div class="stat-number" style="color:#3fb950">${active.length}</div><div class="stat-label">进行中</div></div>
    <div class="stat-card"><div class="stat-number" style="color:#8b949e">${completed.length}</div><div class="stat-label">已完成</div></div>
    <div class="stat-card"><div class="stat-number" style="color:#f85149">${high.length}</div><div class="stat-label">高优先级</div></div>
  `;
  
  document.getElementById('projects').innerHTML = projects.map(p => {
    const statusIcon = p.status === 'completed' ? '✅' : p.status === 'in_progress' ? '🔄' : '⏸️';
    const priorityClass = p.priority === 'high' ? 'priority-high' : p.priority === 'medium' ? 'priority-medium' : 'priority-low';
    const priorityLabel = p.priority === 'high' ? '高' : p.priority === 'medium' ? '中' : '低';
    
    const historyHtml = (p.history || []).slice(-5).map(h => `
      <div class="history-item">
        <span class="history-time">${new Date(h.timestamp).toLocaleTimeString('zh-CN')}</span>
        <span class="history-action">${h.action}</span>
        <span class="history-desc">${h.description}</span>
      </div>
    `).join('');
    
    const errorsHtml = (p.errors || []).map(e => `
      <div class="error-item">
        <span>❌ ${e.error}</span>
        <span class="error-resolution">→ ${e.resolution}</span>
      </div>
    `).join('');
    
    return `
      <div class="project-card">
        <div class="project-header">
          <span class="project-status">${statusIcon}</span>
          <span class="project-name">${p.name}</span>
          <span class="project-priority ${priorityClass}">${priorityLabel}</span>
        </div>
        <div class="project-desc">${p.description}</div>
        <div class="project-task">📌 ${p.current_task}</div>
        <div class="project-meta">
          <span>📁 ${p.id}</span>
          <span>📅 ${new Date(p.created_at).toLocaleDateString('zh-CN')}</span>
          <span>👤 ${(p.agents_involved || []).join(', ')}</span>
        </div>
        ${historyHtml ? `<div class="history"><div class="history-title">📝 最近记录</div>${historyHtml}</div>` : ''}
        ${errorsHtml ? `<div class="errors">${errorsHtml}</div>` : ''}
      </div>
    `;
  }).join('');
}
