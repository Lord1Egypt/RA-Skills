  sanctions, or regulatory requirements. Use when screening business partners against
  trade sanctions or embargo lists. Use when user mentions "合规检查", "进出口合规", "产品认证",
  "关税", "制裁名单", "禁运", "清关", "认证要求", "compliance", "import regulations".
