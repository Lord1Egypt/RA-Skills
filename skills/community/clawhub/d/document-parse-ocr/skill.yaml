name: document_parse_ocr
version: 1.0.0
description: 支持文档智能识别（异步），适用于大批量文档处理场景。提交公网可访问的文件 URL，自动识别文档中的文本、表格、标题等结构信息，返回结构化的 JSON 结果。
author: SCNet
license: MIT
tags:
  - ocr
  - 文档解析
  - 异步处理
required_env_vars:
  - SCNET_API_KEY
optional_env_vars:
  - SCNET_API_BASE
primary_credential: SCNET_API_KEY
homepage: https://github.com/SCNet-sugon/document_parse_ocr.git  # 请替换为实际仓库地址
dependencies:
  - python3
  - requests