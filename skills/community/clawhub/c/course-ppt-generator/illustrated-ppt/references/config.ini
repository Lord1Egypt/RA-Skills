# 图文并茂PPT生成技能配置文件

# 默认设置
[defaults]
# 默认场景: education / business / tech / creative
scene = education
# 默认风格
style = blue_tech
# 输出目录
output_dir = /tmp
# 默认页数
default_pages = 10

# 场景风格配置
[scenes.education]
name = 蓝色科技风
primary = 1E3A5F
accent = 4A90D9
light_bg = F0F5FA
text = FFFFFF

[scenes.business]
name = 专业商务风
primary = 2C3E50
accent = 3498DB
light_bg = ECF0F1
text = FFFFFF

[scenes.tech]
name = 技术简约风
primary = 1A1A2E
accent = 16213E
light_bg = EAEAEA
text = FFFFFF

[scenes.creative]
name = 创意活力风
primary = 6C5CE7
accent = A29BFE
light_bg = DFE6E9
text = FFFFFF

# API配置
[api]
provider = minimax
api_url = https://api.minimaxi.com/v1/image_generation
model = image-01
aspect_ratio = 16:9

# 幻灯片类型配置
[slide_types]
cover = 封面页，用于标题和主信息
toc = 目录页，用于章节导航
content = 内容页，用于知识点展示
code = 代码页，用于代码演示
summary = 总结页，用于要点回顾
homework = 作业页，用于练习题展示
closing = 结束页，用于AI标识等信息