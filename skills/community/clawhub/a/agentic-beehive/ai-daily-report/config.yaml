# AI 市场日报 — 蜂巢配置

# 花园感知
garden:
  # 扫描信号源
  signals:
    news_heat:
      weight: 0.35
      sources:
        - "36kr"
        - "量子位"
        - "机器之心"
        - "新智元"
        - "AI前线"
      search_queries:
        - "国内大模型 最新发布"
        - "AI大模型 新品上线"
        - "大模型 API 更新"
        - "国产大模型 价格调整"
    community:
      weight: 0.25
      sources:
        - "知乎"
        - "V2EX"
        - "即刻"
      search_queries:
        - "大模型 推荐"
        - "国产AI模型 对比"
    release:
      weight: 0.15
      # GitHub/GitLab release 监控
      keywords: ["model release", "API update", "pricing update"]
    price_change:
      weight: 0.10
    docs_update:
      weight: 0.15

  # bloom 阈值
  bloom:
    active_threshold: 0.4      # > 0.4 视为"开花"，全量采蜜
    declining_threshold: 0.2   # < 0.2 视为"凋谢"，轻量检查
    new_vendor_boost: 0.15     # 新发现厂商初始加成
    decay_rate: 0.05           # 每日自然衰减（无新信号时）
    max_score: 1.0

