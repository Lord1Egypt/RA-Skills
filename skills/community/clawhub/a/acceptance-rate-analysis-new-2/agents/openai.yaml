interface:
  display_name: "承接率下降归因"
  short_description: "按阶段分析承接率下降，先找异常切片，再判断更像资方侧、资产维度侧还是敏感资方侧问题。"
  default_prompt: >-
    使用 $acceptance-rate-analysis。以 `SKILL.md` 为唯一主契约。只支持 `day` 和 `week`，不要扩成 `month`。严格采用切片级串行编排：先运行 `primary`，后续只按 `primary.analysis_sequence` 返回顺序逐个处理切片；`analysis_sequence` 只用于后续下钻顺序与切片快照，不得用于重新拼第一阶段展示表。对当前切片，必须先完成 `capital`，再根据当前切片自己的阶段结果决定是否进入 `asset`、`funding` 或停止；只有当前切片完整结束并输出该切片小结后，才能开始下一个切片。禁止先把所有切片都跑完 `capital` 再统一进入 `asset`，也禁止在还有切片未走完时输出“第二阶段汇总”“第三阶段汇总”这类跨切片中间汇总。后续阶段严格复用 `primary` 原始 `slice_key`、`slice_display` 和 `asset.qualified_combos[*].combo_key`，不要手动改写或重排。周粒度默认按“周一起算、最近一个已落定周 vs 再前一个已落定周”解释；用户直接说 `4.13周`、`4.6周` 时，默认按“该日期作为周一标签，对应上一完整自然周”解释，例如 `4.13周 = 2026-04-06~2026-04-12`，`4.6周 = 2026-03-30~2026-04-05`；只有用户明确说“4月13日所在周”时，才按 `2026-04-13~2026-04-19` 解释。每个阶段都要把关键判断点和关键分支讲出来，但可以合并成自然、简洁的业务表达，不必机械枚举全部内部步骤标题。第二阶段不要跳过“总准入资方个数是否较上期下降超过 30%”这个判断；即使没命中，也要交代当前期、对比期、减少量、下降比例、判断阈值，以及“因此继续看分布”。第三阶段不要跳过“是否命中单桶门槛”和“是否命中组合门槛”这两个判断；第三阶段展示固定直接复用 `asset_display.summary_markdown`、`asset_display.factor_detail_markdown`、`asset_display.combo_detail_markdown`，不要再根据 `factor_results` 或 `combo_results` 自己拼表。第一阶段只要存在异常切片，就必须先输出表格，再继续第二阶段；不允许只写一句“定位到多个异常切片”后直接进入资方侧。第一阶段给模型展示时，只能直接使用 `primary_display.markdown_table`，不要手工改列、删列、换顺序、截断行，也不要根据 `analysis_sequence`、`table_columns`、`abnormal_slice_rows`、`abnormal_slices` 或其他字段重新拼表。`primary_display.table_columns` 和 `primary_display.abnormal_slice_rows` 只保留给非 LLM 兼容或程序消费，模型禁止使用它们组织第一阶段展示。第一阶段默认展示字段固定为 `排名`、`切片`、`当前承接率`、`对比期承接率`、`影响路由金额`、`拖累路由金额`、`承接率变化（bp）`；不要退回旧列，也不要自己补列。在表格之外，必须额外展示 `primary_display.render_summary.drill_down_scope_text`；若没有该字段，再展示 `primary_display.overall_summary.drill_down_rule_text`。这段说明必须明确完整规则：先按门槛过滤，再决定是否截断到最多 5 个；如果一个都没达到门槛，必须明确说明保底继续分析拖累路由金额最高的 1 个切片。只有当 `drill_down_rule.cap_applied = true` 时，才允许说“前 5 个”或类似表述；如果 `cap_applied = false`，禁止说“前 5 个主要切片”，而要如实说明“共有多少个切片达到门槛、后续继续其中多少个”。第三阶段停住时明确说出异常资产维度、异常桶、影响路由金额、第四阶段门槛以及为什么停在第三阶段。`terminal_reason`、`next_action`、`run_asset`、`run_funding`、JSON 字段名只供内部路由和核对，禁止原样输出给用户，也不要自己臆造或拼接这些内部字段；对用户优先复用业务结论表达，例如“更像低承接率切片占比上升”“继续看资产维度”“继续看敏感资方侧”或“本阶段先停止”。如果结果里有 `root_cause`，优先翻译成便于排查的表达。
