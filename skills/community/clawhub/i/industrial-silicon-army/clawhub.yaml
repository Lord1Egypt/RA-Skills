# Security & Privacy Configuration (v1.3.0)
# 解决 ClawScan Suspicious: LLM行为分析问题
security:
  # 文件系统读写范围限制
  read_scope:
    - "./data/industrial-silicon-army/"
    - "./config/"
    - "./scripts/"
  write_scope:
    - "./data/industrial-silicon-army/output/"
  
  # 敏感数据处理策略
  sensitive_data_handling: "mask_and_encrypt"
  mask_fields:
    - account      # 银行账号
    - tax_id       # 税号
    - credit_score # 信用评分
    - payment_info # 支付信息
  
  # 操作确认要求
  require_confirmation: true
  confirmation_triggers:
    - "procurement"    # 采购建议
    - "payment"       # 支付相关
    - "data_export"   # 数据导出
  
  # 禁止的自动操作
  auto_purchase: false        # 禁止自动下单
  auto_payment: false         # 禁止自动付款
  auto_transfer: false        # 禁止自动转账
  
  # 数据保留策略
  data_retention:
    financial: 0      # 财务数据不持久化
    logs: 30          # 操作日志保留30天
    analytics: 90    # 分析数据保留90天
  
  # API调用限制
  api_restrictions:
    1688:
      read_only: true
      auto_order: false
      require_human_review: true
