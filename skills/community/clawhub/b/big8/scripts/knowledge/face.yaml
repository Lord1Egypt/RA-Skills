# 👀 面相知识库

# === 三停 ===
three_sections:
  上停（额头）:
    description: 额头到眉毛，主早年运(15-30岁)
    好: 额头宽阔饱满 → 聪明、祖业好
    差: 额头窄小凹陷 → 早年辛苦、运势反复
  中停（鼻子到嘴）:
    description: 眉毛到鼻尖，主中年运(31-50岁)
    好: 鼻梁挺直有肉 → 财运好、事业有成
    差: 鼻梁凹陷歪斜 → 中年波折
  下停（下巴）:
    description: 鼻尖到下巴，主晚年运(50岁后)
    好: 下巴圆润饱满 → 晚年福气
    差: 下巴尖削 → 晚年孤独

# === 五官 ===
five_features:
  耳:
    好: 耳垂厚大 → 福气好
    差: 耳朵无垂 → 福薄
    注意: 耳高于眉 → 聪明早慧
  眉:
    好: 眉毛清秀有弧度 → 人缘好
    差: 眉尾散乱 → 财运不稳
    注意: 眉间距宽 → 心胸开阔
  眼:
    好: 眼神明亮 → 正直聪明
    差: 眼神游移 → 心机重
    注意: 眼尾上扬 → 威严/领导力
  鼻:
    好: 鼻头有肉 → 财运好
    差: 鼻梁起节 → 性格固执
    注意: 鼻孔不外露 → 守财
  口:
    好: 嘴角上扬 → 乐观人缘好
    差: 嘴唇薄 → 口舌多
    注意: 唇色红润 → 身体好

# === 十二宫 ===
twelve_palaces:
  命宫（印堂）: "两眉之间，主一生运势"
  财帛宫（鼻头）: "鼻子，主财运"
  兄弟宫（眉毛）: "眉毛，主兄弟姐妹缘分"
  夫妻宫（眼角）: "眼尾，主婚姻感情"
  子女宫（眼下）: "卧蚕位置，主子嗣"
  疾厄宫（鼻梁）: "山根，主健康"
  迁移宫（额头两侧）: "额头两边，主外出运势"
  交友宫（下巴两侧）: "脸颊，主社交"
  官禄宫（额头中间）: "额中，主事业前途"
  田宅宫（眉眼之间）: "上眼皮，主房产"
  福德宫（眉尾上方）: "额角，主福气"
  父母宫（日月角）: "额头左右，主父母缘分"

# === 痣 ===
moles:
  吉痣: [额头正中有痣(贵气), 下巴有痣(旺夫/旺妻), 耳后有痣(暗财)]
  凶痣: [鼻头有痣(破财), 眉间有痣(心胸窄), 嘴角有痣(口舌)]

# === 纹路 ===
lines:
  好纹: 法令纹深而长 → 有权威
  坏纹: 额头川字纹深 → 操心命
