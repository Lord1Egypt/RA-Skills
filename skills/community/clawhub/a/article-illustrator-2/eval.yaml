version: "1"
defaults:
  trials: 3
  timeout: 300
  threshold: 0.8

trigger_tests:
  - id: explicit-article-illustrator
    should_trigger: true
    prompt: "Use the article-illustrator skill to add images to this article."
  - id: implicit-article-illustrator
    should_trigger: true
    prompt: "Generate multiple illustrations for sections of this article and place them back into the markdown."
  - id: negative-control-cover
    should_trigger: false
    prompt: "Make one single hero cover image for this post."

outcome_tests:
  - id: file-structure
    type: deterministic
    checks:
      - file_exists: "SKILL.md"
      - file_exists: "package.json"
      - file_exists: "scripts/scaffold.ts"
      - file_exists: "scripts/build-prompts.ts"
      - file_exists: "scripts/build-batch.ts"
      - file_exists: "scripts/insert-images.ts"
