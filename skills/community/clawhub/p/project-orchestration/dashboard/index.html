<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orchestration Dashboard</title>
<style>
  :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #c9d1d9; --muted: #8b949e; --blue: #58a6ff; --green: #3fb950; --red: #f85149; --yellow: #d29922; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 24px; }
  h1 { font-size: 24px; margin-bottom: 4px; color: #fff; }
  .subtitle { color: var(--muted); margin-bottom: 24px; font-size: 14px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  .card h2 { font-size: 14px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin-bottom: 12px; }
  .stat-row { display: flex; gap: 16px; flex-wrap: wrap; }
  .stat { flex: 1; min-width: 100px; }
  .stat .value { font-size: 28px; font-weight: 600; color: #fff; }
  .stat .label { font-size: 12px; color: var(--muted); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 6px 8px; color: var(--muted); border-bottom: 1px solid var(--border); font-weight: 500; }
  td { padding: 6px 8px; border-bottom: 1px solid var(--border); }
  .badge { display: inline-block; padding: 1px 6px; border-radius: 10px; font-size: 11px; font-weight: 500; }
  .badge-active { background: rgba(63,185,80,.15); color: var(--green); }
  .badge-broken { background: rgba(248,81,73,.15); color: var(--red); }
  .badge-removed { background: rgba(139,148,158,.15); color: var(--muted); }
  .badge-free { background: rgba(89,166,255,.15); color: var(--blue); }
  .badge-sub { background: rgba(210,153,34,.15); color: var(--yellow); }
  .badge-payg { background: rgba(248,81,73,.15); color: var(--red); }
  .status-bar { display: flex; gap: 12px; align-items: center; padding: 12px 16px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 16px; font-size: 13px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .status-dot.green { background: var(--green); }
  .status-dot.yellow { background: var(--yellow); }
  .status-dot.red { background: var(--red); }
  .error { color: var(--red); font-size: 13px; padding: 8px; }
  .loading { color: var(--muted); font-size: 13px; padding: 8px; }
  .section-tabs { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 1px solid var(--border); }
  .tab { padding: 8px 16px; font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent; color: var(--muted); }
  .tab.active { color: #fff; border-bottom-color: var(--blue); }
  .section { display: none; }
  .section.active { display: block; }
</style>
</head>
<body>
  <h1>Orchestration Dashboard</h1>
  <p class="subtitle">Model inventory, session log, price tracking</p>

  <div class="status-bar" id="statusBar">
    <span class="status-dot green" id="statusDot"></span>
    <span id="statusText">Connecting...</span>
  </div>

  <div class="section-tabs">
    <div class="tab active" onclick="switchTab('models')">Models</div>
    <div class="tab" onclick="switchTab('sessions')">Sessions</div>
    <div class="tab" onclick="switchTab('prices')">Price Changes</div>
  </div>

  <div id="section-models" class="section active">
    <div id="modelStats" class="grid"></div>
    <div class="card" id="modelTable"></div>
  </div>

  <div id="section-sessions" class="section">
    <div class="card" id="sessionContent"></div>
  </div>

  <div id="section-prices" class="section">
    <div class="card" id="priceContent"></div>
  </div>

<script>
const BASE = '';
let data = null;

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('section-' + name).classList.add('active');
}

function updateStatus(ok, msg) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.className = 'status-dot ' + (ok ? 'green' : 'red');
  txt.textContent = msg || (ok ? 'Connected' : 'Disconnected');
}

async function fetchAll() {
  try {
    const r = await fetch(BASE + '/api/all');
    data = await r.json();
    updateStatus(true, 'Connected — ' + data.models.total + ' models, ' + data.sessions.count + ' sessions');
    renderModels();
    renderSessions();
    renderPrices();
  } catch(e) {
    updateStatus(false, 'Failed to connect: ' + e.message);
  }
}

function renderModels() {
  if (!data || !data.models) {
    document.getElementById('modelStats').innerHTML = '<div class="card">No model data</div>';
    return;
  }
  const m = data.models;
  document.getElementById('modelStats').innerHTML = `
    <div class="card"><div class="stat-row">
      <div class="stat"><div class="value">${m.total}</div><div class="label">Total</div></div>
      <div class="stat"><div class="value">${m.active}</div><div class="label">Active</div></div>
      <div class="stat"><div class="value">${m.broken}</div><div class="label">Broken</div></div>
      <div class="stat"><div class="value">${m.removed}</div><div class="label">Removed</div></div>
    </div></div>
  `;

  let html = '<h2>Model Inventory</h2><table><tr><th>ID</th><th>Provider</th><th>Speed</th><th>Context</th><th>Status</th><th>Cost</th><th>Notes</th></tr>';
  for (const model of m.models) {
    const b = model.agent_ready && model.status !== 'removed' ? 'badge-active' : !model.agent_ready ? 'badge-broken' : 'badge-removed';
    const l = model.agent_ready && model.status !== 'removed' ? 'active' : !model.agent_ready ? 'broken' : 'removed';
    const costBadge = model.cost_type === 'free_tier' || model.cost_type === 'free' ? 'badge-free' : model.cost_type === 'subscription' ? 'badge-sub' : 'badge-payg';
    html += `<tr>
      <td style="font-family:monospace;font-size:12px">${model.id}</td>
      <td>${model.provider}</td>
      <td>${'★'.repeat(typeof model.speed === 'number' ? model.speed : 0)}${'☆'.repeat(Math.max(0, 5 - (typeof model.speed === 'number' ? model.speed : 0)))}</td>
      <td>${model.context >= 1000000 ? (model.context/1000000).toFixed(0)+'M' : model.context >= 1000 ? (model.context/1000).toFixed(0)+'K' : model.context}</td>
      <td><span class="badge ${b}">${l}</span></td>
      <td><span class="badge ${costBadge}">${model.cost_type}</span></td>
      <td style="color:var(--muted);font-size:12px">${model.notes || ''}</td>
    </tr>`;
  }
  html += '</table>';
  document.getElementById('modelTable').innerHTML = html;
}

function renderSessions() {
  const s = data.sessions;
  if (!s || !s.sessions || s.sessions.length === 0) {
    document.getElementById('sessionContent').innerHTML = '<h2>Session Log</h2><p class="loading">No sessions logged yet.</p>';
    return;
  }
  let html = '<h2>Session Log (' + s.count + ')</h2><table><tr><th>Date</th><th>Project</th><th>Task</th><th>Model</th><th>Status</th></tr>';
  for (const sess of s.sessions) {
    html += `<tr><td>${sess.date}</td><td>${sess.project}</td><td>${sess.task}</td><td style="font-family:monospace;font-size:12px">${sess.model}</td><td>${sess.status}</td></tr>`;
  }
  html += '</table>';
  document.getElementById('sessionContent').innerHTML = html;
}

function renderPrices() {
  const p = data.prices;
  if (!p || !p.entries || p.entries.length === 0) {
    document.getElementById('priceContent').innerHTML = '<h2>Price Changes</h2><p class="loading">No price changes recorded yet.</p>';
    return;
  }
  let html = '<h2>Price Changes (' + p.count + ')</h2><div style="font-family:monospace;font-size:12px;white-space:pre-wrap">';
  for (const e of p.entries) {
    html += e.text + '\n';
  }
  html += '</div>';
  document.getElementById('priceContent').innerHTML = html;
}

fetchAll();
setInterval(fetchAll, 30000);
</script>
</body>
</html>
